<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0369a1">
<meta name="description" content="CuidadoMayor — Apoyo al Cuidado del Adulto Mayor en Chile">
<title>CuidadoMayor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f0f6ff;--card:#ffffff;--card2:#e8f2ff;--border:#b8d4f0;--accent:#0369a1;--text:#1e3a5f;--muted:#6b8fa5;--green:#16a34a;--yellow:#d97706;--red:#dc2626;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:17px}
a{color:var(--accent)}
header{background:linear-gradient(90deg,#0c4a7a,#0369a1);padding:13px 18px;position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;color:white}
header h1{font-size:1.18rem;font-weight:700;letter-spacing:.01em}
header p{font-size:.8rem;opacity:.85}
nav{background:#fff;border-bottom:2px solid var(--border);display:flex;overflow-x:auto;position:sticky;top:62px;z-index:40;-webkit-overflow-scrolling:touch}
nav::-webkit-scrollbar{height:3px}
nav button{flex:0 0 auto;padding:11px 14px;font-size:.82rem;font-weight:600;color:var(--muted);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap;transition:color .2s}
nav button.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab{display:none;padding:16px;max-width:680px;margin:0 auto}
.tab.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px}
.card2{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px}
.card-title{font-size:1rem;font-weight:700;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.label{font-size:.82rem;color:var(--muted);font-weight:600;margin-bottom:4px;display:block}
input,select,textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:16px;font-family:'Inter',sans-serif;color:var(--text);background:#fff;margin-bottom:10px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
textarea{resize:vertical;min-height:70px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 20px;border-radius:9px;font-size:.95rem;font-weight:600;cursor:pointer;border:none;transition:opacity .2s}
.btn:active{opacity:.75}
.btn-primary{background:var(--accent);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-outline{background:none;color:var(--accent);border:2px solid var(--accent)}
.btn-sm{padding:7px 13px;font-size:.82rem}
.btn-block{width:100%;display:flex}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:700}
.badge-green{background:#dcfce7;color:var(--green)}
.badge-yellow{background:#fef3c7;color:var(--yellow)}
.badge-red{background:#fee2e2;color:var(--red)}
.badge-blue{background:#dbeafe;color:var(--accent)}
.row{display:flex;gap:10px;flex-wrap:wrap}
.row > *{flex:1;min-width:120px}
.med-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;position:relative}
.med-card .med-name{font-size:1.05rem;font-weight:700;margin-bottom:2px}
.med-card .med-info{font-size:.85rem;color:var(--muted);margin-bottom:8px}
.dot-taken{display:inline-block;width:13px;height:13px;border-radius:50%;background:var(--green)}
.dot-missed{display:inline-block;width:13px;height:13px;border-radius:50%;background:var(--red)}
.dot-pending{display:inline-block;width:13px;height:13px;border-radius:50%;background:#e2e8f0;border:1px solid #94a3b8}
.vital-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.vital-row:last-child{border-bottom:none}
.vital-label{font-size:.92rem;font-weight:600}
.vital-val{font-size:1.1rem;font-weight:700}
.tag{display:inline-block;background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:4px 12px;font-size:.8rem;margin:3px;cursor:pointer}
.tag.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
.section-title{font-size:1.05rem;font-weight:700;color:var(--accent);margin:18px 0 10px}
.alert-box{border-radius:10px;padding:12px 14px;margin-bottom:10px;font-size:.9rem;display:flex;gap:10px;align-items:flex-start}
.alert-box.warn{background:#fef3c7;border-left:4px solid var(--yellow)}
.alert-box.danger{background:#fee2e2;border-left:4px solid var(--red)}
.alert-box.info{background:#dbeafe;border-left:4px solid var(--accent)}
.alert-box.success{background:#dcfce7;border-left:4px solid var(--green)}
.emergency-contact{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.emergency-contact:last-child{border-bottom:none}
.checklist-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer}
.checklist-item:last-child{border-bottom:none}
.checklist-item input[type=checkbox]{width:22px;height:22px;flex:0 0 22px;cursor:pointer;margin:0;margin-bottom:0}
.checklist-item span{font-size:.95rem;line-height:1.4}
.fonasa-tramo{border-radius:10px;padding:13px;margin-bottom:10px;border-left:5px solid}
.tramo-a{background:#f0fdf4;border-color:var(--green)}
.tramo-b{background:#eff6ff;border-color:#3b82f6}
.tramo-c{background:#fef3c7;border-color:var(--yellow)}
.tramo-d{background:#fff7ed;border-color:#f97316}
.ges-item{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:12px 14px;margin-bottom:8px}
.ges-item summary{font-weight:600;cursor:pointer;font-size:.95rem}
.ges-item p{font-size:.85rem;color:var(--muted);margin-top:8px;line-height:1.5}
.burnout-q{margin-bottom:16px}
.burnout-q .q-text{font-size:.97rem;font-weight:600;margin-bottom:8px}
.scale-row{display:flex;gap:8px}
.scale-btn{flex:1;padding:8px 4px;border:1.5px solid var(--border);border-radius:8px;font-size:.95rem;font-weight:700;background:#fff;cursor:pointer;text-align:center;color:var(--muted)}
.scale-btn.sel{background:var(--accent);color:#fff;border-color:var(--accent)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto}
.modal-title{font-size:1.1rem;font-weight:700;color:var(--accent);margin-bottom:14px}
.chip-group{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.chip{display:inline-block;padding:5px 13px;border-radius:20px;background:var(--card2);border:1.5px solid var(--border);cursor:pointer;font-size:.82rem;font-weight:600;user-select:none}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.toggle{position:relative;display:inline-block;width:46px;height:26px}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:#ccc;border-radius:26px;cursor:pointer;transition:.3s}
.slider:before{content:'';position:absolute;width:20px;height:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked + .slider{background:var(--accent)}
input:checked + .slider:before{transform:translateX(20px)}
.day-dot{display:inline-block;width:28px;height:28px;border-radius:50%;text-align:center;line-height:28px;font-size:.72rem;font-weight:700;margin:2px;border:1.5px solid var(--border);background:#f8fafc}
.day-dot.taken{background:var(--green);color:#fff;border-color:var(--green)}
.day-dot.missed{background:var(--red);color:#fff;border-color:var(--red)}
.day-dot.future{background:#f1f5f9;color:#94a3b8;border-color:#e2e8f0}
hr{border:none;border-top:1px solid var(--border);margin:14px 0}
.status-btn{padding:10px 18px;border-radius:10px;font-size:.9rem;font-weight:700;border:2px solid transparent;cursor:pointer;flex:1}
.status-btn.active-bien{background:#dcfce7;color:var(--green);border-color:var(--green)}
.status-btn.active-regular{background:#fef3c7;color:var(--yellow);border-color:var(--yellow)}
.status-btn.active-mal{background:#fee2e2;color:var(--red);border-color:var(--red)}
.status-btn:not([class*="active"]){background:#f1f5f9;color:var(--muted)}
.chart-wrap{position:relative;height:200px;margin-top:10px}
.small-note{font-size:.8rem;color:var(--muted);margin-top:-6px;margin-bottom:8px}
.print-card{background:#fff;border:2px solid var(--text);border-radius:10px;padding:16px;font-size:.88rem}
.print-card h2{font-size:1.1rem;font-weight:700;margin-bottom:10px;text-align:center}
.print-card table{width:100%;border-collapse:collapse;font-size:.82rem}
.print-card td{padding:4px 6px;border-bottom:1px solid #e2e8f0}
.print-card td:first-child{font-weight:600;width:40%}
.progress-bar{background:#e2e8f0;border-radius:6px;height:10px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:6px;background:var(--accent);transition:width .4s}
@media(min-width:600px){.tab{padding:20px}}
@media print{
  header,nav,.no-print{display:none!important}
  body{background:#fff}
  .tab{display:block!important;padding:0}
  #tab5{display:none!important}
  .print-card{border:2px solid #000;page-break-inside:avoid}
  .modal-overlay{display:none!important}
}
</style>
</head>
<body>

<header>
  <div>
    <h1>CuidadoMayor</h1>
    <p id="headerPatient">Apoyo al Cuidado del Adulto Mayor</p>
  </div>
  <div style="font-size:1.6rem">🏥</div>
</header>

<nav id="mainNav">
  <button class="active" onclick="showTab(0)">🏠 Resumen</button>
  <button onclick="showTab(1)">💊 Medicamentos</button>
  <button onclick="showTab(2)">📅 Citas y Salud</button>
  <button onclick="showTab(3)">🏥 Beneficios</button>
  <button onclick="showTab(4)">❤️ Cuidador</button>
</nav>

<!-- ===== TAB 1: RESUMEN ===== -->
<div class="tab active" id="tab0">
  <div id="tab0Content"></div>
</div>

<!-- ===== TAB 2: MEDICAMENTOS ===== -->
<div class="tab" id="tab1">
  <div id="tab1Content"></div>
</div>

<!-- ===== TAB 3: CITAS Y SALUD ===== -->
<div class="tab" id="tab2">
  <div id="tab2Content"></div>
</div>

<!-- ===== TAB 4: BENEFICIOS FONASA ===== -->
<div class="tab" id="tab3">
  <div id="tab3Content"></div>
</div>

<!-- ===== TAB 5: RECURSOS CUIDADOR ===== -->
<div class="tab" id="tab4">
  <div id="tab4Content"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent"></div>
</div>

<script>
// ======== STORAGE ========
const STORAGE_KEY = 'cuidadomayor_v1';
let state = {
  patient:{name:'Rosa González',age:78,rut:'12.345.678-9',birthdate:'1946-03-15',bloodType:'O+',medico:'Dr. Andrés Torres',phone:''},
  conditions:['HTA','Diabetes'],
  allergies:'Penicilina',
  surgeries:['Cadera derecha (2018)'],
  emergencyContacts:[
    {name:'Carmen González (hija)',phone:'+56 9 8765 4321',rel:'Hija'},
    {name:'Mario González (hijo)',phone:'+56 9 7654 3210',rel:'Hijo'},
    {name:'Dr. Andrés Torres',phone:'+56 2 2456 7890',rel:'Médico'}
  ],
  medications:[
    {id:'m1',name:'Enalapril',purpose:'Presión arterial',dose:'10',unit:'mg',via:'Oral',times:['08:00','20:00'],days:'todos',stock:45,stockMin:14,fonasa:true,doctor:'Dr. Torres',startDate:'2022-01-10',endDate:'',notes:'Tomar con agua',taken:{}},
    {id:'m2',name:'Metformina',purpose:'Diabetes tipo 2',dose:'850',unit:'mg',via:'Oral',times:['08:00','13:00','20:00'],days:'todos',stock:30,stockMin:21,fonasa:true,doctor:'Dr. Torres',startDate:'2021-06-15',endDate:'',notes:'Tomar con comida',taken:{}},
    {id:'m3',name:'Atorvastatina',purpose:'Colesterol',dose:'40',unit:'mg',via:'Oral',times:['22:00'],days:'todos',stock:8,stockMin:7,fonasa:false,doctor:'Dr. Torres',startDate:'2023-03-20',endDate:'',notes:'Tomar de noche',taken:{}}
  ],
  appointments:[
    {id:'a1',date:'2026-03-24',time:'10:30',type:'Control',especialidad:'Medicina Interna',centro:'CESFAM La Pintana',doctor:'Dr. Torres',motivo:'Control HTA y Diabetes',fonasa:'B',result:'',nextAppt:''},
    {id:'a2',date:'2026-04-08',time:'14:00',type:'Especialista',especialidad:'Cardiología',centro:'Hospital Barros Luco',doctor:'Dra. Mónica Reyes',motivo:'Control cardíaco anual',fonasa:'B',result:'',nextAppt:''},
    {id:'a3',date:'2026-02-15',time:'09:00',type:'Examen',especialidad:'Laboratorio',centro:'CESFAM La Pintana',doctor:'Dr. Torres',motivo:'Hemoglobina glicosilada',fonasa:'B',result:'HbA1c 7.2% - bien controlada',nextAppt:''}
  ],
  vitals:{
    presion:[{date:'2026-03-15',val1:138,val2:86,note:''},{date:'2026-03-10',val1:142,val2:90,note:'Estrés'},{date:'2026-03-05',val1:135,val2:84,note:''},{date:'2026-02-28',val1:140,val2:88,note:''},{date:'2026-02-20',val1:145,val2:92,note:''}],
    temperatura:[{date:'2026-03-15',val:36.8,note:''},{date:'2026-03-10',val:37.1,note:''},{date:'2026-03-05',val:36.7,note:''}],
    glucosa:[{date:'2026-03-15',val:118,note:'Ayunas'},{date:'2026-03-10',val:125,note:'Ayunas'},{date:'2026-03-05',val:112,note:'Ayunas'},{date:'2026-02-28',val:130,note:'Ayunas'}],
    peso:[{date:'2026-03-15',val:72,note:''},{date:'2026-03-05',val:72.5,note:''},{date:'2026-02-20',val:73,note:''}],
    oximetria:[{date:'2026-03-15',val:97,note:''},{date:'2026-03-10',val:96,note:''},{date:'2026-03-05',val:97,note:''}],
    frecuencia:[{date:'2026-03-15',val:74,note:''},{date:'2026-03-10',val:78,note:''},{date:'2026-03-05',val:72,note:''}]
  },
  todayStatus:{status:'',note:''},
  homeSafety:{agarre:false,antideslizante:false,iluminacion:false,alfombras:false,medicamentos:false,telefono:false,baranda:false,botiquin:false},
  burnout:[0,0,0,0,0]
};

function loadState(){
  try{const s=localStorage.getItem(STORAGE_KEY);if(s){const parsed=JSON.parse(s);state=Object.assign({},state,parsed);if(!state.vitals)state.vitals={presion:[],temperatura:[],glucosa:[],peso:[],oximetria:[],frecuencia:[]};if(!state.patient)state.patient={name:'Rosa González',age:78,rut:'12.345.678-9',birthdate:'1946-03-15',bloodType:'O+',medico:'Dr. Andrés Torres',phone:''};if(!state.medications)state.medications=[];if(!state.appointments)state.appointments=[];if(!state.emergencyContacts)state.emergencyContacts=[];if(!state.homeSafety)state.homeSafety={};}}catch(e){}
}
function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch(e){}}

// ======== UTILS ========
function today(){const d=new Date();return d.toISOString().split('T')[0];}
function todayKey(){return today();}
function formatDate(d){if(!d)return '';const p=d.split('-');return `${p[2]}/${p[1]}/${p[0]}`;}
function formatDateLong(d){if(!d)return '';const months=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];const p=d.split('-');return `${parseInt(p[2])} de ${months[parseInt(p[1])-1]} ${p[0]}`;}
function daysUntil(dateStr){const now=new Date(today());const target=new Date(dateStr);const diff=Math.round((target-now)/(1000*60*60*24));return diff;}
function uniqueId(){return 'm'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function el(id){return document.getElementById(id);}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ======== TABS ========
let currentTab=0;
const tabCharts={};
function showTab(i){
  document.querySelectorAll('.tab').forEach((t,idx)=>{t.classList.toggle('active',idx===i);});
  document.querySelectorAll('nav button').forEach((b,idx)=>{b.classList.toggle('active',idx===i);});
  currentTab=i;
  renderTab(i);
}
function renderTab(i){
  if(i===0)renderResumen();
  else if(i===1)renderMedicamentos();
  else if(i===2)renderCitas();
  else if(i===3)renderBeneficios();
  else if(i===4)renderCuidador();
}

// ======== MODAL ========
function openModal(html){el('modalContent').innerHTML=html;el('modalOverlay').classList.add('open');document.body.style.overflow='hidden';}
function closeModal(e){if(e&&e.target!==el('modalOverlay')&&!e.target.classList.contains('close-modal'))return;el('modalOverlay').classList.remove('open');document.body.style.overflow='';}
function closeModalForce(){el('modalOverlay').classList.remove('open');document.body.style.overflow='';}

// ======== RESUMEN ========
function renderResumen(){
  const td=today();
  // Med status
  const meds=state.medications;
  let total=0,taken=0,overdue=0;
  const now=new Date();
  const nowMin=now.getHours()*60+now.getMinutes();
  meds.forEach(m=>{
    if(m.days==='todos'||isDayMatch(m)){
      m.times.forEach(t=>{
        total++;
        const key=`${td}_${m.id}_${t}`;
        if(state.taken&&state.taken[key]){taken++;}
        else{
          const [h,min]=t.split(':').map(Number);
          if(h*60+min<nowMin-30)overdue++;
        }
      });
    }
  });
  const pending=total-taken;
  let medStatus,medClass;
  if(total===0){medStatus='Sin medicamentos hoy';medClass='info';}
  else if(pending===0){medStatus='¡Medicamentos al día!';medClass='success';}
  else if(overdue>0){medStatus=`${overdue} medicamento${overdue>1?'s':''} atrasado${overdue>1?'s':''}`;medClass='danger';}
  else{medStatus=`Quedan ${pending} medicamento${pending>1?'s':''} pendiente${pending>1?'s':''}`;medClass='warn';}

  // Next appointments
  const upcoming=state.appointments.filter(a=>a.date>=td).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,3);
  // Last vitals
  const lv=state.vitals;
  const lastBP=lv.presion&&lv.presion.length?lv.presion[0]:null;
  const lastTemp=lv.temperatura&&lv.temperatura.length?lv.temperatura[0]:null;
  const lastGlu=lv.glucosa&&lv.glucosa.length?lv.glucosa[0]:null;
  const lastPeso=lv.peso&&lv.peso.length?lv.peso[0]:null;
  // Alerts
  const alerts=[];
  meds.forEach(m=>{const days=m.times.length>0?Math.floor(m.stock/m.times.length):m.stock;if(days<=(m.stockMin||7))alerts.push({type:'warn',msg:`<b>${escHtml(m.name)}</b>: stock bajo (${m.stock} unidades, ~${days} días)`});});
  upcoming.forEach(a=>{const d=daysUntil(a.date);if(d>=0&&d<=7)alerts.push({type:'info',msg:`Cita en ${d===0?'hoy':d===1?'1 día':`${d} días`}: <b>${escHtml(a.especialidad)}</b> con ${escHtml(a.doctor)}`});});

  // Today med checklist
  let checkHtml='';
  if(!state.taken)state.taken={};
  meds.forEach(m=>{
    m.times.forEach(t=>{
      const key=`${td}_${m.id}_${t}`;
      const isTaken=!!state.taken[key];
      const [h,min]=t.split(':').map(Number);
      const isLate=(h*60+min)<nowMin-30&&!isTaken;
      checkHtml+=`<div class="checklist-item" onclick="toggleMedTaken('${escHtml(key)}')">
        <input type="checkbox" ${isTaken?'checked':''} onclick="event.stopPropagation();toggleMedTaken('${escHtml(key)}')">
        <span style="flex:1"><b>${escHtml(m.name)}</b> ${m.dose}${m.unit} — ${t} ${isLate?'<span class="badge badge-red">Atrasado</span>':''}</span>
      </div>`;
    });
  });
  if(!checkHtml)checkHtml='<p style="color:var(--muted);font-size:.9rem">No hay medicamentos registrados para hoy.</p>';

  // Status
  const statOpts=['Bien','Regular','Mal'];
  const statColors=['#16a34a','#d97706','#dc2626'];
  const statEmoji=['🟢','🟡','🔴'];
  let statHtml=statOpts.map((s,i)=>`<button class="status-btn${state.todayStatus.status===s?` active-${s.toLowerCase()}`:''}${state.todayStatus.status===''&&i===0?' ':''}' onclick="setStatus('${s}')">${statEmoji[i]} ${s}</button>`).join('');

  const html=`
  <div class="card2">
    <div class="card-title">📅 ${new Date().toLocaleDateString('es-CL',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>
    <div style="font-size:1.1rem;font-weight:600;color:var(--text)">Paciente: ${escHtml(state.patient.name)}, ${state.patient.age} años</div>
    <div style="font-size:.88rem;color:var(--muted);margin-top:3px">Médico: ${escHtml(state.patient.medico)}</div>
  </div>

  } else {
    html+=`<div class="card"><div class="card-title">📊 Adherencia global (30 días)</div>`;
    const rate=compliance.global;
    html+=`<div style="font-size:1.4rem;font-weight:700;color:${rate>=80?'var(--green)':rate>=60?'var(--yellow)':'var(--red)'}">${rate}%</div>`;
    html+=`<div class="progress-bar"><div class="progress-fill" style="width:${rate}%;background:${rate>=80?'var(--green)':rate>=60?'var(--yellow)':'var(--red)'}"></div></div></div>`;

    state.medications.forEach(m=>{
      const daysSupply=m.times.length>0?Math.floor(m.stock/m.times.length):m.stock;
      const lowStock=daysSupply<=(m.stockMin||7);
      const dots=buildDots(m);
      html+=`<div class="med-card">
        <div style="display:flex;align-items:flex-start;justify-content:space-between">
          <div style="flex:1">
            <div class="med-name">${escHtml(m.name)} ${lowStock?'<span class="badge badge-red">Stock bajo</span>':''}</div>
            <div class="med-info">${escHtml(m.purpose)} — ${m.dose}${m.unit} ${escHtml(m.via)}</div>
            <div class="med-info">Horario: ${m.times.join(', ')} | Stock: ${m.stock} uds (≈${daysSupply} días) ${m.fonasa?'<span class="badge badge-green">FONASA</span>':''}</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px">
            <button class="btn btn-sm btn-outline" onclick="editMed('${m.id}')">✏️</button>
            <button class="btn btn-sm btn-red" onclick="deleteMed('${m.id}')">🗑️</button>
          </div>
        </div>
        <div style="margin-top:8px">${dots}</div>
        <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
          ${m.times.map(t=>{
            const key=`${today()}_${m.id}_${t}`;

            return `<button class="btn btn-sm ${isTaken?'btn-green':'btn-outline'}" onclick="toggleMedTaken('${escHtml(key)}')">${isTaken?'✅':'⬜'} ${t}</button>`;
          }).join('')}
          <button class="btn btn-sm btn-outline" onclick="showMedHistory('${m.id}')">📊 Historial</button>
        </div>
      </div>`;
    });
  }
  el('tab1Content').innerHTML=html;
}

function calcCompliance(){
  if(!state.taken)return{global:100};
  const keys=Object.keys(state.taken);
  if(keys.length===0)return{global:100};
  const taken=keys.filter(k=>state.taken[k]).length;
  return{global:Math.round(taken/keys.length*100)};
}

function buildDots(m){
  const days=30;
  let html='<div style="display:flex;flex-wrap:wrap;gap:2px">';
  for(let i=days-1;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const dk=d.toISOString().split('T')[0];
    const isFuture=i<0;
    let status='pending';
    if(!isFuture){
      let allTaken=true,anyKey=false;
      m.times.forEach(t=>{
        const key=`${dk}_${m.id}_${t}`;
        anyKey=true;
        if(!state.taken||!state.taken[key])allTaken=false;
      });
      if(anyKey)status=allTaken?'taken':'missed';
    }
    html+=`<div class="day-dot ${status}" title="${formatDate(dk)}">${dk===today()?'H':''}</div>`;
  }
  html+='</div>';
  return html;
}

function buildVitalTable(type){
  const data=(state.vitals[type]||[]).slice(0,5);
  if(data.length===0)return '<p style="color:var(--muted);font-size:.85rem">Sin registros.</p>';
  let colorFn;
  if(type==='presion')colorFn=v=>bpColor(v.val1,v.val2);
  else if(type==='temperatura')colorFn=v=>tempColor(v.val);
  else if(type==='glucosa')colorFn=v=>gluColor(v.val);
  else if(type==='oximetria')colorFn=v=>oxyColor(v.val);
  else if(type==='frecuencia')colorFn=v=>hrColor(v.val);
  else colorFn=()=>'var(--text)';
  return `<div style="font-size:.88rem">${data.map(v=>`<div class="vital-row"><div class="vital-label" style="font-size:.85rem">${formatDate(v.date)}</div><div class="vital-val" style="font-size:1rem;color:${colorFn(v)}">${type==='presion'?`${v.val1}/${v.val2} mmHg`:type==='temperatura'?`${v.val}°C`:type==='glucosa'?`${v.val} mg/dL`:type==='oximetria'?`${v.val}%`:type==='frecuencia'?`${v.val} lpm`:`${v.val} kg`}</div>${v.note?`<div style="color:var(--muted);font-size:.78rem">${escHtml(v.note)}</div>`:''}</div>`).join('')}</div>`;
}
function renderVitalCharts(){
  const vd=state.vitals;
  const buildChart=(id,data,label,color,getVal)=>{
    const canvas=el(id);if(!canvas)return;
    const sorted=[...data].reverse().slice(0,20);
    if(tabCharts[id])tabCharts[id].destroy();
    tabCharts[id]=new Chart(canvas.getContext('2d'),{type:'line',data:{labels:sorted.map(d=>formatDate(d.date)),datasets:[{label,data:sorted.map(getVal),borderColor:color,backgroundColor:color+'22',fill:true,tension:.3,pointRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10}}},y:{ticks:{font:{size:10}}}}}});
  };
  setTimeout(()=>{
    if(vd.presion&&vd.presion.length)buildChart('bpChart',vd.presion,'Sistólica','#dc2626',d=>d.val1);
    if(vd.temperatura&&vd.temperatura.length)buildChart('tempChart',vd.temperatura,'Temp °C','#f97316',d=>d.val);
    if(vd.glucosa&&vd.glucosa.length)buildChart('gluChart',vd.glucosa,'Glucosa mg/dL','#9333ea',d=>d.val);

  },80);
}

  </div>

  <div class="card">
    <div class="card-title">🏠 Lista de verificación del hogar seguro <span class="badge badge-blue">${safetyDone}/${safetyCkItems.length}</span></div>
    <div class="progress-bar" style="margin-bottom:12px"><div class="progress-fill" style="width:${Math.round(safetyDone/safetyCkItems.length*100)}%;background:${safetyDone===safetyCkItems.length?'var(--green)':'var(--accent)'}"></div></div>
    ${safetyCkItems.map(item=>`<div class="checklist-item" onclick="toggleSafety('${item.key}')">
      <input type="checkbox" ${state.homeSafety[item.key]?'checked':''} onclick="event.stopPropagation();toggleSafety('${item.key}')">
      <span>${escHtml(item.label)}</span>
    </div>`).join('')}
  </div>`;
  el('tab4Content').innerHTML=html;
}

function setBurnout(i,v){
  state.burnout[i]=v;
  saveState();
  renderCuidador();
}
function toggleSafety(key){
  state.homeSafety[key]=!state.homeSafety[key];
  saveState();
  renderCuidador();
}

// ======== INIT ========
loadState();
el('headerPatient').textContent=state.patient.name+', '+state.patient.age+' años';
renderResumen();

// Update header on patient change
function refreshHeader(){el('headerPatient').textContent=state.patient.name+', '+state.patient.age+' años';}
</script>
</body>
</html>
