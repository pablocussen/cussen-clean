<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#7c2d12">
<title>MascotasCL – Cuidado de Mascotas Chile</title>
<link rel="manifest" href="data:application/json,{}">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#fff7ed;--card:#ffffff;--card2:#ffedd5;--border:#fed7aa;--accent:#ea580c;--text:#7c2d12;--muted:#a16207;--green:#16a34a;--yellow:#d97706;--red:#dc2626;--blue:#0369a1;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
header{background:linear-gradient(90deg,#7c2d12,#ea580c);padding:13px 18px;position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;color:white}
header h1{font-size:1.1rem;font-weight:700;letter-spacing:-0.3px}
header span{font-size:1.4rem}
nav{background:#fff;border-bottom:2px solid var(--border);display:flex;overflow-x:auto;position:sticky;top:62px;z-index:40;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
nav button{border:none;background:none;padding:10px 14px;font-size:0.78rem;font-weight:600;color:var(--muted);white-space:nowrap;cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s;font-family:'Inter',sans-serif}
nav button.active{color:var(--accent);border-bottom-color:var(--accent)}
main{padding:16px;max-width:600px;margin:0 auto;padding-bottom:80px}
.tab{display:none}.tab.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(124,45,18,0.07)}
.card2{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
h2{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:12px}
h3{font-size:0.9rem;font-weight:600;color:var(--accent);margin-bottom:8px}
label{font-size:0.8rem;font-weight:600;color:var(--muted);display:block;margin-bottom:4px}
input,select,textarea{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-size:16px;font-family:'Inter',sans-serif;color:var(--text);background:#fff;margin-bottom:10px;outline:none;transition:border-color 0.2s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:70px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:9px;padding:9px 16px;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif}
.btn-primary{background:var(--accent);color:white}.btn-primary:hover{background:#c2410c}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:var(--red);color:white}.btn-danger:hover{opacity:0.85}
.btn-green{background:var(--green);color:white}
.btn-sm{padding:5px 10px;font-size:0.78rem}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:0.72rem;font-weight:600}
.badge-green{background:#dcfce7;color:var(--green)}
.badge-red{background:#fee2e2;color:var(--red)}
.badge-yellow{background:#fef3c7;color:var(--yellow)}
.badge-blue{background:#dbeafe;color:var(--blue)}
.badge-gray{background:#f3f4f6;color:#6b7280}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:#e5e7eb;border-radius:11px;cursor:pointer;transition:0.2s}
.slider:before{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:white;left:2px;top:2px;transition:0.2s}
input:checked+.slider{background:var(--green)}
input:checked+.slider:before{transform:translateX(18px)}
.pet-card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:14px;display:flex;gap:14px;align-items:flex-start;margin-bottom:12px;cursor:pointer;transition:all 0.2s}
.pet-card:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(234,88,12,0.12)}
.pet-card.selected{border-color:var(--accent);background:#fff7ed}
.pet-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;font-weight:700;color:white}
.pet-info{flex:1;min-width:0}
.pet-name{font-weight:700;font-size:1rem;color:var(--text)}
.pet-sub{font-size:0.78rem;color:var(--muted);margin-top:2px}
.alert-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #fde8d0}
.alert-icon{font-size:1.2rem;flex-shrink:0}
.alert-text{flex:1;font-size:0.82rem}
.alert-text strong{display:block;font-weight:600;color:var(--text)}
.alert-text span{color:var(--muted)}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-header h2{margin:0}
.vacc-item{border-left:4px solid var(--green);background:#f0fdf4;border-radius:0 9px 9px 0;padding:10px 12px;margin-bottom:8px}
.vacc-item.due{border-left-color:var(--yellow);background:#fefce8}
.vacc-item.overdue{border-left-color:var(--red);background:#fef2f2}
.vacc-name{font-weight:600;font-size:0.87rem;color:var(--text)}
.vacc-meta{font-size:0.75rem;color:var(--muted);margin-top:3px}
.med-item{background:var(--card2);border-radius:10px;padding:11px 13px;margin-bottom:8px;border:1px solid var(--border)}
.appt-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start}
.appt-date-box{background:var(--accent);color:white;border-radius:8px;width:46px;height:46px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.appt-day{font-size:1.3rem;font-weight:700;line-height:1}
.appt-month{font-size:0.65rem;font-weight:600;text-transform:uppercase;margin-top:1px}
.chart-wrap{position:relative;height:200px;margin:10px 0}
.bcs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.bcs-item{background:var(--card2);border-radius:9px;padding:8px;text-align:center}
.bcs-score{font-size:1.2rem;font-weight:700;color:var(--accent)}
.bcs-label{font-size:0.7rem;color:var(--muted);margin-top:2px}
.law-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
.law-title{font-weight:700;color:var(--accent);margin-bottom:8px;font-size:0.9rem}
.law-list{list-style:none;padding:0}
.law-list li{padding:5px 0;border-bottom:1px solid #fde8d0;font-size:0.83rem;padding-left:18px;position:relative}
.law-list li:before{content:'•';position:absolute;left:0;color:var(--accent)}
.law-list li:last-child{border-bottom:none}
.tip-card{background:var(--card2);border-radius:10px;padding:12px;margin-bottom:8px;border-left:4px solid var(--yellow)}
.tip-title{font-weight:700;font-size:0.85rem;color:var(--text);margin-bottom:4px}
.tip-text{font-size:0.8rem;color:var(--muted)}
.urgency-item{background:#fef2f2;border-left:4px solid var(--red);border-radius:0 9px 9px 0;padding:9px 12px;margin-bottom:6px;font-size:0.82rem;color:var(--red)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:white;border-radius:16px;width:100%;max-width:480px;padding:20px;margin:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-weight:700;font-size:1rem;color:var(--text)}
.modal-close{background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--muted);line-height:1}
.btn-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.empty-state{text-align:center;padding:30px 20px;color:var(--muted)}
.empty-state .icon{font-size:2.5rem;margin-bottom:8px}
.empty-state p{font-size:0.85rem}
.nutr-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #fde8d0;font-size:0.85rem}
.cal-result{background:linear-gradient(135deg,#fff7ed,#ffedd5);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;margin-top:8px}
.cal-result .number{font-size:2rem;font-weight:700;color:var(--accent)}
.cal-result .label{font-size:0.8rem;color:var(--muted)}
.activity-item{background:var(--card2);border-radius:9px;padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;font-size:0.83rem}
.insurance-calc{background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:14px;margin-top:10px}
.insurance-calc .result{font-size:1.1rem;font-weight:700;color:var(--blue);margin-top:8px}
.pet-select-bar{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px;scrollbar-width:none}
.pet-select-bar::-webkit-scrollbar{display:none}
.pet-select-btn{flex-shrink:0;border:1.5px solid var(--border);background:white;border-radius:20px;padding:6px 14px;font-size:0.8rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;color:var(--muted);transition:all 0.2s}
.pet-select-btn.active{border-color:var(--accent);background:var(--accent);color:white}
.weight-log-item{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #fde8d0;font-size:0.83rem}
.ficha-modal{background:#fff7ed;border-radius:12px;padding:14px;margin-top:10px;font-size:0.82rem;border:2px dashed var(--border)}
.ficha-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dashed var(--border)}
.ficha-row:last-child{border:none}
.ficha-key{font-weight:600;color:var(--muted)}
.ficha-val{color:var(--text)}
@media(max-width:400px){.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
  <div>
    <h1>🐾 MascotasCL</h1>
    <div style="font-size:0.7rem;opacity:0.85;margin-top:1px">Cuidado de mascotas · Chile</div>
  </div>
  <span id="alertBadge" style="background:#dc2626;border-radius:50%;width:26px;height:26px;display:none;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700">0</span>
</header>

<nav id="mainNav">
  <button class="active" onclick="switchTab(0)">🐾 Mascotas</button>
  <button onclick="switchTab(1)">💉 Salud</button>
  <button onclick="switchTab(2)">💊 Citas</button>
  <button onclick="switchTab(3)">🥗 Nutrición</button>
  <button onclick="switchTab(4)">📋 Ley &amp; Tips</button>
</nav>

<main>

<!-- TAB 0: MIS MASCOTAS -->
<div class="tab active" id="tab0">
  <div class="section-header">
    <h2>Mis mascotas</h2>
    <button class="btn btn-primary btn-sm" onclick="openPetModal()">+ Agregar</button>
  </div>
  <div id="petList"></div>
  <div id="alertPanel"></div>
</div>

<!-- TAB 1: SALUD -->
<div class="tab" id="tab1">
  <div id="healthPetBar" class="pet-select-bar"></div>
  <div id="healthContent"></div>
</div>

<!-- TAB 2: MEDICAMENTOS Y CITAS -->
<div class="tab" id="tab2">
  <div id="medPetBar" class="pet-select-bar"></div>
  <div id="medContent"></div>
</div>

<!-- TAB 3: NUTRICIÓN Y ACTIVIDAD -->
<div class="tab" id="tab3">
  <div id="nutrPetBar" class="pet-select-bar"></div>
  <div id="nutrContent"></div>
</div>

<!-- TAB 4: LEY Y TIPS -->
<div class="tab" id="tab4">
  <div id="lawContent"></div>
</div>

</main>

<!-- PET MODAL -->
<div class="modal-overlay" id="petModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="petModalTitle">Nueva mascota</span>
      <button class="modal-close" onclick="closePetModal()">×</button>
    </div>
    <label>Nombre *</label>
    <input id="pNombre" placeholder="Ej: Luna">
    <label>Especie *</label>
    <select id="pEspecie" onchange="updateBreedList()">
      <option value="Perro">Perro 🐕</option>
      <option value="Gato">Gato 🐈</option>
      <option value="Ave">Ave 🐦</option>
      <option value="Conejo">Conejo 🐇</option>
      <option value="Otro">Otro</option>
    </select>
    <label>Raza</label>
    <input id="pRaza" placeholder="Ej: Golden Retriever">
    <div class="form-row">
      <div>
        <label>Fecha de nacimiento</label>
        <input type="date" id="pNacimiento">
      </div>
      <div>
        <label>Peso actual (kg)</label>
        <input type="number" id="pPeso" placeholder="0.0" step="0.1" min="0">
      </div>
    </div>
    <div class="form-row">
      <div>
        <label>Sexo</label>
        <select id="pSexo"><option value="Macho">Macho</option><option value="Hembra">Hembra</option></select>
      </div>
      <div>
        <label>Color / descripción</label>
        <input id="pColor" placeholder="Ej: dorado">
      </div>
    </div>
    <div class="toggle-row">
      <span style="font-size:0.85rem;font-weight:600">Castrado / Esterilizado</span>
      <label class="toggle"><input type="checkbox" id="pCastrado"><span class="slider"></span></label>
    </div>
    <div style="margin-top:10px"></div>
    <label>N° Microchip</label>
    <input id="pMicrochip" placeholder="15 dígitos ISO 11784">
    <label>Seguro médico (opcional)</label>
    <input id="pSeguro" placeholder="Ej: PetProtect Plan A">
    <label>Condición / alergias conocidas</label>
    <textarea id="pCondicion" placeholder="Ej: alérgico al pollo, displasia de cadera"></textarea>
    <label>Veterinario / clínica habitual</label>
    <input id="pVet" placeholder="Nombre y teléfono">
    <label>Tipo sanguíneo (si se conoce)</label>
    <input id="pBlood" placeholder="Ej: DEA 1.1+ (perros)">
    <div class="btn-row">
      <button class="btn btn-primary" onclick="savePet()">Guardar</button>
      <button class="btn btn-outline" onclick="closePetModal()">Cancelar</button>
      <button class="btn btn-danger btn-sm" id="deletePetBtn" style="display:none" onclick="deletePet()">Eliminar</button>
    </div>
  </div>
</div>

<!-- VACCINE MODAL -->
<div class="modal-overlay" id="vaccModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Registrar vacuna</span>
      <button class="modal-close" onclick="closeVaccModal()">×</button>
    </div>
    <label>Vacuna *</label>
    <input id="vNombre" placeholder="Ej: Antirrábica">
    <div class="form-row">
      <div><label>Fecha aplicada</label><input type="date" id="vFecha"></div>
      <div><label>Próxima dosis</label><input type="date" id="vProxima"></div>
    </div>
    <label>Veterinario</label>
    <input id="vVet" placeholder="Nombre del profesional">
    <label>N° de lote</label>
    <input id="vLote" placeholder="Ej: A2B3C4">
    <label>Notas</label>
    <textarea id="vNotas" placeholder="Observaciones..."></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveVacc()">Guardar</button>
      <button class="btn btn-outline" onclick="closeVaccModal()">Cancelar</button>
    </div>
  </div>
</div>

<!-- DEWORMING MODAL -->
<div class="modal-overlay" id="dewormModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Registrar desparasitación</span>
      <button class="modal-close" onclick="closeDewormModal()">×</button>
    </div>
    <label>Tipo</label>
    <select id="dwTipo"><option>Interna (oral)</option><option>Externa (pipeta/collar)</option></select>
    <label>Producto *</label>
    <input id="dwProducto" placeholder="Ej: NexGard Spectra">
    <div class="form-row">
      <div><label>Fecha aplicada</label><input type="date" id="dwFecha"></div>
      <div><label>Próxima dosis</label><input type="date" id="dwProxima"></div>
    </div>
    <label>Notas</label>
    <textarea id="dwNotas" placeholder="Ej: Dosis 1 comprimido..."></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveDeworm()">Guardar</button>
      <button class="btn btn-outline" onclick="closeDewormModal()">Cancelar</button>
    </div>
  </div>
</div>

<!-- WEIGHT MODAL -->
<div class="modal-overlay" id="weightModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Registrar peso</span>
      <button class="modal-close" onclick="closeWeightModal()">×</button>
    </div>
    <label>Fecha</label>
    <input type="date" id="wFecha">
    <label>Peso (kg) *</label>
    <input type="number" id="wPeso" placeholder="0.0" step="0.1" min="0">
    <label>Notas</label>
    <input id="wNotas" placeholder="Ej: post-cirugía">
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveWeight()">Guardar</button>
      <button class="btn btn-outline" onclick="closeWeightModal()">Cancelar</button>
    </div>
  </div>
</div>

<!-- MEDICATION MODAL -->
<div class="modal-overlay" id="medModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Agregar medicamento</span>
      <button class="modal-close" onclick="closeMedModal()">×</button>
    </div>
    <label>Nombre *</label>
    <input id="mNombre" placeholder="Ej: NexGard Spectra">
    <label>Para qué sirve</label>
    <input id="mPara" placeholder="Ej: Antipulgas y antiparasitario">
    <div class="form-row">
      <div><label>Dosis</label><input id="mDosis" placeholder="Ej: 1 comprimido"></div>
      <div><label>Frecuencia</label><input id="mFrecuencia" placeholder="Ej: mensual"></div>
    </div>
    <div class="form-row">
      <div><label>Fecha inicio</label><input type="date" id="mInicio"></div>
      <div><label>Fecha fin (opcional)</label><input type="date" id="mFin"></div>
    </div>
    <label>Stock (unidades restantes)</label>
    <input type="number" id="mStock" placeholder="Ej: 3" min="0">
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveMed()">Guardar</button>
      <button class="btn btn-outline" onclick="closeMedModal()">Cancelar</button>
    </div>
  </div>
</div>

<!-- APPOINTMENT MODAL -->
<div class="modal-overlay" id="apptModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Nueva cita veterinaria</span>
      <button class="modal-close" onclick="closeApptModal()">×</button>
    </div>
    <div class="form-row">
      <div><label>Fecha *</label><input type="date" id="aNombre"></div>
      <div><label>Hora</label><input type="time" id="aHora" value="10:00"></div>
    </div>
    <label>Tipo</label>
    <select id="aTipo">
      <option>Control rutinario</option>
      <option>Vacuna</option>
      <option>Emergencia</option>
      <option>Cirugía</option>
      <option>Dental</option>
      <option>Especialista</option>
      <option>Otro</option>
    </select>
    <label>Clínica / Hospital</label>
    <input id="aClinica" placeholder="Ej: Clínica Veterinaria UC">
    <label>Médico</label>
    <input id="aMedico" placeholder="Nombre del veterinario/a">
    <label>Motivo</label>
    <input id="aMotivo" placeholder="Ej: Control anual">
    <label>Notas post-visita (puedes completar después)</label>
    <textarea id="aNotas" placeholder="Diagnóstico, indicaciones, próximos pasos..."></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveAppt()">Guardar</button>
      <button class="btn btn-outline" onclick="closeApptModal()">Cancelar</button>
    </div>
  </div>
</div>

<!-- NUTRITION MODAL -->
<div class="modal-overlay" id="nutrModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Plan alimenticio</span>
      <button class="modal-close" onclick="closeNutrModal()">×</button>
    </div>
    <label>Tipo de alimento</label>
    <select id="nTipo"><option>Seco (croquetas)</option><option>Húmedo (lata/sobre)</option><option>BARF (dieta cruda)</option><option>Mixto</option></select>
    <label>Marca / Producto</label>
    <input id="nMarca" placeholder="Ej: Royal Canin Golden Retriever Adult">
    <div class="form-row">
      <div><label>Cantidad diaria (g)</label><input type="number" id="nCantidad" placeholder="300" min="0"></div>
      <div><label>Comidas por día</label><input type="number" id="nComidas" placeholder="2" min="1" max="6"></div>
    </div>
    <label>Horario (ej: 08:00 y 18:00)</label>
    <input id="nHorario" placeholder="08:00 y 18:00">
    <label>Notas / alergias</label>
    <textarea id="nNotas" placeholder="Sin pollo, sin gluten..."></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveNutr()">Guardar</button>
      <button class="btn btn-outline" onclick="closeNutrModal()">Cancelar</button>
    </div>
  </div>
</div>

<!-- ACTIVITY MODAL -->
<div class="modal-overlay" id="actModal">
  <div class="modal">
    <div class="modal-header">

<script>
// ===== DATA LAYER =====
const KEY = 'mascotascl_v1';
let db = {pets:[],vaccines:[],deworms:[],weights:[],meds:[],appts:[],nutrs:[],activities:[]};

function loadDB(){
  try{const s=localStorage.getItem(KEY);if(s)db=JSON.parse(s);}catch(e){}
  if(!db.pets)db.pets=[];
  if(!db.vaccines)db.vaccines=[];
  if(!db.deworms)db.deworms=[];
  if(!db.weights)db.weights=[];
  if(!db.meds)db.meds=[];
  if(!db.appts)db.appts=[];
  if(!db.nutrs)db.nutrs=[];
  if(!db.activities)db.activities=[];
}
function saveDB(){try{localStorage.setItem(KEY,JSON.stringify(db));}catch(e){}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function today(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){if(!d)return '—';const p=d.split('-');return `${p[2]}/${p[1]}/${p[0]}`;}
function daysFromNow(d){if(!d)return null;return Math.ceil((new Date(d)-new Date(today()))/(1000*60*60*24));}
function petAge(dob){
  if(!dob)return '';
  const b=new Date(dob),n=new Date();
  let y=n.getFullYear()-b.getFullYear(),m=n.getMonth()-b.getMonth();
  if(m<0){y--;m+=12;}
  if(y>0)return `${y} año${y>1?'s':''} ${m>0?m+'m':''}`;
  return `${m} meses`;
}
const SPECIES_EMOJI={Perro:'🐕',Gato:'🐈',Ave:'🐦',Conejo:'🐇',Otro:'🐾'};
const SPECIES_COLORS={Perro:'#ea580c',Gato:'#9333ea',Ave:'#0369a1',Conejo:'#16a34a',Otro:'#d97706'};

// ===== CURRENT SELECTIONS =====
let currentPetId=null;
let editingPetId=null;

function getPet(id){return db.pets.find(p=>p.id===id);}
function getSelectedPet(){return getPet(currentPetId);}

// ===== DEMO DATA =====
function seedDemo(){
  if(db.pets.length>0)return;
  const pid=uid();
  db.pets.push({id:pid,nombre:'Luna',especie:'Perro',raza:'Golden Retriever',nacimiento:'2021-03-15',peso:28,sexo:'Hembra',castrado:true,color:'Dorado',microchip:'978000412345678',seguro:'PetProtect Plan B',condicion:'Ninguna conocida',vet:'Dr. Gómez – Clínica San Borja, +56 2 2345 6789',blood:'DEA 1.1+'});
  const today2=new Date();
  const fut30=new Date(today2);fut30.setDate(fut30.getDate()+30);
  const past60=new Date(today2);past60.setDate(past60.getDate()-60);
  const past30=new Date(today2);past30.setDate(past30.getDate()-30);
  const fut20=new Date(today2);fut20.setDate(fut20.getDate()+20);
  db.vaccines.push({id:uid(),petId:pid,nombre:'Quintuple (Distemper+Parvo)',fecha:past30.toISOString().slice(0,10),proxima:fut30.toISOString().slice(0,10),vet:'Dr. Gómez',lote:'QP2025A',notas:''});
  db.vaccines.push({id:uid(),petId:pid,nombre:'Antirrábica',fecha:past30.toISOString().slice(0,10),proxima:fut20.toISOString().slice(0,10),vet:'Dr. Gómez',lote:'AR2025B',notas:'Obligatoria por ley'});
  db.deworms.push({id:uid(),petId:pid,tipo:'Interna (oral)',producto:'Drontal Plus',fecha:past60.toISOString().slice(0,10),proxima:past30.toISOString().slice(0,10),notas:'Vencida – ¡aplicar pronto!'});
  db.deworms.push({id:uid(),petId:pid,tipo:'Externa (pipeta/collar)',producto:'Frontline Combo',fecha:past30.toISOString().slice(0,10),proxima:fut20.toISOString().slice(0,10),notas:''});
  db.weights.push({id:uid(),petId:pid,fecha:'2024-09-01',peso:26.5,notas:''});
  db.weights.push({id:uid(),petId:pid,fecha:'2024-11-01',peso:27.0,notas:''});
  db.weights.push({id:uid(),petId:pid,fecha:'2025-01-01',peso:27.5,notas:''});
  db.weights.push({id:uid(),petId:pid,fecha:'2025-03-01',peso:28.0,notas:'post-control'});
  db.meds.push({id:uid(),petId:pid,nombre:'NexGard Spectra',para:'Antipulgas y antiparasitario',dosis:'1 comprimido',frecuencia:'Mensual',inicio:'2025-01-01',fin:'',stock:2});
  const apptDate=new Date(today2);apptDate.setDate(apptDate.getDate()+14);
  db.appts.push({id:uid(),petId:pid,fecha:apptDate.toISOString().slice(0,10),hora:'10:30',tipo:'Control rutinario',clinica:'Clínica Veterinaria UC',medico:'Dr. Gómez',motivo:'Control anual + vacunas',notas:''});
  db.nutrs.push({id:uid(),petId:pid,tipo:'Seco (croquetas)',marca:'Royal Canin Golden Retriever Adult',cantidad:300,comidas:2,horario:'08:00 y 18:00',notas:''});
  const actD=new Date(today2);actD.setDate(actD.getDate()-1);
  db.activities.push({id:uid(),petId:pid,tipo:'Paseo',fecha:actD.toISOString().slice(0,10),duracion:45,distancia:3.2,notas:'Parque Bicentenario'});
  db.activities.push({id:uid(),petId:pid,tipo:'Juego en casa',fecha:today(),duracion:20,distancia:0,notas:'Pelota en el jardín'});
  currentPetId=pid;
  saveDB();
}

// ===== TAB SYSTEM =====
function switchTab(n){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===n));
  document.querySelectorAll('#mainNav button').forEach((b,i)=>b.classList.toggle('active',i===n));
  if(n===1)renderHealth();
  if(n===2)renderMeds();
  if(n===3)renderNutr();
  if(n===4)renderLaw();
}

// ===== TAB 0: PETS =====
function renderPets(){
  const el=document.getElementById('petList');
  if(db.pets.length===0){
    el.innerHTML=`<div class="empty-state"><div class="icon">🐾</div><p>Aún no has agregado mascotas.<br>Toca <strong>+ Agregar</strong> para comenzar.</p></div>`;
    document.getElementById('alertPanel').innerHTML='';
    return;
  }
  el.innerHTML=db.pets.map(p=>{
    const alerts=getAlerts(p.id);
    const overdueCount=alerts.filter(a=>a.status==='overdue').length;
    const upcomingCount=alerts.filter(a=>a.status==='upcoming').length;
    return `<div class="pet-card ${currentPetId===p.id?'selected':''}" onclick="selectPet('${p.id}')">
      <div class="pet-avatar" style="background:${SPECIES_COLORS[p.especie]||'#ea580c'}">${SPECIES_EMOJI[p.especie]||'🐾'}</div>
      <div class="pet-info">
        <div class="pet-name">${p.nombre} <span style="font-weight:400;font-size:0.8rem;color:var(--muted)">${p.sexo||''}</span></div>
        <div class="pet-sub">${p.especie}${p.raza?' · '+p.raza:''} · ${petAge(p.nacimiento)||'edad desconocida'}</div>
        <div class="pet-sub">${p.peso?p.peso+' kg ·':''} ${p.castrado?'✂️ Castrado/a ·':''} Microchip: ${p.microchip||'sin registrar'}</div>
        <div style="margin-top:5px;display:flex;gap:4px;flex-wrap:wrap">
          ${overdueCount>0?`<span class="badge badge-red">⚠️ ${overdueCount} vencido${overdueCount>1?'s':''}</span>`:''}
          ${upcomingCount>0?`<span class="badge badge-yellow">🔔 ${upcomingCount} próximo${upcomingCount>1?'s':''}</span>`:''}
          ${alerts.length===0?'<span class="badge badge-green">✓ Al día</span>':''}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end">
        <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();openPetModal('${p.id}')">Editar</button>
        <button class="btn btn-sm" style="background:#fff7ed;border:1px solid var(--border);color:var(--accent)" onclick="event.stopPropagation();openFicha('${p.id}')">🆘 Ficha</button>
      </div>
    </div>`;
  }).join('');
  renderAlertPanel();
  updateAlertBadge();
}

function selectPet(id){currentPetId=id;renderPets();}

function getAlerts(petId){
  const alerts=[];
  const vaccPet=db.vaccines.filter(v=>v.petId===petId);
  vaccPet.forEach(v=>{
    const d=daysFromNow(v.proxima);
    if(d!==null&&d<0)alerts.push({type:'Vacuna',name:v.nombre,days:d,status:'overdue'});
    else if(d!==null&&d<=30)alerts.push({type:'Vacuna',name:v.nombre,days:d,status:'upcoming'});
  });
  const dewPet=db.deworms.filter(d=>d.petId===petId);
  dewPet.forEach(dw=>{
    const d=daysFromNow(dw.proxima);
    if(d!==null&&d<0)alerts.push({type:'Desparasitación',name:dw.producto,days:d,status:'overdue'});
    else if(d!==null&&d<=14)alerts.push({type:'Desparasitación',name:dw.producto,days:d,status:'upcoming'});
  });
  const apptPet=db.appts.filter(a=>a.petId===petId);
  apptPet.forEach(a=>{
    const d=daysFromNow(a.fecha);
    if(d!==null&&d>=0&&d<=7)alerts.push({type:'Cita',name:a.tipo+' – '+a.clinica,days:d,status:'upcoming'});
  });
  const medPet=db.meds.filter(m=>m.petId===petId);
  medPet.forEach(m=>{
    if(m.stock!==''&&Number(m.stock)<=2)alerts.push({type:'Stock bajo',name:m.nombre+` (${m.stock} restante${m.stock==1?'':'s'})`,days:null,status:'overdue'});
  });
  return alerts;
}

function renderAlertPanel(){
  const el=document.getElementById('alertPanel');
  if(!currentPetId){el.innerHTML='';return;}
  const pet=getPet(currentPetId);
  if(!pet){el.innerHTML='';return;}
  const alerts=getAlerts(currentPetId);
  if(alerts.length===0){
    el.innerHTML=`<div class="card" style="border-left:4px solid var(--green)"><h3 style="color:var(--green)">✓ ${pet.nombre} está al día</h3><p style="font-size:0.83rem;color:var(--muted)">No hay vacunas, desparasitaciones ni citas pendientes en los próximos días.</p></div>`;
    return;
  }
  el.innerHTML=`<div class="card"><h3>Alertas de ${pet.nombre}</h3>${alerts.map(a=>`
    <div class="alert-item">
      <div class="alert-icon">${a.status==='overdue'?'🔴':'🟡'}</div>
      <div class="alert-text">
        <strong>${a.name}</strong>
        <span>${a.type} · ${a.days===null?'stock bajo':a.days<0?`Venció hace ${Math.abs(a.days)} día${Math.abs(a.days)>1?'s':''}`:a.days===0?'Hoy':`En ${a.days} día${a.days>1?'s':''}`}</span>
      </div>
      <span class="badge ${a.status==='overdue'?'badge-red':'badge-yellow'}">${a.status==='overdue'?'Vencido':'Pronto'}</span>
    </div>`).join('')}</div>`;
}

function updateAlertBadge(){
  const total=db.pets.reduce((s,p)=>s+getAlerts(p.id).length,0);
  const badge=document.getElementById('alertBadge');
  badge.textContent=total;
  badge.style.display=total>0?'flex':'none';
}

// ===== PET MODAL =====
function openPetModal(id){
  editingPetId=id||null;
  document.getElementById('petModalTitle').textContent=id?'Editar mascota':'Nueva mascota';
  document.getElementById('deletePetBtn').style.display=id?'inline-flex':'none';
  const p=id?getPet(id):null;
  document.getElementById('pNombre').value=p?p.nombre:'';
  document.getElementById('pEspecie').value=p?p.especie:'Perro';
  document.getElementById('pRaza').value=p?p.raza:'';
  document.getElementById('pNacimiento').value=p?p.nacimiento:'';
  document.getElementById('pPeso').value=p?p.peso:'';
  document.getElementById('pSexo').value=p?p.sexo:'Macho';
  document.getElementById('pColor').value=p?p.color:'';
  document.getElementById('pCastrado').checked=p?p.castrado:false;
  document.getElementById('pMicrochip').value=p?p.microchip:'';
  document.getElementById('pSeguro').value=p?p.seguro:'';
  document.getElementById('pCondicion').value=p?p.condicion:'';
  document.getElementById('pVet').value=p?p.vet:'';
  document.getElementById('pBlood').value=p?p.blood:'';
  document.getElementById('petModal').classList.add('open');
}
function closePetModal(){document.getElementById('petModal').classList.remove('open');}
function savePet(){
  const nom=document.getElementById('pNombre').value.trim();
  if(!nom){alert('Ingresa el nombre de tu mascota');return;}
  const data={id:editingPetId||uid(),nombre:nom,especie:document.getElementById('pEspecie').value,raza:document.getElementById('pRaza').value.trim(),nacimiento:document.getElementById('pNacimiento').value,peso:parseFloat(document.getElementById('pPeso').value)||0,sexo:document.getElementById('pSexo').value,color:document.getElementById('pColor').value.trim(),castrado:document.getElementById('pCastrado').checked,microchip:document.getElementById('pMicrochip').value.trim(),seguro:document.getElementById('pSeguro').value.trim(),condicion:document.getElementById('pCondicion').value.trim(),vet:document.getElementById('pVet').value.trim(),blood:document.getElementById('pBlood').value.trim()};
  if(editingPetId){const i=db.pets.findIndex(p=>p.id===editingPetId);if(i>=0)db.pets[i]=data;}
  else{db.pets.push(data);currentPetId=data.id;}
  saveDB();closePetModal();renderPets();
}
function deletePet(){
  if(!confirm('¿Eliminar esta mascota y todos sus registros?'))return;
  db.pets=db.pets.filter(p=>p.id!==editingPetId);
  db.vaccines=db.vaccines.filter(v=>v.petId!==editingPetId);
  db.deworms=db.deworms.filter(d=>d.petId!==editingPetId);
  db.weights=db.weights.filter(w=>w.petId!==editingPetId);
  db.meds=db.meds.filter(m=>m.petId!==editingPetId);
  db.appts=db.appts.filter(a=>a.petId!==editingPetId);
  db.nutrs=db.nutrs.filter(n=>n.petId!==editingPetId);
  db.activities=db.activities.filter(a=>a.petId!==editingPetId);
  if(currentPetId===editingPetId)currentPetId=db.pets.length>0?db.pets[0].id:null;
  saveDB();closePetModal();renderPets();
}

// ===== FICHA DE EMERGENCIA =====

// ===== PET SELECTOR BAR =====
function renderPetBar(containerId,onSelect){
  const el=document.getElementById(containerId);
  if(db.pets.length===0){el.innerHTML='<div style="font-size:0.82rem;color:var(--muted)">No hay mascotas registradas.</div>';return;}

// ===== TAB 1: SALUD =====
let weightChart=null;
function renderHealth(){
  if(!currentPetId&&db.pets.length>0)currentPetId=db.pets[0].id;
  renderPetBar('healthPetBar','renderHealth()');
  const el=document.getElementById('healthContent');
  if(db.pets.length===0){el.innerHTML='<div class="empty-state"><div class="icon">💉</div><p>Agrega primero una mascota en la pestaña Mascotas.</p></div>';return;}
  const pet=getSelectedPet();
  if(!pet){el.innerHTML='';return;}
  const vaccs=db.vaccines.filter(v=>v.petId===pet.id).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const dews=db.deworms.filter(d=>d.petId===pet.id).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const wlogs=db.weights.filter(w=>w.petId===pet.id).sort((a,b)=>a.fecha.localeCompare(b.fecha));

  // Vaccine calendar
  const vaccCal=pet.especie==='Gato'?[
    {v:'Triple felina (Panleucopenia, Rinotraqueitis, Calicivirus)',freq:'Anual'},
    {v:'Leucemia felina (FeLV)',freq:'Anual'},
    {v:'Antirrábica',freq:'Anual (obligatoria en algunas comunas)'}
  ]:[
    {v:'Quintuple (Distemper, Parvovirus, Hepatitis, Parainfluenza, Leptospira)',freq:'Anual'},
    {v:'Antirrábica',freq:'Anual (obligatoria por ley)'},
    {v:'Bordetella (tos de las perreras)',freq:'Cada 6-12 meses si está expuesto'},
    {v:'Lyme',freq:'Opcional – zonas de alto riesgo'}
  ];

  el.innerHTML=`
    <div class="card">
      <div class="section-header"><h2>💉 Vacunas</h2><button class="btn btn-primary btn-sm" onclick="openVaccModal()">+ Agregar</button></div>
      <div class="card2" style="margin-bottom:12px">
        <h3 style="color:var(--muted)">Calendario recomendado – ${pet.especie}</h3>
        ${vaccCal.map(c=>`<div style="padding:4px 0;border-bottom:1px dashed var(--border);font-size:0.8rem"><span style="font-weight:600">${c.v}</span><span style="color:var(--muted)"> · ${c.freq}</span></div>`).join('')}
      </div>
      ${vaccs.length===0?'<div class="empty-state" style="padding:15px 0"><p>Sin vacunas registradas</p></div>':vaccs.map(v=>{
        const d=daysFromNow(v.proxima);
        const status=d===null?'none':d<0?'overdue':d<=30?'due':'ok';
        return `<div class="vacc-item ${status==='overdue'?'overdue':status==='due'?'due':''}">
          <div class="vacc-name">${v.nombre} ${status==='overdue'?'<span class="badge badge-red">Vencida</span>':status==='due'?'<span class="badge badge-yellow">Próxima</span>':'<span class="badge badge-green">Al día</span>'}</div>
          <div class="vacc-meta">Aplicada: ${fmtDate(v.fecha)} · Próxima: ${fmtDate(v.proxima)} · Vet: ${v.vet||'—'} · Lote: ${v.lote||'—'}</div>
          ${v.notas?`<div class="vacc-meta" style="margin-top:3px;font-style:italic">${v.notas}</div>`:''}
          <button class="btn btn-danger btn-sm" style="margin-top:6px" onclick="deleteRecord('vaccines','${v.id}');renderHealth()">Eliminar</button>
        </div>`;
      }).join('')}
    </div>
    <div class="card">
      <div class="section-header"><h2>🐛 Desparasitación</h2><button class="btn btn-primary btn-sm" onclick="openDewormModal()">+ Agregar</button></div>
      <div class="card2" style="margin-bottom:10px;font-size:0.8rem">
        <span style="font-weight:600">Interna (oral):</span> cada 3-6 meses &nbsp;|&nbsp; <span style="font-weight:600">Externa (pipeta/collar):</span> cada 1-3 meses
      </div>
      ${dews.length===0?'<div class="empty-state" style="padding:15px 0"><p>Sin desparasitaciones registradas</p></div>':dews.map(d=>{
        const days=daysFromNow(d.proxima);
        const status=days===null?'none':days<0?'overdue':days<=14?'due':'ok';

      ${wlogs.length===0?'<div class="empty-state" style="padding:10px 0"><p>Sin registros de peso</p></div>':''}
      <div class="card2" style="margin-top:12px">

        <p style="font-size:0.78rem;color:var(--muted);margin-bottom:8px">Escala 1-9 (ideal: 4-5)</p>
        <div class="bcs-grid">
          ${[['1-2','Muy delgado','Costillas, columna y pelvis muy prominentes'],['3','Delgado','Costillas visibles, poca grasa'],['4-5','Ideal','Costillas palpables con leve cobertura grasa'],['6-7','Sobrepeso','Costillas difíciles de palpar'],['8-9','Obeso','Depósitos de grasa evidentes']].map(([s,l,d])=>`<div class="bcs-item"><div class="bcs-score">${s}</div><div class="bcs-label" style="font-weight:600">${l}</div><div class="bcs-label">${d}</div></div>`).join('')}
        </div>
      </div>
    </div>`;

  if(wlogs.length>=2){
    setTimeout(()=>{
      const ctx=document.getElementById('weightChartCanvas');
      if(!ctx)return;
      if(weightChart){weightChart.destroy();weightChart=null;}
      weightChart=new Chart(ctx,{type:'line',data:{labels:wlogs.map(w=>fmtDate(w.fecha)),datasets:[{label:'Peso (kg)',data:wlogs.map(w=>w.peso),borderColor:'#ea580c',backgroundColor:'rgba(234,88,12,0.12)',tension:0.3,pointRadius:5,pointBackgroundColor:'#ea580c',fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:false,ticks:{callback:v=>v+' kg'}}}}});
    },50);
  }
}

function renderApptItem(a,past){

  const tKey=Object.keys(typeColors).find(k=>a.tipo.startsWith(k))||'Otro';
  return `<div class="appt-item" style="${past?'opacity:0.65':''}">
    <div class="appt-date-box" style="${past?'background:#9ca3af':''}"><div class="appt-day">${parts[2]}</div><div class="appt-month">${mon}</div></div>

    </div>
    <button class="btn btn-danger btn-sm" onclick="deleteRecord('appts','${a.id}');renderMeds()">×</button>
  </div>`;
}

        ${nutr.notas?`<div class="nutr-row"><span>Notas</span><span style="font-size:0.8rem">${nutr.notas}</span></div>`:''}
      `:'<p style="font-size:0.83rem;color:var(--muted)">Sin plan alimenticio registrado</p>'}

        <div class="label">Calorías diarias estimadas (${pet.nombre}, ${w} kg, ${pet.castrado?'castrado/a':'entero/a'})</div>
        <div class="number">${dailyCal} kcal</div>
        <div class="label">RER base: ${rer} kcal · Factor: ${pet.castrado?'1.6 (adulto castrado)':'2.0 (activo/entero)'}</div>
      </div>`:'<p style="font-size:0.8rem;color:var(--muted);margin-top:8px">Registra el peso de ${pet.nombre} para calcular las calorías diarias.</p>'}
    </div>
    <div class="card2" style="border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px">

        <li>SuperBodega aCuenta – precios de mayorista</li>

        <li>Si pierdes a tu mascota: cualquier veterinario puede leer el chip y ubicarte</li>
        <li>Número de 15 dígitos que identifica país, especie y animal único</li>
      </ul>
    </div>
    <div class="law-section">
      <div class="law-title">🏥 Seguro médico para mascotas en Chile (2024-2025)</div>
      <div class="card2" style="margin-bottom:10px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:0.82rem">
          ${[['PetProtect','Planes desde $5.000/mes, cubre accidentes y enfermedades'],['VetMás','Amplia red de clínicas afiliadas en Santiago'],['BancoEstado Pet','Seguro básico, buena cobertura nacional'],['MetLife Mascotas','Cubre urgencias, cirugías y hospitalización']].map(([n,d])=>`<div style="background:white;border-radius:8px;padding:8px"><div style="font-weight:700;color:var(--accent)">${n}</div><div style="color:var(--muted)">${d}</div></div>`).join('')}
        </div>
      </div>
      <p style="font-size:0.82rem;color:var(--muted);margin-bottom:8px">Cobertura típica: accidentes, enfermedades, cirugías, urgencias veterinarias</p>
      <div class="insurance-calc">
        <h3 style="color:var(--blue)">¿Vale la pena? Calculadora rápida</h3>
        <div class="form-row">
          <div><label>Prima mensual ($)</label><input type="number" id="iMensual" placeholder="8000" oninput="calcInsurance()"></div>
          <div><label>Gastos vet anuales ($)</label><input type="number" id="iGastos" placeholder="150000" oninput="calcInsurance()"></div>
        </div>
        <div id="iResult" class="result"></div>
      </div>
    </div>
    <div class="law-section">
      <div class="law-title">☀️ Tips para dueños chilenos</div>
      <div class="tip-card">
        <div class="tip-title">Golpe de calor en verano (peligro real en CL)</div>
        <div class="tip-text">Señales: jadeo extremo, lengua muy larga y oscura, salivación excesiva, debilidad, convulsiones. Acción: mueve a la sombra, moja con agua fría (no helada), lleva de urgencia al veterinario.</div>
      </div>
      <div class="tip-card">
        <div class="tip-title">🚗 Viajes largos con mascotas</div>
        <div class="tip-text">Usa transportín homologado (BASCHS). Agua disponible siempre. Parada cada 2 horas. Nunca dejar en auto con calor. Vacuna antirrábica vigente para cruzar fronteras.</div>
      </div>
      <div class="tip-card">
        <div class="tip-title">🌿 Plantas tóxicas comunes en Chile</div>
        <div class="tip-text"><strong>Peligrosas para perros y gatos:</strong> cicuta (muy tóxica), aloe vera (tóxico en cantidad), lirio (fatal para gatos), poinsettia/pascuero, lavanda, hiedra, azalea, hortensia, marihuana.</div>
      </div>
      <div class="tip-card">
        <div class="tip-title">🏞️ Parques pet-friendly en Santiago</div>
        <div class="tip-text">Parque Bicentenario (Vitacura, área canina), Parque Bustamante (Providencia), Parque de Los Reyes (área habilitada), Parque Juan Pablo II (Pudahuel), Parque El Tranque (Lo Barnechea).</div>
      </div>
      <div class="tip-card">
        <div class="tip-title">🍫 Alimentos peligrosos para mascotas</div>
        <div class="tip-text"><strong>NUNCA dar:</strong> chocolate (teobromina), uvas y pasas, cebolla y ajo, xilitol (edulcorante en chicles), macadamia, alcohol, aguacate, cafeína, nueces.</div>
      </div>
    </div>
  `;
}

function calcInsurance(){
  const m=parseFloat(document.getElementById('iMensual').value)||0;
  const g=parseFloat(document.getElementById('iGastos').value)||0;
  const r=document.getElementById('iResult');
  if(!m||!g){r.innerHTML='';return;}
  const prima=m*12;
  const ahorro=g-prima;
  r.innerHTML=`Prima anual: <strong>$${prima.toLocaleString('es-CL')} CLP</strong><br>Gastos sin seguro: <strong>$${g.toLocaleString('es-CL')} CLP</strong><br>
    ${ahorro>0?`<span style="color:var(--green)">✓ Te ahorras $${ahorro.toLocaleString('es-CL')} con el seguro</span>`:ahorro<0?`<span style="color:var(--red)">✗ El seguro te cuesta $${Math.abs(ahorro).toLocaleString('es-CL')} más de lo que gastas</span>`:'<span style="color:var(--muted)">Empate – considera cobertura de urgencias</span>'}`;
}

// ===== GENERIC DELETE =====
function deleteRecord(collection,id){
  db[collection]=db[collection].filter(x=>x.id!==id);
  saveDB();renderPets();updateAlertBadge();
}

// ===== INIT =====
loadDB();
seedDemo();
if(!currentPetId&&db.pets.length>0)currentPetId=db.pets[0].id;
renderPets();
renderLaw();
updateAlertBadge();
</script>
