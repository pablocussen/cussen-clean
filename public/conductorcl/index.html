<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0369a1">
<meta name="description" content="ConductorCL - Gestión de Vehículos para Chile">
<title>ConductorCL 🚗</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f0f6ff;--card:#ffffff;--card2:#e8f2ff;--border:#b8d4f0;--accent:#0369a1;--text:#1e3a5f;--muted:#6b8fa5;--green:#16a34a;--yellow:#d97706;--red:#dc2626;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
button{font-family:'Inter',sans-serif;cursor:pointer}
input,select,textarea{font-family:'Inter',sans-serif;font-size:16px}
header{background:linear-gradient(90deg,#0c4a7a,#0369a1);padding:13px 18px;position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;color:white}
header h1{font-size:18px;font-weight:700;letter-spacing:-.3px}
header span{font-size:13px;opacity:.8}
nav{background:#fff;border-bottom:2px solid var(--border);display:flex;overflow-x:auto;position:sticky;top:62px;z-index:40;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
nav button{flex:none;padding:11px 14px;border:none;background:none;color:var(--muted);font-size:12px;font-weight:600;white-space:nowrap;border-bottom:3px solid transparent;transition:.2s}
nav button.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab{display:none;padding:16px;max-width:700px;margin:0 auto}
.tab.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(3,105,161,.07)}
.card2{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-size:15px;font-weight:700;color:var(--text)}
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-red{background:#fee2e2;color:var(--red)}
.badge-yellow{background:#fef3c7;color:var(--yellow)}
.badge-green{background:#dcfce7;color:var(--green)}
.badge-blue{background:#dbeafe;color:var(--accent)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;font-size:14px;font-weight:600;border:none;transition:.15s}
.btn-primary{background:var(--accent);color:white}
.btn-primary:hover{background:#025588}
.btn-secondary{background:var(--card2);color:var(--accent);border:1px solid var(--border)}
.btn-danger{background:#fee2e2;color:var(--red);border:1px solid #fca5a5}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-full{width:100%;justify-content:center}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.stat-box{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.stat-num{font-size:20px;font-weight:700;color:var(--accent)}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:16px;color:var(--text);background:white;outline:none;transition:.15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{resize:vertical;min-height:72px}
.semaforo{width:12px;height:12px;border-radius:50%;display:inline-block}
.semaforo-red{background:var(--red)}
.semaforo-yellow{background:var(--yellow)}
.semaforo-green{background:var(--green)}
.semaforo-gray{background:#d1d5db}
.doc-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.doc-row:last-child{border-bottom:none}
.doc-info{flex:1}
.doc-name{font-size:14px;font-weight:600}
.doc-detail{font-size:12px;color:var(--muted);margin-top:2px}
.hist-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.hist-row:last-child{border-bottom:none}
.hist-icon{width:36px;height:36px;border-radius:8px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.hist-info{flex:1}
.hist-title{font-size:13px;font-weight:600}
.hist-sub{font-size:12px;color:var(--muted)}
.hist-cost{font-size:13px;font-weight:700;color:var(--accent);white-space:nowrap}
.alert-banner{border-radius:10px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:flex-start;gap:10px;font-size:13px}
.alert-red{background:#fee2e2;border:1px solid #fca5a5;color:#7f1d1d}
.alert-yellow{background:#fef3c7;border:1px solid #fcd34d;color:#78350f}
.alert-green{background:#dcfce7;border:1px solid #86efac;color:#14532d}
.veh-card{position:relative;border-radius:12px;padding:16px;border:2px solid var(--border);background:white;margin-bottom:12px;cursor:pointer;transition:.15s}
.veh-card:hover{border-color:var(--accent)}
.veh-card.selected{border-color:var(--accent);background:#f0f6ff}
.veh-icon{width:52px;height:52px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:28px;background:var(--card2)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:white;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px}
.checkbox-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.checkbox-item{display:flex;align-items:center;gap:5px;background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:5px 9px;cursor:pointer;font-size:13px}
.checkbox-item input{accent-color:var(--accent)}
.fuel-type-btn{padding:7px 12px;border-radius:8px;border:1.5px solid var(--border);background:white;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:.15s}
.fuel-type-btn.active{border-color:var(--accent);color:var(--accent);background:#e0f2fe}
.chart-wrap{position:relative;height:220px;margin-top:12px}
.section-title{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;margin-top:18px}
.divider{height:1px;background:var(--border);margin:12px 0}
.empty-state{text-align:center;padding:32px 16px;color:var(--muted)}
.empty-state .em{font-size:40px;margin-bottom:8px}
.empty-state p{font-size:14px}
.vehicle-selector{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.vehicle-selector::-webkit-scrollbar{display:none}
.vselector-btn{flex:none;padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:white;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap}
.vselector-btn.active{border-color:var(--accent);color:var(--accent);background:#e0f2fe}
.tag{display:inline-block;background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600;color:var(--accent);margin:2px}
.input-row{display:flex;gap:8px}
.input-row .form-group{flex:1}
.close-btn{float:right;background:none;border:none;font-size:20px;color:var(--muted);cursor:pointer;padding:0}
@media(min-width:500px){.grid2{grid-template-columns:1fr 1fr}.grid3{grid-template-columns:1fr 1fr 1fr}}
@media(max-width:360px){nav button{padding:10px 10px;font-size:11px}}
</style>
</head>
<body>
<header>
  <div>
    <h1>🚗 ConductorCL</h1>
    <span id="hdr-sub">Gestión de Vehículos</span>
  </div>
  <div id="hdr-alerts" style="font-size:13px"></div>
</header>

<nav id="main-nav">
  <button class="active" onclick="showTab('tab-veh')">🚗 Vehículos</button>
  <button onclick="showTab('tab-docs')">📄 Documentos</button>
  <button onclick="showTab('tab-mant')">🔧 Mantenciones</button>
  <button onclick="showTab('tab-fuel')">⛽ Combustible</button>
  <button onclick="showTab('tab-gasto')">💰 Gastos</button>
</nav>

<!-- TAB 1: VEHÍCULOS -->
<div id="tab-veh" class="tab active">
  <div id="veh-alerts"></div>
  <div id="veh-list"></div>
  <button class="btn btn-primary btn-full" onclick="openAddVehicle()" id="btn-add-veh">
    + Agregar Vehículo
  </button>
  <div id="veh-stats" style="margin-top:18px"></div>
</div>

<!-- TAB 2: DOCUMENTOS -->
<div id="tab-docs" class="tab">
  <div class="vehicle-selector" id="doc-vselector"></div>
  <div id="doc-alerts"></div>
  <div id="doc-list"></div>
</div>

<!-- TAB 3: MANTENCIONES -->
<div id="tab-mant" class="tab">
  <div class="vehicle-selector" id="mant-vselector"></div>
  <button class="btn btn-primary btn-full" onclick="openAddMant()" style="margin-bottom:14px">
    + Agregar Mantención
  </button>
  <div id="mant-alerts"></div>
  <div id="mant-history"></div>
</div>

<!-- TAB 4: COMBUSTIBLE -->
<div id="tab-fuel" class="tab">
  <div class="vehicle-selector" id="fuel-vselector"></div>
  <button class="btn btn-primary btn-full" onclick="openAddFuel()" style="margin-bottom:14px">
    + Registrar Carga
  </button>
  <div id="fuel-stats"></div>
  <div id="fuel-prices" class="card2" style="margin-top:12px">
    <div class="card-title" style="margin-bottom:8px">⛽ Precios de Referencia Chile</div>
    <div class="grid2" style="gap:8px">
      <div class="stat-box"><div class="stat-num">$1.050</div><div class="stat-label">Bencina 93 /L</div></div>
      <div class="stat-box"><div class="stat-num">$1.100</div><div class="stat-label">Bencina 95 /L</div></div>
      <div class="stat-box"><div class="stat-num">$1.150</div><div class="stat-label">Bencina 97 /L</div></div>
      <div class="stat-box"><div class="stat-num">$980</div><div class="stat-label">Diesel /L</div></div>
    </div>
  </div>
  <div id="fuel-chart-section" style="margin-top:12px"></div>
  <div id="fuel-history" style="margin-top:8px"></div>
</div>

<!-- TAB 5: GASTOS -->
<div id="tab-gasto" class="tab">
  <div class="vehicle-selector" id="gasto-vselector"></div>
  <button class="btn btn-secondary btn-full" onclick="openAddGasto()" style="margin-bottom:14px">
    + Registrar Gasto Manual
  </button>
  <div id="gasto-stats"></div>
  <div id="gasto-charts" style="margin-top:12px"></div>
  <div id="gasto-breakeven" style="margin-top:8px"></div>
</div>

<!-- MODAL: Agregar Vehículo -->
<div class="modal-overlay" id="modal-veh">
  <div class="modal">
    <button class="close-btn" onclick="closeModal('modal-veh')">✕</button>
    <div class="modal-title">🚗 Agregar Vehículo</div>
    <div class="input-row">
      <div class="form-group"><label>Marca</label><input id="v-marca" placeholder="Toyota"></div>
      <div class="form-group"><label>Modelo</label><input id="v-modelo" placeholder="Corolla"></div>
    </div>
    <div class="input-row">
      <div class="form-group"><label>Año</label><input id="v-anio" type="number" placeholder="2019" min="1980" max="2030"></div>
      <div class="form-group"><label>Patente</label><input id="v-patente" placeholder="ABCD12" style="text-transform:uppercase"></div>
    </div>
    <div class="input-row">
      <div class="form-group"><label>Km actuales</label><input id="v-km" type="number" placeholder="45000"></div>
      <div class="form-group"><label>Color (hex)</label><input id="v-color" type="color" value="#0369a1" style="height:44px;padding:4px"></div>
    </div>
    <div class="form-group"><label>Combustible</label>
      <select id="v-fuel">
        <option value="93">Bencina 93</option>
        <option value="95">Bencina 95</option>
        <option value="97">Bencina 97</option>
        <option value="diesel">Diesel</option>
        <option value="gas">Gas</option>
      </select>
    </div>
    <button class="btn btn-primary btn-full" onclick="saveVehicle()">Guardar Vehículo</button>
  </div>
</div>

<!-- MODAL: Agregar Documento -->
<div class="modal-overlay" id="modal-doc">
  <div class="modal">
    <button class="close-btn" onclick="closeModal('modal-doc')">✕</button>
    <div class="modal-title" id="modal-doc-title">📄 Documento</div>
    <input type="hidden" id="d-type">
    <div id="doc-form-fields"></div>
    <button class="btn btn-primary btn-full" onclick="saveDoc()">Guardar Documento</button>
  </div>
</div>

<!-- MODAL: Agregar Mantención -->
<div class="modal-overlay" id="modal-mant">
  <div class="modal">
    <button class="close-btn" onclick="closeModal('modal-mant')">✕</button>
    <div class="modal-title">🔧 Registrar Mantención</div>
    <div class="input-row">
      <div class="form-group"><label>Fecha</label><input id="m-fecha" type="date"></div>
      <div class="form-group"><label>Km actuales</label><input id="m-km" type="number" placeholder="45000"></div>
    </div>
    <div class="form-group"><label>Tipos de mantención</label>
      <div class="checkbox-group" id="mant-types-check"></div>
    </div>
    <div class="input-row">
      <div class="form-group"><label>Taller</label><input id="m-taller" placeholder="Nombre del taller"></div>
      <div class="form-group"><label>Costo (CLP)</label><input id="m-costo" type="number" placeholder="45000"></div>
    </div>
    <div class="form-group"><label>Notas</label><textarea id="m-notas" placeholder="Observaciones adicionales..."></textarea></div>
    <button class="btn btn-primary btn-full" onclick="saveMant()">Guardar Mantención</button>
  </div>
</div>

<!-- MODAL: Agregar Combustible -->
<div class="modal-overlay" id="modal-fuel">
  <div class="modal">
    <button class="close-btn" onclick="closeModal('modal-fuel')">✕</button>
    <div class="modal-title">⛽ Registrar Carga</div>
    <div class="input-row">
      <div class="form-group"><label>Fecha</label><input id="f-fecha" type="date"></div>
      <div class="form-group"><label>Km odómetro</label><input id="f-km" type="number" placeholder="45000"></div>
    </div>
    <div class="input-row">
      <div class="form-group"><label>Litros</label><input id="f-litros" type="number" step="0.01" placeholder="40.5"></div>
      <div class="form-group"><label>Precio/L (CLP)</label><input id="f-precio" type="number" placeholder="1100"></div>
    </div>
    <div class="form-group"><label>Total pagado (CLP)</label><input id="f-total" type="number" placeholder="44550" id="f-total"></div>
    <div class="form-group"><label>Tipo combustible</label>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px" id="fuel-type-btns">
        <button class="fuel-type-btn active" data-val="93" onclick="selectFuelType(this)">Bencina 93</button>
        <button class="fuel-type-btn" data-val="95" onclick="selectFuelType(this)">Bencina 95</button>
        <button class="fuel-type-btn" data-val="97" onclick="selectFuelType(this)">Bencina 97</button>
        <button class="fuel-type-btn" data-val="diesel" onclick="selectFuelType(this)">Diesel</button>
        <button class="fuel-type-btn" data-val="gas" onclick="selectFuelType(this)">Gas</button>
      </div>
    </div>
    <div class="form-group"><label>Estación / Copec / Shell</label><input id="f-estacion" placeholder="Copec Vitacura"></div>
    <button class="btn btn-primary btn-full" onclick="saveFuel()">Guardar Carga</button>
  </div>
</div>

<!-- MODAL: Agregar Gasto -->
<div class="modal-overlay" id="modal-gasto">
  <div class="modal">
    <button class="close-btn" onclick="closeModal('modal-gasto')">✕</button>
    <div class="modal-title">💰 Registrar Gasto</div>
    <div class="input-row">
      <div class="form-group"><label>Fecha</label><input id="g-fecha" type="date"></div>
      <div class="form-group"><label>Monto (CLP)</label><input id="g-monto" type="number" placeholder="5000"></div>
    </div>
    <div class="form-group"><label>Categoría</label>
      <select id="g-cat">
        <option value="Multa">🚨 Multa</option>
        <option value="Peaje">🛣️ Peaje</option>
        <option value="Estacionamiento">🅿️ Estacionamiento</option>
        <option value="Lavado">🧽 Lavado</option>
        <option value="Accesorio">🔩 Accesorio</option>
        <option value="Otro">📦 Otro</option>
      </select>
    </div>
    <div class="form-group"><label>Descripción</label><input id="g-desc" placeholder="Descripción del gasto"></div>
    <button class="btn btn-primary btn-full" onclick="saveGasto()">Guardar Gasto</button>
  </div>
</div>

<script>
// ===== DATA LAYER =====
const DB_KEY = 'conductorcl_db';

function loadDB() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function saveDB(db) {
  try { localStorage.setItem(DB_KEY, JSON.stringify(db)); } catch(e) {}
}

function initDB() {
  const today = new Date();
  const y = today.getFullYear();
  const fmt = d => d.toISOString().slice(0,10);
  // SOAP expires in 25 days
  const soapExp = new Date(today); soapExp.setDate(soapExp.getDate() + 25);
  // RTV expires in 8 months
  const rtvExp = new Date(today); rtvExp.setMonth(rtvExp.getMonth() + 8);
  return {
    vehicles: [{
      id: 'v1', marca:'Toyota', modelo:'Corolla', anio:2019,
      patente:'ABCD12', km:45000, color:'#0369a1', fuel:'95',
      createdAt: fmt(today)
    }],
    documents: [
      {id:'d1',vehicleId:'v1',type:'soap',expiry:fmt(soapExp),aseguradora:'Mapfre',monto:42000,createdAt:fmt(today)},
      {id:'d2',vehicleId:'v1',type:'permiso',year:y,municipio:'Las Condes',monto:82000,numero:'PC-2024-98765',createdAt:fmt(today)},
      {id:'d3',vehicleId:'v1',type:'rtv',expiry:fmt(rtvExp),establecimiento:'Revisur San Borja',createdAt:fmt(today)},
      {id:'d4',vehicleId:'v1',type:'patente',numero:'ABCD12',region:'RM',createdAt:fmt(today)}
    ],
    maintenance: [
      {id:'m1',vehicleId:'v1',fecha:fmt(new Date(y,0,15)),types:['Cambio aceite','Filtro aire'],km:40000,taller:'Automotora Central',costo:65000,notas:'Todo en orden'},
      {id:'m2',vehicleId:'v1',fecha:fmt(new Date(y-1,9,20)),types:['Alineación/balanceo'],km:37000,taller:'Centro Ruedas',costo:28000,notas:''},
      {id:'m3',vehicleId:'v1',fecha:fmt(new Date(y-1,6,5)),types:['Frenos'],km:33000,taller:'TecniFreno',costo:95000,notas:'Pastillas delanteras'}
    ],
    fuel: [
      {id:'f1',vehicleId:'v1',fecha:fmt(new Date(y,today.getMonth(),-5)),km:45000,litros:40,precio:1100,total:44000,tipo:'95',estacion:'Copec Vitacura'},
      {id:'f2',vehicleId:'v1',fecha:fmt(new Date(y,today.getMonth(),-20)),km:44560,litros:38.5,precio:1095,total:42158,tipo:'95',estacion:'Shell Las Condes'},
      {id:'f3',vehicleId:'v1',fecha:fmt(new Date(y,today.getMonth(),-35)),km:43990,litros:42,precio:1085,total:45570,tipo:'95',estacion:'Petrobras'},
      {id:'f4',vehicleId:'v1',fecha:fmt(new Date(y,today.getMonth(),-55)),km:43340,litros:39,precio:1070,total:41730,tipo:'95',estacion:'Copec Vitacura'},
      {id:'f5',vehicleId:'v1',fecha:fmt(new Date(y,today.getMonth(),-72)),km:42750,litros:41,precio:1060,total:43460,tipo:'95',estacion:'Shell Apoquindo'}
    ],
    expenses: [],
    selectedVehicle: 'v1',
    version: 1
  };
}

let db = loadDB() || initDB();
if (!db.version) { db = initDB(); }
saveDB(db);

// ===== CHARTS =====
let chartFuel = null;
let chartDoughnut = null;
let chartMonthly = null;

// ===== HELPERS =====
const clp = n => '$' + Math.round(n).toLocaleString('es-CL');
const fmt = d => d ? new Date(d+'T12:00:00').toLocaleDateString('es-CL',{day:'2-digit',month:'short',year:'numeric'}) : '—';
const uid = () => 'id' + Date.now() + Math.random().toString(36).slice(2,6);
const today = () => new Date().toISOString().slice(0,10);

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr+'T12:00:00');
  const now = new Date(); now.setHours(12,0,0,0);
  return Math.round((d - now) / 86400000);
}

function getVehicle(id) { return db.vehicles.find(v=>v.id===id); }
function getSelectedVehicle() { return getVehicle(db.selectedVehicle) || db.vehicles[0]; }
function setSelectedVehicle(id) { db.selectedVehicle = id; saveDB(db); }

function mantTypeName(t) {
  const map = {
    'Cambio aceite':'🛢️ Cambio aceite',
    'Filtro aire':'💨 Filtro aire',
    'Filtro combustible':'⚗️ Filtro combustible',
    'Cambio neumáticos':'🔄 Neumáticos',
    'Frenos':'🛑 Frenos',
    'Batería':'🔋 Batería',
    'Correa distribución':'⚙️ Correa dist.',
    'Alineación/balanceo':'⚖️ Alineación',
    'Revisión general':'🔍 Rev. general',
    'Otro':'🔩 Otro'
  };
  return map[t] || t;
}

// Next service estimations by type
function nextServiceKm(type, lastKm) {
  const intervals = {'Cambio aceite':5000,'Filtro aire':10000,'Filtro combustible':15000,'Cambio neumáticos':40000,'Frenos':30000,'Correa distribución':60000,'Alineación/balanceo':20000,'Batería':null,'Revisión general':10000};
  if (intervals[type] != null) return lastKm + intervals[type];
  return null;
}

function getDocByType(vehicleId, type) {
  return db.documents.filter(d=>d.vehicleId===vehicleId && d.type===type).slice(-1)[0] || null;
}

  const totalKm = db.vehicles.reduce((s,v)=>s+v.km,0);

function getVehicleBadges(vid) {
  const badges = [];
  const docs = getExpiredDocAlerts(vid);
  if (docs.expired > 0) badges.push(`<span class="badge badge-red">🔴 ${docs.expired} doc${docs.expired>1?'s':''} vencido${docs.expired>1?'s':''}</span>`);
  if (docs.soon > 0) badges.push(`<span class="badge badge-yellow">🟡 Vence pronto</span>`);
  const fuel = db.fuel.filter(f=>f.vehicleId===vid);
  if (fuel.length >= 2) {
    const last5 = fuel.slice(-5);
    const avg = calcAvgRendimiento(last5);
    if (avg < 8) badges.push(`<span class="badge badge-yellow">⛽ Bajo rendimiento</span>`);
  }
  if (badges.length === 0) badges.push(`<span class="badge badge-green">✅ Al día</span>`);
  return badges.join(' ');
}

function getExpiredDocAlerts(vid) {
  let expired = 0, soon = 0;
  const checkDocs = ['soap','rtv'];
  checkDocs.forEach(type => {
    const doc = getDocByType(vid, type);
    if (doc && doc.expiry) {
      const days = daysUntil(doc.expiry);
      if (days < 0) expired++;
      else if (days <= 30) soon++;
    }
  });
  return {expired, soon};
}

function getGlobalAlerts() {
  const alerts = [];
  db.vehicles.forEach(v => {
    const soap = getDocByType(v.id,'soap');
    if (soap && soap.expiry) {
      const days = daysUntil(soap.expiry);
      if (days < 0) alerts.push({level:'red',icon:'🚨',msg:`SOAP de ${v.marca} ${v.modelo} está VENCIDO`});
      else if (days <= 30) alerts.push({level:'yellow',icon:'⚠️',msg:`Tu SOAP (${v.marca} ${v.modelo}) vence en ${days} días`});
    }
    const rtv = getDocByType(v.id,'rtv');
    if (rtv && rtv.expiry) {
      const days = daysUntil(rtv.expiry);
      if (days < 0) alerts.push({level:'red',icon:'🚨',msg:`Revisión Técnica de ${v.marca} ${v.modelo} está VENCIDA`});
      else if (days <= 30) alerts.push({level:'yellow',icon:'⚠️',msg:`Revisión Técnica (${v.marca} ${v.modelo}) vence en ${days} días`});
    }
    // Check Permiso Circulacion - due March 31
    const now = new Date();
    if (now.getMonth() < 3) { // Jan, Feb, March
      const dueDate = new Date(now.getFullYear(), 2, 31);
      const permiso = getDocByType(v.id,'permiso');
      if (!permiso || permiso.year < now.getFullYear()) {
        const daysLeft = Math.round((dueDate - now) / 86400000);
        if (daysLeft >= 0) alerts.push({level:'yellow',icon:'📄',msg:`Permiso de Circulación ${now.getFullYear()} vence el 31 de Marzo (${daysLeft} días)`});
      }
    }
  });
  return alerts;
}

function getAllCosts() {
  let total = 0;
  db.maintenance.forEach(m => total += m.costo || 0);
  db.fuel.forEach(f => total += f.total || 0);
  db.documents.forEach(d => { if (d.monto) total += d.monto; });
  db.expenses.forEach(e => total += e.monto || 0);
  return total;
}

function getNextMantAlert() {
  const sv = getSelectedVehicle();
  if (!sv) return null;
  const mants = db.maintenance.filter(m=>m.vehicleId===sv.id).sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  if (mants.length === 0) return null;
  const last = mants[0];
  const oilChange = last.types.includes('Cambio aceite');
  if (oilChange) {
    const nextKm = last.km + 5000;
    const diff = nextKm - sv.km;
    if (diff <= 1000) return `Cambio de aceite en ${diff.toLocaleString('es-CL')} km (${sv.marca} ${sv.modelo})`;
  }
  return null;
}

function deleteVehicle(id) {
  if (!confirm('¿Eliminar este vehículo y todos sus datos?')) return;
  db.vehicles = db.vehicles.filter(v=>v.id!==id);
  db.documents = db.documents.filter(d=>d.vehicleId!==id);
  db.maintenance = db.maintenance.filter(m=>m.vehicleId!==id);
  db.fuel = db.fuel.filter(f=>f.vehicleId!==id);
  db.expenses = db.expenses.filter(e=>e.vehicleId!==id);
  if (db.selectedVehicle===id) db.selectedVehicle = db.vehicles[0]?.id || null;
  saveDB(db);
  renderVehicles();
}

function updateHeader() {
  const all = getGlobalAlerts();
  const hdr = document.getElementById('hdr-alerts');
  if (all.length > 0) hdr.innerHTML = `<span style="background:rgba(255,255,255,.2);border-radius:20px;padding:3px 9px">${all.length} alerta${all.length>1?'s':''}</span>`;
  else hdr.innerHTML = `<span style="opacity:.6;font-size:12px">Todo al día ✅</span>`;
}

function renderDocs() {
  renderVSelector('doc-vselector', 'renderDocs()');
  const sv = getSelectedVehicle();
  if (!sv) { document.getElementById('doc-list').innerHTML='<div class="empty-state"><div class="em">📄</div><p>Agrega un vehículo primero</p></div>'; return; }

  const alertsEl = document.getElementById('doc-alerts');
  const listEl = document.getElementById('doc-list');

  const docTypes = [
    {type:'rtv', name:'Revisión Técnica', icon:'🔍', desc:'Anual obligatoria'},
    {type:'soap', name:'SOAP', icon:'🛡️', desc:'Seguro obligatorio anual'},
    {type:'permiso', name:'Permiso de Circulación', icon:'📋', desc:'Anual - vence 31 Marzo'},
    {type:'seguro', name:'Seguro Adicional', icon:'🔒', desc:'Opcional'},
    {type:'patente', name:'Patente / Inscripción', icon:'🏷️', desc:'Referencia'}
  ];

  let alertsHtml = '';
  let listHtml = '<div class="card">';

  docTypes.forEach(dt => {
    const doc = getDocByType(sv.id, dt.type);
    let status = 'gray'; let detail = 'Sin registrar'; let daysMsg = '';

    if (doc) {
      if (dt.type === 'patente') { status='green'; detail=`Patente: ${doc.numero} · Región: ${doc.region}`; }
      else if (dt.type === 'permiso') {
        const now = new Date();
        if (doc.year >= now.getFullYear()) { status='green'; detail=`Año ${doc.year} · ${doc.municipio} · ${clp(doc.monto)}`; }
        else { status='red'; detail=`Año ${doc.year} - VENCIDO`; }
      } else if (doc.expiry) {
        const days = daysUntil(doc.expiry);
        if (days < 0) { status='red'; daysMsg=`Venció hace ${Math.abs(days)} días`; }
        else if (days <= 30) { status='yellow'; daysMsg=`Vence en ${days} días`; }
        else { status='green'; daysMsg=`Válido por ${days} días`; }
        if (dt.type==='soap') detail=`${doc.aseguradora||'—'} · ${clp(doc.monto||0)} · ${fmt(doc.expiry)}`;
        else if (dt.type==='rtv') detail=`${doc.establecimiento||'—'} · Vence: ${fmt(doc.expiry)}`;
        else if (dt.type==='seguro') detail=`${doc.compania||'—'} · ${fmt(doc.expiry)}`;
        if (daysMsg && status==='yellow') alertsHtml += `<div class="alert-banner alert-yellow">⚠️ ${dt.name}: ${daysMsg}</div>`;
        if (daysMsg && status==='red') alertsHtml += `<div class="alert-banner alert-red">🚨 ${dt.name}: ${daysMsg}</div>`;
      }
    }

    listHtml += `<div class="doc-row">
      <span class="semaforo semaforo-${status}"></span>
      <div class="doc-info">
        <div class="doc-name">${dt.icon} ${dt.name}</div>
        <div class="doc-detail">${detail}</div>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="openAddDoc('${dt.type}','${sv.id}')">${doc?'Actualizar':'+ Agregar'}</button>
    </div>`;
  });
  listHtml += '</div>';

  alertsEl.innerHTML = alertsHtml;
  listEl.innerHTML = listHtml;
}

function saveDoc() {
  const [type, vehicleId] = document.getElementById('d-type').value.split('|');
  const g = id => { const el=document.getElementById(id); return el?el.value.trim():''; };
  let doc = {id: uid(), vehicleId, type, createdAt: today()};

  if (type==='rtv') { doc.expiry=g('df-expiry'); doc.establecimiento=g('df-establecimiento'); }
  else if (type==='soap') { doc.aseguradora=g('df-aseguradora'); doc.expiry=g('df-expiry'); doc.monto=+g('df-monto'); }
  else if (type==='permiso') { doc.year=+g('df-year'); doc.municipio=g('df-municipio'); doc.monto=+g('df-monto'); doc.numero=g('df-numero'); }
  else if (type==='seguro') { doc.compania=g('df-compania'); doc.expiry=g('df-expiry'); doc.tipo=g('df-tipo'); }
  else if (type==='patente') { doc.numero=g('df-numero'); doc.region=g('df-region'); }

  // Remove old same type for same vehicle
  db.documents = db.documents.filter(d=>!(d.vehicleId===vehicleId && d.type===type));
  db.documents.push(doc);
  saveDB(db);
  closeModal('modal-doc');
  renderDocs();
}

// ===== TAB 3: MANTENCIONES =====
const MANT_TYPES = ['Cambio aceite','Filtro aire','Filtro combustible','Cambio neumáticos','Frenos','Batería','Correa distribución','Alineación/balanceo','Revisión general','Otro'];

function renderMant() {
  renderVSelector('mant-vselector', 'renderMant()');
  const sv = getSelectedVehicle();
  if (!sv) return;

  const alertsEl = document.getElementById('mant-alerts');
  const histEl = document.getElementById('mant-history');

  // Alerts based on km
  const mants = db.maintenance.filter(m=>m.vehicleId===sv.id).sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  let alertsHtml = '';

  // Per-type next service check
  const lastByType = {};
  mants.forEach(m => {
    m.types.forEach(t => { if (!lastByType[t]) lastByType[t] = m; });
  });

  Object.entries(lastByType).forEach(([type, m]) => {
    const nextKm = nextServiceKm(type, m.km);
    if (nextKm) {
      const diff = nextKm - sv.km;
      if (diff <= 0) alertsHtml += `<div class="alert-banner alert-red">🚨 ${mantTypeName(type)} vencido — programar ahora</div>`;
      else if (diff <= 1000) alertsHtml += `<div class="alert-banner alert-yellow">🔧 ${mantTypeName(type)} en ${diff.toLocaleString('es-CL')} km</div>`;
    }
  });

  // Time-based: oil change 6 months
  const lastOil = lastByType['Cambio aceite'];
  if (lastOil) {
    const d = new Date(lastOil.fecha+'T12:00:00');
    const months = (new Date() - d) / (1000*60*60*24*30);
    if (months >= 6) alertsHtml += `<div class="alert-banner alert-yellow">⏱️ Han pasado ${Math.round(months)} meses desde el último cambio de aceite</div>`;
  }

  // Battery 3 years
  const lastBat = lastByType['Batería'];
  if (lastBat) {
    const d = new Date(lastBat.fecha+'T12:00:00');
    const years = (new Date() - d) / (1000*60*60*24*365);
    if (years >= 2.5) alertsHtml += `<div class="alert-banner alert-yellow">🔋 Batería instalada hace ${years.toFixed(1)} años — considerar reemplazo</div>`;
  }

  if (!alertsHtml) alertsHtml = '<div class="alert-banner alert-green">✅ Mantenciones al día</div>';
  alertsEl.innerHTML = alertsHtml;

  // Cost this year
  const y = new Date().getFullYear();
  const costYear = mants.filter(m=>m.fecha.startsWith(y)).reduce((s,m)=>s+m.costo,0);

  let histHtml = `<div class="card2"><div class="grid2"><div class="stat-box"><div class="stat-num">${mants.length}</div><div class="stat-label">Mantenciones</div></div><div class="stat-box"><div class="stat-num">${clp(costYear)}</div><div class="stat-label">Gasto ${y}</div></div></div></div>`;

  if (mants.length === 0) {
    histHtml += '<div class="empty-state"><div class="em">🔧</div><p>Sin mantenciones registradas</p></div>';
  } else {
    histHtml += '<div class="card"><div class="section-title">Historial</div>';
    mants.forEach(m => {
      histHtml += `<div class="hist-row">
        <div class="hist-icon">🔧</div>
        <div class="hist-info">
          <div class="hist-title">${m.types.map(mantTypeName).join(', ')}</div>
          <div class="hist-sub">${fmt(m.fecha)} · ${m.km.toLocaleString('es-CL')} km · ${m.taller||'—'}</div>
          ${m.notas?`<div class="hist-sub" style="font-style:italic">${m.notas}</div>`:''}
        </div>
        <div>
          <div class="hist-cost">${clp(m.costo)}</div>
          <button class="btn btn-danger btn-sm" style="margin-top:4px" onclick="deleteMant('${m.id}')">✕</button>
        </div>
      </div>`;
    });
    histHtml += '</div>';
  }
  histEl.innerHTML = histHtml;
}

  document.getElementById('m-fecha').value = today();

// ===== TAB 4: COMBUSTIBLE =====
function calcAvgRendimiento(fills) {
  const sorted = [...fills].sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));
  const vals = [];
  for (let i=1; i<sorted.length; i++) {
    const km = sorted[i].km - sorted[i-1].km;
    if (km > 0 && sorted[i].litros > 0) vals.push(km / sorted[i].litros);
  }
  if (vals.length===0) return 0;
  return vals.reduce((s,v)=>s+v,0)/vals.length;
}

function renderFuel() {
  renderVSelector('fuel-vselector', 'renderFuel()');
  const sv = getSelectedVehicle();
  if (!sv) return;

  const fills = db.fuel.filter(f=>f.vehicleId===sv.id).sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));
  const statsEl = document.getElementById('fuel-stats');
  const chartEl = document.getElementById('fuel-chart-section');
  const histEl = document.getElementById('fuel-history');

  if (fills.length < 2) {
    statsEl.innerHTML = `<div class="card2" style="text-align:center;color:var(--muted);padding:20px"><div style="font-size:32px">⛽</div><p>Registra al menos 2 cargas para ver estadísticas</p></div>`;
    chartEl.innerHTML = '';
    histEl.innerHTML = '';
    return;
  }

  // Calculate rendimiento per fill
  const rendimientos = [];
  for (let i=1; i<fills.length; i++) {
    const km = fills[i].km - fills[i-1].km;
    const r = km > 0 && fills[i].litros > 0 ? km / fills[i].litros : 0;
    rendimientos.push({fill: fills[i], r});
  }

  const last5 = rendimientos.slice(-5);
  const avgR = last5.reduce((s,x)=>s+x.r,0)/last5.length;

  // Cost per km
  const totalKmDriven = fills[fills.length-1].km - fills[0].km;
  const totalFuelCost = fills.reduce((s,f)=>s+f.total,0);
  const costPerKm = totalKmDriven > 0 ? totalFuelCost/totalKmDriven : 0;

  // Monthly spend
  const now = new Date();
  const monthFills = fills.filter(f=>{ const d=new Date(f.fecha+'T12:00:00'); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); });
  const monthCost = monthFills.reduce((s,f)=>s+f.total,0);
  const totalLitros = fills.reduce((s,f)=>s+f.litros,0);

  statsEl.innerHTML = `<div class="card2"><div class="grid2" style="gap:8px">
    <div class="stat-box"><div class="stat-num">${avgR.toFixed(1)}</div><div class="stat-label">km/L promedio</div></div>
    <div class="stat-box"><div class="stat-num">${clp(costPerKm)}</div><div class="stat-label">CLP/km</div></div>
    <div class="stat-box"><div class="stat-num">${clp(monthCost)}</div><div class="stat-label">Gasto este mes</div></div>
    <div class="stat-box"><div class="stat-num">${totalLitros.toFixed(0)}L</div><div class="stat-label">Litros totales</div></div>
  </div></div>`;

  // Chart
  const last10 = rendimientos.slice(-10);
  chartEl.innerHTML = `<div class="card"><div class="card-title">📈 Rendimiento km/L</div><div class="chart-wrap"><canvas id="fuelChart"></canvas></div></div>`;

  requestAnimationFrame(() => {
    const ctx = document.getElementById('fuelChart');
    if (!ctx) return;
    if (chartFuel) chartFuel.destroy();
    chartFuel = new Chart(ctx, {
      type: 'line',
      data: {
        labels: last10.map(x=>fmt(x.fill.fecha)),
        datasets: [{
          label:'km/L',
          data: last10.map(x=>+x.r.toFixed(2)),
          borderColor:'#0369a1',fill:true,
          backgroundColor:'rgba(3,105,161,.1)',
          tension:.3,pointRadius:4,pointBackgroundColor:'#0369a1'
        }]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10}}},y:{ticks:{font:{size:10}},beginAtZero:false}}}
    });
  });

  // History
  let histHtml = '<div class="card"><div class="section-title">Cargas registradas</div>';
  [...fills].reverse().forEach((f,i) => {
    const ri = rendimientos.find(x=>x.fill.id===f.id);
    histHtml += `<div class="hist-row">
      <div class="hist-icon">⛽</div>
      <div class="hist-info">
        <div class="hist-title">${f.tipo ? 'Bencina ' + f.tipo : f.tipo} — ${f.litros}L${f.estacion ? ' · '+f.estacion : ''}</div>
        <div class="hist-sub">${fmt(f.fecha)} · ${f.km.toLocaleString('es-CL')} km · ${clp(f.precio)}/L${ri?` · <strong>${ri.r.toFixed(1)} km/L</strong>`:''}</div>
      </div>
      <div>
        <div class="hist-cost">${clp(f.total)}</div>
        <button class="btn btn-danger btn-sm" style="margin-top:4px" onclick="deleteFuel('${f.id}')">✕</button>
      </div>
    </div>`;
  });
  histHtml += '</div>';
  histEl.innerHTML = histHtml;
}

let selectedFuelType = '95';
function selectFuelType(btn) {
  document.querySelectorAll('#fuel-type-btns .fuel-type-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  selectedFuelType = btn.dataset.val;
}

function openAddFuel() {
  const sv = getSelectedVehicle(); if (!sv) { alert('Agrega un vehículo primero'); return; }
  document.getElementById('f-fecha').value = today();
  document.getElementById('f-km').value = sv.km;
  document.getElementById('f-litros').value = '';
  document.getElementById('f-precio').value = '';
  document.getElementById('f-total').value = '';
  document.getElementById('f-estacion').value = '';
  // Reset fuel type buttons
  document.querySelectorAll('#fuel-type-btns .fuel-type-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.val===sv.fuel||'95');
  });
  selectedFuelType = sv.fuel||'95';
  openModal('modal-fuel');
}

function saveFuel() {
  const sv = getSelectedVehicle(); if (!sv) return;
  const km = +document.getElementById('f-km').value;
  const litros = +document.getElementById('f-litros').value;
  const precio = +document.getElementById('f-precio').value;
  let total = +document.getElementById('f-total').value;
  if (!total && litros && precio) total = litros * precio;
  if (!km || !litros) { alert('Completa km y litros'); return; }
  const entry = {
    id: uid(), vehicleId: sv.id,
    fecha: document.getElementById('f-fecha').value,
    km, litros, precio, total,
    tipo: selectedFuelType,
    estacion: document.getElementById('f-estacion').value
  };
  if (km > sv.km) sv.km = km;
  db.fuel.push(entry);
  saveDB(db);
  closeModal('modal-fuel');
  renderFuel();
}

function deleteFuel(id) {
  db.fuel = db.fuel.filter(f=>f.id!==id);
  saveDB(db);
  renderFuel();
}

// ===== TAB 5: GASTOS =====
function renderGasto() {
  renderVSelector('gasto-vselector', 'renderGasto()');
  const sv = getSelectedVehicle();
  if (!sv) return;

  const statsEl = document.getElementById('gasto-stats');
  const chartsEl = document.getElementById('gasto-charts');
  const beEl = document.getElementById('gasto-breakeven');

  // Build expense categories
  const y = new Date().getFullYear();
  const cats = {
    'Combustible': db.fuel.filter(f=>f.vehicleId===sv.id && f.fecha.startsWith(y)).reduce((s,f)=>s+f.total,0),
    'Mantención': db.maintenance.filter(m=>m.vehicleId===sv.id && m.fecha.startsWith(y)).reduce((s,m)=>s+m.costo,0),
    'SOAP': 0, 'Permiso Circ.': 0, 'Rev. Técnica': 0, 'Seg. Adicional': 0,
    'Multas': 0, 'Peajes': 0, 'Estacionamiento': 0, 'Otros': 0
  };

  const soapDoc = getDocByType(sv.id,'soap');
  if (soapDoc && soapDoc.monto) cats['SOAP'] = soapDoc.monto;
  const permDoc = getDocByType(sv.id,'permiso');
  if (permDoc && permDoc.monto && permDoc.year===y) cats['Permiso Circ.'] = permDoc.monto;

  // Manual expenses for this vehicle this year
  db.expenses.filter(e=>e.vehicleId===sv.id && e.fecha.startsWith(y)).forEach(e => {
    if (e.categoria==='Multa') cats['Multas'] += e.monto;
    else if (e.categoria==='Peaje') cats['Peajes'] += e.monto;
    else if (e.categoria==='Estacionamiento') cats['Estacionamiento'] += e.monto;
    else cats['Otros'] += e.monto;
  });

  const totalCost = Object.values(cats).reduce((s,v)=>s+v,0);
  const totalKm = sv.km;
  const fills = db.fuel.filter(f=>f.vehicleId===sv.id && f.fecha.startsWith(y));
  const kmThisYear = fills.length >= 2 ? fills[fills.length-1].km - fills[0].km : 0;

  const costPerKmAll = kmThisYear > 0 ? totalCost/kmThisYear : 0;
  const proyAnual = costPerKmAll > 0 ? costPerKmAll * 12000 : totalCost * 12 / (new Date().getMonth()+1);

  statsEl.innerHTML = `<div class="card2"><div class="grid3" style="gap:8px">
    <div class="stat-box"><div class="stat-num">${clp(totalCost)}</div><div class="stat-label">Total ${y}</div></div>
    <div class="stat-box"><div class="stat-num">${costPerKmAll>0?clp(costPerKmAll):'—'}</div><div class="stat-label">CLP/km total</div></div>
    <div class="stat-box"><div class="stat-num">${clp(proyAnual)}</div><div class="stat-label">Proyección anual</div></div>
  </div></div>`;

  // Doughnut chart
  const filtered = Object.entries(cats).filter(([,v])=>v>0);
  const COLORS = ['#0369a1','#16a34a','#d97706','#dc2626','#7c3aed','#db2777','#0891b2','#ca8a04','#65a30d','#9ca3af'];

  chartsEl.innerHTML = `<div class="card">
    <div class="card-title">📊 Distribución de Gastos ${y}</div>
    <div class="chart-wrap" style="height:240px"><canvas id="doughnutChart"></canvas></div>
    <div style="margin-top:12px">
      ${filtered.map(([k,v],i)=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px">
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${COLORS[i%COLORS.length]};margin-right:6px"></span>${k}</span>
        <strong>${clp(v)}</strong>
      </div>`).join('')}
      <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:14px;font-weight:700"><span>Total</span><span>${clp(totalCost)}</span></div>
    </div>
  </div>`;

  requestAnimationFrame(() => {
    const ctx = document.getElementById('doughnutChart');
    if (!ctx) return;
    if (chartDoughnut) chartDoughnut.destroy();
    chartDoughnut = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: filtered.map(([k])=>k),
        datasets: [{data: filtered.map(([,v])=>v), backgroundColor: COLORS.slice(0,filtered.length)}]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:11}}}}}
    });
  });

  // Break-even vs Uber
  const kmPerMonth = kmThisYear > 0 ? Math.round(kmThisYear / (new Date().getMonth()+1)) : 1000;
  const uberPerKm = 600;
  const ownMonthly = Math.round(totalCost / (new Date().getMonth()+1));
  const uberMonthly = kmPerMonth * uberPerKm;
  const diff = ownMonthly - uberMonthly;
  const diffLabel = diff > 0 ? `<span class="badge badge-red">+${clp(diff)} más caro que Uber</span>` : `<span class="badge badge-green">${clp(Math.abs(diff))} más barato que Uber</span>`;

  beEl.innerHTML = `<div class="card">
    <div class="card-title">🤔 ¿Te conviene tener auto?</div>
    <p style="font-size:13px;color:var(--muted);margin:8px 0">Comparación vs taxi/Uber estimado (${clp(uberPerKm)}/km)</p>
    <div class="grid2" style="gap:8px;margin-bottom:12px">
      <div class="stat-box"><div class="stat-num">${clp(ownMonthly)}</div><div class="stat-label">Tu costo mensual</div></div>
      <div class="stat-box"><div class="stat-num">${clp(uberMonthly)}</div><div class="stat-label">Uber ~${kmPerMonth.toLocaleString('es-CL')} km/mes</div></div>
    </div>
    <div style="text-align:center">${diffLabel}</div>
    <p style="font-size:12px;color:var(--muted);margin-top:8px;text-align:center">Basado en ${kmPerMonth.toLocaleString('es-CL')} km/mes promedio</p>
  </div>

  <div class="card" style="margin-top:0">
    <div class="card-title">📋 Gastos manuales</div>
    <div id="manual-expenses-list"></div>
  </div>`;

  // Manual expenses list
  const manualExps = db.expenses.filter(e=>e.vehicleId===sv.id).sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  const expEl = document.getElementById('manual-expenses-list');
  if (manualExps.length===0) {
    expEl.innerHTML='<p style="color:var(--muted);font-size:13px;text-align:center;padding:12px">Sin gastos manuales registrados</p>';
  } else {
    expEl.innerHTML = manualExps.slice(0,10).map(e=>`<div class="hist-row">
      <div class="hist-icon">💸</div>
      <div class="hist-info"><div class="hist-title">${e.categoria}</div><div class="hist-sub">${fmt(e.fecha)}${e.desc?' · '+e.desc:''}</div></div>
      <div><div class="hist-cost">${clp(e.monto)}</div><button class="btn btn-danger btn-sm" style="margin-top:4px" onclick="deleteGasto('${e.id}')">✕</button></div>
    </div>`).join('');
  }
}

function openAddGasto() {
  const sv = getSelectedVehicle(); if (!sv) { alert('Agrega un vehículo primero'); return; }
  document.getElementById('g-fecha').value = today();
  document.getElementById('g-monto').value = '';
  document.getElementById('g-desc').value = '';
  openModal('modal-gasto');
}

function saveGasto() {
  const sv = getSelectedVehicle(); if (!sv) return;
  const monto = +document.getElementById('g-monto').value;
  if (!monto) { alert('Ingresa un monto'); return; }
  const entry = {
    id: uid(), vehicleId: sv.id,
    fecha: document.getElementById('g-fecha').value,
    monto,
    categoria: document.getElementById('g-cat').value,
    desc: document.getElementById('g-desc').value
  };
  db.expenses.push(entry);
  saveDB(db);
  closeModal('modal-gasto');
  renderGasto();
}

function deleteGasto(id) {
  db.expenses = db.expenses.filter(e=>e.id!==id);
  saveDB(db);
  renderGasto();
}

// ===== MODAL HELPERS =====
function openModal(id) {
  const el = document.getElementById(id);
  el.classList.add('open');
  el.addEventListener('click', function bgClose(e) {
    if (e.target===el) { el.classList.remove('open'); el.removeEventListener('click',bgClose); }
  });
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function openAddVehicle() {
  document.getElementById('v-marca').value='';
  document.getElementById('v-modelo').value='';
  document.getElementById('v-anio').value='';
  document.getElementById('v-patente').value='';
  document.getElementById('v-km').value='';
  document.getElementById('v-color').value='#0369a1';
  openModal('modal-veh');
}

function saveVehicle() {
  const marca = document.getElementById('v-marca').value.trim();
  const modelo = document.getElementById('v-modelo').value.trim();
  const anio = +document.getElementById('v-anio').value;
  const patente = document.getElementById('v-patente').value.trim().toUpperCase();
  const km = +document.getElementById('v-km').value || 0;
  if (!marca || !modelo || !patente) { alert('Completa marca, modelo y patente'); return; }
  if (db.vehicles.length >= 5) { alert('Máximo 5 vehículos'); return; }
  const v = {
    id: uid(), marca, modelo, anio: anio||new Date().getFullYear(),
    patente, km, color: document.getElementById('v-color').value,
    fuel: document.getElementById('v-fuel').value,
    createdAt: today()
  };
  db.vehicles.push(v);
  db.selectedVehicle = v.id;
  saveDB(db);
  closeModal('modal-veh');
  renderVehicles();
}

// ===== INIT =====
renderVehicles();
</script>
