<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>KiteSpot Chile — Condiciones de kitesurf en tiempo real</title>
<meta name="description" content="Consulta el viento, oleaje y condiciones de kitesurf en los mejores spots de Chile. Dashboard en tiempo real con semaforo, mapa y alertas.">
<meta name="theme-color" content="#22d3ee">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta property="og:title" content="KiteSpot Chile">
<meta property="og:description" content="Condiciones de kitesurf en tiempo real para spots de Chile">
<meta property="og:type" content="website">
<meta property="og:url" content="https://cussen.cl/wind/">
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#070b16;--bg2:#101828;--bg3:#1e293b;--bg4:#334155;
  --text:#f1f5f9;--muted:#94a3b8;--dim:#64748b;
  --cyan:#22d3ee;--cyan2:#06b6d4;--cyan-glow:rgba(34,211,238,.18);
  --orange:#fb923c;--orange2:#f97316;
  --green:#4ade80;--green-dim:rgba(74,222,128,.12);
  --yellow:#facc15;--yellow-dim:rgba(250,204,21,.12);
  --red:#f87171;--red-dim:rgba(248,113,113,.12);
  --radius:16px;--radius-sm:10px;
  --header-h:48px;--nav-h:42px;
  --shadow-sm:0 2px 8px rgba(0,0,0,.25);
  --shadow-md:0 4px 16px rgba(0,0,0,.35);
  --shadow-glow-g:0 0 24px rgba(74,222,128,.15);
  --shadow-glow-y:0 0 24px rgba(250,204,21,.12);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased}
body{min-height:100vh;min-height:100dvh;overflow-x:hidden;overscroll-behavior-y:contain;position:relative;background:radial-gradient(ellipse at top,#0a1629 0%,var(--bg) 50%,#020617 100%)}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 20% 20%,rgba(34,211,238,.06) 0%,transparent 40%),radial-gradient(circle at 80% 60%,rgba(251,146,60,.04) 0%,transparent 40%);pointer-events:none;z-index:0}
.header,.nav,main{position:relative;z-index:1}
a{color:var(--cyan);text-decoration:none}

/* Header — premium glass */
.header{position:sticky;top:0;z-index:100;background:rgba(7,11,22,.72);backdrop-filter:blur(24px) saturate(1.8);-webkit-backdrop-filter:blur(24px) saturate(1.8);border-bottom:1px solid rgba(148,163,184,.06);padding:10px 14px;padding-top:calc(10px + var(--safe-top));height:calc(var(--header-h) + var(--safe-top));display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:10px}
.logo{font-size:1.15rem;font-weight:800;background:linear-gradient(135deg,#22d3ee 0%,#60a5fa 35%,#fb923c 70%,#22d3ee 100%);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.5px;animation:logoShift 6s ease-in-out infinite}
@keyframes logoShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.location-badge{font-size:.68rem;color:var(--muted);background:rgba(30,41,59,.6);border:1px solid rgba(148,163,184,.08);padding:4px 10px;border-radius:20px;display:flex;align-items:center;gap:5px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;backdrop-filter:blur(8px)}
.btn-icon{background:none;border:none;color:var(--muted);cursor:pointer;padding:8px;border-radius:10px;transition:all .2s cubic-bezier(.4,0,.2,1);min-width:38px;min-height:38px;display:flex;align-items:center;justify-content:center}
.btn-icon:active{color:var(--cyan);background:var(--cyan-glow);transform:scale(.88)}
.lang-toggle{font-size:.62rem;font-weight:700;color:var(--muted);background:rgba(30,41,59,.6);border:1px solid rgba(148,163,184,.1);padding:4px 10px;border-radius:14px;cursor:pointer;letter-spacing:.6px;transition:all .2s;min-width:34px;text-align:center;backdrop-filter:blur(8px)}
.lang-toggle:active{color:var(--cyan);border-color:var(--cyan);transform:scale(.9)}
.btn-icon.spinning svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Nav — glass tabs with gradient underline */
.nav{position:sticky;top:calc(var(--header-h) + var(--safe-top));z-index:99;background:rgba(7,11,22,.82);backdrop-filter:blur(20px) saturate(1.6);-webkit-backdrop-filter:blur(20px) saturate(1.6);display:flex;border-bottom:1px solid rgba(148,163,184,.04);height:var(--nav-h)}
.tab-btn{flex:1;background:none;border:none;color:var(--dim);font-family:inherit;font-size:.66rem;font-weight:700;padding:0;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;letter-spacing:.6px;text-transform:uppercase;min-height:var(--nav-h);-webkit-tap-highlight-color:transparent;position:relative}
.ico-tab{width:17px;height:17px;flex-shrink:0}
.ico-inline{width:11px;height:11px;vertical-align:-1px}
.ico-btn{width:17px;height:17px}
.ico-empty{width:44px;height:44px;margin-bottom:12px;opacity:.25}
.tab-btn.active{color:var(--cyan)}
.tab-btn.active::after{content:'';position:absolute;bottom:-1px;left:20%;right:20%;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);border-radius:2px;box-shadow:0 0 12px var(--cyan)}
.tab-btn:active{color:var(--text);transform:scale(.96)}

/* Content — edge-to-edge on mobile */
.content{max-width:720px;margin:0 auto;padding:10px}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* Cards — elevated, refined */
.spot-list{display:flex;flex-direction:column;gap:10px}
.spot-card{background:linear-gradient(180deg,rgba(30,41,59,.7) 0%,rgba(16,24,40,.75) 100%);border:1px solid rgba(148,163,184,.08);border-radius:var(--radius);padding:14px 14px 14px 16px;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);animation:fadeUp .35s cubic-bezier(.16,1,.3,1) both;-webkit-tap-highlight-color:transparent;will-change:transform;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.spot-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:0 3px 3px 0;transition:all .25s}
.spot-card:active{transform:scale(.99);box-shadow:var(--shadow-md)}
.spot-card.status-green::before{background:linear-gradient(180deg,var(--green) 0%,var(--green) 60%,transparent 100%);box-shadow:2px 0 16px rgba(74,222,128,.5),0 0 12px var(--green);animation:sideGlow 3s ease-in-out infinite}
@keyframes sideGlow{0%,100%{box-shadow:2px 0 16px rgba(74,222,128,.5),0 0 12px var(--green)}50%{box-shadow:4px 0 24px rgba(74,222,128,.7),0 0 18px var(--green)}}
.spot-card.status-yellow::before{background:linear-gradient(180deg,var(--yellow) 0%,var(--yellow) 60%,transparent 100%);box-shadow:2px 0 14px rgba(250,204,21,.4)}
.spot-card.status-red::before{background:linear-gradient(180deg,var(--red) 0%,rgba(248,113,113,.5) 60%,transparent 100%)}
.spot-card.status-green{border-color:rgba(74,222,128,.15);background:linear-gradient(180deg,rgba(74,222,128,.05) 0%,rgba(16,24,40,.8) 100%)}
.spot-card.status-yellow{border-color:rgba(250,204,21,.12);background:linear-gradient(180deg,rgba(250,204,21,.03) 0%,rgba(16,24,40,.8) 100%)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.spot-list .spot-card:nth-child(1){animation-delay:.02s}
.spot-list .spot-card:nth-child(2){animation-delay:.06s}
.spot-list .spot-card:nth-child(3){animation-delay:.1s}
.spot-list .spot-card:nth-child(4){animation-delay:.14s}
.spot-list .spot-card:nth-child(5){animation-delay:.18s}
.spot-list .spot-card:nth-child(6){animation-delay:.22s}
.spot-list .spot-card:nth-child(7){animation-delay:.26s}
.spot-list .spot-card:nth-child(8){animation-delay:.3s}
.spot-list .spot-card:nth-child(n+9){animation-delay:.34s}

.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px}
.spot-name{font-size:.92rem;font-weight:700;line-height:1.2;letter-spacing:-.2px}
.spot-region{font-size:.64rem;color:var(--muted);margin-top:2px;letter-spacing:.1px}
.card-top-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
.status-badge{font-size:.58rem;font-weight:800;padding:5px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;border:1px solid transparent}
.status-badge.green{background:var(--green-dim);color:var(--green);border-color:rgba(74,222,128,.3);box-shadow:0 0 16px rgba(74,222,128,.15)}
.status-badge.yellow{background:var(--yellow-dim);color:var(--yellow);border-color:rgba(250,204,21,.25)}
.status-badge.red{background:var(--red-dim);color:var(--red);border-color:rgba(248,113,113,.2)}
.fav-btn{background:none;border:none;cursor:pointer;padding:6px;opacity:.35;transition:all .2s cubic-bezier(.4,0,.2,1);min-width:30px;min-height:30px;display:flex;align-items:center;justify-content:center;border-radius:8px;-webkit-tap-highlight-color:transparent}
.fav-btn:active{transform:scale(.82)}
.fav-btn.active{opacity:1;color:var(--cyan)}
.fav-btn.active svg{filter:drop-shadow(0 0 6px var(--cyan))}

.card-data{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;padding:10px 4px;background:rgba(7,11,22,.4);border-radius:10px;border:1px solid rgba(148,163,184,.04)}
.data-item{text-align:center;position:relative}
.data-item:not(:last-child)::after{content:'';position:absolute;right:-3px;top:15%;bottom:15%;width:1px;background:rgba(148,163,184,.08)}
.data-label{font-size:.54rem;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px;font-weight:600}
.data-value{font-size:1.02rem;font-weight:800;letter-spacing:-.3px;line-height:1}
.data-unit{font-size:.58rem;color:var(--muted);font-weight:500;letter-spacing:.2px}
.wind-arrow{display:inline-block;transition:transform .4s cubic-bezier(.4,0,.2,1)}

/* Forecast strip — momentum scroll */
.card-forecast{display:flex;gap:4px;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none;padding:4px 0;-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity}
.card-forecast::-webkit-scrollbar{display:none}
.fc-hour{flex:0 0 auto;text-align:center;padding:6px 8px;border-radius:9px;background:rgba(7,11,22,.5);min-width:44px;scroll-snap-align:start;transition:transform .2s}
.fc-hour:active{transform:scale(.92)}
.fc-hour .fc-time{font-size:.5rem;color:var(--dim);margin-bottom:2px;font-weight:600;letter-spacing:.2px}
.fc-hour .fc-wind{font-size:.82rem;font-weight:800;letter-spacing:-.3px;line-height:1.1}
.fc-hour .fc-arrow{font-size:.62rem;color:var(--dim);margin-top:2px}
.fc-hour.fc-green{background:linear-gradient(180deg,rgba(74,222,128,.15),rgba(74,222,128,.05));box-shadow:inset 0 0 0 1px rgba(74,222,128,.18)}
.fc-hour.fc-green .fc-wind{color:var(--green)}
.fc-hour.fc-yellow{background:linear-gradient(180deg,rgba(250,204,21,.1),rgba(250,204,21,.03));box-shadow:inset 0 0 0 1px rgba(250,204,21,.15)}
.fc-hour.fc-yellow .fc-wind{color:var(--yellow)}
.fc-hour.fc-red{opacity:.55}
.fc-hour.fc-red .fc-wind{color:var(--red)}

/* Expanded card detail */
.card-detail{display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--bg3)}
.spot-card.expanded .card-detail{display:block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.detail-item{background:var(--bg);border-radius:var(--radius-sm);padding:8px;text-align:center}
.detail-item .data-label{margin-bottom:3px}
.detail-item .data-value{font-size:1.05rem}
.chart-wrap{height:150px;position:relative;margin-top:6px}


/* 7-day forecast in spot cards */
.fc-days{margin-bottom:8px}
.fc-day-row{margin-bottom:6px}
.fc-day-label{font-size:.55rem;color:var(--cyan);font-weight:600;text-transform:uppercase;margin-bottom:3px}
.fc-day-hours{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.fc-day-hours::-webkit-scrollbar{display:none}
.fc-day-item{flex:0 0 auto;text-align:center;min-width:30px;padding:3px 2px;border-radius:5px;background:var(--bg)}
.fc-day-item .fc-time{font-size:.45rem;color:var(--dim)}
.fc-day-item .fc-wind{font-size:.65rem;font-weight:700}
.fc-day-item .fc-arrow{font-size:.5rem;color:var(--dim)}
.fc-day-item.dg .fc-wind{color:var(--green)}
.fc-day-item.dy .fc-wind{color:var(--yellow)}
.fc-day-item.dr .fc-wind{color:var(--red)}
.fc-day-item.fc-rain{background:rgba(59,130,246,.2)}
.fc-day-item.fc-rain .fc-time{color:#3b82f6}
.fc-day-item.fc-cold .fc-time{color:#94a3b8}

/* Best moment + week score */
.best-moment{font-size:.7rem;padding:8px 12px;border-radius:10px;margin-bottom:10px;display:flex;align-items:center;gap:8px;line-height:1.35}
.best-moment.has-window{background:linear-gradient(90deg,rgba(74,222,128,.1),rgba(74,222,128,.04));border:1px solid rgba(74,222,128,.18);color:var(--green)}
.best-moment.no-window{background:rgba(248,113,113,.05);border:1px solid rgba(248,113,113,.12);color:var(--red)}
.best-moment .bm-icon{font-size:.85rem;flex-shrink:0}
.best-moment .bm-text{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.best-moment .bm-when{font-weight:800;letter-spacing:-.1px}
.week-dots{display:flex;gap:3px;margin-left:auto;flex-shrink:0}
.week-dot{width:7px;height:7px;border-radius:50%;background:rgba(148,163,184,.15);transition:transform .2s}
.week-dot.wd-green{background:var(--green);box-shadow:0 0 6px rgba(74,222,128,.5)}
.week-dot.wd-yellow{background:var(--yellow);box-shadow:0 0 4px rgba(250,204,21,.4)}
.week-dot.wd-red{background:var(--red)}

/* Empty states */
.empty-state{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-state svg{display:block;margin:0 auto}
.empty-state p{font-size:.82rem;line-height:1.5}


/* Notification permission banner */
.notif-banner{background:linear-gradient(135deg,rgba(6,182,212,.08),rgba(249,115,22,.08));border:1px solid rgba(6,182,212,.3);border-radius:var(--radius);padding:12px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.notif-banner p{font-size:.75rem;flex:1;line-height:1.4}
.notif-banner .btn-sm{background:var(--cyan);color:var(--bg);border:none;font-family:inherit;font-size:.72rem;font-weight:600;padding:8px 14px;border-radius:8px;cursor:pointer;white-space:nowrap}

/* Updated timestamp */
.updated{text-align:center;font-size:.6rem;color:var(--dim);padding:6px;margin-top:2px}

/* Loading */
.loading{text-align:center;padding:48px 20px;color:var(--muted)}
.loading .spinner{width:32px;height:32px;border:2.5px solid var(--bg3);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
.load-progress{font-size:.7rem;color:var(--cyan);font-weight:600;margin-top:6px}

/* ====== HERO CARD ====== */
.hero-card{border-radius:20px;padding:22px 18px;margin-bottom:12px;position:relative;overflow:hidden;min-height:90px;box-shadow:var(--shadow-md);animation:fadeUp .45s cubic-bezier(.16,1,.3,1) both}
.hero-loading{display:flex;align-items:center;justify-content:center;height:90px}
.hero-card.go{background:linear-gradient(135deg,rgba(74,222,128,.18) 0%,rgba(34,211,238,.1) 50%,rgba(7,11,22,.8) 100%);border:1px solid rgba(74,222,128,.25);box-shadow:var(--shadow-md),var(--shadow-glow-g)}
.hero-card.maybe{background:linear-gradient(135deg,rgba(250,204,21,.14) 0%,rgba(251,146,60,.08) 50%,rgba(7,11,22,.8) 100%);border:1px solid rgba(250,204,21,.22);box-shadow:var(--shadow-md),var(--shadow-glow-y)}
.hero-card.nogo{background:linear-gradient(135deg,rgba(248,113,113,.1) 0%,rgba(16,24,40,.9) 100%);border:1px solid rgba(248,113,113,.18);box-shadow:var(--shadow-md)}
.hero-card::before{content:'';position:absolute;top:-50%;right:-30%;width:100%;height:200%;background:radial-gradient(circle at center,rgba(34,211,238,.08) 0%,transparent 55%);pointer-events:none}
.hero-card.go::after{content:'';position:absolute;top:-50%;left:-30%;width:100%;height:200%;background:radial-gradient(circle at center,rgba(74,222,128,.12) 0%,transparent 55%);animation:heroPulse 5s ease-in-out infinite;pointer-events:none}
.hero-card.go .hero-info::after,.hero-card.maybe .hero-info::after{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.08) 50%,transparent 100%);animation:heroShimmer 4.5s ease-in-out infinite;pointer-events:none}
.hero-info{position:relative;overflow:hidden}
@keyframes heroShimmer{0%{left:-100%}60%,100%{left:200%}}
@keyframes heroPulse{0%,100%{opacity:.4;transform:scale(.92)}50%{opacity:1;transform:scale(1.08)}}

.hero-status{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:1.8px;margin-bottom:10px;display:flex;align-items:center;gap:8px;position:relative;z-index:1}
.hero-card.go .hero-status{color:var(--green)}
.hero-card.maybe .hero-status{color:var(--yellow)}
.hero-card.nogo .hero-status{color:var(--red)}
.hero-status .hero-live{width:7px;height:7px;border-radius:50%;animation:livePulse 2s ease-in-out infinite;flex-shrink:0}
.hero-card.go .hero-live{background:var(--green);box-shadow:0 0 12px var(--green)}
.hero-card.maybe .hero-live{background:var(--yellow);box-shadow:0 0 10px var(--yellow)}
.hero-card.nogo .hero-live{background:var(--red)}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1);box-shadow:0 0 0 0 currentColor}50%{opacity:.85;transform:scale(1.15);box-shadow:0 0 0 5px transparent}}

.hero-main{display:flex;align-items:center;gap:16px;margin-bottom:10px;position:relative;z-index:1}
.hero-wind{font-size:3rem;font-weight:900;line-height:.9;letter-spacing:-3px;font-variant-numeric:tabular-nums}
.hero-card.go .hero-wind{color:var(--green);text-shadow:0 0 32px rgba(74,222,128,.3);animation:windBreath 3.5s ease-in-out infinite}
.hero-card.maybe .hero-wind{color:var(--yellow);text-shadow:0 0 24px rgba(250,204,21,.25);animation:windBreath 4s ease-in-out infinite}
.hero-card.nogo .hero-wind{color:var(--text)}
@keyframes windBreath{0%,100%{text-shadow:0 0 32px rgba(74,222,128,.3);transform:scale(1)}50%{text-shadow:0 0 48px rgba(74,222,128,.5);transform:scale(1.015)}}
.hero-unit{font-size:.72rem;color:var(--muted);font-weight:600;letter-spacing:.5px}
.hero-info{flex:1;min-width:0}
.hero-spot{font-size:1.08rem;font-weight:800;margin-bottom:3px;letter-spacing:-.3px;line-height:1.15}
.hero-meta{font-size:.68rem;color:var(--muted);line-height:1.45}
.hero-dir{display:inline-flex;align-items:center;gap:4px}
.hero-dir .wind-arrow{font-size:1rem;transition:transform .6s cubic-bezier(.4,0,.2,1);display:inline-block;animation:arrowDrift 4s ease-in-out infinite}
@keyframes arrowDrift{0%,100%{filter:drop-shadow(0 0 6px currentColor)}50%{filter:drop-shadow(0 0 14px currentColor)}}

.hero-bottom{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;position:relative;z-index:1}
.hero-window{font-size:.68rem;font-weight:600;padding:6px 11px;border-radius:10px;background:rgba(255,255,255,.06);backdrop-filter:blur(8px);display:inline-flex;align-items:center;gap:5px;border:1px solid rgba(255,255,255,.05)}
.hero-card.go .hero-window{color:var(--green);background:rgba(74,222,128,.12);border-color:rgba(74,222,128,.2)}
.hero-card.maybe .hero-window{color:var(--yellow);background:rgba(250,204,21,.1);border-color:rgba(250,204,21,.2)}
.hero-gear{font-size:.68rem;font-weight:600;padding:6px 11px;border-radius:10px;background:rgba(34,211,238,.12);color:var(--cyan);display:inline-flex;align-items:center;gap:5px;border:1px solid rgba(34,211,238,.2)}
.hero-share{background:rgba(255,255,255,.04);border:1px solid rgba(148,163,184,.15);color:var(--muted);font-family:inherit;font-size:.68rem;font-weight:600;padding:6px 12px;border-radius:10px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;margin-left:auto;transition:all .2s cubic-bezier(.4,0,.2,1)}
.hero-share:active{background:var(--cyan-glow);color:var(--cyan);border-color:var(--cyan);transform:scale(.94)}
.hero-countdown{font-size:.68rem;font-weight:700;padding:6px 11px;border-radius:10px;background:rgba(250,204,21,.12);color:var(--yellow);display:inline-flex;align-items:center;gap:5px;font-variant-numeric:tabular-nums;border:1px solid rgba(250,204,21,.18)}

/* Session timeline */
.session-timeline{display:flex;gap:2px;margin-top:12px;height:22px;border-radius:8px;overflow:hidden;background:rgba(7,11,22,.5);position:relative}
.session-timeline::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(34,211,238,.08) 50%,transparent 100%);animation:timelineShimmer 3s linear infinite;pointer-events:none}
@keyframes timelineShimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.st-block{flex:1;position:relative;transition:all .3s cubic-bezier(.4,0,.2,1);min-width:0}
.st-block.st-go{background:linear-gradient(180deg,rgba(74,222,128,.45),rgba(74,222,128,.25))}
.st-block.st-maybe{background:linear-gradient(180deg,rgba(250,204,21,.28),rgba(250,204,21,.14))}
.st-block.st-no{background:rgba(148,163,184,.06)}
.st-block.st-rain{background:rgba(59,130,246,.25)}
.st-block.st-now{outline:2px solid var(--cyan);outline-offset:-1px;border-radius:4px;z-index:1;box-shadow:0 0 12px var(--cyan)}
.st-block .st-label{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);font-size:.45rem;color:var(--dim);white-space:nowrap}
.st-block .st-val{font-size:.5rem;font-weight:700;color:var(--text);text-align:center;line-height:20px;opacity:.8}

/* ====== WEEK GRID ====== */
.week-grid{margin-bottom:12px;background:linear-gradient(180deg,rgba(30,41,59,.5),rgba(16,24,40,.5));border:1px solid rgba(148,163,184,.08);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm)}
.wg-header{display:flex;border-bottom:1px solid rgba(148,163,184,.08);background:rgba(7,11,22,.3)}
.wg-header .wg-label{flex:0 0 105px;padding:8px 10px;font-size:.55rem;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.8px}
.wg-header .wg-day{flex:1;text-align:center;padding:8px 2px;font-size:.58rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.wg-header .wg-day.today{color:var(--cyan);text-shadow:0 0 8px rgba(34,211,238,.5)}
.wg-row{display:flex;border-bottom:1px solid rgba(51,65,85,.25);transition:background .2s}
.wg-row:last-child{border-bottom:none}
.wg-row:active{background:rgba(34,211,238,.05)}
.wg-row .wg-label{flex:0 0 105px;padding:7px 10px;font-size:.64rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px;letter-spacing:-.1px}
.wg-km{font-size:.5rem;color:var(--dim);font-weight:500}
.wg-row .wg-cell{flex:1;display:flex;align-items:center;justify-content:center;padding:6px 1px;position:relative}
.wg-dot{width:11px;height:11px;border-radius:50%;transition:all .25s cubic-bezier(.4,0,.2,1)}
.wg-dot.wg-go{background:var(--green);box-shadow:0 0 10px rgba(74,222,128,.5),inset 0 -1px 2px rgba(0,0,0,.15);animation:dotPulse 2.8s ease-in-out infinite}
.wg-dot.wg-maybe{background:var(--yellow);box-shadow:0 0 8px rgba(250,204,21,.4),inset 0 -1px 2px rgba(0,0,0,.15)}
@keyframes dotPulse{0%,100%{box-shadow:0 0 10px rgba(74,222,128,.5),inset 0 -1px 2px rgba(0,0,0,.15)}50%{box-shadow:0 0 18px rgba(74,222,128,.8),inset 0 -1px 2px rgba(0,0,0,.15)}}
.wg-dot.wg-no{background:rgba(51,65,85,.7)}
.wg-dot.wg-rain{outline:2px solid #3b82f6;outline-offset:1px}
.wg-dot.wg-cold{outline:2px solid #94a3b8;outline-offset:1px}
.wg-dot.wg-rain.wg-cold{outline-color:#60a5fa}
.wg-cell:hover .wg-dot{transform:scale(1.5)}
.wg-peak{font-size:.5rem;color:var(--dim);position:absolute;bottom:1px;font-weight:600}

/* ====== DAY PLANNER ====== */
.day-planner{margin-bottom:14px;background:linear-gradient(180deg,rgba(30,41,59,.55),rgba(16,24,40,.5));border:1px solid rgba(148,163,184,.08);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm)}
.day-planner:empty{display:none}
.dp-header{padding:10px 14px;display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid rgba(148,163,184,.06);background:rgba(7,11,22,.3)}
.dp-header>span:first-child{font-size:.7rem;font-weight:800;color:var(--cyan);text-transform:uppercase;letter-spacing:1px;text-shadow:0 0 8px rgba(34,211,238,.3)}
.dp-sub{font-size:.55rem;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.dp-rows{display:flex;flex-direction:column}
.dp-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(51,65,85,.18);transition:all .2s;cursor:pointer;-webkit-tap-highlight-color:transparent}
.dp-row:last-child{border-bottom:none}
.dp-row:active{background:rgba(34,211,238,.06);transform:scale(.99)}
.dp-day{flex:0 0 60px;font-size:.62rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.dp-spot{flex:1;min-width:0}
.dp-name{font-size:.78rem;font-weight:700;color:var(--text);line-height:1.2;display:flex;align-items:center;gap:5px;letter-spacing:-.1px}
.dp-window{font-size:.6rem;color:var(--green);margin-top:2px;font-weight:600;font-variant-numeric:tabular-nums}
.dp-arrow{color:var(--dim);font-size:.85rem;transition:transform .2s}
.dp-row:active .dp-arrow{transform:translateX(3px)}
.dp-empty .dp-info{font-size:.65rem;color:var(--dim);font-style:italic}
.dp-empty{opacity:.5;cursor:default}
.dp-fire{background:linear-gradient(90deg,rgba(74,222,128,.06) 0%,transparent 100%)}
.dp-fire .dp-name{color:var(--green)}
.dp-fire .dp-window{color:var(--green)}
.dp-flame{color:#fcd34d;text-shadow:0 0 8px rgba(252,211,77,.6);font-size:.7rem;animation:flameFlick 1.5s ease-in-out infinite}
@keyframes flameFlick{0%,100%{opacity:1;text-shadow:0 0 8px rgba(252,211,77,.6)}50%{opacity:.85;text-shadow:0 0 14px rgba(252,211,77,.9)}}

/* Search mini */
.spot-list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:2px 4px}
.spot-list-header>span{font-size:.68rem;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
.search-wrap-mini{display:flex;align-items:center;gap:6px;background:rgba(30,41,59,.6);border:1px solid rgba(148,163,184,.1);border-radius:10px;padding:6px 10px;transition:all .2s;backdrop-filter:blur(8px)}
.search-wrap-mini:focus-within{border-color:var(--cyan);box-shadow:0 0 0 3px var(--cyan-glow)}
.search-wrap-mini svg{color:var(--dim);flex-shrink:0}
.search-wrap-mini input{background:none;border:none;color:var(--text);font-family:inherit;font-size:.74rem;outline:none;width:90px;font-weight:500}
.search-wrap-mini input::placeholder{color:var(--dim)}

/* Distance badge */
.dist-badge{font-size:.56rem;color:var(--muted);background:rgba(7,11,22,.6);padding:3px 8px;border-radius:10px;margin-left:6px;font-weight:600;letter-spacing:.2px;border:1px solid rgba(148,163,184,.08)}

/* Thermal risk badge */
.thermal-badge{display:inline-flex;align-items:center;gap:5px;font-size:.6rem;font-weight:700;padding:4px 10px;border-radius:8px;margin-top:6px;letter-spacing:.1px}
.thermal-badge.thermal-ok{background:rgba(74,222,128,.1);color:var(--green);border:1px solid rgba(74,222,128,.18)}
.thermal-badge.thermal-warn{background:rgba(250,204,21,.12);color:var(--yellow);border:1px solid rgba(250,204,21,.2)}
.thermal-badge.thermal-bad{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.18)}
.thermal-badge svg{flex-shrink:0}
.tide-badge{display:inline-flex;align-items:center;gap:5px;font-size:.6rem;font-weight:600;padding:4px 10px;border-radius:8px;margin-top:6px;background:rgba(96,165,250,.1);color:#93c5fd;border:1px solid rgba(96,165,250,.18)}
.tide-icon{font-size:.72rem}
.tide-spring{color:#fcd34d;margin-left:3px;font-size:.62rem;text-shadow:0 0 6px rgba(252,211,77,.6)}

/* Micro-stats pills (stability, trend, 80m wind) */
.micro-stats{display:flex;gap:5px;margin:8px 0;flex-wrap:wrap}
.ms-pill{display:inline-flex;align-items:center;gap:3px;font-size:.58rem;font-weight:600;padding:3px 8px;border-radius:999px;border:1px solid transparent;letter-spacing:.1px;line-height:1.3;white-space:nowrap}
.ms-pill em{font-style:normal;font-weight:800;opacity:.85}
.ms-pill.ms-alt{background:rgba(148,163,184,.06);color:var(--muted);border-color:rgba(148,163,184,.12)}

/* Rain overlay on card */
.rain-overlay{position:absolute;top:0;right:0;padding:4px 8px;border-radius:0 var(--radius) 0 8px;font-size:.6rem;font-weight:700;display:flex;align-items:center;gap:3px}
.rain-overlay.rain-heavy{background:rgba(59,130,246,.2);color:#60a5fa}
.rain-overlay.rain-light{background:rgba(59,130,246,.1);color:#93c5fd}


/* Suggest spot — add button */
.custom-spots-actions{display:flex;gap:6px;margin-top:10px}
.custom-spots-actions .suggest-btn{margin-top:0;flex:1}
.suggest-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:12px;margin-top:10px;background:var(--bg2);border:1px dashed var(--bg3);border-radius:var(--radius);color:var(--muted);font-family:inherit;font-size:.72rem;cursor:pointer;transition:all .2s;font-weight:600}
.suggest-btn.export-btn{font-size:.65rem}
.suggest-btn:active{background:var(--cyan-glow);color:var(--cyan);border-color:var(--cyan)}

/* Fullscreen map picker */
.map-picker{position:fixed;inset:0;z-index:300;background:var(--bg);display:flex;flex-direction:column;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.map-picker-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;padding-top:calc(12px + var(--safe-top));background:rgba(15,23,42,.95);backdrop-filter:blur(16px);z-index:10;border-bottom:1px solid var(--bg3)}
.map-picker-header h3{font-size:.95rem;font-weight:700}
.map-picker-close{background:none;border:none;color:var(--muted);cursor:pointer;padding:8px;border-radius:8px;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center}
.map-picker-close:active{color:var(--text);background:var(--bg3)}
.map-picker-body{flex:1;position:relative}
.map-picker-body .leaflet-container{height:100%;width:100%;background:var(--bg)}
.map-picker-hint{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:1000;background:rgba(15,23,42,.9);backdrop-filter:blur(8px);color:var(--text);font-size:.75rem;padding:8px 16px;border-radius:20px;pointer-events:none;transition:opacity .3s;border:1px solid var(--bg3)}
.map-picker-hint.hidden{opacity:0}
.map-picker-footer{padding:12px 16px;padding-bottom:calc(12px + var(--safe-bottom));background:rgba(15,23,42,.95);backdrop-filter:blur(16px);border-top:1px solid var(--bg3);display:none;animation:slideUp .3s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.map-picker-footer.visible{display:block}
.map-picker-spot-input{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.map-picker-spot-input input{flex:1;background:var(--bg);border:1px solid var(--bg3);border-radius:8px;padding:10px 12px;color:var(--text);font-family:inherit;font-size:.85rem;outline:none}
.map-picker-spot-input input:focus{border-color:var(--cyan)}
.map-picker-spot-input input::placeholder{color:var(--dim)}
.map-picker-coords{font-size:.65rem;color:var(--dim);margin-bottom:8px}
.map-picker-save{width:100%;background:var(--cyan);color:var(--bg);border:none;font-family:inherit;font-size:.85rem;font-weight:700;padding:12px;border-radius:10px;cursor:pointer;transition:all .15s}
.map-picker-save:active{transform:scale(.97);opacity:.9}
.map-picker-save:disabled{opacity:.4;cursor:not-allowed}

/* All-spots map view */
.all-map-legend{position:absolute;top:14px;left:14px;z-index:1000;display:flex;flex-wrap:wrap;gap:8px 10px;background:rgba(7,11,22,.85);backdrop-filter:blur(10px);padding:7px 10px;border-radius:10px;border:1px solid rgba(148,163,184,.12);font-size:.58rem;color:var(--text);max-width:calc(100% - 28px)}
.all-map-legend span{display:flex;align-items:center;gap:6px;font-weight:500}
.all-map-legend i{display:inline-block;width:9px;height:9px;border-radius:50%;flex-shrink:0}
.all-map-legend .dot-go{background:#4ade80;box-shadow:0 0 6px #4ade80}
.all-map-legend .dot-mb{background:#facc15}
.all-map-legend .dot-no{background:#f87171}
.all-map-legend .dot-cu{background:#fb923c;box-shadow:0 0 6px #fb923c}

/* Map popup styles */
.leaflet-popup-content-wrapper{background:rgba(7,11,22,.95) !important;border:1px solid rgba(34,211,238,.25) !important;color:var(--text) !important;border-radius:12px !important;box-shadow:0 8px 32px rgba(0,0,0,.5) !important;backdrop-filter:blur(8px)}
.leaflet-popup-tip{background:rgba(7,11,22,.95) !important;border:1px solid rgba(34,211,238,.25) !important}
.leaflet-popup-content{margin:12px 14px !important;font-family:'Inter',sans-serif !important}
.leaflet-popup-close-button{color:var(--muted) !important;font-size:18px !important;padding:8px 8px 0 0 !important}
.map-popup .mp-name{font-size:.9rem;font-weight:800;letter-spacing:-.2px;line-height:1.2;color:var(--text);margin-bottom:2px}
.map-popup .mp-region{font-size:.6rem;color:var(--muted);margin-bottom:8px;font-weight:500}
.map-popup .mp-wind{font-size:.7rem;color:var(--text);margin-bottom:3px;display:flex;align-items:baseline;gap:4px}
.map-popup .mp-num{font-size:1.4rem;font-weight:900;letter-spacing:-.5px;line-height:1}
.map-popup .mp-unit{font-size:.6rem;color:var(--muted);font-weight:500}
.map-popup .mp-meta{font-size:.6rem;color:var(--muted);margin-bottom:6px}
.map-popup .mp-window{font-size:.62rem;color:var(--green);font-weight:700;background:rgba(74,222,128,.1);padding:4px 8px;border-radius:6px;margin-bottom:8px;border:1px solid rgba(74,222,128,.2)}
.map-popup .mp-loading{font-size:.65rem;color:var(--dim);font-style:italic;margin-bottom:8px}
.map-popup .mp-btn{width:100%;background:var(--cyan);color:#020617;border:none;padding:7px 12px;border-radius:8px;font-family:inherit;font-size:.68rem;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:.2px}
.map-popup .mp-btn:active{transform:scale(.96);opacity:.9}
.map-popup .mp-time{font-size:.6rem;color:var(--cyan);background:rgba(34,211,238,.1);padding:3px 8px;border-radius:6px;margin-bottom:6px;display:inline-block;font-weight:700;letter-spacing:.3px;text-transform:uppercase}

/* Map time travel controls */
.map-time-controls{position:absolute;bottom:14px;right:14px;left:14px;z-index:1000;background:rgba(7,11,22,.92);backdrop-filter:blur(16px) saturate(1.5);-webkit-backdrop-filter:blur(16px) saturate(1.5);border:1px solid rgba(148,163,184,.15);border-radius:16px;padding:12px 14px;box-shadow:0 8px 32px rgba(0,0,0,.5);max-width:520px;margin:0 auto}
.mt-top{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.mt-btn{background:linear-gradient(135deg,#22d3ee,#06b6d4);color:#020617;border:none;width:42px;height:42px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s cubic-bezier(.4,0,.2,1);box-shadow:0 4px 16px rgba(34,211,238,.4)}
.mt-btn:active{transform:scale(.92)}
.mt-btn-ghost{background:rgba(148,163,184,.1);color:var(--muted);border:1px solid rgba(148,163,184,.15);font-family:inherit;font-size:.65rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:8px 12px;border-radius:10px;cursor:pointer;transition:all .15s}
.mt-btn-ghost:active{background:var(--cyan-glow);color:var(--cyan);transform:scale(.94)}
.mt-label{flex:1;display:flex;flex-direction:column;gap:2px;line-height:1.1;min-width:0}
.mt-label .mt-day{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mt-label .mt-hr{font-size:1.25rem;font-weight:900;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:-.3px}
.mt-slider{width:100%;-webkit-appearance:none;appearance:none;background:linear-gradient(90deg,rgba(74,222,128,.15) 0%,rgba(34,211,238,.15) 50%,rgba(251,146,60,.15) 100%);height:6px;border-radius:3px;outline:none;cursor:pointer}
.mt-slider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;background:#22d3ee;border-radius:50%;cursor:pointer;box-shadow:0 2px 12px rgba(34,211,238,.5),0 0 0 3px rgba(34,211,238,.15);border:2px solid #070b16;transition:transform .15s}
.mt-slider::-webkit-slider-thumb:active{transform:scale(1.15)}
.mt-slider::-moz-range-thumb{width:22px;height:22px;background:#22d3ee;border-radius:50%;cursor:pointer;box-shadow:0 2px 12px rgba(34,211,238,.5);border:2px solid #070b16}

/* Pull to refresh */
.ptr-indicator{text-align:center;height:0;overflow:hidden;transition:height .2s;color:var(--cyan);font-size:.7rem;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px}
.ptr-indicator.pulling{height:40px}
.ptr-indicator.refreshing{height:40px}
.ptr-indicator svg{width:16px;height:16px;transition:transform .2s}
.ptr-indicator.refreshing svg{animation:spin .8s linear infinite}

/* Bottom safe area padding */
.content::after{content:'';display:block;height:var(--safe-bottom);min-height:8px}

/* Desktop */
@media(min-width:640px){
  .header{padding:10px 20px}
  .content{padding:16px}
  .card-data{grid-template-columns:repeat(5,1fr)}
  .spot-card{padding:16px}
  .spot-card:hover{border-color:var(--cyan);transform:translateY(-1px)}
  .spot-name{font-size:.95rem}
  .data-value{font-size:1.05rem}
}

/* Small phones */
@media(max-width:360px){
  .spot-name{font-size:.8rem}
  .data-value{font-size:.85rem}
  .tab-btn{font-size:.6rem}
  .status-badge{font-size:.55rem;padding:2px 6px}
  .fc-hour{min-width:34px;padding:2px 4px}
  .content{padding:6px}
}

</style>
</head>
<body>
<!-- Ambient wind particles canvas (fixed background) -->
<canvas id="windBg" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.55"></canvas>


<header class="header">
  <div class="header-left">
    <span class="logo">KiteSpot</span>
    <span class="location-badge" id="locationBadge"><svg class="ico-inline" viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="6" r="2.5" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M8 1C5.2 1 3 3.2 3 6c0 3.5 5 8.5 5 8.5s5-5 5-8.5C13 3.2 10.8 1 8 1z" fill="none" stroke="currentColor" stroke-width="1.5"/></svg> Localizando...</span>
  </div>
  <div style="display:flex;align-items:center;gap:4px">
    <button class="btn-icon" id="mapBtn" onclick="showAllSpotsMap()" title="Mapa"><svg class="ico-btn" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6l5-2 4 2 5-2v12l-5 2-4-2-5 2z"/><path d="M8 4v14M12 6v14" opacity=".5"/></svg></button>
    <button class="lang-toggle" id="langBtn" onclick="toggleLang()">EN</button>
    <button class="btn-icon" id="refreshBtn" onclick="refreshData()" title="Actualizar"><svg class="ico-btn" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 10a7 7 0 0112.9-3.7M17 10a7 7 0 01-12.9 3.7"/><path d="M3 4v4h4M17 16v-4h-4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
  </div>
</header>

<nav class="nav">
  <button class="tab-btn active" onclick="showTab('spots',this)"><svg class="ico-tab" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2l4 8-4 8-4-8z"/><path d="M3 7h4M3 11h3M13 7h4M14 11h3" stroke-linecap="round" opacity=".5"/></svg>SPOTS</button>
  <button class="tab-btn" onclick="showTab('favs',this)"><svg class="ico-tab" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2l2.5 5 5.5.8-4 3.9.9 5.3L10 14.5 5.1 17l.9-5.3-4-3.9 5.5-.8z"/></svg>FAVS</button>

// ========== GEOLOCATION ==========
function getLocation() {
  return new Promise(resolve => {
    if (!navigator.geolocation) { document.getElementById('locationBadge').textContent = t('chile'); resolve(); return; }
    // Try high accuracy first (GPS), fallback to low accuracy (network/IP)
    let resolved = false;
    const onSuccess = pos => { if (resolved) return; resolved = true; userLat = pos.coords.latitude; userLon = pos.coords.longitude; updateLocationBadge(); resolve(); };
    const onError = () => { if (resolved) return; resolved = true; document.getElementById('locationBadge').textContent = t('chile'); console.warn('KiteSpot: GPS failed, showing all spots'); resolve(); };
    navigator.geolocation.getCurrentPosition(onSuccess, () => {
      // Retry with low accuracy (faster, uses network/wifi)
      navigator.geolocation.getCurrentPosition(onSuccess, onError, { timeout: 10000, maximumAge: 600000, enableHighAccuracy: false });
    }, { timeout: 10000, maximumAge: 300000, enableHighAccuracy: true });
  });
}

function updateLocationBadge() {
  if (!userLat) return;
  const nearest = findNearest();
  document.getElementById('locationBadge').textContent = nearest ? `${t('nearTo')} ${nearest.name}` : t('chile');
}

function findNearest() {
  if (!userLat) return null;
  let min = Infinity, best = null;
  SPOTS.forEach(s => { const d = haversine(userLat, userLon, s.lat, s.lon); if (d < min) { min = d; best = s; } });
  return best;
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function distanceToSpot(spot) {
  if (!userLat) return null;
  return Math.round(haversine(userLat, userLon, spot.lat, spot.lon));
}

// ========== DATA FETCHING ==========
const CACHE_TTL = 15 * 60 * 1000; // 15 min

async function fetchWithRetry(url, retries = 2) {
  for (let attempt = 0; attempt <= retries; attempt++) {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 8000);
      const r = await fetch(url, { signal: controller.signal });
      clearTimeout(timeout);
      if (r.ok) return r.json();
      if (r.status === 429 && attempt < retries) {
        await new Promise(ok => setTimeout(ok, 1500 * (attempt + 1)));
        continue;
      }
      console.warn('KiteSpot fetch error:', r.status, url.substring(0, 60));
    } catch(e) {
      if (e.name === 'AbortError') console.warn('KiteSpot timeout:', url.substring(0, 60));
      else console.warn('KiteSpot fetch failed:', e.message);
      if (attempt < retries) await new Promise(ok => setTimeout(ok, 1000));
    }
  }
  return null;
}

async function fetchAllSpots() {
  const cached = localStorage.getItem('ks_data');
  const cachedTime = parseInt(localStorage.getItem('ks_time') || '0');
  if (cached && Date.now() - cachedTime < CACHE_TTL) {
    const parsed = JSON.parse(cached);
    // Validate cache: if most spots have 0 wind, discard stale cache
    const vals = Object.values(parsed);
    const zeroCount = vals.filter(v => v?.wind?.current?.wind_speed_10m === 0 || !v?.wind?.current).length;
    if (vals.length > 0 && zeroCount < vals.length * 0.5) {
      spotData = parsed;
      renderSpots();
      updateTimestamp(cachedTime);
      return;
    }
    console.warn('KiteSpot: cache invalid (too many zeros), refetching');
    localStorage.removeItem('ks_data');
    localStorage.removeItem('ks_time');
  }

  // Fetch nearby spots (200km) + favorites. Without GPS: top 12 + favorites
  let spotsToFetch;
  if (userLat) {
    const nearby = SPOTS.filter(s => haversine(userLat, userLon, s.lat, s.lon) <= NEARBY_RADIUS);
    const favOnly = SPOTS.filter(s => favorites.includes(s.id) && !nearby.find(n => n.id === s.id));
    spotsToFetch = [...nearby, ...favOnly];
    spotsToFetch.sort((a, b) => haversine(userLat, userLon, a.lat, a.lon) - haversine(userLat, userLon, b.lat, b.lon));
  } else {
    // No GPS — load first 12 built-in spots + all favorites
    const favOnly = SPOTS.filter(s => favorites.includes(s.id));
    const nonFav = SPOTS.filter(s => !favorites.includes(s.id)).slice(0, 12);
    spotsToFetch = [...favOnly, ...nonFav];
  }

  const total = spotsToFetch.length;
  document.getElementById('spotList').innerHTML = `<div class="loading"><div class="spinner"></div>${t('loading')} ${total} spots<div class="load-progress" id="loadProgress">0/${total}</div></div>`;

  const prog = document.getElementById('loadProgress');
  const BATCH = userLat ? 2 : 3; // smaller batches when nearby (fewer spots), larger when all
  for (let i = 0; i < spotsToFetch.length; i += BATCH) {
    const batch = spotsToFetch.slice(i, i + BATCH);
    const results = await Promise.allSettled(batch.map(async spot => {
      const [wind, marine] = await Promise.all([
        fetchWithRetry(`https://api.open-meteo.com/v1/forecast?latitude=${spot.lat}&longitude=${spot.lon}&current=wind_speed_10m,wind_direction_10m,wind_gusts_10m,temperature_2m,weather_code,precipitation,wind_speed_80m&hourly=wind_speed_10m,wind_direction_10m,wind_gusts_10m,temperature_2m,precipitation,weather_code&forecast_days=7&wind_speed_unit=kn&timezone=America/Santiago&cell_selection=sea`),
        fetchWithRetry(`https://marine-api.open-meteo.com/v1/marine?latitude=${spot.lat}&longitude=${spot.lon}&current=wave_height,wave_period,wave_direction,sea_surface_temperature&hourly=wave_height&forecast_days=7&timezone=America/Santiago`)
      ]);
      return { id: spot.id, wind, marine };
    }));
    results.forEach(r => { if (r.status === 'fulfilled' && r.value.wind && !r.value.wind.error) spotData[r.value.id] = r.value; });
    if (prog) prog.textContent = `${Math.min(i + BATCH, total)}/${total}`;
    if (i + BATCH < spotsToFetch.length) await new Promise(ok => setTimeout(ok, 400));
  }

  const now = Date.now();
  const loadedCount = Object.keys(spotData).length;
  console.log('KiteSpot: loaded', loadedCount, 'spots');
  localStorage.setItem('ks_data', JSON.stringify(spotData));
  localStorage.setItem('ks_time', String(now));
  try {
    renderSpots();
  } catch(e) {
    console.error('KiteSpot render error:', e);
    document.getElementById('spotList').innerHTML = `<div class="empty-state"><p>Error al renderizar. <button onclick="localStorage.clear();location.reload()" style="color:var(--cyan);background:none;border:1px solid var(--cyan);padding:6px 16px;border-radius:8px;cursor:pointer;margin-top:8px">Reiniciar app</button></p></div>`;
  }
  updateTimestamp(now);
  checkAlerts();
}

function updateTimestamp(time) {
  const d = new Date(time);
  document.getElementById('updatedTime').textContent = `Actualizado: ${d.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'})}`;
}

  localStorage.removeItem('ks_data');

// ========== SCORING ==========
function getSpotStatus(spot) {
  const d = spotData[spot.id];
  if (!d || !d.wind || !d.wind.current) return { status: 'unknown', color: 'red', label: t('noData'), warn: '' };

  const windRaw = d.wind.current.wind_speed_10m;
  const gustRaw = d.wind.current.wind_gusts_10m;
  // Apply shore correction: sheltered spots get less wind at beach level
  const wind = shoreWindCorrection(windRaw, spot.shore);
  const gust = shoreWindCorrection(gustRaw, spot.shore);
  const dir = d.wind.current.wind_direction_10m;
  const rain = d.wind.current.precipitation || 0;
  const temp = d.wind.current.temperature_2m;
  const wcode = d.wind.current.weather_code || 0;

  // Rain: >2mm/h = no go, >0.5mm = warning
  const heavyRain = rain > 2 || wcode >= 63;
  const lightRain = rain > 0.5 || (wcode >= 51 && wcode < 63);
  // Cold: <10°C warning
  const cold = temp != null && temp < 10;

  if (heavyRain) return { status: 'red', color: 'red', label: t('rain'), warn: `${rain.toFixed(1)}mm/h` };

  const dirOk = isDirectionFavorable(dir, spot.idealDir);
  const gustOk = gust < 40;
  const gustWarn = gust >= 35;

  let warn = '';
  if (lightRain) warn = t('drizzle');
  if (cold) warn += (warn ? ' + ' : '') + `${Math.round(temp)}°C`;
  if (spot.shore === 'sheltered') warn += (warn ? ' + ' : '') + t('shoreWarn');

  if (wind >= spot.windMin && wind <= spot.windMax && dirOk && gustOk && !gustWarn && !lightRain) {
    const thermal = getThermalRisk(spot);
    if (thermal?.level === 'bad') {
      return { status: 'yellow', color: 'yellow', label: t('thermal'), warn: thermal.msg };
    }
    return { status: 'green', color: 'green', label: t('sendIt'), warn };
  }
  if ((wind >= 8 && wind < spot.windMin) || (wind > spot.windMax && wind <= 35) || !dirOk || gustWarn || lightRain) {
    if (wind >= 8 && wind <= 35) return { status: 'yellow', color: 'yellow', label: lightRain ? t('drizzle') : t('maybe'), warn };
  }
  return { status: 'red', color: 'red', label: t('noGo'), warn };
}

function isDirectionFavorable(actual, idealDirs) {
  return idealDirs.some(ideal => {
    let diff = Math.abs(actual - ideal);
    if (diff > 180) diff = 360 - diff;
    return diff <= 30;
  });
}

// ========== TIDE ESTIMATION (lunar cycle) ==========
// Approximate tide state from moon position — not station-precise but gives correct trend
function getTideState(date = new Date()) {
  // Moon phase calculation (simplified Meeus)
  const Y = date.getFullYear();
  const M = date.getMonth() + 1;
  const D = date.getDate() + date.getHours() / 24;
  const JD = 367 * Y - Math.floor(7 * (Y + Math.floor((M + 9) / 12)) / 4) + Math.floor(275 * M / 9) + D + 1721013.5;
  const T = (JD - 2451545.0) / 36525;
  // Moon's mean elongation
  const Dmoon = 297.8502042 + 445267.1115168 * T;
  // Moon's mean anomaly
  const Mmoon = 134.9634114 + 477198.8676313 * T;
  // Sun's mean anomaly
  const Msun = 357.5291092 + 35999.0502909 * T;
  // Moon age in degrees (0-360)
  const moonAge = ((Dmoon % 360) + 360) % 360;
  // Moon phase 0-1 (0=new, 0.5=full)
  const phase = moonAge / 360;

  // Tide follows moon transit (~every 12h25m)
  // Approximate: high tide offset from moon transit ~0h at coast
  const hoursSinceNewMoon = phase * 29.53 * 24;
  const tidalCycle = 12.4206; // hours per tidal cycle
  const tidePhase = (hoursSinceNewMoon % tidalCycle) / tidalCycle; // 0-1

  // Spring/neap factor (spring near new/full moon)
  const springFactor = Math.abs(Math.cos(phase * 2 * Math.PI));
  const isSpring = springFactor > 0.7;

  let state, icon, label_es, label_en;
  if (tidePhase < 0.15 || tidePhase > 0.85) {
    state = 'high'; icon = '▲'; label_es = 'Pleamar'; label_en = 'High tide';
  } else if (tidePhase >= 0.15 && tidePhase < 0.35) {
    state = 'falling'; icon = '↘'; label_es = 'Bajando'; label_en = 'Falling';
  } else if (tidePhase >= 0.35 && tidePhase < 0.65) {
    state = 'low'; icon = '▼'; label_es = 'Bajamar'; label_en = 'Low tide';
  } else {
    state = 'rising'; icon = '↗'; label_es = 'Subiendo'; label_en = 'Rising';
  }

  // Next high/low estimate
  let nextHighHrs, nextLowHrs;
  if (state === 'high') { nextHighHrs = 0; nextLowHrs = tidalCycle / 2 * (0.5 - (tidePhase > 0.85 ? tidePhase - 1 : tidePhase) / 0.5); }
  else if (state === 'low') { nextLowHrs = 0; nextHighHrs = tidalCycle / 2 * (1 - (tidePhase - 0.35) / 0.3); }
  else if (state === 'falling') { nextLowHrs = tidalCycle / 2 * (1 - (tidePhase - 0.15) / 0.2); nextHighHrs = nextLowHrs + tidalCycle / 2; }
  else { nextHighHrs = tidalCycle / 2 * (1 - (tidePhase - 0.65) / 0.2); nextLowHrs = nextHighHrs + tidalCycle / 2; }

  return { state, icon, label_es, label_en, phase, isSpring, springFactor,
    nextHighHrs: Math.max(0, Math.round(nextHighHrs * 10) / 10),
    nextLowHrs: Math.max(0, Math.round(nextLowHrs * 10) / 10)
  };
}

function tideHtml(spot) {
  // Skip lake spots
  if (['pucon','llanquihue','ptovaras','ensenada','ptooctay'].includes(spot.id)) return '';
  const tide = getTideState();
  const label = lang === 'es' ? tide.label_es : tide.label_en;
  const nextH = tide.nextHighHrs > 0 ? `${tide.nextHighHrs.toFixed(0)}h` : '';
  const nextL = tide.nextLowHrs > 0 ? `${tide.nextLowHrs.toFixed(0)}h` : '';
  const next = tide.state === 'high' ? `↓${nextL}` :
               tide.state === 'low' ? `↑${nextH}` :
               tide.state === 'falling' ? `↓${nextL}` :
               `↑${nextH}`;
  const spring = tide.isSpring ? '<span class="tide-spring" title="Mareas vivas">★</span>' : '';
  return `<div class="tide-badge"><span class="tide-icon">${tide.icon}</span> ${label} ${next}${spring}</div>`;
}

// Shore wind correction: sheltered spots lose ~25% wind at shore, semi ~10%
function shoreWindCorrection(speed, shore) {
  if (shore === 'sheltered') return speed * 0.75;
  if (shore === 'semi') return speed * 0.90;
  return speed; // exposed = full wind
}

function getStatusScore(status) {
  return status === 'green' ? 0 : status === 'yellow' ? 1 : 2;
}

// ========== BEST MOMENT ANALYSIS ==========
function analyzeBestMoment(spot) {
  const d = spotData[spot.id];
  if (!d?.wind?.hourly) return { bestWindow: null, weekDots: [], goodDays: 0, nextGoodIdx: -1 };

  const times = d.wind.hourly.time;
  const speeds = d.wind.hourly.wind_speed_10m;
  const dirs = d.wind.hourly.wind_direction_10m;
  const now = new Date();

  // Find best windows (consecutive good hours 10-20h)
  let bestWindow = null;
  let bestScore = 0;
  let currentWindow = null;

  // Week dots: one per day, best status of navigable hours
  const dayMap = {};

  for (let i = 0; i < times.length; i++) {
    const dt = new Date(times[i]);
    const hr = dt.getHours();
    if (hr < 10 || hr > 20) continue;
    if (dt < now) continue;

    const spdRaw = speeds[i];
    const spd = shoreWindCorrection(spdRaw, spot.shore);
    const dir = dirs[i];
    const rain = d.wind.hourly.precipitation?.[i] || 0;
    const temp = d.wind.hourly.temperature_2m?.[i];
    const noRain = rain < 2;
    const isGood = spd >= spot.windMin && spd <= spot.windMax && isDirectionFavorable(dir, spot.idealDir) && noRain;
    const isMaybe = spd >= 8 && spd <= 35;

    // Day dot tracking
    const dayKey = dt.toDateString();
    if (!dayMap[dayKey]) dayMap[dayKey] = { date: dt, best: 'red', rain: false, cold: false };
    if (isGood) dayMap[dayKey].best = 'green';
    else if (isMaybe && dayMap[dayKey].best !== 'green') dayMap[dayKey].best = 'yellow';
    if (rain > 0.5) dayMap[dayKey].rain = true;
    if (temp != null && temp < 10) dayMap[dayKey].cold = true;

    // Best window tracking
    if (isGood) {
      if (!currentWindow) currentWindow = { start: dt, end: dt, startIdx: i, avgSpeed: spd, count: 1 };
      else { currentWindow.end = dt; currentWindow.avgSpeed += spd; currentWindow.count++; }
    } else {
      if (currentWindow) {
        currentWindow.avgSpeed /= currentWindow.count;
        const score = currentWindow.count * currentWindow.avgSpeed;
        if (score > bestScore) { bestScore = score; bestWindow = { ...currentWindow }; }
      }
      currentWindow = null;
    }
  }
  // Close last window
  if (currentWindow) {
    currentWindow.avgSpeed /= currentWindow.count;
    const score = currentWindow.count * currentWindow.avgSpeed;
    if (score > bestScore) { bestScore = score; bestWindow = { ...currentWindow }; }
  }

  const weekDots = Object.values(dayMap).slice(0, 7);
  const goodDays = weekDots.filter(d => d.best === 'green').length;

  // Format best window
  if (bestWindow) {
    const isToday = bestWindow.start.toDateString() === now.toDateString();
    const isTomorrow = bestWindow.start.toDateString() === new Date(now.getTime() + 86400000).toDateString();
    const dayLabel = isToday ? t('today') : isTomorrow ? t('tomorrow') : bestWindow.start.toLocaleDateString(lang==='en'?'en-US':'es-CL', { weekday: 'short', day: 'numeric' });
    const startH = bestWindow.start.getHours();
    const endH = bestWindow.end.getHours() + 1;
    const dir = dirs[bestWindow.startIdx];
    bestWindow.label = `${dayLabel} ${startH}-${endH}h`;
    bestWindow.detail = `${Math.round(bestWindow.avgSpeed)}kn ${degToCompass(dir)}`;
    bestWindow.hoursFromNow = Math.round((bestWindow.start - now) / 3600000);
  }

  return { bestWindow, weekDots, goodDays, nextGoodIdx: bestWindow?.startIdx ?? -1 };
}

// ========== NEARBY SPOTS ==========
const NEARBY_RADIUS = 200; // km

function getNearbySpots() {
  let nearby = [...SPOTS];
  if (userLat) {
    nearby = nearby.map(s => ({ ...s, dist: haversine(userLat, userLon, s.lat, s.lon) }));
    nearby = nearby.filter(s => s.dist <= NEARBY_RADIUS);
    nearby.sort((a, b) => a.dist - b.dist);
  }
  return nearby.slice(0, 12); // max 12 nearby
}

// ========== GEAR RECOMMENDATION ==========
function getGear(windKn) {
  if (windKn >= 30) return { kite: '5-7m', board: 'Directional', icon: 'S' };
  if (windKn >= 24) return { kite: '7-9m', board: 'TT / Surf', icon: 'M' };
  if (windKn >= 18) return { kite: '9-12m', board: 'TT / Foil', icon: 'M' };
  if (windKn >= 14) return { kite: '12-14m', board: 'TT / Foil', icon: 'L' };
  if (windKn >= 10) return { kite: '14-17m', board: 'Foil', icon: 'XL' };
  return { kite: 'Foil only', board: 'Foil', icon: '—' };
}

// Wind stability: gust factor indicates turbulence
function getWindStability(wind, gust) {
  if (!wind || wind < 1) return null;
  const factor = gust / wind;
  if (factor < 1.3) return { level: 'stable', label_es: 'Estable', label_en: 'Stable', color: 'var(--green)' };
  if (factor < 1.6) return { level: 'variable', label_es: 'Variable', label_en: 'Variable', color: 'var(--yellow)' };
  return { level: 'gusty', label_es: 'Rachoso', label_en: 'Gusty', color: 'var(--red)' };
}

// Wind trend: is it increasing or decreasing in next 3 hours?
function getWindTrend(spot) {
  const d = spotData[spot.id];
  if (!d?.wind?.hourly) return null;
  const now = new Date();
  const times = d.wind.hourly.time;
  const idx = times.findIndex(t => new Date(t) >= now);
  if (idx < 0 || idx + 3 >= times.length) return null;
  const current = shoreWindCorrection(d.wind.hourly.wind_speed_10m[idx], spot.shore);
  const future = shoreWindCorrection(d.wind.hourly.wind_speed_10m[idx + 3], spot.shore);
  const diff = future - current;
  if (diff > 3) return { dir: 'up', label_es: 'Subiendo', label_en: 'Rising', icon: '↑', color: 'var(--green)' };
  if (diff < -3) return { dir: 'down', label_es: 'Bajando', label_en: 'Dropping', icon: '↓', color: 'var(--red)' };
  return { dir: 'steady', label_es: 'Estable', label_en: 'Steady', icon: '→', color: 'var(--muted)' };
}

// ========== HERO CARD ==========
let _countdownTimer = null;

function renderHero() {
  const el = document.getElementById('heroCard');
  try {
  const nearby = getNearbySpots();
  if (!nearby.length) { el.innerHTML = '<div class="hero-loading"><div class="spinner"></div></div>'; return; }

  // Smart recommendation: respect user preferences (favorites first)
  // 1. If user has favorites with a navigable window this week, pick best of THOSE
  // 2. Only if all favorites are unrideable, fall back to best non-favorite
  const scoreSpot = (s) => {
    const st = getSpotStatus(s);
    const analysis = analyzeBestMoment(s);
    const dist = s.dist || 999;
    let score = 0;
    if (st.status === 'green') score += 100;
    else if (st.status === 'yellow') score += 50;
    else score += 10;
    if (analysis.bestWindow?.hoursFromNow <= 6) score += 30;
    else if (analysis.bestWindow?.hoursFromNow <= 12) score += 15;
    score -= Math.min(dist / 10, 20);
    score += analysis.goodDays * 5;
    return { spot: s, score, st, analysis };
  };

  const favoriteSpots = nearby.filter(s => favorites.includes(s.id));
  const favScored = favoriteSpots.map(scoreSpot);
  // A favorite "qualifies" if green/yellow now OR has any window this week
  const usableFavs = favScored.filter(x => x.st.status !== 'red' || (x.analysis.bestWindow && x.analysis.goodDays > 0));

  let best;
  if (usableFavs.length > 0) {
    // Prefer favorites — sort them by their score
    usableFavs.sort((a, b) => b.score - a.score);
    best = usableFavs[0].spot;
  } else {
    // No usable favorites — fall back to best overall
    const allScored = nearby.map(scoreSpot).sort((a, b) => b.score - a.score);
    best = allScored[0]?.spot || nearby[0];
  }

  const st = getSpotStatus(best);
  const d = spotData[best.id];
  const wind = shoreWindCorrection(d?.wind?.current?.wind_speed_10m ?? 0, best.shore);
  const dir = d?.wind?.current?.wind_direction_10m ?? 0;
  const gust = shoreWindCorrection(d?.wind?.current?.wind_gusts_10m ?? 0, best.shore);
  const wave = d?.marine?.current?.wave_height;
  const analysis = analyzeBestMoment(best);
  const dist = best.dist ? Math.round(best.dist) : null;

  const rain = d?.wind?.current?.precipitation || 0;
  const temp = d?.wind?.current?.temperature_2m;
  const cls = st.status === 'green' ? 'go' : st.status === 'yellow' ? 'maybe' : 'nogo';
  const distText = dist != null ? ` · ${dist}km` : '';
  const msg = st.status === 'green' ? (lang==='es'?'ANDA A '+best.name.toUpperCase()+distText:'GO TO '+best.name.toUpperCase()+distText) :
              st.status === 'yellow' ? (lang==='es'?'SE PUEDE EN '+best.name+distText:'RIDEABLE AT '+best.name+distText) :
              st.label === t('rain') ? t('rain') :
              (lang==='es'?'ESPERA — '+best.name+distText:'WAIT — '+best.name+distText);

  // Gear
  const gear = getGear(wind);

  // Window + countdown
  let windowHtml = '';
  let countdownHtml = '';
  if (analysis.bestWindow) {
    const bw = analysis.bestWindow;
    windowHtml = `<div class="hero-window"><svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><path d="M8 4v4l3 2"/></svg>${bw.label} · ${bw.detail}</div>`;
    if (bw.hoursFromNow > 0) {
      countdownHtml = `<div class="hero-countdown" id="heroCountdown" data-target="${bw.start.toISOString()}"><svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 3v5l3 2"/><circle cx="8" cy="8" r="6.5"/></svg>en ${formatCountdown(bw.start)}</div>`;
    }
  }

  // Session timeline (today 10-20h)
  let timelineHtml = buildSessionTimeline(best, d);

  el.className = 'hero-card ' + cls;
  el.innerHTML = `
    <div class="hero-status"><span class="hero-live"></span>${msg}</div>
    <div class="hero-main">
      <div><div class="hero-wind">${Math.round(wind)}</div><div class="hero-unit">kn</div></div>
      <div class="hero-info">
        <div class="hero-spot">${best.name}</div>
        <div class="hero-meta">
          <span class="hero-dir"><span class="wind-arrow" style="transform:rotate(${dir+180}deg)">&#8593;</span> ${degToCompass(dir)}</span>
          · ${t('gust')} ${Math.round(gust)}kn
          ${wave != null ? '· '+t('waves')+' '+wave.toFixed(1)+'m' : ''}
          ${dist != null ? '· '+dist+'km' : ''}
          ${rain > 0.5 ? '· <span style="color:#3b82f6">'+rain.toFixed(1)+'mm</span>' : ''}
          ${temp != null ? '· '+Math.round(temp)+'°C' : ''}
          ${d?.marine?.current?.sea_surface_temperature != null ? '· Mar '+Math.round(d.marine.current.sea_surface_temperature)+'°C' : ''}
        </div>
      </div>
    </div>
    <div class="hero-bottom">
      ${windowHtml}${countdownHtml}
      <div class="hero-gear"><svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 14C2 8 8 2 14 2"/><circle cx="5" cy="11" r="2"/></svg>${gear.kite}</div>
      <button class="hero-share" onclick="shareSpot('${best.id}')"><svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 8h8M12 8l-3-3M12 8l-3 3"/></svg>${t('send')}</button>
    </div>
    ${thermalBadgeHtml(best)}${tideHtml(best)}
    ${timelineHtml}`;

  // Start countdown updates
  if (_countdownTimer) clearInterval(_countdownTimer);
  if (analysis.bestWindow?.hoursFromNow > 0) {
    _countdownTimer = setInterval(() => {
      const cdEl = document.getElementById('heroCountdown');
      if (!cdEl) { clearInterval(_countdownTimer); return; }
      const target = new Date(cdEl.dataset.target);
      cdEl.querySelector('svg').nextSibling.textContent = 'en ' + formatCountdown(target);
    }, 60000);
  }
  } catch(e) { console.error('Hero render error:', e); el.innerHTML = ''; }
}

function formatCountdown(target) {
  const diff = target - new Date();
  if (diff <= 0) return lang==='en'?'now':'ahora';
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  if (h > 24) return Math.floor(h/24) + 'd ' + (h%24) + 'h';
  if (h > 0) return h + 'h ' + m + t('min');
  return m + t('min');
}

function buildSessionTimeline(spot, d) {
  if (!d?.wind?.hourly) return '';
  const now = new Date();
  const today = now.toDateString();
  const times = d.wind.hourly.time;
  const blocks = [];
  for (let i = 0; i < times.length; i++) {
    const dt = new Date(times[i]);
    if (dt.toDateString() !== today) { if (blocks.length > 0) break; continue; }
    const hr = dt.getHours();
    if (hr < 10 || hr > 20) continue;
    const w = shoreWindCorrection(d.wind.hourly.wind_speed_10m[i], spot.shore);
    const rn = d.wind.hourly.precipitation?.[i] || 0;
    const isNow = hr === now.getHours();
    const good = w >= spot.windMin && w <= spot.windMax && rn < 2;
    const maybe = w >= 8 && w <= 35 && rn < 2;
    const rain = rn >= 2;
    let cls = rain ? 'st-rain' : good ? 'st-go' : maybe ? 'st-maybe' : 'st-no';
    if (isNow) cls += ' st-now';
    const showLabel = hr % 3 === 1 || hr === 10 || hr === 20;
    blocks.push(`<div class="st-block ${cls}" title="${hr}h: ${Math.round(w)}kn"><div class="st-val">${Math.round(w)}</div>${showLabel ? '<div class="st-label">'+hr+'h</div>' : ''}</div>`);
  }
  if (!blocks.length) return '';
  return `<div class="session-timeline">${blocks.join('')}</div>`;
}
