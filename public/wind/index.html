  ctx.stroke();

  // ===== STATUS PILL =====
  const statusText = st.status === 'green' ? 'SE PUEDE NAVEGAR' : st.status === 'yellow' ? 'CONDICIONES POSIBLES' : 'NO RECOMENDADO';
  ctx.font = '800 24px Inter,sans-serif';
  const pillW = ctx.measureText(statusText).width + 70;
  ctx.fillStyle = statusColor + '20';
  ctx.strokeStyle = statusColor + '60';
  ctx.lineWidth = 1.5;
  roundRect(ctx, 70, 195, pillW, 54, 27, true, true);
  // Pill dot
  ctx.fillStyle = statusColor;
  ctx.shadowColor = statusColor; ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.arc(98, 222, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = statusColor;
  ctx.fillText(statusText, 120, 211);

  // ===== SPOT NAME =====
  let nameSize = 90;
  ctx.font = `900 ${nameSize}px Inter,sans-serif`;
  while (ctx.measureText(spot.name).width > W - 140 && nameSize > 56) {
    nameSize -= 4;
    ctx.font = `900 ${nameSize}px Inter,sans-serif`;
  }
  // Spot name with subtle gradient
  const nameGrad = ctx.createLinearGradient(70, 0, W, 0);
  nameGrad.addColorStop(0, '#f1f5f9');
  nameGrad.addColorStop(1, '#cbd5e1');
  ctx.fillStyle = nameGrad;
  ctx.fillText(spot.name, 70, 290);

  // Region with location pin
  ctx.font = '600 24px Inter,sans-serif';
  ctx.fillStyle = '#94a3b8';
  // Draw pin icon
  ctx.save();
  ctx.translate(72, 408);
  ctx.fillStyle = '#64748b';
  ctx.beginPath();
  ctx.arc(0, 0, 8, Math.PI, 0);
  ctx.lineTo(0, 16);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#070b16';
  ctx.beginPath();
  ctx.arc(0, -2, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  ctx.fillStyle = '#94a3b8';
  ctx.fillText(`${spot.region}  ·  ${spot.level}`, 95, 400);

  // ===== HERO WIND DISPLAY =====
  const heroY = 480;

  // Wind number (huge, glowing)
  ctx.font = '900 320px Inter,sans-serif';
  ctx.fillStyle = '#070b16';
  // Outline first for separation
  ctx.fillText(String(wind), 70, heroY);
  // Glow layers
  ctx.shadowColor = statusGlow + 'cc';
  ctx.shadowBlur = 60;
  ctx.fillStyle = statusColor;
  ctx.fillText(String(wind), 70, heroY);
  ctx.shadowBlur = 30;
  ctx.fillText(String(wind), 70, heroY);
  ctx.shadowBlur = 0;

  const bigW = ctx.measureText(String(wind)).width;

  // "kn" unit
  ctx.font = '700 56px Inter,sans-serif';
  ctx.fillStyle = '#64748b';
  ctx.fillText('kn', 80 + bigW + 16, heroY + 220);

  // Gust line below
  ctx.font = '600 28px Inter,sans-serif';
  ctx.fillStyle = '#94a3b8';
  ctx.fillText(`rafaga ${gust}kn`, 80 + bigW + 16, heroY + 290);

  // ===== COMPASS / DIRECTION =====
  const compX = W - 240, compY = heroY + 180;
  const compR = 130;

  // Outer ring
  ctx.strokeStyle = 'rgba(148,163,184,.15)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(compX, compY, compR, 0, Math.PI * 2);
  ctx.stroke();

  // Inner ring
  ctx.strokeStyle = 'rgba(148,163,184,.08)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(compX, compY, compR - 18, 0, Math.PI * 2);
  ctx.stroke();

  // N/E/S/W marks
  ctx.font = '700 18px Inter,sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ['N','E','S','O'].forEach((label, i) => {
    const angle = (i * 90 - 90) * Math.PI / 180;
    const x = compX + Math.cos(angle) * (compR - 30);
    const y = compY + Math.sin(angle) * (compR - 30);
    ctx.fillStyle = label === 'N' ? '#cbd5e1' : '#475569';
    ctx.fillText(label, x, y);
  });

  // Tick marks every 30°
  ctx.strokeStyle = 'rgba(148,163,184,.2)';
  for (let a = 0; a < 360; a += 30) {
    const angle = (a - 90) * Math.PI / 180;
    const x1 = compX + Math.cos(angle) * (compR - 4);
    const y1 = compY + Math.sin(angle) * (compR - 4);
    const x2 = compX + Math.cos(angle) * (compR);
    const y2 = compY + Math.sin(angle) * (compR);
    ctx.beginPath();
    ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  // Direction arrow (large, glowing)
  ctx.save();
  ctx.translate(compX, compY);
  ctx.rotate((dir + 180) * Math.PI / 180);
  ctx.shadowColor = statusGlow;
  ctx.shadowBlur = 30;
  ctx.fillStyle = statusColor;
  ctx.beginPath();
  ctx.moveTo(0, -88);
  ctx.lineTo(34, 30);
  ctx.lineTo(0, 14);
  ctx.lineTo(-34, 30);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;
  // Center dot
  ctx.fillStyle = '#070b16';
  ctx.beginPath();
  ctx.arc(0, 0, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = statusColor;
  ctx.beginPath();
  ctx.arc(0, 0, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Compass label below
  ctx.font = '900 42px Inter,sans-serif';
  ctx.fillStyle = '#f1f5f9';
  ctx.textAlign = 'center';
  ctx.fillText(degToCompass(dir), compX, compY + compR + 40);
  ctx.font = '500 18px Inter,sans-serif';
  ctx.fillStyle = '#64748b';
  ctx.fillText(`${Math.round(dir)}°`, compX, compY + compR + 76);
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';

  // ===== STATS ROW =====
  const stats = [];
  if (wave != null) stats.push({ label: 'OLAS', value: wave.toFixed(1), unit: 'm', color: '#60a5fa' });
  if (temp != null) stats.push({ label: 'AIRE', value: Math.round(temp), unit: '°C', color: '#fb923c' });
  if (seaT != null) stats.push({ label: 'MAR', value: Math.round(seaT), unit: '°C', color: '#22d3ee' });
  // Add gear pill
  if (st.status !== 'red') {
    const gear = getGear(wind);
    stats.push({ label: 'VELA', value: gear.kite.split(' ')[0], unit: '', color: '#a78bfa' });
  }

  if (stats.length > 0) {
    const statsY = 880;
    const statsCardH = 96;
    // Background card
    ctx.fillStyle = 'rgba(30,41,59,.4)';
    ctx.strokeStyle = 'rgba(148,163,184,.08)';
    ctx.lineWidth = 1;
    roundRect(ctx, 70, statsY, W - 140, statsCardH, 16, true, true);
    const colW = (W - 140) / stats.length;
    stats.forEach((s, i) => {
      const x = 70 + i * colW;
      // Divider
      if (i > 0) {
        ctx.strokeStyle = 'rgba(148,163,184,.08)';
        ctx.beginPath();
        ctx.moveTo(x, statsY + 18); ctx.lineTo(x, statsY + statsCardH - 18);
        ctx.stroke();
      }
      ctx.textAlign = 'center';
      ctx.font = '700 14px Inter,sans-serif';
      ctx.fillStyle = '#64748b';
      ctx.fillText(s.label, x + colW/2, statsY + 18);
      ctx.font = '900 38px Inter,sans-serif';
      ctx.fillStyle = '#f1f5f9';
      const valText = String(s.value);
      const valW = ctx.measureText(valText).width;
      ctx.fillText(valText, x + colW/2 - (s.unit ? 6 : 0), statsY + 42);
      if (s.unit) {
        ctx.font = '600 18px Inter,sans-serif';
        ctx.fillStyle = '#94a3b8';
        ctx.textAlign = 'left';
        ctx.fillText(s.unit, x + colW/2 + valW/2 - 4, statsY + 56);
        ctx.textAlign = 'center';
      }
    });
    ctx.textAlign = 'left';
  }

  // ===== BEST WINDOW =====
  if (analysis.bestWindow) {
    const bw = analysis.bestWindow;
    const wY = 1010;
    // Glowing card
    ctx.shadowColor = statusGlow + '60';
    ctx.shadowBlur = 30;
    ctx.fillStyle = statusColor + '15';
    roundRect(ctx, 70, wY, W - 140, 105, 18, true, false);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = statusColor + '50';
    ctx.lineWidth = 1.5;
    roundRect(ctx, 70, wY, W - 140, 105, 18, false, true);

    // Clock icon
    ctx.strokeStyle = statusColor;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(110, wY + 52, 18, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(110, wY + 42); ctx.lineTo(110, wY + 52);
    ctx.lineTo(118, wY + 56);
    ctx.stroke();

    ctx.font = '700 16px Inter,sans-serif';
    ctx.fillStyle = '#94a3b8';
    ctx.fillText('MEJOR VENTANA', 145, wY + 26);
    ctx.font = '900 32px Inter,sans-serif';
    ctx.fillStyle = statusColor;
    ctx.fillText(`${bw.label} · ${bw.detail}`, 145, wY + 52);
  }

  // ===== HOURLY BAR CHART =====
  if (d.wind.hourly) {
    const times = d.wind.hourly.time;
    const hours = [];
    for (let i = 0; i < times.length && hours.length < 8; i++) {
      const dt = new Date(times[i]);
      if (dt < now) continue;
      const hr = dt.getHours();
      if (hr < 10 || hr > 20) continue;
      const w = Math.round(shoreWindCorrection(d.wind.hourly.wind_speed_10m[i], spot.shore));
      const dd = d.wind.hourly.wind_direction_10m[i];
      hours.push({ hr, w, dd, day: dt });
    }
    if (hours.length) {
      const chY = 1145;
      const chH = 130;
      // Chart container
      ctx.fillStyle = 'rgba(15,23,42,.4)';
      ctx.strokeStyle = 'rgba(148,163,184,.08)';
      ctx.lineWidth = 1;
      roundRect(ctx, 70, chY, W - 140, chH, 16, true, true);

      // Chart label
      ctx.font = '700 14px Inter,sans-serif';
      ctx.fillStyle = '#64748b';
      ctx.fillText('PROXIMAS HORAS', 90, chY + 14);

      // Bars
      const maxW = 35;
      const barAreaY = chY + 40;
      const barAreaH = 70;
      const barW = (W - 220) / hours.length;
      let lastDay = null;
      hours.forEach((h, i) => {
        const x = 90 + i * barW;
        const ratio = Math.min(1, h.w / maxW);
        const barH = Math.max(4, ratio * barAreaH);
        const barY = barAreaY + barAreaH - barH;
        const isFav = h.w >= spot.windMin && h.w <= spot.windMax;
        const cls = isFav ? statusColor : h.w >= 8 ? '#facc15' : '#475569';

        // Bar with gradient
        const barGrad = ctx.createLinearGradient(0, barY, 0, barY + barH);
        barGrad.addColorStop(0, cls);
        barGrad.addColorStop(1, cls + '60');
        ctx.fillStyle = barGrad;
        roundRect(ctx, x + 4, barY, barW - 14, barH, 4, true, false);

        // Hour label
        ctx.textAlign = 'center';
        ctx.font = '700 13px Inter,sans-serif';
        ctx.fillStyle = '#64748b';
        // Day prefix if changed
        let lbl = h.hr + 'h';
        const dayKey = h.day.toDateString();
        if (lastDay && lastDay !== dayKey) {
          lbl = h.day.toLocaleDateString('es-CL', { weekday: 'short' }).slice(0,2) + ' ' + lbl;
        }
        lastDay = dayKey;
        ctx.fillText(lbl, x + (barW - 10) / 2 + 4, chY + chH - 18);

        // Wind value on top of bar
        ctx.font = '800 17px Inter,sans-serif';
        ctx.fillStyle = isFav ? cls : '#94a3b8';
        ctx.fillText(String(h.w), x + (barW - 10) / 2 + 4, barY - 18);
      });
      ctx.textAlign = 'left';
    }
  }

  // ===== FOOTER =====
  // Subtle divider
  ctx.strokeStyle = 'rgba(148,163,184,.08)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(70, H - 90); ctx.lineTo(W - 70, H - 90);
  ctx.stroke();

  // Footer brand mark
  ctx.font = '800 26px Inter,sans-serif';
  const footerGrad = ctx.createLinearGradient(70, 0, W - 70, 0);
  footerGrad.addColorStop(0, '#22d3ee');
  footerGrad.addColorStop(1, '#fb923c');
  ctx.fillStyle = footerGrad;
  ctx.fillText('cussen.cl/wind', 70, H - 60);

  ctx.font = '500 16px Inter,sans-serif';
  ctx.fillStyle = '#475569';
  ctx.fillText('Condiciones en tiempo real · 27 spots de Chile', 70, H - 32);

  // Tag corner
  ctx.font = '700 14px Inter,sans-serif';
  ctx.fillStyle = '#475569';
  ctx.textAlign = 'right';
  ctx.fillText('#KITESPOT', W - 70, H - 60);
  ctx.font = '500 14px Inter,sans-serif';
  ctx.fillStyle = statusColor;
  ctx.fillText(spot.region.toUpperCase(), W - 70, H - 38);
  ctx.textAlign = 'left';

  return new Promise(resolve => canvas.toBlob(b => resolve(b), 'image/png', 0.95));
}

function roundRect(ctx, x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  if (fill) ctx.fill();
  if (stroke) ctx.stroke();
}

async function shareSpot(spotId) {
  const spot = SPOTS.find(s => s.id === spotId);
  const d = spotData[spotId];
  if (!spot || !d?.wind?.current) return;
  const st = getSpotStatus(spot);
  const wind = Math.round(shoreWindCorrection(d.wind.current.wind_speed_10m, spot.shore));
  const gust = Math.round(shoreWindCorrection(d.wind.current.wind_gusts_10m, spot.shore));
  const dir = d.wind.current.wind_direction_10m;
  const wave = d?.marine?.current?.wave_height;
  const temp = d.wind.current.temperature_2m;
  const seaT = d?.marine?.current?.sea_surface_temperature;
  const analysis = analyzeBestMoment(spot);

  // Show loading state on share button
  const shareBtn = document.querySelector('.hero-share, .share-btn-card');
  const origHtml = shareBtn?.innerHTML;
  if (shareBtn) shareBtn.innerHTML = '<span style="opacity:.7">⌛</span>';

  // Status emoji
  const emoji = st.status === 'green' ? '🟢' : st.status === 'yellow' ? '🟡' : '🔴';

  // Concise text — the image carries the visuals
  let msg = `${emoji} *${spot.name}*\n`;
  msg += `${wind}kn ${degToCompass(dir)} · rafaga ${gust}kn`;
  if (wave != null) msg += ` · olas ${wave.toFixed(1)}m`;
  msg += '\n';

  if (analysis.bestWindow) {
    msg += `\n⏱ Ventana: ${analysis.bestWindow.label} · ${analysis.bestWindow.detail}`;
    if (st.status !== 'red' && wind > 0) {
      const gear = getGear(wind);
      msg += ` · vela ${gear.kite}`;
    }
    msg += '\n';
  }

  msg += `\n📲 cussen.cl/wind`;

  // Try to share with image
  let imageBlob = null;
  try { imageBlob = await generateSpotImage(spotId); } catch(e) { console.warn('Image gen failed:', e); }

  // Restore button
  if (shareBtn && origHtml) shareBtn.innerHTML = origHtml;

  // Share with file if supported
  if (imageBlob && navigator.canShare) {
    const file = new File([imageBlob], `${spot.id}-${Date.now()}.png`, { type: 'image/png' });
    if (navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ title: `${spot.name} — KiteSpot`, text: msg, files: [file] });
        return;
      } catch(e) { /* user cancelled or failed, fall through */ }
    }
  }

  // Fallback: text only
  if (navigator.share) {
    try { await navigator.share({ title: `${spot.name} — KiteSpot`, text: msg }); return; } catch(e) {}
  }

  // Last resort: copy + download image
  navigator.clipboard?.writeText(msg);
  if (imageBlob) {
    const url = URL.createObjectURL(imageBlob);
    const a = document.createElement('a');
    a.href = url; a.download = `kitespot-${spot.id}.png`; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }
  if (shareBtn) {
    shareBtn.innerHTML = '✓ ' + t('copied');
    setTimeout(() => { if (origHtml) shareBtn.innerHTML = origHtml; }, 2000);
  }
}

// ========== DAY PLANNER ==========
// For each of the next 7 days, find the BEST spot (best window) and show it
function renderDayPlanner() {
  const el = document.getElementById('dayPlanner');
  if (!el) return;
  try {
    const nearby = getNearbySpots();
    if (!nearby.length) { el.innerHTML = ''; return; }

    const now = new Date();
    const days = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(now.getTime() + i * 86400000);
      d.setHours(0,0,0,0);
      days.push({ date: d, key: d.toDateString(), idx: i });
    }

    // For each spot, build best window per day
    const spotDayWindows = {};
    nearby.forEach(spot => {
      const sd = spotData[spot.id];
      if (!sd?.wind?.hourly) return;
      const times = sd.wind.hourly.time;
      const speeds = sd.wind.hourly.wind_speed_10m;
      const dirs = sd.wind.hourly.wind_direction_10m;
      const rains = sd.wind.hourly.precipitation || [];
      spotDayWindows[spot.id] = {};
      let cur = null;
      let curDay = null;
      for (let i = 0; i < times.length; i++) {
        const dt = new Date(times[i]);
        const hr = dt.getHours();
        if (hr < 10 || hr > 20) {
          if (cur && curDay) {
            cur.avg /= cur.count;
            const k = curDay;
            if (!spotDayWindows[spot.id][k] || cur.score > spotDayWindows[spot.id][k].score) spotDayWindows[spot.id][k] = cur;
          }
          cur = null; curDay = null;
          continue;
        }
        if (dt < now) continue;
        const dayKey = dt.toDateString();
        const spd = shoreWindCorrection(speeds[i], spot.shore);
        const rain = rains[i] || 0;
        const isGood = spd >= spot.windMin && spd <= spot.windMax && isDirectionFavorable(dirs[i], spot.idealDir) && rain < 2;

        if (isGood) {
          if (!cur || curDay !== dayKey) {
            if (cur && curDay) {
              cur.avg /= cur.count;
              const k = curDay;
              if (!spotDayWindows[spot.id][k] || cur.score > spotDayWindows[spot.id][k].score) spotDayWindows[spot.id][k] = cur;
            }
            cur = { startHr: hr, endHr: hr, avg: spd, count: 1, dir: dirs[i], score: 0 };
            curDay = dayKey;
          } else {
            cur.endHr = hr;
            cur.avg += spd;
            cur.count++;
          }
          if (cur) cur.score = cur.count * (cur.avg / Math.max(1, cur.count));
        } else {
          if (cur && curDay) {
            cur.avg /= cur.count;
            const k = curDay;
            if (!spotDayWindows[spot.id][k] || cur.score > spotDayWindows[spot.id][k].score) spotDayWindows[spot.id][k] = cur;
          }
          cur = null; curDay = null;
        }
      }
      if (cur && curDay) {
        cur.avg /= cur.count;
        if (!spotDayWindows[spot.id][curDay] || cur.score > spotDayWindows[spot.id][curDay].score) spotDayWindows[spot.id][curDay] = cur;
      }
    });

    // For each day, find top spot
    const dayBests = days.map(day => {
      let best = null;
      nearby.forEach(spot => {
        const w = spotDayWindows[spot.id]?.[day.key];
        if (!w) return;
        const score = w.count * w.avg - (spot.dist || 0) * 0.05;
        if (!best || score > best.score) best = { spot, window: w, score };
      });
      return { day, best };
    });

    // Render
    let html = `<div class="dp-header"><span>${lang==='es'?'Semana':'Week'}</span><span class="dp-sub">${lang==='es'?'Mejor spot por dia':'Best spot per day'}</span></div>`;
    html += '<div class="dp-rows">';
    dayBests.forEach(({day, best}) => {
      const dayLabel = day.idx === 0 ? t('today') : day.idx === 1 ? t('tomorrow') : day.date.toLocaleDateString(lang==='en'?'en-US':'es-CL', { weekday: 'short', day: 'numeric' });
      if (!best) {
        html += `<div class="dp-row dp-empty"><div class="dp-day">${dayLabel}</div><div class="dp-info">${lang==='es'?'Sin ventana':'No window'}</div></div>`;
      } else {
        const w = best.window;
        const isFire = w.count >= 5 && w.avg >= 18;
        html += `<div class="dp-row${isFire?' dp-fire':''}" onclick="scrollToSpot('${best.spot.id}')">
          <div class="dp-day">${dayLabel}</div>
          <div class="dp-spot">
            <div class="dp-name">${best.spot.name}${isFire?'<span class="dp-flame">★</span>':''}</div>
            <div class="dp-window">${w.startHr}-${w.endHr+1}h · ${Math.round(w.avg)}kn ${degToCompass(w.dir)}</div>
          </div>
          <div class="dp-arrow">→</div>
        </div>`;
      }
    });
    html += '</div>';
    el.innerHTML = html;
  } catch(e) { console.error('Day planner error:', e); el.innerHTML = ''; }
}

function renderWeekGrid() {
  const el = document.getElementById('weekGrid');
  try {
  const nearby = getNearbySpots();
  if (!nearby.length) { el.innerHTML = ''; return; }

  // Get day labels (next 7 days)
  const now = new Date();
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(now.getTime() + i * 86400000);
    days.push({
      date: d,
      label: i === 0 ? t('today') : d.toLocaleDateString(lang==='en'?'en-US':'es-CL', { weekday: 'short' }).slice(0,2),
      dateStr: d.toDateString(),
      isToday: i === 0
    });
  }

  // Header
  let html = '<div class="wg-header"><div class="wg-label">'+t('spot')+'</div>';
  days.forEach(d => { html += `<div class="wg-day ${d.isToday?'today':''}">${d.label}</div>`; });
  html += '</div>';

  // Rows
  nearby.forEach(spot => {
    const analysis = analyzeBestMoment(spot);
    const dotMap = {};
    analysis.weekDots.forEach(wd => { dotMap[wd.date.toDateString()] = wd; });

    // Get peak wind per day
    const peakMap = {};
    const sd = spotData[spot.id];
    if (sd?.wind?.hourly) {
      sd.wind.hourly.time.forEach((t, i) => {
        const dt = new Date(t);
        const hr = dt.getHours();
        if (hr < 10 || hr > 20) return;
        const key = dt.toDateString();
        const spd = shoreWindCorrection(sd.wind.hourly.wind_speed_10m[i], spot.shore);
        if (!peakMap[key] || spd > peakMap[key]) peakMap[key] = spd;
      });
    }

    const spotDist = spot.dist ? Math.round(spot.dist) : null;
    const distLabel = spotDist != null ? `<span class="wg-km">${spotDist}km</span>` : '';
    html += `<div class="wg-row" onclick="scrollToSpot('${spot.id}')"><div class="wg-label">${spot.name.split('(')[0].trim()}${distLabel}</div>`;
    days.forEach(d => {
      const dayData = dotMap[d.dateStr] || { best: 'red', rain: false, cold: false };
      const status = typeof dayData === 'string' ? dayData : dayData.best;
      const rain = dayData.rain || false;
      const cold = dayData.cold || false;
      const cls = (status === 'green' ? 'wg-go' : status === 'yellow' ? 'wg-maybe' : 'wg-no')
        + (rain ? ' wg-rain' : '') + (cold ? ' wg-cold' : '');
      const peak = peakMap[d.dateStr];
      html += `<div class="wg-cell"><div class="wg-dot ${cls}"></div>${peak?'<span class="wg-peak">'+Math.round(peak)+'</span>':''}</div>`;
    });
    html += '</div>';
  });

  el.innerHTML = html;
  } catch(e) { console.error('WeekGrid error:', e); el.innerHTML = ''; }
}

function scrollToSpot(spotId) {
  // Find the card in the active tab pane
  const activePane = document.querySelector('.tab-pane.active');
  const card = activePane?.querySelector('#card-' + spotId) || document.getElementById('card-' + spotId);
  if (card) {
    document.querySelectorAll('.spot-card.expanded').forEach(c => c.classList.remove('expanded'));
    card.classList.add('expanded');
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    const canvas = card.querySelector('canvas');
    if (canvas) renderChart(spotId, canvas);
  }
}

// ========== RENDERING ==========
function renderSpots() {
  // Render hero + grid
  renderHero();
  renderWeekGrid();
  renderDayPlanner();

  // Render spot list — nearby only, sorted by distance
  const list = document.getElementById('spotList');
  let sorted = getNearbySpots();

  const searchTerm = document.getElementById('searchInput')?.value?.toLowerCase() || '';
  if (searchTerm) {
    sorted = SPOTS.filter(s => s.name.toLowerCase().includes(searchTerm) || s.region.toLowerCase().includes(searchTerm));
    // Fetch data on-demand for spots not yet loaded
    const toFetch = sorted.filter(s => !spotData[s.id]);
    if (toFetch.length) {
      fetchSpotsOnDemand(toFetch);
    }
  }

  if (!sorted.length && !searchTerm) {
    list.innerHTML = `<div class="empty-state"><p>${lang==='en'?'No nearby spots. Enable your location.':'No hay spots cercanos. Activa tu ubicacion.'}</p></div>`;
    return;
  }

  // Count spots with data vs without
  const withData = sorted.filter(s => spotData[s.id]);
  const noData = sorted.filter(s => !spotData[s.id]);

  list.innerHTML = sorted.map((spot, i) => buildSpotCard(spot, i)).join('');

  // If most spots have no data, show retry
  if (noData.length > withData.length && !searchTerm) {
    list.innerHTML += `<div style="text-align:center;padding:16px"><button onclick="localStorage.removeItem('ks_data');localStorage.removeItem('ks_time');location.reload()" style="background:var(--accent);color:#000;border:none;padding:10px 24px;border-radius:8px;font-weight:600;cursor:pointer">${lang==='en'?'Retry loading':'Reintentar carga'}</button><p style="font-size:.7rem;color:var(--muted);margin-top:8px">${lang==='en'?'Data may have failed to load':'Los datos pueden no haber cargado'}</p></div>`;
  }
}

function buildSpotCard(spot, idx) {
  try {
  const d = spotData[spot.id];
  const st = getSpotStatus(spot);
  const wind = d?.wind?.current?.wind_speed_10m != null ? shoreWindCorrection(d.wind.current.wind_speed_10m, spot.shore) : '—';
  const gust = d?.wind?.current?.wind_gusts_10m != null ? shoreWindCorrection(d.wind.current.wind_gusts_10m, spot.shore) : '—';
  const dir = d?.wind?.current?.wind_direction_10m ?? 0;
  const wave = d?.marine?.current?.wave_height ?? '—';
  const temp = d?.wind?.current?.temperature_2m ?? '—';
  const isFav = favorites.includes(spot.id);
  const dist = distanceToSpot(spot);
  const distHtml = dist !== null ? `<span class="dist-badge">${dist} km</span>` : '';

  // Best moment analysis
  const analysis = analyzeBestMoment(spot);
  let bestHtml = '';
  if (analysis.bestWindow) {
    const bw = analysis.bestWindow;
    bestHtml = `<div class="best-moment has-window"><svg class="bm-icon" viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><path d="M8 4v4l3 2"/></svg><span class="bm-text"><span class="bm-when">${bw.label}</span> ${bw.detail}</span><div class="week-dots">${analysis.weekDots.map(d=>`<div class="week-dot wd-${d.best}"></div>`).join('')}</div></div>`;
  } else {
    bestHtml = `<div class="best-moment no-window"><svg class="bm-icon" viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><path d="M5.5 5.5l5 5M10.5 5.5l-5 5"/></svg><span class="bm-text">${t('noWindow')}</span><div class="week-dots">${analysis.weekDots.map(d=>`<div class="week-dot wd-${d.best}"></div>`).join('')}</div></div>`;
  }

  // Next hours forecast strip — only navigable hours (10-20h)
  let fcHtml = '';
  if (d?.wind?.hourly) {
    const now = new Date();
    const times = d.wind.hourly.time;
    let added = 0;
    let lastDay = null;
    for (let i = 0; i < times.length && added < 8; i++) {
      const dt = new Date(times[i]);
      if (dt < now) continue;
      const hr = dt.getHours();
      if (hr < 10 || hr > 20) continue;
      const w = shoreWindCorrection(d.wind.hourly.wind_speed_10m[i], spot.shore);
      const dd = d.wind.hourly.wind_direction_10m[i];
      const fcSt = w >= spot.windMin && w <= spot.windMax ? 'fc-green' : w >= 8 ? 'fc-yellow' : 'fc-red';
      const dayKey = dt.toDateString();
      let dayLabel = '';
      if (lastDay !== dayKey) {
        const isToday = dayKey === now.toDateString();
        if (!isToday) dayLabel = dt.toLocaleDateString(lang==='en'?'en-US':'es-CL', { weekday: 'short' }).slice(0,2);
        lastDay = dayKey;
      }
      fcHtml += `<div class="fc-hour ${fcSt}"><div class="fc-time">${dayLabel ? dayLabel+' ' : ''}${hr}h</div><div class="fc-wind">${Math.round(w)}</div><div class="fc-arrow" style="transform:rotate(${dd+180}deg)">↑</div></div>`;
      added++;
    }
  }

  return `<div class="spot-card status-${st.status}" onclick="toggleDetail('${spot.id}', this)" id="card-${spot.id}">
    ${rainOverlayHtml(spot)}
    <div class="card-top">
      <div><div class="spot-name">${spot.name}${distHtml}</div><div class="spot-region">${spot.region} · ${spot.level}</div>${thermalBadgeHtml(spot)}${tideHtml(spot)}</div>
      <div class="card-top-right">
        <span class="status-badge ${st.color}">${st.label}</span>
        <button class="fav-btn ${isFav?'active':''}" onclick="toggleFav(event,'${spot.id}')"><svg viewBox="0 0 20 20" width="16" height="16" fill="${isFav?'currentColor':'none'}" stroke="currentColor" stroke-width="1.5"><path d="M10 2l2.5 5 5.5.8-4 3.9.9 5.3L10 14.5 5.1 17l.9-5.3-4-3.9 5.5-.8z"/></svg></button>
        ${spot.custom ? `<button class="fav-btn" onclick="deleteCustomSpot(event,'${spot.id}')" title="Eliminar"><svg viewBox="0 0 20 20" width="14" height="14" fill="none" stroke="var(--red)" stroke-width="1.5"><path d="M4 6h12M8 6V4h4v2M6 6v10h8V6" stroke-linecap="round"/></svg></button>` : ''}
      </div>
    </div>
    ${bestHtml}
    <div class="card-data">
      <div class="data-item"><div class="data-label">${t('wind')}</div><div class="data-value">${typeof wind==='number'?Math.round(wind):'—'}<span class="data-unit"> kn</span></div></div>
      <div class="data-item"><div class="data-label">${t('gust')}</div><div class="data-value">${typeof gust==='number'?Math.round(gust):'—'}<span class="data-unit"> kn</span></div></div>
      <div class="data-item"><div class="data-label">${t('dir')}</div><div class="data-value"><span class="wind-arrow" style="transform:rotate(${dir+180}deg)">↑</span> ${degToCompass(dir)}</div></div>
      <div class="data-item"><div class="data-label">${t('waves')}</div><div class="data-value">${typeof wave==='number'?wave.toFixed(1):'—'}<span class="data-unit"> m</span></div></div>
    </div>
    ${(() => {
      const stab = typeof wind==='number' && typeof gust==='number' ? getWindStability(wind, gust) : null;
      const trend = getWindTrend(spot);
      if (!stab && !trend) return '';
      let html = '<div class="micro-stats">';
      if (stab) html += `<span class="ms-pill" style="color:${stab.color};border-color:${stab.color}40;background:${stab.color}14">${lang==='es'?stab.label_es:stab.label_en} <em>x${(gust/wind).toFixed(1)}</em></span>`;
      if (trend) html += `<span class="ms-pill" style="color:${trend.color};border-color:${trend.color}30">${trend.icon} 3h</span>`;
      // Wind shear: 10m vs 80m altitude
      const w80 = d?.wind?.current?.wind_speed_80m;
      if (w80 != null && typeof wind === 'number' && wind > 0) {
        const w80c = shoreWindCorrection(w80, spot.shore);
        const ratio = w80c / wind;
        const pct = Math.round((ratio - 1) * 100);
        let shearColor, shearLabel, shearIcon;
        if (ratio < 1.2) {
          shearColor = '#94a3b8'; shearIcon = '≈';
          shearLabel = lang==='es' ? 'Uniforme' : 'Uniform';
        } else if (ratio < 1.6) {
          shearColor = '#22d3ee'; shearIcon = '↑';
          shearLabel = lang==='es' ? 'Hay viento aloft' : 'Wind aloft';
        } else if (ratio < 2.2) {
          shearColor = '#facc15'; shearIcon = '⚠';
          shearLabel = lang==='es' ? 'Shear alto' : 'High shear';
        } else {
          shearColor = '#f87171'; shearIcon = '⚠';
          shearLabel = lang==='es' ? 'Shear peligroso' : 'Dangerous shear';
        }
        html += `<span class="ms-pill" style="color:${shearColor};border-color:${shearColor}40;background:${shearColor}10" title="10m: ${Math.round(wind)}kn / 80m: ${Math.round(w80c)}kn">${shearIcon} ${shearLabel} <em>+${pct}%</em></span>`;
      }
      return html + '</div>';
    })()}
    ${fcHtml ? `<div class="card-forecast">${fcHtml}</div>` : ''}
    <div class="card-detail" id="detail-${spot.id}">
      <div class="detail-grid">
        <div class="detail-item"><div class="data-label">${t('air')}</div><div class="data-value">${typeof temp==='number'?Math.round(temp):'—'}°C</div></div>
        <div class="detail-item"><div class="data-label">${t('sea')}</div><div class="data-value">${d?.marine?.current?.sea_surface_temperature != null ? Math.round(d.marine.current.sea_surface_temperature) : '—'}°C</div></div>
        <div class="detail-item"><div class="data-label">${t('waves')}</div><div class="data-value">${d?.marine?.current?.wave_height?.toFixed(1) ?? '—'}<span class="data-unit">m</span> · ${d?.marine?.current?.wave_period?.toFixed(0) ?? '—'}<span class="data-unit">s</span></div></div>
        <div class="detail-item"><div class="data-label">${t('ideal')}</div><div class="data-value">${spot.windMin}-${spot.windMax}<span class="data-unit"> kn</span></div></div>
      </div>
      <p style="font-size:.75rem;color:var(--muted);line-height:1.4;margin-bottom:8px">${spot.desc}</p>
      <div style="display:flex;gap:12px;margin-bottom:8px;flex-wrap:wrap">
        <a href="https://www.google.com/maps?q=${spot.lat},${spot.lon}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="display:inline-flex;align-items:center;gap:4px;font-size:.7rem;color:var(--cyan);padding:4px 0"><svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="6.5" r="2.5"/><path d="M8 1.5C5.5 1.5 3.5 3.5 3.5 6c0 3.5 4.5 8.5 4.5 8.5s4.5-5 4.5-8.5c0-2.5-2-4.5-4.5-4.5z"/></svg>${lang==='en'?'View on map':'Ver en mapa'}</a>
        <button onclick="event.stopPropagation();shareSpot('${spot.id}')" style="display:inline-flex;align-items:center;gap:4px;font-size:.7rem;color:var(--cyan);background:none;border:none;cursor:pointer;padding:4px 0"><svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 8h8M12 8l-3-3M12 8l-3 3"/></svg>${lang==='en'?'Share spot':'Compartir spot'}</button>
      </div>
      ${build7DayForecast(spot, d)}
      <div class="chart-wrap"><canvas id="chart-${spot.id}"></canvas></div>
    </div>
  </div>`;
  } catch(e) { console.error('Card error:', spot?.id, e); return `<div class="spot-card status-red"><div class="spot-name">${spot?.name||'?'}</div><div style="color:var(--muted);font-size:.7rem">Error al cargar</div></div>`; }
}

function build7DayForecast(spot, d) {
  if (!d?.wind?.hourly) return '';
  const times = d.wind.hourly.time;
  const now = new Date();
  let html = '<div class="fc-days">';
  let lastDay = '';
  let dayHtml = '';
  let dayCount = 0;

  for (let i = 0; i < times.length && dayCount < 7; i++) {
    const dt = new Date(times[i]);
    const hr = dt.getHours();
    if (hr < 10 || hr > 20) continue;
    if (dt < now && dt.toDateString() === now.toDateString() && hr < now.getHours()) continue;

    const dayStr = dt.toLocaleDateString(lang==='en'?'en-US':'es-CL', { weekday: 'short', day: 'numeric', month: 'short' });
    if (dayStr !== lastDay) {
      if (dayHtml) { html += `<div class="fc-day-hours">${dayHtml}</div></div>`; }
      lastDay = dayStr;
      dayHtml = '';
      dayCount++;
      const isToday = dt.toDateString() === now.toDateString();
      const label = isToday ? t('today') : dayStr;
      html += `<div class="fc-day-row"><div class="fc-day-label">${label}</div>`;
    }

    const w = shoreWindCorrection(d.wind.hourly.wind_speed_10m[i], spot.shore);
    const dd = d.wind.hourly.wind_direction_10m[i];
    const rn = d.wind.hourly.precipitation?.[i] || 0;
    const tp = d.wind.hourly.temperature_2m?.[i];
    const noRn = rn < 2;
    const cls = (w >= spot.windMin && w <= spot.windMax && noRn) ? 'dg' : w >= 8 ? 'dy' : 'dr';
    const extraCls = (rn > 0.5 ? ' fc-rain' : '') + (tp != null && tp < 10 ? ' fc-cold' : '');
    dayHtml += `<div class="fc-day-item ${cls}${extraCls}"><div class="fc-time">${hr}h</div><div class="fc-wind">${Math.round(w)}</div><div class="fc-arrow" style="transform:rotate(${dd+180}deg)">&#8593;</div></div>`;
  }
  if (dayHtml) html += `<div class="fc-day-hours">${dayHtml}</div></div>`;
  html += '</div>';
  return html;
}

function toggleDetail(spotId, el) {
  const card = el || document.getElementById('card-' + spotId);
  if (!card) return;
  const wasExpanded = card.classList.contains('expanded');
  document.querySelectorAll('.spot-card.expanded').forEach(c => c.classList.remove('expanded'));
  if (!wasExpanded) {
    card.classList.add('expanded');
    const canvas = card.querySelector('canvas');
    if (canvas) renderChart(spotId, canvas);
  }
}

let _chartJsLoaded = false;
function loadChartJs() {
  if (_chartJsLoaded) return Promise.resolve();
  return new Promise(resolve => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js';
    s.onload = () => { _chartJsLoaded = true; resolve(); };
    document.head.appendChild(s);
  });
}

async function renderChart(spotId, canvasEl) {
  const d = spotData[spotId];
  if (!d?.wind?.hourly) return;
  const canvas = canvasEl || document.getElementById('chart-' + spotId);
  if (!canvas) return;
  const chartKey = canvas.id || spotId;
  if (charts[chartKey]) { charts[chartKey].destroy(); delete charts[chartKey]; }
  await loadChartJs();

  const now = new Date();
  const times = d.wind.hourly.time;
  const startIdx = times.findIndex(t => new Date(t) >= now);
  if (startIdx < 0) return;
  const end = Math.min(startIdx + 24, times.length);

  const spot = SPOTS.find(s => s.id === spotId);
  const labels = [];
  const windData = [];
  const gustData = [];
  const rainData = [];
  const tempData = [];
  for (let i = startIdx; i < end; i++) {
    labels.push(new Date(times[i]).getHours() + ':00');
    windData.push(Math.round(shoreWindCorrection(d.wind.hourly.wind_speed_10m[i], spot?.shore)));
    gustData.push(Math.round(shoreWindCorrection(d.wind.hourly.wind_gusts_10m[i], spot?.shore)));
    rainData.push(d.wind.hourly.precipitation?.[i] || 0);
    tempData.push(d.wind.hourly.temperature_2m?.[i] || null);
  }
  const hasRain = rainData.some(r => r > 0);

  charts[chartKey] = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Viento (kn)', data: windData, borderColor: '#06b6d4', backgroundColor: 'rgba(6,182,212,.1)', fill: true, tension: .3, pointRadius: 0, yAxisID: 'y' },
        { label: 'Rafaga (kn)', data: gustData, borderColor: '#f97316', backgroundColor: 'transparent', borderDash: [4,4], tension: .3, pointRadius: 0, yAxisID: 'y' },
        { label: 'Lluvia (mm)', data: rainData, type: 'bar', backgroundColor: 'rgba(59,130,246,.35)', borderColor: 'rgba(59,130,246,.6)', borderWidth: 1, borderRadius: 2, yAxisID: 'yRain', barPercentage: .6, hidden: !hasRain },
        { label: 'Temp (°C)', data: tempData, borderColor: '#94a3b8', backgroundColor: 'transparent', borderDash: [2,3], tension: .3, pointRadius: 0, borderWidth: 1, yAxisID: 'yTemp' }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#94a3b8', font: { size: 9, family: 'Inter' }, boxWidth: 12, padding: 8 } },
        tooltip: {
          backgroundColor: '#1e293b', titleColor: '#e2e8f0', bodyColor: '#94a3b8', borderColor: '#334155', borderWidth: 1,
          callbacks: { label: ctx => {
            if (ctx.dataset.label === 'Lluvia (mm)' && ctx.raw === 0) return null;
            return `${ctx.dataset.label}: ${ctx.raw}`;
          }}
        }
      },
      scales: {
        x: { ticks: { color: '#64748b', font: { size: 9 }, maxTicksLimit: 8 }, grid: { color: 'rgba(148,163,184,.06)' } },
        y: { position: 'left', ticks: { color: '#64748b', font: { size: 9 } }, grid: { color: 'rgba(148,163,184,.08)' }, suggestedMin: 0, title: { display: false } },
        yRain: { position: 'right', display: hasRain, ticks: { color: '#3b82f6', font: { size: 8 } }, grid: { display: false }, suggestedMin: 0, suggestedMax: Math.max(...rainData) * 2 || 5 },
        yTemp: { display: false, suggestedMin: 0 }
      }
    },
    plugins: [{
      id: 'idealZone',
      beforeDraw(chart) {
        if (!spot) return;
        const { ctx, chartArea: { left, right }, scales: { y } } = chart;
        const top = y.getPixelForValue(spot.windMax);
        const bottom = y.getPixelForValue(spot.windMin);
        ctx.save();
        ctx.fillStyle = 'rgba(34,197,94,.08)';
        ctx.fillRect(left, top, right - left, bottom - top);
        ctx.restore();
      }
    }]
  });
}

function degToCompass(deg) {
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(deg / 22.5) % 16];
}

// ========== THERMAL RISK ==========
function getThermalRisk(spot) {
  const d = spotData[spot.id];
  if (!d?.wind?.current || !d?.marine?.current) return null;
  const landTemp = d.wind.current.temperature_2m;
  const seaTemp = d.marine.current.sea_surface_temperature;
  if (landTemp == null || seaTemp == null) return null;
  const delta = landTemp - seaTemp;
  const wind = d.wind.current.wind_speed_10m || 0;
  // Shore exposure affects how easily wind reaches the beach
  // sheltered: bahias/lagos — viento rara vez llega a orilla
  // semi: semi-protegido — viento llega pero inestable
  // exposed: costa abierta — viento llega directo
  const shore = spot.shore || 'semi';
  const thresholds = shore === 'sheltered' ? { badDelta:4, badWind:20, warnDelta:2, warnWind:22 }
    : shore === 'semi' ? { badDelta:8, badWind:16, warnDelta:5, warnWind:20 }
    : { badDelta:12, badWind:15, warnDelta:8, warnWind:18 };
  if (delta > thresholds.badDelta && wind < thresholds.badWind) return { level: 'bad', delta: Math.round(delta), msg: t('thermalBad'), landTemp: Math.round(landTemp), seaTemp: Math.round(seaTemp) };
  if (delta > thresholds.warnDelta && wind < thresholds.warnWind) return { level: 'warn', delta: Math.round(delta), msg: t('thermalWarn'), landTemp: Math.round(landTemp), seaTemp: Math.round(seaTemp) };
  return { level: 'ok', delta: Math.round(delta), msg: t('thermalOk'), landTemp: Math.round(landTemp), seaTemp: Math.round(seaTemp) };
}

function thermalBadgeHtml(spot) {
  const t = getThermalRisk(spot);
  if (!t) return '';
  const icon = t.level === 'ok' ? '<svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 8l3 3 5-6"/></svg>'
    : '<svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 4v5M8 11v1"/></svg>';
  return `<div class="thermal-badge thermal-${t.level}" title="Tierra ${t.landTemp}°C · Mar ${t.seaTemp}°C · Δ${t.delta}°C">${icon}${t.msg} <span style="opacity:.6">(Δ${t.delta}°C)</span></div>`;
}

// ========== RAIN OVERLAY ==========
function rainOverlayHtml(spot) {
  const d = spotData[spot.id];
  if (!d?.wind?.current) return '';
  const rain = d.wind.current.precipitation || 0;
  if (rain < 0.5) return '';
  const heavy = rain > 2;
  return `<div class="rain-overlay ${heavy ? 'rain-heavy' : 'rain-light'}"><svg viewBox="0 0 16 16" width="10" height="10" fill="currentColor"><path d="M8 2C8 2 3 8 3 11a5 5 0 0010 0C13 8 8 2 8 2z"/></svg>${rain.toFixed(1)}mm</div>`;
}

// ========== MAP SPOT PICKER ==========
let _leafletLoaded = false;
let _mapPickerMap = null;
let _mapPickerMarker = null;
let _pickedLat = null, _pickedLon = null;

function loadLeaflet() {
  if (_leafletLoaded) return Promise.resolve();
  return new Promise(resolve => {
    const css = document.createElement('link');
    css.rel = 'stylesheet';
    css.href = 'https://unpkg.com/leaflet@1.9/dist/leaflet.css';
    document.head.appendChild(css);

function buildMapTimeline() {
  // Build list of navigable hours for next 7 days (10h-20h)
  const tl = [];
  const now = new Date();
  const nowHr = now.getHours();
  // Start from current hour (rounded down) if within range, else from 10h today/tomorrow
  for (let dayOffset = 0; dayOffset < 7; dayOffset++) {
    const d = new Date(now); d.setDate(d.getDate() + dayOffset); d.setMinutes(0,0,0);
    for (let hr = 10; hr <= 20; hr++) {
      d.setHours(hr);
      if (d < now) continue; // skip past hours today
      tl.push({ time: new Date(d), label: hr+'h', day: dayOffset });
    }
  }
  return tl;
}

function getStatusAtTime(spot, dateTime) {
  // Get hourly forecast index for this time
  const d = spotData[spot.id];
  if (!d?.wind?.hourly) return null;
  const target = dateTime.getTime();
  let idx = -1;
  let bestDiff = Infinity;
  for (let i = 0; i < d.wind.hourly.time.length; i++) {
    const t = new Date(d.wind.hourly.time[i]).getTime();
    const diff = Math.abs(t - target);
    if (diff < bestDiff) { bestDiff = diff; idx = i; }
    if (t > target + 3600000) break; // 1h tolerance, then stop
  }
  if (idx < 0 || bestDiff > 3600000 * 2) return null;

  const wind = shoreWindCorrection(d.wind.hourly.wind_speed_10m[idx], spot.shore);
  const gust = shoreWindCorrection(d.wind.hourly.wind_gusts_10m[idx], spot.shore);
  const dir = d.wind.hourly.wind_direction_10m[idx];
  const rain = d.wind.hourly.precipitation?.[idx] || 0;

  let status = 'red';
  const dirOk = isDirectionFavorable(dir, spot.idealDir);
  if (rain > 2) status = 'red';
  else if (wind >= spot.windMin && wind <= spot.windMax && dirOk && gust < 40 && rain < 0.5) status = 'green';
  else if (wind >= 8 && wind <= 35) status = 'yellow';

  return { wind: Math.round(wind), gust: Math.round(gust), dir, rain, status };
}

function colorForStatus(status, isCustom) {
  if (isCustom) return '#fb923c';
  if (status === 'green') return '#4ade80';
  if (status === 'yellow') return '#facc15';
  if (status === 'red') return '#f87171';
  return '#64748b';
}

function updateMapForTime() {
  const point = _mapTimeline[_mapTimeIdx];
  if (!point) return;
  const customIds = new Set(JSON.parse(localStorage.getItem('ks_custom_spots') || '[]').map(s => s.id));

  Object.entries(_mapMarkers).forEach(([id, entry]) => {
    const status = getStatusAtTime(entry.spot, point.time);
    const isCustom = customIds.has(id);
    const color = colorForStatus(status?.status || 'unknown', isCustom);
    entry.marker.setStyle({ fillColor: color, color: '#0f172a' });
    entry.lastStatus = status;
    // Pulse animation: scale up briefly
    const newRadius = isCustom ? 9 : 8;
    entry.marker.setRadius(newRadius);
  });

  // Update label
  const lbl = document.getElementById('mapTimeLabel');
  if (lbl) {
    const now = new Date();
    const isToday = point.time.toDateString() === now.toDateString();
    const isTomorrow = point.time.toDateString() === new Date(now.getTime() + 86400000).toDateString();
    const dayLbl = isToday ? (lang==='es'?'Hoy':'Today') :
                   isTomorrow ? (lang==='es'?'Manana':'Tomorrow') :
                   point.time.toLocaleDateString(lang==='es'?'es-CL':'en-US', { weekday: 'long', day: 'numeric' });
    const hr = point.time.getHours();
    lbl.innerHTML = `<span class="mt-day">${dayLbl}</span><span class="mt-hr">${hr}:00</span>`;
  }
  // Update slider value
  const sl = document.getElementById('mapTimeSlider');
  if (sl) sl.value = String(_mapTimeIdx);
}

  _mapTimeIdx = Math.max(0, Math.min(_mapTimeline.length - 1, idx));

async function fetchSpotsOnDemand(spots, callback) {
  for (const spot of spots) {
    if (spotData[spot.id]) continue;
    try {
      const [wind, marine] = await Promise.all([
        fetchWithRetry(`https://api.open-meteo.com/v1/forecast?latitude=${spot.lat}&longitude=${spot.lon}&current=wind_speed_10m,wind_direction_10m,wind_gusts_10m,temperature_2m,weather_code,precipitation,wind_speed_80m&hourly=wind_speed_10m,wind_direction_10m,wind_gusts_10m,temperature_2m,precipitation,weather_code&forecast_days=7&wind_speed_unit=kn&timezone=America/Santiago&cell_selection=sea`),
        fetchWithRetry(`https://marine-api.open-meteo.com/v1/marine?latitude=${spot.lat}&longitude=${spot.lon}&current=wave_height,wave_period,wave_direction,sea_surface_temperature&hourly=wave_height&forecast_days=7&timezone=America/Santiago`)
      ]);
      if (wind && !wind.error) {
        spotData[spot.id] = { id: spot.id, wind, marine };
        localStorage.setItem('ks_data', JSON.stringify(spotData));
        // Re-render the active view
        const activeTab = document.querySelector('.tab-pane.active')?.id;
        if (activeTab === 'tab-favs') renderFavorites();
        else renderSpots();
      }
    } catch(e) {}
  }
}

// ========== FAVORITES ==========
// ========== AMBIENT WIND BACKGROUND ==========
function initWindBackground() {
  const canvas = document.getElementById('windBg');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0, particles = [], rafId = null;
  let t = 0;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(1,0,0,1,0,0);
    ctx.scale(dpr, dpr);
  }

  // Flow field: smooth angle field using sum of sines (cheap pseudo-curl-noise)
  // Returns angle in radians for any (x,y,t)
  function flowAngle(x, y, time) {
    const s1 = Math.sin(x * 0.004 + time * 0.0003) * Math.cos(y * 0.004 - time * 0.0002);
    const s2 = Math.sin(y * 0.0028 + time * 0.00018) * Math.cos(x * 0.003 + time * 0.00012);
    const s3 = Math.sin((x + y) * 0.002 + time * 0.0001);
    // Bias toward roughly horizontal flow with swirling perturbation
    return (s1 + s2 * 0.7 + s3 * 0.5) * Math.PI * 0.8 + Math.PI * 0.05;
  }

  function spawn(reborn) {
    const layer = Math.random() < 0.45 ? 0 : Math.random() < 0.78 ? 1 : 2;
    const speed = 0.5 + Math.random() * 1.0 + layer * 0.7;
    return {
      x: reborn ? Math.random() * W : -20 + Math.random() * (W + 40),
      y: reborn ? Math.random() * H : Math.random() * H,
      px: 0, py: 0,
      life: 0,
      maxLife: 60 + Math.floor(Math.random() * 100) + layer * 30,
      speed,
      width: 0.5 + layer * 0.45,
      opacity: 0.12 + layer * 0.12 + Math.random() * 0.08,
      layer
    };
  }

  function init() {
    resize();
    particles = [];
    const count = W < 500 ? 80 : 140;
    for (let i = 0; i < count; i++) {
      const p = spawn(true);
      p.life = Math.floor(Math.random() * p.maxLife);
      particles.push(p);
    }
  }

  function animate() {
    // Fade trails (instead of clearing) — gives flowing trail look
    ctx.fillStyle = 'rgba(7,11,22,.10)';
    ctx.fillRect(0, 0, W, H);

    t += 1;

    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      p.px = p.x; p.py = p.y;
      const a = flowAngle(p.x, p.y, t);
      p.x += Math.cos(a) * p.speed;
      p.y += Math.sin(a) * p.speed;
      p.life++;

      // Draw segment as small gradient
      ctx.strokeStyle = `rgba(${p.layer === 2 ? '103,232,249' : '34,211,238'},${p.opacity})`;
      ctx.lineWidth = p.width;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(p.px, p.py);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();

      // Respawn when off-screen or end of life
      if (p.x < -10 || p.x > W + 10 || p.y < -10 || p.y > H + 10 || p.life > p.maxLife) {
        particles[i] = spawn(false);
      }
    }
    rafId = requestAnimationFrame(animate);
  }

  init();
  animate();

  window.addEventListener('resize', () => {
    if (rafId) cancelAnimationFrame(rafId);
    init();
    animate();
  });

  // Pause when hidden to save battery
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) { if (rafId) cancelAnimationFrame(rafId); rafId = null; }
    else if (!rafId) animate();
  });
}

function deleteCustomSpot(e, spotId) {
  e.stopPropagation();
  const name = SPOTS.find(s => s.id === spotId)?.name || spotId;
  if (!confirm((lang==='en'?'Delete ':'Eliminar ') + name + '?')) return;
  // Remove from SPOTS array
  const idx = SPOTS.findIndex(s => s.id === spotId);
  if (idx >= 0) SPOTS.splice(idx, 1);
  // Remove from localStorage
  const custom = JSON.parse(localStorage.getItem('ks_custom_spots') || '[]');
  localStorage.setItem('ks_custom_spots', JSON.stringify(custom.filter(s => s.id !== spotId)));
  // Remove from favorites
  favorites = favorites.filter(f => f !== spotId);
  localStorage.setItem('ks_favs', JSON.stringify(favorites));
  // Remove cached data
  delete spotData[spotId];
  localStorage.setItem('ks_data', JSON.stringify(spotData));
  renderSpots();
  renderFavorites();
}

function toggleFav(e, spotId) {
  e.stopPropagation();
  const wasFav = favorites.includes(spotId);
  if (wasFav) favorites = favorites.filter(f => f !== spotId);
  else favorites.push(spotId);
  localStorage.setItem('ks_favs', JSON.stringify(favorites));
  // Update just the button that was clicked
  const btn = e.currentTarget;
  const isFav = !wasFav;
  btn.classList.toggle('active', isFav);
  const svg = btn.querySelector('svg');
  if (svg) svg.setAttribute('fill', isFav ? 'currentColor' : 'none');
}

function renderFavorites() {
  const list = document.getElementById('favList');
  if (!favorites.length) {
    list.innerHTML = `<div class="empty-state"><svg class="ico-empty" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 4l5 10 11 1.6-8 7.8 1.9 11L20 29l-9.9 5.4L12 23.4l-8-7.8L15 14z"/></svg><p>${t('favEmpty')}</p></div>`;
    return;
  }
  const favSpots = SPOTS.filter(s => favorites.includes(s.id));
  // Fetch data on-demand for fav spots not yet loaded
  const toFetch = favSpots.filter(s => !spotData[s.id]);
  if (toFetch.length) fetchSpotsOnDemand(toFetch);
  list.innerHTML = favSpots.map((s, i) => buildSpotCard(s, i)).join('');
}

// ========== NOTIFICATIONS ==========

function requestNotifPermission() {
  if ('Notification' in window) {
    Notification.requestPermission().then(p => {
      if (p === 'granted') document.getElementById('notifBanner').style.display = 'none';
    });
  }
}

function checkAlerts() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const last = JSON.parse(localStorage.getItem('ks_lastAlert') || '{}');
  // Auto-alert on all nearby spots that go green
  getNearbySpots().forEach(spot => {
    const st = getSpotStatus(spot);
    const isGood = st.status === 'green';
    const wasGood = last[spot.id] === true;
    if (isGood && !wasGood) {
      const d = spotData[spot.id];
      const wind = shoreWindCorrection(d?.wind?.current?.wind_speed_10m || 0, spot.shore);
      const dir = d?.wind?.current?.wind_direction_10m || 0;
      new Notification(`${spot.name} ${t('spotIsOn')}`, {
        body: `${Math.round(wind)} kn ${degToCompass(dir)}${spot.dist ? ' - '+Math.round(spot.dist)+'km' : ''}`,
        icon: 'icon.svg', tag: 'kitespot-' + spot.id
      });
    }
    last[spot.id] = isGood;
  });
  localStorage.setItem('ks_lastAlert', JSON.stringify(last));
}

// ========== INIT ==========
// Export custom spots as base64 string for sharing/backup
function exportCustomSpots() {
  const custom = JSON.parse(localStorage.getItem('ks_custom_spots') || '[]');
  if (!custom.length) {
    alert(lang==='es' ? 'No tienes spots agregados' : 'No custom spots to export');
    return;
  }
  const json = JSON.stringify(custom);
  const code = btoa(unescape(encodeURIComponent(json)));
  const url = location.origin + location.pathname + '?spots=' + code;
  if (navigator.share) {
    navigator.share({ title:'KiteSpot — mis spots', text:`Mis spots (${custom.length}): ${custom.map(s=>s.name).join(', ')}`, url }).catch(()=>{});
  } else {
    navigator.clipboard?.writeText(url);
    alert((lang==='es'?'Link copiado: ':'Link copied: ') + url.substring(0,60) + '...');
  }
}

// Import spots from URL ?spots=base64
function importCustomSpotsFromURL() {
  const params = new URLSearchParams(location.search);
  const code = params.get('spots');
  if (!code) return 0;
  try {
    const json = decodeURIComponent(escape(atob(code)));
    const incoming = JSON.parse(json);
    if (!Array.isArray(incoming)) return 0;
    const existing = JSON.parse(localStorage.getItem('ks_custom_spots') || '[]');
    let added = 0;
    incoming.forEach(s => {
      if (s && s.id && s.lat && s.lon && !existing.find(e => e.id === s.id)) {
        existing.push(s);
        added++;
      }
    });
    if (added > 0) {
      localStorage.setItem('ks_custom_spots', JSON.stringify(existing));
      // Auto-favorite imported spots
      const favs = JSON.parse(localStorage.getItem('ks_favs') || '[]');
      incoming.forEach(s => { if (s.id && !favs.includes(s.id)) favs.push(s.id); });
      localStorage.setItem('ks_favs', JSON.stringify(favs));
      // Clean URL
      history.replaceState({}, '', location.pathname);
      setTimeout(() => alert((lang==='es'?'Importado: ':'Imported: ') + added + (lang==='es'?' spots':' spots')), 800);
    }
    return added;
  } catch(e) { console.warn('Import failed:', e); return 0; }
}

async function init() {
  // Set lang button
  document.getElementById('langBtn').textContent = lang === 'es' ? 'EN' : 'ES';

  // Import any spots from URL
  importCustomSpotsFromURL();

  // Load custom spots from localStorage
  const customSpots = JSON.parse(localStorage.getItem('ks_custom_spots') || '[]');
  customSpots.forEach(s => { if (!SPOTS.find(x => x.id === s.id)) SPOTS.push(s); });

  await getLocation();
  fetchAllSpots();

  // Show notification banner if not granted
  if ('Notification' in window && Notification.permission === 'default') {
    document.getElementById('notifBanner').style.display = 'flex';
  }

  // Auto-refresh every 30 min
  setInterval(() => { refreshData(); }, 30 * 60 * 1000);

  // Ambient wind particles — makes the whole app feel alive
  initWindBackground();

  // Register SW with forced update — clears old caches
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      // Unregister ALL old service workers first
      return Promise.all(regs.map(r => r.unregister()));
    }).then(() => {
      // Clear all caches
      return caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k))));
    }).then(() => {
      // Register fresh SW
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }).catch(() => {});
  }

  // Pull to refresh
  let _ptrStart = 0, _ptrActive = false;
  const ptrEl = document.getElementById('ptrIndicator');
  document.addEventListener('touchstart', e => {
    if (window.scrollY === 0) { _ptrStart = e.touches[0].clientY; _ptrActive = true; }
  }, { passive: true });
  document.addEventListener('touchmove', e => {
    if (!_ptrActive) return;
    const dy = e.touches[0].clientY - _ptrStart;
    if (dy > 30 && dy < 120) { ptrEl.classList.add('pulling'); ptrEl.classList.remove('refreshing'); }
  }, { passive: true });
  document.addEventListener('touchend', async () => {
    if (ptrEl.classList.contains('pulling')) {
      ptrEl.classList.remove('pulling');
      ptrEl.classList.add('refreshing');
      document.getElementById('ptrText').textContent = 'Actualizando...';
      await refreshData();
      ptrEl.classList.remove('refreshing');
      document.getElementById('ptrText').textContent = 'Suelta para actualizar';
    }
    _ptrActive = false;
  });
}

init();
</script>
