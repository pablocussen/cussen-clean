<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>KiteSpot Chile — Condiciones de kitesurf en tiempo real</title>
<meta name="description" content="Consulta el viento, oleaje y condiciones de kitesurf en los mejores spots de Chile. Dashboard en tiempo real con semaforo, mapa y alertas.">
<meta name="theme-color" content="#06b6d4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta property="og:title" content="KiteSpot Chile">
<meta property="og:description" content="Condiciones de kitesurf en tiempo real para spots de Chile">
<meta property="og:type" content="website">
<meta property="og:url" content="https://cussen.cl/wind/">
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f172a;--bg2:#1e293b;--bg3:#334155;
  --text:#e2e8f0;--muted:#94a3b8;--dim:#64748b;
  --cyan:#06b6d4;--cyan2:#0891b2;--cyan-glow:rgba(6,182,212,.15);
  --orange:#f97316;--orange2:#ea580c;
  --green:#22c55e;--yellow:#eab308;--red:#ef4444;
  --radius:14px;--radius-sm:10px;
  --header-h:44px;--nav-h:40px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased}
body{min-height:100vh;min-height:100dvh;overflow-x:hidden;overscroll-behavior-y:contain}
a{color:var(--cyan);text-decoration:none}

/* Header — compact */
.header{position:sticky;top:0;z-index:100;background:rgba(15,23,42,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(148,163,184,.08);padding:8px 12px;padding-top:calc(8px + var(--safe-top));height:calc(var(--header-h) + var(--safe-top));display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:8px}
.logo{font-size:1.1rem;font-weight:800;background:linear-gradient(135deg,var(--cyan),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.location-badge{font-size:.68rem;color:var(--muted);background:var(--bg2);padding:3px 8px;border-radius:20px;display:flex;align-items:center;gap:4px;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-icon{background:none;border:none;color:var(--muted);cursor:pointer;padding:8px;border-radius:8px;transition:all .2s;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center}
.btn-icon:active{color:var(--cyan);background:var(--cyan-glow);transform:scale(.92)}
.lang-toggle{font-size:.6rem;font-weight:700;color:var(--dim);background:var(--bg2);border:1px solid var(--bg3);padding:3px 8px;border-radius:12px;cursor:pointer;letter-spacing:.5px;transition:all .15s;min-width:32px;text-align:center}
.lang-toggle:active{color:var(--cyan);border-color:var(--cyan);transform:scale(.92)}
.btn-icon.spinning svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Nav — horizontal, compact */
.nav{position:sticky;top:calc(var(--header-h) + var(--safe-top));z-index:99;background:rgba(15,23,42,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:flex;border-bottom:1px solid rgba(148,163,184,.06);height:var(--nav-h)}
.tab-btn{flex:1;background:none;border:none;color:var(--dim);font-family:inherit;font-size:.65rem;font-weight:600;padding:0;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;letter-spacing:.4px;text-transform:uppercase;min-height:var(--nav-h);-webkit-tap-highlight-color:transparent}
.ico-tab{width:16px;height:16px;flex-shrink:0}
.ico-inline{width:11px;height:11px;vertical-align:-1px}
.ico-btn{width:16px;height:16px}
.ico-empty{width:40px;height:40px;margin-bottom:10px;opacity:.3}
.tab-btn.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.tab-btn:active{color:var(--text);transform:scale(.95)}

/* Content — edge-to-edge on mobile */
.content{max-width:720px;margin:0 auto;padding:8px}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* Cards — tighter, touch-optimized */
.spot-list{display:flex;flex-direction:column;gap:8px}
.spot-card{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:12px;cursor:pointer;transition:all .15s;animation:fadeUp .3s ease both;-webkit-tap-highlight-color:transparent;will-change:transform}
.spot-card:active{transform:scale(.985);background:rgba(30,41,59,.8)}
.spot-card.status-green{border-left:3px solid var(--green)}
.spot-card.status-yellow{border-left:3px solid var(--yellow)}
.spot-card.status-red{border-left:3px solid var(--red)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.spot-name{font-size:.88rem;font-weight:700;line-height:1.2}
.spot-region{font-size:.65rem;color:var(--muted);margin-top:1px}
.card-top-right{display:flex;align-items:center;gap:6px}
.status-badge{font-size:.6rem;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
.status-badge.green{background:rgba(34,197,94,.15);color:var(--green)}
.status-badge.yellow{background:rgba(234,179,8,.15);color:var(--yellow)}
.status-badge.red{background:rgba(239,68,68,.15);color:var(--red)}
.fav-btn{background:none;border:none;cursor:pointer;padding:6px;opacity:.35;transition:all .15s;min-width:28px;min-height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;-webkit-tap-highlight-color:transparent}
.fav-btn:active{transform:scale(.85)}
.fav-btn.active{opacity:1;color:var(--cyan)}

.card-data{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:6px}
.data-item{text-align:center}
.data-label{font-size:.55rem;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px}
.data-value{font-size:.95rem;font-weight:700}
.data-unit{font-size:.6rem;color:var(--muted);font-weight:500}
.wind-arrow{display:inline-block;transition:transform .3s}

/* Forecast strip — momentum scroll */
.card-forecast{display:flex;gap:3px;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none;padding:3px 0;-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity}
.card-forecast::-webkit-scrollbar{display:none}
.fc-hour{flex:0 0 auto;text-align:center;padding:3px 5px;border-radius:6px;background:var(--bg);min-width:38px;scroll-snap-align:start}
.fc-hour .fc-time{font-size:.5rem;color:var(--dim);margin-bottom:1px}
.fc-hour .fc-wind{font-size:.7rem;font-weight:700}
.fc-hour .fc-arrow{font-size:.6rem;color:var(--dim)}
.fc-hour.fc-green .fc-wind{color:var(--green)}
.fc-hour.fc-yellow .fc-wind{color:var(--yellow)}
.fc-hour.fc-red .fc-wind{color:var(--red)}

/* Expanded card detail */
.card-detail{display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--bg3)}
.spot-card.expanded .card-detail{display:block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.detail-item{background:var(--bg);border-radius:var(--radius-sm);padding:8px;text-align:center}
.detail-item .data-label{margin-bottom:3px}
.detail-item .data-value{font-size:1.05rem}
.chart-wrap{height:150px;position:relative;margin-top:6px}


/* 7-day forecast in spot cards */
.fc-days{margin-bottom:8px}
.fc-day-row{margin-bottom:6px}
.fc-day-label{font-size:.55rem;color:var(--cyan);font-weight:600;text-transform:uppercase;margin-bottom:3px}
.fc-day-hours{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.fc-day-hours::-webkit-scrollbar{display:none}
.fc-day-item{flex:0 0 auto;text-align:center;min-width:30px;padding:3px 2px;border-radius:5px;background:var(--bg)}
.fc-day-item .fc-time{font-size:.45rem;color:var(--dim)}
.fc-day-item .fc-wind{font-size:.65rem;font-weight:700}
.fc-day-item .fc-arrow{font-size:.5rem;color:var(--dim)}
.fc-day-item.dg .fc-wind{color:var(--green)}
.fc-day-item.dy .fc-wind{color:var(--yellow)}
.fc-day-item.dr .fc-wind{color:var(--red)}
.fc-day-item.fc-rain{background:rgba(59,130,246,.2)}
.fc-day-item.fc-rain .fc-time{color:#3b82f6}
.fc-day-item.fc-cold .fc-time{color:#94a3b8}
.fc-day-summary{display:flex;align-items:center;gap:6px;font-size:.6rem;color:var(--muted);margin-top:2px}
.fc-day-summary .best{color:var(--green);font-weight:700}

/* Best moment + week score */
.best-moment{font-size:.7rem;padding:6px 10px;border-radius:8px;margin-bottom:6px;display:flex;align-items:center;gap:6px;line-height:1.3}
.best-moment.has-window{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);color:var(--green)}
.best-moment.no-window{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);color:var(--red)}
.best-moment .bm-icon{font-size:.85rem;flex-shrink:0}
.best-moment .bm-text{flex:1}
.best-moment .bm-when{font-weight:700}
.week-dots{display:flex;gap:3px;margin-left:auto}
.week-dot{width:8px;height:8px;border-radius:50%;background:var(--bg3)}
.week-dot.wd-green{background:var(--green)}
.week-dot.wd-yellow{background:var(--yellow)}
.week-dot.wd-red{background:var(--red)}

/* Empty states */
.empty-state{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-state svg{display:block;margin:0 auto}
.empty-state p{font-size:.82rem;line-height:1.5}


/* Notification permission banner */
.notif-banner{background:linear-gradient(135deg,rgba(6,182,212,.08),rgba(249,115,22,.08));border:1px solid rgba(6,182,212,.3);border-radius:var(--radius);padding:12px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.notif-banner p{font-size:.75rem;flex:1;line-height:1.4}
.notif-banner .btn-sm{background:var(--cyan);color:var(--bg);border:none;font-family:inherit;font-size:.72rem;font-weight:600;padding:8px 14px;border-radius:8px;cursor:pointer;white-space:nowrap}

/* Updated timestamp */
.updated{text-align:center;font-size:.6rem;color:var(--dim);padding:6px;margin-top:2px}

/* Loading */
.loading{text-align:center;padding:48px 20px;color:var(--muted)}
.loading .spinner{width:32px;height:32px;border:2.5px solid var(--bg3);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
.load-progress{font-size:.7rem;color:var(--cyan);font-weight:600;margin-top:6px}

/* ====== HERO CARD ====== */
.hero-card{border-radius:16px;padding:20px 16px;margin-bottom:10px;position:relative;overflow:hidden;min-height:80px}
.hero-loading{display:flex;align-items:center;justify-content:center;height:80px}
.hero-card.go{background:linear-gradient(135deg,rgba(34,197,94,.15),rgba(6,182,212,.1));border:1px solid rgba(34,197,94,.25)}
.hero-card.maybe{background:linear-gradient(135deg,rgba(234,179,8,.12),rgba(249,115,22,.08));border:1px solid rgba(234,179,8,.2)}
.hero-card.nogo{background:linear-gradient(135deg,rgba(239,68,68,.1),rgba(148,163,184,.05));border:1px solid rgba(239,68,68,.15)}
.hero-card.go::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(34,197,94,.06) 0%,transparent 60%);animation:heroPulse 4s ease-in-out infinite}
@keyframes heroPulse{0%,100%{opacity:.5;transform:scale(.9)}50%{opacity:1;transform:scale(1.1)}}

.hero-status{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.hero-card.go .hero-status{color:var(--green)}
.hero-card.maybe .hero-status{color:var(--yellow)}
.hero-card.nogo .hero-status{color:var(--red)}
.hero-status .hero-live{width:6px;height:6px;border-radius:50%;animation:livePulse 2s ease-in-out infinite}
.hero-card.go .hero-live{background:var(--green)}
.hero-card.maybe .hero-live{background:var(--yellow)}
.hero-card.nogo .hero-live{background:var(--red)}
@keyframes livePulse{0%,100%{opacity:1;box-shadow:0 0 0 0 currentColor}50%{opacity:.7;box-shadow:0 0 0 4px transparent}}

.hero-main{display:flex;align-items:center;gap:14px;margin-bottom:8px}
.hero-wind{font-size:2.8rem;font-weight:800;line-height:1;letter-spacing:-2px}
.hero-card.go .hero-wind{color:var(--green)}
.hero-card.maybe .hero-wind{color:var(--yellow)}
.hero-card.nogo .hero-wind{color:var(--text)}
.hero-unit{font-size:.7rem;color:var(--muted);font-weight:500}
.hero-info{flex:1}
.hero-spot{font-size:1rem;font-weight:700;margin-bottom:2px}
.hero-meta{font-size:.68rem;color:var(--muted);line-height:1.4}
.hero-dir{display:inline-flex;align-items:center;gap:3px}
.hero-dir .wind-arrow{font-size:1rem;transition:transform .5s}

.hero-bottom{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.hero-window{font-size:.68rem;padding:5px 10px;border-radius:8px;background:rgba(255,255,255,.05);display:inline-flex;align-items:center;gap:5px}
.hero-card.go .hero-window{color:var(--green)}
.hero-card.maybe .hero-window{color:var(--yellow)}
.hero-gear{font-size:.68rem;padding:5px 10px;border-radius:8px;background:rgba(6,182,212,.1);color:var(--cyan);display:inline-flex;align-items:center;gap:5px}
.hero-share{background:none;border:1px solid var(--bg3);color:var(--muted);font-family:inherit;font-size:.68rem;padding:5px 10px;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;margin-left:auto;transition:all .15s}
.hero-share:active{background:var(--cyan-glow);color:var(--cyan);transform:scale(.95)}
.hero-countdown{font-size:.68rem;padding:5px 10px;border-radius:8px;background:rgba(234,179,8,.1);color:var(--yellow);display:inline-flex;align-items:center;gap:5px;font-variant-numeric:tabular-nums}

/* Session timeline */
.session-timeline{display:flex;gap:2px;margin-top:10px;height:20px;border-radius:6px;overflow:hidden;background:var(--bg)}
.st-block{flex:1;position:relative;transition:all .2s;min-width:0}
.st-block.st-go{background:rgba(34,197,94,.35)}
.st-block.st-maybe{background:rgba(234,179,8,.2)}
.st-block.st-no{background:rgba(148,163,184,.06)}
.st-block.st-rain{background:rgba(59,130,246,.2)}
.st-block.st-now{outline:2px solid var(--cyan);outline-offset:-1px;border-radius:3px;z-index:1}
.st-block .st-label{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);font-size:.45rem;color:var(--dim);white-space:nowrap}
.st-block .st-val{font-size:.5rem;font-weight:700;color:var(--text);text-align:center;line-height:20px;opacity:.8}

/* ====== WEEK GRID ====== */
.week-grid{margin-bottom:10px;background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);overflow:hidden}
.wg-header{display:flex;border-bottom:1px solid var(--bg3)}
.wg-header .wg-label{flex:0 0 100px;padding:6px 8px;font-size:.55rem;font-weight:600;color:var(--dim);text-transform:uppercase}
.wg-header .wg-day{flex:1;text-align:center;padding:6px 2px;font-size:.55rem;font-weight:600;color:var(--muted)}
.wg-header .wg-day.today{color:var(--cyan)}
.wg-row{display:flex;border-bottom:1px solid rgba(51,65,85,.4);transition:background .15s}
.wg-row:last-child{border-bottom:none}
.wg-row:active{background:rgba(6,182,212,.05)}
.wg-row .wg-label{flex:0 0 100px;padding:5px 8px;font-size:.62rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:3px}
.wg-km{font-size:.45rem;color:var(--dim);font-weight:400}
.wg-row .wg-cell{flex:1;display:flex;align-items:center;justify-content:center;padding:5px 1px;position:relative}
.wg-dot{width:10px;height:10px;border-radius:50%;transition:transform .2s}
.wg-dot.wg-go{background:var(--green);box-shadow:0 0 6px rgba(34,197,94,.4)}
.wg-dot.wg-maybe{background:var(--yellow);box-shadow:0 0 4px rgba(234,179,8,.3)}
.wg-dot.wg-no{background:var(--bg3)}
.wg-dot.wg-rain{outline:2px solid #3b82f6;outline-offset:1px}
.wg-dot.wg-cold{outline:2px solid #94a3b8;outline-offset:1px}
.wg-dot.wg-rain.wg-cold{outline-color:#60a5fa}
.wg-cell:hover .wg-dot{transform:scale(1.4)}
.wg-peak{font-size:.5rem;color:var(--dim);position:absolute;bottom:1px}

/* Search mini */
.spot-list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:0 2px}
.spot-list-header>span{font-size:.7rem;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.search-wrap-mini{display:flex;align-items:center;gap:4px;background:var(--bg2);border:1px solid var(--bg3);border-radius:8px;padding:4px 8px}
.search-wrap-mini svg{color:var(--dim);flex-shrink:0}
.search-wrap-mini input{background:none;border:none;color:var(--text);font-family:inherit;font-size:.72rem;outline:none;width:80px}
.search-wrap-mini input::placeholder{color:var(--dim)}

/* Distance badge */
.dist-badge{font-size:.55rem;color:var(--dim);background:var(--bg);padding:2px 6px;border-radius:10px;margin-left:4px}

/* Thermal risk badge */
.thermal-badge{display:inline-flex;align-items:center;gap:4px;font-size:.6rem;font-weight:600;padding:3px 8px;border-radius:6px;margin-top:4px}
.thermal-badge.thermal-ok{background:rgba(34,197,94,.1);color:var(--green)}
.thermal-badge.thermal-warn{background:rgba(234,179,8,.12);color:var(--yellow)}
.thermal-badge.thermal-bad{background:rgba(239,68,68,.1);color:var(--red)}
.thermal-badge svg{flex-shrink:0}

/* Rain overlay on card */
.rain-overlay{position:absolute;top:0;right:0;padding:4px 8px;border-radius:0 var(--radius) 0 8px;font-size:.6rem;font-weight:700;display:flex;align-items:center;gap:3px}
.rain-overlay.rain-heavy{background:rgba(59,130,246,.2);color:#60a5fa}
.rain-overlay.rain-light{background:rgba(59,130,246,.1);color:#93c5fd}
.spot-card{position:relative;overflow:hidden}

/* Tide info */
.tide-info{display:flex;align-items:center;gap:4px;font-size:.6rem;color:var(--muted);margin-top:4px}
.tide-info svg{flex-shrink:0}

/* Suggest spot — add button */
.suggest-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:12px;margin-top:10px;background:var(--bg2);border:1px dashed var(--bg3);border-radius:var(--radius);color:var(--muted);font-family:inherit;font-size:.75rem;cursor:pointer;transition:all .15s}
.suggest-btn:active{background:var(--cyan-glow);color:var(--cyan);border-color:var(--cyan)}

/* Fullscreen map picker */
.map-picker{position:fixed;inset:0;z-index:300;background:var(--bg);display:flex;flex-direction:column;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.map-picker-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;padding-top:calc(12px + var(--safe-top));background:rgba(15,23,42,.95);backdrop-filter:blur(16px);z-index:10;border-bottom:1px solid var(--bg3)}
.map-picker-header h3{font-size:.95rem;font-weight:700}
.map-picker-close{background:none;border:none;color:var(--muted);cursor:pointer;padding:8px;border-radius:8px;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center}
.map-picker-close:active{color:var(--text);background:var(--bg3)}
.map-picker-body{flex:1;position:relative}
.map-picker-body .leaflet-container{height:100%;width:100%;background:var(--bg)}
.map-picker-hint{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:1000;background:rgba(15,23,42,.9);backdrop-filter:blur(8px);color:var(--text);font-size:.75rem;padding:8px 16px;border-radius:20px;pointer-events:none;transition:opacity .3s;border:1px solid var(--bg3)}
.map-picker-hint.hidden{opacity:0}
.map-picker-footer{padding:12px 16px;padding-bottom:calc(12px + var(--safe-bottom));background:rgba(15,23,42,.95);backdrop-filter:blur(16px);border-top:1px solid var(--bg3);display:none;animation:slideUp .3s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.map-picker-footer.visible{display:block}
.map-picker-spot-input{display:flex;gap:8px;align-items:center;margin-bottom:10px}

.map-picker-save:active{transform:scale(.97);opacity:.9}

/* Pull to refresh */
.ptr-indicator{text-align:center;height:0;overflow:hidden;transition:height .2s;color:var(--cyan);font-size:.7rem;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px}

/* Bottom safe area padding */

// ========== STATE ==========
let spotData = {};       // {spotId: {current, hourly, marine}}
let userLat = null, userLon = null;
let favorites = JSON.parse(localStorage.getItem('ks_favs') || '[]');
let charts = {};

// ========== TABS ==========
function showTab(tab, btn) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

  btn.classList.add('active');
  if (tab === 'favs') renderFavorites();
}

// ========== GEOLOCATION ==========
function getLocation() {
  return new Promise(resolve => {
    if (!navigator.geolocation) { document.getElementById('locationBadge').textContent = t('chile'); resolve(); return; }
    navigator.geolocation.getCurrentPosition(
      pos => { userLat = pos.coords.latitude; userLon = pos.coords.longitude; updateLocationBadge(); resolve(); },
      () => { document.getElementById('locationBadge').textContent = t('chile'); resolve(); },
      { timeout: 5000, maximumAge: 300000 }
    );
  });
}

function updateLocationBadge() {
  if (!userLat) return;
  const nearest = findNearest();
  document.getElementById('locationBadge').textContent = nearest ? `${t('nearTo')} ${nearest.name}` : t('chile');
}

function findNearest() {
  if (!userLat) return null;
  let min = Infinity, best = null;
  SPOTS.forEach(s => { const d = haversine(userLat, userLon, s.lat, s.lon); if (d < min) { min = d; best = s; } });
  return best;
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function distanceToSpot(spot) {
  if (!userLat) return null;
  return Math.round(haversine(userLat, userLon, spot.lat, spot.lon));
}

// ========== DATA FETCHING ==========
const CACHE_TTL = 15 * 60 * 1000; // 15 min

async function fetchWithRetry(url, retries = 3) {
  for (let attempt = 0; attempt < retries; attempt++) {
    try {
      const r = await fetch(url);
      if (r.ok) return r.json();
      if (r.status === 429 && attempt < retries - 1) {
        await new Promise(ok => setTimeout(ok, 1000 * (attempt + 1)));
        continue;
      }
    } catch(e) {}
    return null;
  }
  return null;
}

async function fetchAllSpots() {
  const cached = localStorage.getItem('ks_data');
  const cachedTime = parseInt(localStorage.getItem('ks_time') || '0');
  if (cached && Date.now() - cachedTime < CACHE_TTL) {
    spotData = JSON.parse(cached);
    renderSpots();
    updateTimestamp(cachedTime);
    return;
  }

  // Only fetch nearby spots (200km) + favorites — not all 29
  let spotsToFetch = [...SPOTS];
  if (userLat) {
    const nearby = SPOTS.filter(s => haversine(userLat, userLon, s.lat, s.lon) <= NEARBY_RADIUS);
    const favOnly = SPOTS.filter(s => favorites.includes(s.id) && !nearby.includes(s));
    spotsToFetch = [...nearby, ...favOnly];
    spotsToFetch.sort((a, b) => haversine(userLat, userLon, a.lat, a.lon) - haversine(userLat, userLon, b.lat, b.lon));
  }

  const total = spotsToFetch.length;
  document.getElementById('spotList').innerHTML = `<div class="loading"><div class="spinner"></div>${t('loading')} ${total} spots<div class="load-progress" id="loadProgress">0/${total}</div></div>`;

  const prog = document.getElementById('loadProgress');
  const BATCH = userLat ? 2 : 3; // smaller batches when nearby (fewer spots), larger when all
  for (let i = 0; i < spotsToFetch.length; i += BATCH) {
    const batch = spotsToFetch.slice(i, i + BATCH);
    const results = await Promise.allSettled(batch.map(async spot => {
      const [wind, marine] = await Promise.all([
        fetchWithRetry(`https://api.open-meteo.com/v1/forecast?latitude=${spot.lat}&longitude=${spot.lon}&current=wind_speed_10m,wind_direction_10m,wind_gusts_10m,temperature_2m,weather_code,precipitation&hourly=wind_speed_10m,wind_direction_10m,wind_gusts_10m,temperature_2m,precipitation,weather_code&forecast_days=7&wind_speed_unit=kn&timezone=America/Santiago`),
        fetchWithRetry(`https://marine-api.open-meteo.com/v1/marine?latitude=${spot.lat}&longitude=${spot.lon}&current=wave_height,wave_period,wave_direction,sea_surface_temperature&hourly=wave_height&forecast_days=7&timezone=America/Santiago`)
      ]);
      return { id: spot.id, wind, marine };
    }));
    results.forEach(r => { if (r.status === 'fulfilled' && r.value.wind && !r.value.wind.error) spotData[r.value.id] = r.value; });
    if (prog) prog.textContent = `${Math.min(i + BATCH, total)}/${total}`;
    if (i + BATCH < spotsToFetch.length) await new Promise(ok => setTimeout(ok, 400));
  }

  const now = Date.now();
  localStorage.setItem('ks_data', JSON.stringify(spotData));
  localStorage.setItem('ks_time', String(now));
  renderSpots();
  updateTimestamp(now);
  checkAlerts();
}

function updateTimestamp(time) {
  const d = new Date(time);
  document.getElementById('updatedTime').textContent = `Actualizado: ${d.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'})}`;
}

async function refreshData() {
  localStorage.removeItem('ks_data');
  localStorage.removeItem('ks_time');
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  await fetchAllSpots();
  btn.classList.remove('spinning');
}

// ========== SCORING ==========
function getSpotStatus(spot) {
  const d = spotData[spot.id];
  if (!d || !d.wind || !d.wind.current) return { status: 'unknown', color: 'red', label: t('noData'), warn: '' };

  const wind = d.wind.current.wind_speed_10m;
  const gust = d.wind.current.wind_gusts_10m;
  const dir = d.wind.current.wind_direction_10m;
  const rain = d.wind.current.precipitation || 0;
  const temp = d.wind.current.temperature_2m;
  const wcode = d.wind.current.weather_code || 0;

  // Rain: >2mm/h = no go, >0.5mm = warning
  const heavyRain = rain > 2 || wcode >= 63; // 63+ = heavy rain/thunderstorm
  const lightRain = rain > 0.5 || (wcode >= 51 && wcode < 63);
  // Cold: <10°C warning
  const cold = temp != null && temp < 10;

  if (heavyRain) return { status: 'red', color: 'red', label: t('rain'), warn: `${rain.toFixed(1)}mm/h` };

  const dirOk = isDirectionFavorable(dir, spot.idealDir);
  const gustOk = gust < 40;
  const gustWarn = gust >= 35;

  let warn = '';
  if (lightRain) warn = t('drizzle');
  if (cold) warn += (warn ? ' + ' : '') + `${Math.round(temp)}°C`;

  if (wind >= spot.windMin && wind <= spot.windMax && dirOk && gustOk && !gustWarn && !lightRain) {
    // Check thermal risk — if bad, downgrade to yellow
    const thermal = getThermalRisk(spot);
    if (thermal?.level === 'bad') {
      return { status: 'yellow', color: 'yellow', label: t('thermal'), warn: thermal.msg };
    }
    return { status: 'green', color: 'green', label: t('sendIt'), warn };
  }
  if ((wind >= 8 && wind < spot.windMin) || (wind > spot.windMax && wind <= 35) || !dirOk || gustWarn || lightRain) {
    if (wind >= 8 && wind <= 35) return { status: 'yellow', color: 'yellow', label: lightRain ? t('drizzle') : t('maybe'), warn };
  }
  return { status: 'red', color: 'red', label: t('noGo'), warn };
}

function isDirectionFavorable(actual, idealDirs) {
  return idealDirs.some(ideal => {
    let diff = Math.abs(actual - ideal);
    if (diff > 180) diff = 360 - diff;
    return diff <= 45;
  });
}

function getStatusScore(status) {
  return status === 'green' ? 0 : status === 'yellow' ? 1 : 2;
}

// ========== BEST MOMENT ANALYSIS ==========
function analyzeBestMoment(spot) {
  const d = spotData[spot.id];
  if (!d?.wind?.hourly) return { bestWindow: null, weekDots: [], goodDays: 0, nextGoodIdx: -1 };

  const times = d.wind.hourly.time;
  const speeds = d.wind.hourly.wind_speed_10m;
  const dirs = d.wind.hourly.wind_direction_10m;
  const now = new Date();

  // Find best windows (consecutive good hours 10-20h)
  let bestWindow = null;
  let bestScore = 0;
  let currentWindow = null;

  // Week dots: one per day, best status of navigable hours
  const dayMap = {};

  for (let i = 0; i < times.length; i++) {
    const dt = new Date(times[i]);
    const hr = dt.getHours();
    if (hr < 10 || hr > 20) continue;
    if (dt < now) continue;

    const spd = speeds[i];
    const dir = dirs[i];
    const rain = d.wind.hourly.precipitation?.[i] || 0;
    const temp = d.wind.hourly.temperature_2m?.[i];
    const noRain = rain < 2;
    const isGood = spd >= spot.windMin && spd <= spot.windMax && isDirectionFavorable(dir, spot.idealDir) && noRain;
    const isMaybe = spd >= 8 && spd <= 35;

    // Day dot tracking
    const dayKey = dt.toDateString();
    if (!dayMap[dayKey]) dayMap[dayKey] = { date: dt, best: 'red', rain: false, cold: false };
    if (isGood) dayMap[dayKey].best = 'green';
    else if (isMaybe && dayMap[dayKey].best !== 'green') dayMap[dayKey].best = 'yellow';
    if (rain > 0.5) dayMap[dayKey].rain = true;
    if (temp != null && temp < 10) dayMap[dayKey].cold = true;

    // Best window tracking
    if (isGood) {
      if (!currentWindow) currentWindow = { start: dt, end: dt, startIdx: i, avgSpeed: spd, count: 1 };
      else { currentWindow.end = dt; currentWindow.avgSpeed += spd; currentWindow.count++; }
    } else {
      if (currentWindow) {
        currentWindow.avgSpeed /= currentWindow.count;
        const score = currentWindow.count * currentWindow.avgSpeed;
        if (score > bestScore) { bestScore = score; bestWindow = { ...currentWindow }; }
      }
      currentWindow = null;
    }
  }
  // Close last window
  if (currentWindow) {
    currentWindow.avgSpeed /= currentWindow.count;
    const score = currentWindow.count * currentWindow.avgSpeed;
    if (score > bestScore) { bestScore = score; bestWindow = { ...currentWindow }; }
  }

  const weekDots = Object.values(dayMap).slice(0, 7);
  const goodDays = weekDots.filter(d => d.best === 'green').length;

  // Format best window
  if (bestWindow) {
    const isToday = bestWindow.start.toDateString() === now.toDateString();
    const isTomorrow = bestWindow.start.toDateString() === new Date(now.getTime() + 86400000).toDateString();
    const dayLabel = isToday ? t('today') : isTomorrow ? t('tomorrow') : bestWindow.start.toLocaleDateString(lang==='en'?'en-US':'es-CL', { weekday: 'short', day: 'numeric' });
    const startH = bestWindow.start.getHours();
    const endH = bestWindow.end.getHours() + 1;
    const dir = dirs[bestWindow.startIdx];
    bestWindow.label = `${dayLabel} ${startH}-${endH}h`;
    bestWindow.detail = `${Math.round(bestWindow.avgSpeed)}kn ${degToCompass(dir)}`;
    bestWindow.hoursFromNow = Math.round((bestWindow.start - now) / 3600000);
  }

  return { bestWindow, weekDots, goodDays, nextGoodIdx: bestWindow?.startIdx ?? -1 };
}

// ========== NEARBY SPOTS ==========
const NEARBY_RADIUS = 200; // km

function getNearbySpots() {
  let nearby = [...SPOTS];
  if (userLat) {
    nearby = nearby.map(s => ({ ...s, dist: haversine(userLat, userLon, s.lat, s.lon) }));
    nearby = nearby.filter(s => s.dist <= NEARBY_RADIUS);
    nearby.sort((a, b) => a.dist - b.dist);
  }
  return nearby.slice(0, 12); // max 12 nearby
}

// ========== GEAR RECOMMENDATION ==========
function getGear(windKn) {
  if (windKn >= 30) return { kite: '5-7m', board: 'Directional', icon: 'S' };
  if (windKn >= 24) return { kite: '7-9m', board: 'TT / Surf', icon: 'M' };
  if (windKn >= 18) return { kite: '9-12m', board: 'TT / Foil', icon: 'M' };
  if (windKn >= 14) return { kite: '12-14m', board: 'TT / Foil', icon: 'L' };
  if (windKn >= 10) return { kite: '14-17m', board: 'Foil', icon: 'XL' };
  return { kite: 'Foil only', board: 'Foil', icon: '—' };
}

// ========== HERO CARD ==========
let _countdownTimer = null;

function renderHero() {
  const el = document.getElementById('heroCard');
  const nearby = getNearbySpots();
  if (!nearby.length) { el.innerHTML = '<div class="hero-loading"><div class="spinner"></div></div>'; return; }

  // Find best spot: green first (nearest), then yellow (nearest)
  let best = nearby.find(s => getSpotStatus(s).status === 'green');
  if (!best) best = nearby.find(s => getSpotStatus(s).status === 'yellow');
  if (!best) best = nearby[0];

  const st = getSpotStatus(best);
  const d = spotData[best.id];
  const wind = d?.wind?.current?.wind_speed_10m ?? 0;
  const dir = d?.wind?.current?.wind_direction_10m ?? 0;
  const gust = d?.wind?.current?.wind_gusts_10m ?? 0;
  const wave = d?.marine?.current?.wave_height;
  const analysis = analyzeBestMoment(best);
  const dist = best.dist ? Math.round(best.dist) : null;

  const rain = d?.wind?.current?.precipitation || 0;
  const temp = d?.wind?.current?.temperature_2m;
  const cls = st.status === 'green' ? 'go' : st.status === 'yellow' ? 'maybe' : 'nogo';
  const msg = st.label === t('rain') ? t('rain') : st.status === 'green' ? t('sendIt') : st.status === 'yellow' ? t('canDo') : t('wait');

  // Gear
  const gear = getGear(wind);

  // Window + countdown
  let windowHtml = '';
  let countdownHtml = '';
  if (analysis.bestWindow) {
    const bw = analysis.bestWindow;
    windowHtml = `<div class="hero-window"><svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><path d="M8 4v4l3 2"/></svg>${bw.label} · ${bw.detail}</div>`;
    if (bw.hoursFromNow > 0) {
      countdownHtml = `<div class="hero-countdown" id="heroCountdown" data-target="${bw.start.toISOString()}"><svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 3v5l3 2"/><circle cx="8" cy="8" r="6.5"/></svg>en ${formatCountdown(bw.start)}</div>`;
    }
  }

  // Session timeline (today 10-20h)
  let timelineHtml = buildSessionTimeline(best, d);

  el.className = 'hero-card ' + cls;
  el.innerHTML = `
    <div class="hero-status"><span class="hero-live"></span>${msg}</div>
    <div class="hero-main">
      <div><div class="hero-wind">${Math.round(wind)}</div><div class="hero-unit">kn</div></div>
      <div class="hero-info">
        <div class="hero-spot">${best.name}</div>
        <div class="hero-meta">
          <span class="hero-dir"><span class="wind-arrow" style="transform:rotate(${dir+180}deg)">&#8593;</span> ${degToCompass(dir)}</span>
          · ${t('gust')} ${Math.round(gust)}kn
          ${wave != null ? '· '+t('waves')+' '+wave.toFixed(1)+'m' : ''}
          ${dist != null ? '· '+dist+'km' : ''}
          ${rain > 0.5 ? '· <span style="color:#3b82f6">'+rain.toFixed(1)+'mm</span>' : ''}
          ${temp != null ? '· '+Math.round(temp)+'°C' : ''}
          ${d?.marine?.current?.sea_surface_temperature != null ? '· Mar '+Math.round(d.marine.current.sea_surface_temperature)+'°C' : ''}
        </div>
      </div>
    </div>
    <div class="hero-bottom">
      ${windowHtml}${countdownHtml}
      <div class="hero-gear"><svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 14C2 8 8 2 14 2"/><circle cx="5" cy="11" r="2"/></svg>${gear.kite}</div>
      <button class="hero-share" onclick="shareSpot('${best.id}')"><svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 8h8M12 8l-3-3M12 8l-3 3"/></svg>${t('send')}</button>
    </div>
    ${thermalBadgeHtml(best)}
    ${timelineHtml}`;

  // Start countdown updates
  if (_countdownTimer) clearInterval(_countdownTimer);
  if (analysis.bestWindow?.hoursFromNow > 0) {
    _countdownTimer = setInterval(() => {
      const cdEl = document.getElementById('heroCountdown');
      if (!cdEl) { clearInterval(_countdownTimer); return; }
      const target = new Date(cdEl.dataset.target);
      cdEl.querySelector('svg').nextSibling.textContent = 'en ' + formatCountdown(target);
    }, 60000);
  }
}

function formatCountdown(target) {
  const diff = target - new Date();
  if (diff <= 0) return lang==='en'?'now':'ahora';
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  if (h > 24) return Math.floor(h/24) + 'd ' + (h%24) + 'h';
  if (h > 0) return h + 'h ' + m + t('min');
  return m + t('min');
}

function buildSessionTimeline(spot, d) {
  if (!d?.wind?.hourly) return '';
  const now = new Date();
  const today = now.toDateString();
  const times = d.wind.hourly.time;
  const blocks = [];
  for (let i = 0; i < times.length; i++) {
    const dt = new Date(times[i]);
    if (dt.toDateString() !== today) { if (blocks.length > 0) break; continue; }
    const hr = dt.getHours();
    if (hr < 10 || hr > 20) continue;
    const w = d.wind.hourly.wind_speed_10m[i];
    const rn = d.wind.hourly.precipitation?.[i] || 0;
    const isNow = hr === now.getHours();
    const good = w >= spot.windMin && w <= spot.windMax && rn < 2;
    const maybe = w >= 8 && w <= 35 && rn < 2;
    const rain = rn >= 2;
    let cls = rain ? 'st-rain' : good ? 'st-go' : maybe ? 'st-maybe' : 'st-no';
    if (isNow) cls += ' st-now';
    const showLabel = hr % 3 === 1 || hr === 10 || hr === 20;
    blocks.push(`<div class="st-block ${cls}" title="${hr}h: ${Math.round(w)}kn"><div class="st-val">${Math.round(w)}</div>${showLabel ? '<div class="st-label">'+hr+'h</div>' : ''}</div>`);
  }
  if (!blocks.length) return '';
  return `<div class="session-timeline">${blocks.join('')}</div>`;
}

function shareSpot(spotId) {
  const spot = SPOTS.find(s => s.id === spotId);
  const d = spotData[spotId];
  const st = getSpotStatus(spot);
  const wind = d?.wind?.current?.wind_speed_10m ?? 0;
  const dir = d?.wind?.current?.wind_direction_10m ?? 0;
  const status = st.label;
  const text = `${spot.name}: ${Math.round(wind)}kn ${degToCompass(dir)} (${status}) — cussen.cl/wind`;
  if (navigator.share) {
    navigator.share({ title: 'KiteSpot', text }).catch(() => {});
  } else {
    navigator.clipboard?.writeText(text);
    const btn = document.querySelector('.hero-share');
    if (btn) { btn.textContent = t('copied'); setTimeout(() => { btn.innerHTML = '<svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 8h8M12 8l-3-3M12 8l-3 3"/></svg>'+t('send'); }, 2000); }
  }
}

// ========== WEEK GRID ==========
function renderWeekGrid() {
  const el = document.getElementById('weekGrid');
  const nearby = getNearbySpots();
  if (!nearby.length) { el.innerHTML = ''; return; }

  // Get day labels (next 7 days)
  const now = new Date();
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(now.getTime() + i * 86400000);
    days.push({
      date: d,
      label: i === 0 ? t('today') : d.toLocaleDateString(lang==='en'?'en-US':'es-CL', { weekday: 'short' }).slice(0,2),
      dateStr: d.toDateString(),
      isToday: i === 0
    });
  }

  // Header
  let html = '<div class="wg-header"><div class="wg-label">'+t('spot')+'</div>';
  days.forEach(d => { html += `<div class="wg-day ${d.isToday?'today':''}">${d.label}</div>`; });
  html += '</div>';

  // Rows
  nearby.forEach(spot => {
    const analysis = analyzeBestMoment(spot);
    const dotMap = {};
    analysis.weekDots.forEach(wd => { dotMap[wd.date.toDateString()] = wd; });

    // Get peak wind per day
    const peakMap = {};
    const sd = spotData[spot.id];
    if (sd?.wind?.hourly) {
      sd.wind.hourly.time.forEach((t, i) => {
        const dt = new Date(t);
        const hr = dt.getHours();
        if (hr < 10 || hr > 20) return;
        const key = dt.toDateString();
        const spd = sd.wind.hourly.wind_speed_10m[i];
        if (!peakMap[key] || spd > peakMap[key]) peakMap[key] = spd;
      });
    }

    const spotDist = spot.dist ? Math.round(spot.dist) : null;
    const distLabel = spotDist != null ? `<span class="wg-km">${spotDist}km</span>` : '';
    html += `<div class="wg-row" onclick="scrollToSpot('${spot.id}')"><div class="wg-label">${spot.name.split('(')[0].trim()}${distLabel}</div>`;
    days.forEach(d => {
      const dayData = dotMap[d.dateStr] || { best: 'red', rain: false, cold: false };
      const status = typeof dayData === 'string' ? dayData : dayData.best;
      const rain = dayData.rain || false;
      const cold = dayData.cold || false;
      const cls = (status === 'green' ? 'wg-go' : status === 'yellow' ? 'wg-maybe' : 'wg-no')
        + (rain ? ' wg-rain' : '') + (cold ? ' wg-cold' : '');
      const peak = peakMap[d.dateStr];
      html += `<div class="wg-cell"><div class="wg-dot ${cls}"></div>${peak?'<span class="wg-peak">'+Math.round(peak)+'</span>':''}</div>`;
    });
    html += '</div>';
  });

  el.innerHTML = html;
}

function scrollToSpot(spotId) {
  // Find the card in the active tab pane
  const activePane = document.querySelector('.tab-pane.active');
  const card = activePane?.querySelector('#card-' + spotId) || document.getElementById('card-' + spotId);
  if (card) {
    document.querySelectorAll('.spot-card.expanded').forEach(c => c.classList.remove('expanded'));
    card.classList.add('expanded');
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    const canvas = card.querySelector('canvas');
    if (canvas) renderChart(spotId, canvas);
  }
}

// ========== RENDERING ==========
function renderSpots() {
  // Render hero + grid
  renderHero();
  renderWeekGrid();

  // Render spot list — nearby only, sorted by distance
  const list = document.getElementById('spotList');
  let sorted = getNearbySpots();

  const searchTerm = document.getElementById('searchInput')?.value?.toLowerCase() || '';
  if (searchTerm) {
    sorted = SPOTS.filter(s => s.name.toLowerCase().includes(searchTerm) || s.region.toLowerCase().includes(searchTerm));
    // Fetch data on-demand for spots not yet loaded
    const toFetch = sorted.filter(s => !spotData[s.id]);
    if (toFetch.length) {
      fetchSpotsOnDemand(toFetch);
    }
  }

  if (!sorted.length && !searchTerm) {
    list.innerHTML = `<div class="empty-state"><p>${lang==='en'?'No nearby spots. Enable your location.':'No hay spots cercanos. Activa tu ubicacion.'}</p></div>`;
    return;
  }

  list.innerHTML = sorted.map((spot, i) => buildSpotCard(spot, i)).join('');
}

function build7DayForecast(spot, d) {
  if (!d?.wind?.hourly) return '';
  const times = d.wind.hourly.time;
  const now = new Date();
  let html = '<div class="fc-days">';
  let lastDay = '';
  let dayHtml = '';
  let dayCount = 0;

  for (let i = 0; i < times.length && dayCount < 7; i++) {
    const dt = new Date(times[i]);
    const hr = dt.getHours();
    if (hr < 10 || hr > 20) continue;
    if (dt < now && dt.toDateString() === now.toDateString() && hr < now.getHours()) continue;

    const dayStr = dt.toLocaleDateString(lang==='en'?'en-US':'es-CL', { weekday: 'short', day: 'numeric', month: 'short' });
    if (dayStr !== lastDay) {
      if (dayHtml) { html += `<div class="fc-day-hours">${dayHtml}</div></div>`; }
      lastDay = dayStr;
      dayHtml = '';
      dayCount++;
      const isToday = dt.toDateString() === now.toDateString();
      const label = isToday ? t('today') : dayStr;
      html += `<div class="fc-day-row"><div class="fc-day-label">${label}</div>`;
    }

    const w = d.wind.hourly.wind_speed_10m[i];
    const dd = d.wind.hourly.wind_direction_10m[i];
    const rn = d.wind.hourly.precipitation?.[i] || 0;
    const tp = d.wind.hourly.temperature_2m?.[i];
    const noRn = rn < 2;
    const cls = (w >= spot.windMin && w <= spot.windMax && noRn) ? 'dg' : w >= 8 ? 'dy' : 'dr';
    const extraCls = (rn > 0.5 ? ' fc-rain' : '') + (tp != null && tp < 10 ? ' fc-cold' : '');
    dayHtml += `<div class="fc-day-item ${cls}${extraCls}"><div class="fc-time">${hr}h</div><div class="fc-wind">${Math.round(w)}</div><div class="fc-arrow" style="transform:rotate(${dd+180}deg)">&#8593;</div></div>`;
  }
  if (dayHtml) html += `<div class="fc-day-hours">${dayHtml}</div></div>`;
  html += '</div>';
  return html;
}

function toggleDetail(spotId, el) {
  const card = el || document.getElementById('card-' + spotId);
  if (!card) return;
  const wasExpanded = card.classList.contains('expanded');
  document.querySelectorAll('.spot-card.expanded').forEach(c => c.classList.remove('expanded'));
  if (!wasExpanded) {
    card.classList.add('expanded');
    const canvas = card.querySelector('canvas');
    if (canvas) renderChart(spotId, canvas);
  }
}

let _chartJsLoaded = false;
function loadChartJs() {
  if (_chartJsLoaded) return Promise.resolve();
  return new Promise(resolve => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js';
    s.onload = () => { _chartJsLoaded = true; resolve(); };
    document.head.appendChild(s);
  });
}

async function renderChart(spotId, canvasEl) {
  const d = spotData[spotId];
  if (!d?.wind?.hourly) return;
  const canvas = canvasEl || document.getElementById('chart-' + spotId);
  if (!canvas) return;
  const chartKey = canvas.id || spotId;
  if (charts[chartKey]) { charts[chartKey].destroy(); delete charts[chartKey]; }
  await loadChartJs();

  const now = new Date();
  const times = d.wind.hourly.time;
  const startIdx = times.findIndex(t => new Date(t) >= now);
  if (startIdx < 0) return;
  const end = Math.min(startIdx + 24, times.length);

  const labels = [];
  const windData = [];
  const gustData = [];
  const rainData = [];
  const tempData = [];
  for (let i = startIdx; i < end; i++) {
    labels.push(new Date(times[i]).getHours() + ':00');
    windData.push(Math.round(d.wind.hourly.wind_speed_10m[i]));
    gustData.push(Math.round(d.wind.hourly.wind_gusts_10m[i]));
    rainData.push(d.wind.hourly.precipitation?.[i] || 0);
    tempData.push(d.wind.hourly.temperature_2m?.[i] || null);
  }

  const spot = SPOTS.find(s => s.id === spotId);
  const hasRain = rainData.some(r => r > 0);

  charts[chartKey] = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Viento (kn)', data: windData, borderColor: '#06b6d4', backgroundColor: 'rgba(6,182,212,.1)', fill: true, tension: .3, pointRadius: 0, yAxisID: 'y' },
        { label: 'Rafaga (kn)', data: gustData, borderColor: '#f97316', backgroundColor: 'transparent', borderDash: [4,4], tension: .3, pointRadius: 0, yAxisID: 'y' },
        { label: 'Lluvia (mm)', data: rainData, type: 'bar', backgroundColor: 'rgba(59,130,246,.35)', borderColor: 'rgba(59,130,246,.6)', borderWidth: 1, borderRadius: 2, yAxisID: 'yRain', barPercentage: .6, hidden: !hasRain },
        { label: 'Temp (°C)', data: tempData, borderColor: '#94a3b8', backgroundColor: 'transparent', borderDash: [2,3], tension: .3, pointRadius: 0, borderWidth: 1, yAxisID: 'yTemp' }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#94a3b8', font: { size: 9, family: 'Inter' }, boxWidth: 12, padding: 8 } },
        tooltip: {
          backgroundColor: '#1e293b', titleColor: '#e2e8f0', bodyColor: '#94a3b8', borderColor: '#334155', borderWidth: 1,
          callbacks: { label: ctx => {
            if (ctx.dataset.label === 'Lluvia (mm)' && ctx.raw === 0) return null;
            return `${ctx.dataset.label}: ${ctx.raw}`;
          }}
        }
      },
      scales: {
        x: { ticks: { color: '#64748b', font: { size: 9 }, maxTicksLimit: 8 }, grid: { color: 'rgba(148,163,184,.06)' } },
        y: { position: 'left', ticks: { color: '#64748b', font: { size: 9 } }, grid: { color: 'rgba(148,163,184,.08)' }, suggestedMin: 0, title: { display: false } },
        yRain: { position: 'right', display: hasRain, ticks: { color: '#3b82f6', font: { size: 8 } }, grid: { display: false }, suggestedMin: 0, suggestedMax: Math.max(...rainData) * 2 || 5 },
        yTemp: { display: false, suggestedMin: 0 }
      }
    },
    plugins: [{
      id: 'idealZone',
      beforeDraw(chart) {
        if (!spot) return;
        const { ctx, chartArea: { left, right }, scales: { y } } = chart;
        const top = y.getPixelForValue(spot.windMax);
        const bottom = y.getPixelForValue(spot.windMin);
        ctx.save();
        ctx.fillStyle = 'rgba(34,197,94,.08)';
        ctx.fillRect(left, top, right - left, bottom - top);
        ctx.restore();
      }
    }]
  });
}

function degToCompass(deg) {
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(deg / 22.5) % 16];
}

// ========== THERMAL RISK ==========
function getThermalRisk(spot) {
  const d = spotData[spot.id];
  if (!d?.wind?.current || !d?.marine?.current) return null;
  const landTemp = d.wind.current.temperature_2m;
  const seaTemp = d.marine.current.sea_surface_temperature;
  if (landTemp == null || seaTemp == null) return null;
  const delta = landTemp - seaTemp;
  const wind = d.wind.current.wind_speed_10m || 0;
  // High delta + low wind = thermal turbulence at shore
  if (delta > 12 && wind < 15) return { level: 'bad', delta: Math.round(delta), msg: t('thermalBad'), landTemp: Math.round(landTemp), seaTemp: Math.round(seaTemp) };
  if (delta > 8 && wind < 18) return { level: 'warn', delta: Math.round(delta), msg: t('thermalWarn'), landTemp: Math.round(landTemp), seaTemp: Math.round(seaTemp) };
  return { level: 'ok', delta: Math.round(delta), msg: t('thermalOk'), landTemp: Math.round(landTemp), seaTemp: Math.round(seaTemp) };
}

function thermalBadgeHtml(spot) {
  const t = getThermalRisk(spot);
  if (!t) return '';
  const icon = t.level === 'ok' ? '<svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 8l3 3 5-6"/></svg>'
    : '<svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 4v5M8 11v1"/></svg>';
  return `<div class="thermal-badge thermal-${t.level}" title="Tierra ${t.landTemp}°C · Mar ${t.seaTemp}°C · Δ${t.delta}°C">${icon}${t.msg} <span style="opacity:.6">(Δ${t.delta}°C)</span></div>`;
}

// ========== RAIN OVERLAY ==========
function rainOverlayHtml(spot) {
  const d = spotData[spot.id];
  if (!d?.wind?.current) return '';
  const rain = d.wind.current.precipitation || 0;
  if (rain < 0.5) return '';
  const heavy = rain > 2;
  return `<div class="rain-overlay ${heavy ? 'rain-heavy' : 'rain-light'}"><svg viewBox="0 0 16 16" width="10" height="10" fill="currentColor"><path d="M8 2C8 2 3 8 3 11a5 5 0 0010 0C13 8 8 2 8 2z"/></svg>${rain.toFixed(1)}mm</div>`;
}

// ========== MAP SPOT PICKER ==========
let _leafletLoaded = false;
let _mapPickerMap = null;
let _mapPickerMarker = null;
let _pickedLat = null, _pickedLon = null;

function loadLeaflet() {
  if (_leafletLoaded) return Promise.resolve();
  return new Promise(resolve => {
    const css = document.createElement('link');
    css.rel = 'stylesheet';
    css.href = 'https://unpkg.com/leaflet@1.9/dist/leaflet.css';
    document.head.appendChild(css);
    const js = document.createElement('script');
    js.src = 'https://unpkg.com/leaflet@1.9/dist/leaflet.js';
    js.onload = () => { _leafletLoaded = true; resolve(); };
    document.head.appendChild(js);
  });
}

async function showSuggestModal() {
  // Create fullscreen map picker
  const picker = document.createElement('div');
  picker.className = 'map-picker';
  picker.id = 'mapPicker';
  picker.innerHTML = `
    <div class="map-picker-header">
      <h3>${t('addSpotTitle')}</h3>
      <button class="map-picker-close" onclick="closeMapPicker()"><svg viewBox="0 0 20 20" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l8 8M14 6l-8 8" stroke-linecap="round"/></svg></button>
    </div>
    <div class="map-picker-body">
      <div id="mapPickerMap"></div>
      <div class="map-picker-hint" id="mapPickerHint">${t('tapHint')}</div>
    </div>
    <div class="map-picker-footer" id="mapPickerFooter">
      <div class="map-picker-spot-input">
        <input type="text" id="pickerSpotName" placeholder="${t('spotName')}" maxlength="50">
      </div>
      <div class="map-picker-coords" id="pickerCoords"></div>
      <button class="map-picker-save" id="pickerSaveBtn" disabled onclick="savePickedSpot()">${t('save')}</button>
    </div>`;
  document.body.appendChild(picker);
  document.body.style.overflow = 'hidden';

  // Load Leaflet and init map
  await loadLeaflet();
  const centerLat = userLat || -33.45;
  const centerLon = userLon || -70.65;
  const zoom = userLat ? 10 : 5;

  _mapPickerMap = L.map('mapPickerMap', { zoomControl: false }).setView([centerLat, centerLon], zoom);
  L.control.zoom({ position: 'bottomright' }).addTo(_mapPickerMap);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '', maxZoom: 18
  }).addTo(_mapPickerMap);

  // Add existing spots as small cyan dots
  SPOTS.forEach(s => {
    L.circleMarker([s.lat, s.lon], {
      radius: 4, fillColor: '#06b6d4', fillOpacity: .5, stroke: false
    }).bindTooltip(s.name, { permanent: false, direction: 'top', className: 'spot-tooltip' }).addTo(_mapPickerMap);
  });

  // Add user custom spots as orange dots
  const custom = JSON.parse(localStorage.getItem('ks_custom_spots') || '[]');
  custom.forEach(s => {
    L.circleMarker([s.lat, s.lon], {
      radius: 5, fillColor: '#f97316', fillOpacity: .7, stroke: true, color: '#f97316', weight: 1
    }).bindTooltip(s.name, { permanent: false, direction: 'top' }).addTo(_mapPickerMap);
  });

  // Click to place marker
  _mapPickerMap.on('click', e => {
    _pickedLat = e.latlng.lat;
    _pickedLon = e.latlng.lng;

    if (_mapPickerMarker) _mapPickerMap.removeLayer(_mapPickerMarker);
    _mapPickerMarker = L.marker([_pickedLat, _pickedLon], {
      icon: L.divIcon({
        className: '',
        html: '<div style="width:20px;height:20px;background:var(--cyan);border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.4);transform:translate(-10px,-10px)"></div>',
        iconSize: [0, 0]
      })
    }).addTo(_mapPickerMap);

    // Show footer
    document.getElementById('mapPickerHint').classList.add('hidden');
    document.getElementById('mapPickerFooter').classList.add('visible');
    document.getElementById('pickerCoords').textContent = `${_pickedLat.toFixed(4)}, ${_pickedLon.toFixed(4)}`;
    document.getElementById('pickerSpotName').focus();
    updateSaveBtn();
  });

  // Enable save when name is typed
  document.getElementById('pickerSpotName').addEventListener('input', updateSaveBtn);
}

function updateSaveBtn() {
  const name = document.getElementById('pickerSpotName')?.value?.trim();
  const btn = document.getElementById('pickerSaveBtn');
  if (btn) btn.disabled = !name || !_pickedLat;
}

function closeMapPicker() {
  const picker = document.getElementById('mapPicker');
  if (picker) picker.remove();
  document.body.style.overflow = '';
  if (_mapPickerMap) { _mapPickerMap.remove(); _mapPickerMap = null; }
  _mapPickerMarker = null;
  _pickedLat = null;
  _pickedLon = null;
}

function savePickedSpot() {
  const name = document.getElementById('pickerSpotName')?.value?.trim();
  if (!name || !_pickedLat) return;

  // Create custom spot
  const customSpot = {
    id: 'custom_' + Date.now(),
    name,
    region: 'Personalizado',
    lat: parseFloat(_pickedLat.toFixed(4)),
    lon: parseFloat(_pickedLon.toFixed(4)),
    windMin: 12,
    windMax: 25,
    idealDir: [180, 202, 225, 247, 270, 292, 315],
    level: 'Todos',
    desc: 'Spot agregado por el usuario',
    custom: true
  };

  // Save to localStorage
  const custom = JSON.parse(localStorage.getItem('ks_custom_spots') || '[]');
  custom.push(customSpot);
  localStorage.setItem('ks_custom_spots', JSON.stringify(custom));

  // Add to SPOTS array
  SPOTS.push(customSpot);

  // Add to favorites automatically
  if (!favorites.includes(customSpot.id)) {
    favorites.push(customSpot.id);
    localStorage.setItem('ks_favs', JSON.stringify(favorites));
  }

  // Close map and fetch data
  closeMapPicker();

  // Show toast
  const toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;padding:10px 20px;border-radius:8px;font-size:.8rem;font-weight:600;z-index:300;animation:fadeUp .3s';
  toast.textContent = `${name} ${t('added')}`;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);

  // Fetch data for the new spot
  fetchSpotsOnDemand([customSpot]);
}

let _filterTimer;
function filterSpots() { clearTimeout(_filterTimer); _filterTimer = setTimeout(renderSpots, 300); }

async function fetchSpotsOnDemand(spots, callback) {
  for (const spot of spots) {
    if (spotData[spot.id]) continue;
    try {
      const [wind, marine] = await Promise.all([
        fetchWithRetry(`https://api.open-meteo.com/v1/forecast?latitude=${spot.lat}&longitude=${spot.lon}&current=wind_speed_10m,wind_direction_10m,wind_gusts_10m,temperature_2m,weather_code,precipitation&hourly=wind_speed_10m,wind_direction_10m,wind_gusts_10m,temperature_2m,precipitation,weather_code&forecast_days=7&wind_speed_unit=kn&timezone=America/Santiago`),
        fetchWithRetry(`https://marine-api.open-meteo.com/v1/marine?latitude=${spot.lat}&longitude=${spot.lon}&current=wave_height,wave_period,wave_direction,sea_surface_temperature&hourly=wave_height&forecast_days=7&timezone=America/Santiago`)
      ]);
      if (wind && !wind.error) {
        spotData[spot.id] = { id: spot.id, wind, marine };
        localStorage.setItem('ks_data', JSON.stringify(spotData));
        // Re-render the active view
        const activeTab = document.querySelector('.tab-pane.active')?.id;
        if (activeTab === 'tab-favs') renderFavorites();
        else renderSpots();
      }
    } catch(e) {}
  }
}

function destroyCharts() {
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
}

// ========== FAVORITES ==========
function toggleFav(e, spotId) {
  e.stopPropagation();
  const wasFav = favorites.includes(spotId);
  if (wasFav) favorites = favorites.filter(f => f !== spotId);
  else favorites.push(spotId);
  localStorage.setItem('ks_favs', JSON.stringify(favorites));
  // Update just the button that was clicked
  const btn = e.currentTarget;
  const isFav = !wasFav;
  btn.classList.toggle('active', isFav);
  const svg = btn.querySelector('svg');
  if (svg) svg.setAttribute('fill', isFav ? 'currentColor' : 'none');
}

function renderFavorites() {
  const list = document.getElementById('favList');
  if (!favorites.length) {
    list.innerHTML = `<div class="empty-state"><svg class="ico-empty" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 4l5 10 11 1.6-8 7.8 1.9 11L20 29l-9.9 5.4L12 23.4l-8-7.8L15 14z"/></svg><p>${t('favEmpty')}</p></div>`;
    return;
  }
  const favSpots = SPOTS.filter(s => favorites.includes(s.id));
  // Fetch data on-demand for fav spots not yet loaded
  const toFetch = favSpots.filter(s => !spotData[s.id]);
  if (toFetch.length) fetchSpotsOnDemand(toFetch);
  list.innerHTML = favSpots.map((s, i) => buildSpotCard(s, i)).join('');
}

// ========== NOTIFICATIONS ==========

function requestNotifPermission() {
  if ('Notification' in window) {
    Notification.requestPermission().then(p => {
      if (p === 'granted') document.getElementById('notifBanner').style.display = 'none';
    });
  }
}

function checkAlerts() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const last = JSON.parse(localStorage.getItem('ks_lastAlert') || '{}');
  // Auto-alert on all nearby spots that go green
  getNearbySpots().forEach(spot => {
    const st = getSpotStatus(spot);
    const isGood = st.status === 'green';
    const wasGood = last[spot.id] === true;
    if (isGood && !wasGood) {
      const d = spotData[spot.id];
      const wind = d?.wind?.current?.wind_speed_10m || 0;
      const dir = d?.wind?.current?.wind_direction_10m || 0;
      new Notification(`${spot.name} ${t('spotIsOn')}`, {
        body: `${Math.round(wind)} kn ${degToCompass(dir)}${spot.dist ? ' - '+Math.round(spot.dist)+'km' : ''}`,
        icon: 'icon.svg', tag: 'kitespot-' + spot.id
      });
    }
    last[spot.id] = isGood;
  });
  localStorage.setItem('ks_lastAlert', JSON.stringify(last));
}

// ========== INIT ==========
async function init() {
  // Set lang button
  document.getElementById('langBtn').textContent = lang === 'es' ? 'EN' : 'ES';

  // Load custom spots from localStorage
  const customSpots = JSON.parse(localStorage.getItem('ks_custom_spots') || '[]');
  customSpots.forEach(s => { if (!SPOTS.find(x => x.id === s.id)) SPOTS.push(s); });

  await getLocation();
  fetchAllSpots();

  // Show notification banner if not granted
  if ('Notification' in window && Notification.permission === 'default') {
    document.getElementById('notifBanner').style.display = 'flex';
  }

  // Auto-refresh every 30 min
  setInterval(() => { refreshData(); }, 30 * 60 * 1000);

  // Register SW
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // Pull to refresh
  let _ptrStart = 0, _ptrActive = false;
  const ptrEl = document.getElementById('ptrIndicator');
  document.addEventListener('touchstart', e => {
    if (window.scrollY === 0) { _ptrStart = e.touches[0].clientY; _ptrActive = true; }
  }, { passive: true });
  document.addEventListener('touchmove', e => {
    if (!_ptrActive) return;
    const dy = e.touches[0].clientY - _ptrStart;
    if (dy > 30 && dy < 120) { ptrEl.classList.add('pulling'); ptrEl.classList.remove('refreshing'); }
  }, { passive: true });
  document.addEventListener('touchend', async () => {
    if (ptrEl.classList.contains('pulling')) {
      ptrEl.classList.remove('pulling');
      ptrEl.classList.add('refreshing');
      document.getElementById('ptrText').textContent = 'Actualizando...';
      await refreshData();
      ptrEl.classList.remove('refreshing');
      document.getElementById('ptrText').textContent = 'Suelta para actualizar';
    }
    _ptrActive = false;
  });
}

init();
