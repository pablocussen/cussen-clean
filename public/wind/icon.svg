<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c0118"/>
      <stop offset="45%" stop-color="#1a0533"/>
      <stop offset="60%" stop-color="#2d1b69"/>
      <stop offset="75%" stop-color="#ff6b35"/>
      <stop offset="85%" stop-color="#ff2d78"/>
      <stop offset="100%" stop-color="#0c0118"/>
    </linearGradient>
    <linearGradient id="sunG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="50%" stop-color="#ff2d78"/>
      <stop offset="100%" stop-color="#c026d3"/>
    </linearGradient>
    <linearGradient id="kN" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="sunR" cx="256" cy="310" r="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity=".9"/>
      <stop offset="60%" stop-color="#ff2d78" stop-opacity=".6"/>
      <stop offset="100%" stop-color="#c026d3" stop-opacity="0"/>
    </radialGradient>
    <filter id="neon" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neonStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softG" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <clipPath id="cr"><rect width="512" height="512" rx="108" ry="108"/></clipPath>
  </defs>

  <g clip-path="url(#cr)">
    <!-- Sky gradient -->
    <rect width="512" height="512" fill="url(#sky)"/>

    <!-- Retro sun (half circle with scan lines) -->
    <circle cx="256" cy="320" r="85" fill="url(#sunG)"/>
    <!-- Sun scan lines -->
    <g fill="#0c0118">
      <rect x="171" y="295" width="170" height="4" rx="2"/>
      <rect x="171" y="305" width="170" height="5" rx="2"/>
      <rect x="171" y="316" width="170" height="6" rx="3"/>
      <rect x="171" y="329" width="170" height="7" rx="3"/>
      <rect x="171" y="344" width="170" height="9" rx="4"/>
      <rect x="171" y="362" width="170" height="12" rx="5"/>
    </g>
    <!-- Sun glow -->
    <circle cx="256" cy="310" r="120" fill="url(#sunR)" opacity=".5"/>

    <!-- Perspective grid (ground plane) -->
    <g stroke="#c026d3" fill="none" opacity=".5" stroke-width="1.2">
      <!-- Horizontal lines receding -->
      <line x1="0" y1="340" x2="512" y2="340"/>
      <line x1="0" y1="360" x2="512" y2="360"/>
      <line x1="0" y1="385" x2="512" y2="385"/>
      <line x1="0" y1="415" x2="512" y2="415"/>
      <line x1="0" y1="455" x2="512" y2="455"/>
      <line x1="0" y1="512" x2="512" y2="512"/>
      <!-- Vertical lines converging to vanishing point -->
      <line x1="256" y1="320" x2="0" y2="512"/>
      <line x1="256" y1="320" x2="60" y2="512"/>
      <line x1="256" y1="320" x2="128" y2="512"/>
      <line x1="256" y1="320" x2="200" y2="512"/>
      <line x1="256" y1="320" x2="256" y2="512"/>
      <line x1="256" y1="320" x2="312" y2="512"/>
      <line x1="256" y1="320" x2="384" y2="512"/>
      <line x1="256" y1="320" x2="452" y2="512"/>
      <line x1="256" y1="320" x2="512" y2="512"/>
    </g>

    <!-- Ground plane fill -->
    <path d="M0,340 L512,340 L512,512 L0,512Z" fill="#0c0118" opacity=".4"/>

    <!-- Stars -->
    <g fill="#f0abfc" opacity=".4">
      <circle cx="65" cy="45" r="1.5"/><circle cx="180" cy="75" r="1"/><circle cx="340" cy="35" r="1.3"/>
      <circle cx="430" cy="70" r="1"/><circle cx="90" cy="140" r="1.2"/><circle cx="460" cy="130" r=".9"/>
      <circle cx="200" cy="30" r=".8"/><circle cx="400" cy="100" r="1.1"/><circle cx="50" cy="100" r=".7"/>
    </g>

    <!-- KITE — neon outline style -->
    <g transform="translate(310,115)" filter="url(#neonStrong)">
      <!-- Outer glow -->
      <path d="M-95,-10 Q0,-85 95,-10 Q65,45 0,60 Q-65,45 -95,-10Z" fill="#22d3ee" opacity=".15" filter="url(#softG)"/>
      <!-- Kite body — semi-filled with neon edge -->
      <path d="M-95,-10 Q0,-85 95,-10 Q65,45 0,60 Q-65,45 -95,-10Z" fill="rgba(34,211,238,.12)" stroke="#22d3ee" stroke-width="2.5"/>
      <!-- Panel fill left -->
      <path d="M-95,-10 Q-30,-50 0,60 Q-65,45 -95,-10Z" fill="rgba(34,211,238,.08)"/>
      <!-- Panel fill right -->
      <path d="M95,-10 Q30,-50 0,60 Q65,45 95,-10Z" fill="rgba(103,232,249,.06)"/>
      <!-- Struts neon -->
      <path d="M-95,-10 Q-30,-50 0,60" stroke="#06b6d4" stroke-width="1.5" fill="none" opacity=".7"/>
      <path d="M95,-10 Q30,-50 0,60" stroke="#06b6d4" stroke-width="1.5" fill="none" opacity=".7"/>
      <!-- Leading edge bright -->
      <path d="M-80,-15 Q0,-75 80,-15" stroke="#a5f3fc" stroke-width="3" fill="none" stroke-linecap="round"/>
      <!-- Hotspot -->
      <circle cx="0" cy="-50" r="5" fill="#f0fdfa" opacity=".85"/>
      <circle cx="0" cy="-50" r="12" fill="#22d3ee" opacity=".15"/>
    </g>

    <!-- Control lines — neon thin -->
    <g stroke="#67e8f9" fill="none" opacity=".4" stroke-linecap="round">
      <path d="M230,130 Q210,240 195,320" stroke-width="1.2"/>
      <path d="M395,130 Q340,240 215,320" stroke-width="1.2"/>
    </g>

    <!-- Rider — neon silhouette -->
    <g transform="translate(200,315)" filter="url(#neon)">
      <!-- Board — neon orange -->
      <ellipse cx="5" cy="26" rx="52" ry="5" fill="none" stroke="#fb923c" stroke-width="2.5" transform="rotate(-5,5,26)"/>
      <ellipse cx="5" cy="26" rx="48" ry="2" fill="#fb923c" opacity=".15" transform="rotate(-5,5,26)"/>
      <!-- Spray neon dots -->
      <g fill="#22d3ee" opacity=".7">
        <circle cx="-52" cy="22" r="3"/><circle cx="-44" cy="30" r="2"/><circle cx="-38" cy="36" r="1.3"/>
        <circle cx="60" cy="22" r="2.5"/><circle cx="54" cy="30" r="1.8"/><circle cx="64" cy="32" r="1"/>
      </g>
      <!-- Body outline — neon white/cyan -->
      <path d="M5,24 Q8,12 2,-5" stroke="#f0fdfa" stroke-width="4.5" fill="none" stroke-linecap="round"/>
      <path d="M2,-5 Q-3,-18 -5,-28" stroke="#f0fdfa" stroke-width="4" fill="none" stroke-linecap="round"/>
      <!-- Arms -->
      <path d="M-4,-18 Q-14,-26 -18,-28" stroke="#f0fdfa" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M-4,-18 Q6,-28 14,-28" stroke="#f0fdfa" stroke-width="3" fill="none" stroke-linecap="round"/>
      <!-- Head -->
      <circle cx="-5" cy="-34" r="6.5" fill="none" stroke="#f0fdfa" stroke-width="2.5"/>
      <circle cx="-5" cy="-34" r="6.5" fill="#f0fdfa" opacity=".15"/>
      <!-- Control bar neon -->
      <line x1="-22" y1="-28" x2="18" y2="-28" stroke="#fb923c" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- Reflection of kite in grid (very subtle) -->
    <g transform="translate(310,410) scale(0.7,-0.25)" opacity=".06">
      <path d="M-95,-10 Q0,-85 95,-10 Q65,45 0,60 Q-65,45 -95,-10Z" fill="#22d3ee"/>
    </g>

    <!-- Bottom scanline overlay -->
    <g opacity=".08">
      <rect y="0" width="512" height="1" fill="#f0abfc" transform="translate(0,340)"/>
      <rect y="0" width="512" height="1" fill="#f0abfc" transform="translate(0,342)"/>
      <rect y="0" width="512" height="1" fill="#f0abfc" transform="translate(0,344)"/>
    </g>
  </g>

  <!-- Border -->
  <rect width="512" height="512" rx="108" ry="108" fill="none" stroke="#2d1b69" stroke-width="2" opacity=".6"/>
</svg>
