<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Sunset gradient bg -->
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0c0a1f"/>
      <stop offset="35%" stop-color="#1e1b4b"/>
      <stop offset="65%" stop-color="#7c2d92"/>
      <stop offset="85%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <!-- Kite gradient -->
    <linearGradient id="kiteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="kiteEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Water -->
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0c4a6e" stop-opacity=".7"/>
      <stop offset="100%" stop-color="#082f49" stop-opacity=".95"/>
    </linearGradient>
    <!-- Sun glow -->
    <radialGradient id="sunGlow" cx="50%" cy="68%" r="50%">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity=".9"/>
      <stop offset="40%" stop-color="#fbbf24" stop-opacity=".4"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <!-- Kite shadow filter -->
    <filter id="kiteShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feOffset dx="0" dy="4" result="offset"/>
      <feFlood flood-color="#000" flood-opacity=".4"/>
      <feComposite in2="offset" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <clipPath id="rounded"><rect width="512" height="512" rx="116"/></clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <!-- Sky -->
    <rect width="512" height="512" fill="url(#sky)"/>

    <!-- Sun (just glow, no disk visible) -->
    <rect width="512" height="512" fill="url(#sunGlow)"/>

    <!-- Stars top -->
    <g fill="#fff" opacity=".7">
      <circle cx="80" cy="55" r="1.5"/>
      <circle cx="180" cy="35" r="1"/>
      <circle cx="340" cy="50" r="1.2"/>
      <circle cx="430" cy="80" r="1"/>
      <circle cx="120" cy="100" r=".8"/>
      <circle cx="395" cy="125" r="1"/>
    </g>

    <!-- Distant mountain silhouette -->
    <path d="M0,360 L70,295 L130,330 L195,280 L255,310 L320,275 L390,305 L450,290 L512,315 L512,370 L0,370Z"
          fill="#1e1b4b" opacity=".75"/>
    <!-- Closer mountain -->
    <path d="M0,395 L60,355 L120,380 L180,345 L240,375 L310,355 L380,385 L450,360 L512,380 L512,410 L0,410Z"
          fill="#0f172a" opacity=".8"/>

    <!-- Water area -->
    <rect x="0" y="385" width="512" height="127" fill="url(#water)"/>

    <!-- Water highlights / reflections -->
    <g stroke="#67e8f9" stroke-linecap="round" fill="none" opacity=".4">
      <line x1="60" y1="430" x2="100" y2="430" stroke-width="2"/>
      <line x1="180" y1="445" x2="240" y2="445" stroke-width="1.5"/>
      <line x1="320" y1="425" x2="370" y2="425" stroke-width="2"/>
      <line x1="80" y1="465" x2="140" y2="465" stroke-width="1.5"/>
      <line x1="280" y1="475" x2="350" y2="475" stroke-width="1.5"/>
      <line x1="400" y1="450" x2="470" y2="450" stroke-width="2"/>
    </g>

    <!-- Sun reflection on water -->
    <ellipse cx="256" cy="395" rx="80" ry="3" fill="#fbbf24" opacity=".7"/>
    <ellipse cx="256" cy="410" rx="60" ry="2" fill="#fbbf24" opacity=".4"/>

    <!-- BIG KITE — hero element, centered top -->
    <g transform="translate(256,170)" filter="url(#kiteShadow)">
      <!-- Outer glow halo -->
      <ellipse cx="0" cy="0" rx="160" ry="80" fill="#22d3ee" opacity=".2" filter="url(#glow)"/>
      <!-- Main kite arc shape (C-kite curve) -->
      <path d="M-140,-15
               Q-145,-50 -100,-78
               Q-50,-100 0,-105
               Q50,-100 100,-78
               Q145,-50 140,-15
               Q120,50 60,75
               Q20,90 0,90
               Q-20,90 -60,75
               Q-120,50 -140,-15 Z"
            fill="url(#kiteGrad)"
            stroke="url(#kiteEdge)"
            stroke-width="3"
            stroke-linejoin="round"/>
      <!-- Panel ribs (subtle) -->
      <g fill="none" stroke="#0891b2" stroke-width="2" opacity=".5">
        <path d="M-115,-30 Q-50,-90 -10,90"/>
        <path d="M115,-30 Q50,-90 10,90"/>
        <path d="M-65,-65 Q-25,-50 -3,90"/>
        <path d="M65,-65 Q25,-50 3,90"/>
      </g>
      <!-- Top edge highlight -->
      <path d="M-110,-50 Q0,-110 110,-50"
            stroke="#f0fdfa" stroke-width="4" fill="none"
            opacity=".7" stroke-linecap="round"/>
      <!-- Center bright spot -->
      <ellipse cx="0" cy="-60" rx="20" ry="8" fill="#fff" opacity=".5" filter="url(#glow)"/>
    </g>

    <!-- Lines from kite down to rider -->
    <g stroke="#e2e8f0" stroke-width="1.5" opacity=".55" stroke-linecap="round">
      <path d="M180,200 Q170,300 230,395" fill="none"/>
      <path d="M332,200 Q345,300 280,395" fill="none"/>
    </g>

    <!-- Small rider silhouette on water -->
    <g transform="translate(256,395)">
      <!-- Board -->
      <ellipse cx="0" cy="22" rx="35" ry="4" fill="#1e293b"/>
      <!-- Body silhouette -->
      <path d="M0,22 Q-2,5 -2,-15" stroke="#1e293b" stroke-width="6" fill="none" stroke-linecap="round"/>
      <!-- Head -->
      <circle cx="-2" cy="-22" r="6" fill="#1e293b"/>
      <!-- Spray -->
      <g fill="#67e8f9" opacity=".7">
        <circle cx="-38" cy="20" r="2"/>
        <circle cx="-32" cy="26" r="1.4"/>
        <circle cx="40" cy="20" r="2"/>
        <circle cx="34" cy="26" r="1.4"/>
      </g>
    </g>

  </g>

  <!-- Outer subtle border -->
  <rect width="512" height="512" rx="116" ry="116" fill="none" stroke="#0c0a1f" stroke-width="2" opacity=".5"/>
</svg>
