<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient: deep ocean night sky -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1629"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <!-- Kite gradient: cyan to vivid blue -->
    <linearGradient id="kite" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="kiteShadow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#164e63"/>
    </linearGradient>
    <!-- Sun/horizon glow -->
    <radialGradient id="sunGlow" cx="50%" cy="65%" r="50%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#f97316" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <!-- Wind streak gradient -->
    <linearGradient id="wind" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0"/>
    </linearGradient>
    <!-- Water reflection -->
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e7490" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#164e63" stop-opacity="0.1"/>
    </linearGradient>
    <!-- Kite edge glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- App background with rounded corners -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Atmospheric sun glow behind -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#sunGlow)"/>

  <!-- Subtle horizon line -->
  <line x1="40" y1="340" x2="472" y2="340" stroke="#1e293b" stroke-width="1.5" opacity="0.6"/>

  <!-- Water waves abstract -->
  <g opacity="0.5">
    <path d="M 40 370 Q 100 360 160 370 T 280 370 T 400 370 T 472 370" stroke="#0e7490" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 40 395 Q 110 385 180 395 T 320 395 T 472 395" stroke="#0e7490" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M 60 420 Q 140 410 220 420 T 380 420 T 472 420" stroke="#0e7490" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Wind streaks flowing across sky -->
  <g stroke-linecap="round" fill="none">
    <line x1="60" y1="110" x2="180" y2="110" stroke="url(#wind)" stroke-width="4"/>
    <line x1="90" y1="155" x2="170" y2="155" stroke="url(#wind)" stroke-width="3" opacity="0.7"/>
    <line x1="50" y1="195" x2="200" y2="195" stroke="url(#wind)" stroke-width="3" opacity="0.8"/>
    <line x1="80" y1="240" x2="160" y2="240" stroke="url(#wind)" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- KITE: main curved shape with glow -->
  <g transform="translate(340,130)">
    <!-- Outer glow -->
    <path d="M -90 -20 Q 0 -80 90 -20 Q 60 40 0 50 Q -60 40 -90 -20 Z"
          fill="url(#kite)" opacity="0.3" filter="url(#softGlow)"/>
    <!-- Main kite body (arc shape) -->
    <path d="M -90 -20 Q 0 -80 90 -20 Q 60 40 0 50 Q -60 40 -90 -20 Z"
          fill="url(#kite)" stroke="#a5f3fc" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Kite panel divisions -->
    <path d="M -90 -20 Q -30 -50 0 50" stroke="#0891b2" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M 90 -20 Q 30 -50 0 50" stroke="#0891b2" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M -45 -35 Q -20 -10 0 50" stroke="#0891b2" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M 45 -35 Q 20 -10 0 50" stroke="#0891b2" stroke-width="1" fill="none" opacity="0.4"/>
    <!-- Highlight on top edge -->
    <path d="M -75 -25 Q 0 -70 75 -25" stroke="#f0fdfa" stroke-width="2" fill="none" opacity="0.7" stroke-linecap="round"/>
  </g>

  <!-- Control lines from kite to rider (two thin lines) -->
  <g stroke="#f1f5f9" stroke-width="1.2" opacity="0.75" stroke-linecap="round">
    <line x1="270" y1="150" x2="150" y2="330"/>
    <line x1="410" y1="150" x2="170" y2="330"/>
  </g>

  <!-- Rider silhouette with board -->
  <g transform="translate(160,325)">
    <!-- Board -->
    <ellipse cx="0" cy="40" rx="55" ry="7" fill="#fb923c" opacity="0.95"/>
    <ellipse cx="0" cy="38" rx="55" ry="3" fill="#fed7aa" opacity="0.6"/>
    <!-- Spray -->
    <g fill="#67e8f9" opacity="0.55">
      <circle cx="-60" cy="38" r="2.5"/>
      <circle cx="-55" cy="44" r="1.8"/>
      <circle cx="60" cy="38" r="2.5"/>
      <circle cx="56" cy="44" r="1.8"/>
      <circle cx="-48" cy="48" r="1.2"/>
      <circle cx="52" cy="48" r="1.2"/>
    </g>
    <!-- Body -->
    <path d="M 0 40 Q 5 20 10 0 Q 14 -20 10 -38" stroke="#f1f5f9" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Arms reaching up to bar -->
    <path d="M 10 -20 Q 5 -25 -5 -30" stroke="#f1f5f9" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 10 -20 Q 18 -28 25 -30" stroke="#f1f5f9" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Head -->
    <circle cx="10" cy="-45" r="7" fill="#f1f5f9"/>
    <!-- Control bar -->
    <line x1="-8" y1="-30" x2="28" y2="-30" stroke="#fb923c" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Accent glow dot at top right (wind indicator) -->
  <circle cx="340" cy="130" r="3" fill="#f0fdfa" opacity="0.9"/>
</svg>
