<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="40%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="kiteG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="30%" stop-color="#22d3ee"/>
      <stop offset="70%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="kiteR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#164e63"/>
    </linearGradient>
    <radialGradient id="glow1" cx="256" cy="180" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity=".25"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="256" cy="400" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fb923c" stop-opacity=".2"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="40%" stop-color="#22d3ee" stop-opacity=".6"/>
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0"/>
    </linearGradient>
    <filter id="gl" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <clipPath id="rr"><rect width="512" height="512" rx="108" ry="108"/></clipPath>
  </defs>

  <!-- Clipped to rounded rect -->
  <g clip-path="url(#rr)">
    <!-- Background -->
    <rect width="512" height="512" fill="url(#bg)"/>
    <!-- Ambient glows -->
    <rect width="512" height="512" fill="url(#glow1)"/>
    <rect width="512" height="512" fill="url(#glow2)"/>

    <!-- Stars / dots -->
    <g fill="#f1f5f9" opacity=".15">
      <circle cx="80" cy="60" r="1.2"/><circle cx="420" cy="90" r="1"/><circle cx="140" cy="120" r=".8"/>
      <circle cx="370" cy="55" r="1.1"/><circle cx="450" cy="180" r=".9"/><circle cx="60" cy="200" r="1"/>
    </g>

    <!-- Wind streaks -->
    <g stroke-linecap="round" fill="none">
      <line x1="30" y1="135" x2="195" y2="135" stroke="url(#wg)" stroke-width="3.5"/>
      <line x1="55" y1="180" x2="175" y2="180" stroke="url(#wg)" stroke-width="2.5" opacity=".7"/>
      <line x1="40" y1="225" x2="210" y2="225" stroke="url(#wg)" stroke-width="3" opacity=".8"/>
      <line x1="70" y1="270" x2="170" y2="270" stroke="url(#wg)" stroke-width="2" opacity=".5"/>
      <line x1="45" y1="310" x2="140" y2="310" stroke="url(#wg)" stroke-width="1.5" opacity=".35"/>
    </g>

    <!-- KITE centered — C-shape arc -->
    <g transform="translate(320,155)" filter="url(#gl)">
      <!-- Outer glow layer -->
      <path d="M-105,-15 Q0,-95 105,-15 Q70,50 0,65 Q-70,50 -105,-15Z" fill="url(#kiteG)" opacity=".25" filter="url(#sg)"/>
      <!-- Main kite body -->
      <path d="M-105,-15 Q0,-95 105,-15 Q70,50 0,65 Q-70,50 -105,-15Z" fill="url(#kiteG)" stroke="#cffafe" stroke-width="2" stroke-linejoin="round"/>
      <!-- Dark side panel -->
      <path d="M0,-60 Q35,-20 0,65" fill="url(#kiteR)" opacity=".45"/>
      <!-- Strut lines -->
      <path d="M-105,-15 Q-35,-55 0,65" stroke="#0891b2" stroke-width="1.8" fill="none" opacity=".5"/>
      <path d="M105,-15 Q35,-55 0,65" stroke="#0891b2" stroke-width="1.8" fill="none" opacity=".5"/>
      <path d="M-52,-40 Q-18,-15 0,65" stroke="#0891b2" stroke-width="1.2" fill="none" opacity=".3"/>
      <path d="M52,-40 Q18,-15 0,65" stroke="#0891b2" stroke-width="1.2" fill="none" opacity=".3"/>
      <!-- Leading edge highlight -->
      <path d="M-88,-20 Q0,-82 88,-20" stroke="#f0fdfa" stroke-width="2.5" fill="none" opacity=".8" stroke-linecap="round"/>
      <!-- Bright point -->
      <circle cx="0" cy="-55" r="4" fill="#f0fdfa" opacity=".9"/>
    </g>

    <!-- Control lines — curved, thin -->
    <g stroke="#e2e8f0" fill="none" opacity=".6" stroke-linecap="round">
      <path d="M235,170 Q200,280 190,340" stroke-width="1.3"/>
      <path d="M405,170 Q350,280 210,340" stroke-width="1.3"/>
    </g>

    <!-- Rider — dynamic pose, leaning back -->
    <g transform="translate(195,335)">
      <!-- Board at angle -->
      <ellipse cx="10" cy="42" rx="60" ry="7" fill="#fb923c" transform="rotate(-8,10,42)"/>
      <ellipse cx="10" cy="40" rx="58" ry="3" fill="#fcd34d" opacity=".5" transform="rotate(-8,10,40)"/>
      <!-- Spray particles -->
      <g fill="#67e8f9" opacity=".6">
        <circle cx="-58" cy="36" r="3.5"/><circle cx="-50" cy="46" r="2.5"/><circle cx="-42" cy="52" r="1.8"/>
        <circle cx="72" cy="36" r="3"/><circle cx="65" cy="46" r="2.2"/><circle cx="78" cy="44" r="1.5"/>
        <circle cx="-55" cy="55" r="1.3"/><circle cx="68" cy="54" r="1"/>
      </g>
      <!-- Legs bent -->
      <path d="M8,40 Q12,25 5,12" stroke="#f1f5f9" stroke-width="5.5" fill="none" stroke-linecap="round"/>
      <!-- Torso leaning back -->
      <path d="M5,12 Q-2,-8 -5,-30" stroke="#f1f5f9" stroke-width="6" fill="none" stroke-linecap="round"/>
      <!-- Arms up to bar -->
      <path d="M-5,-22 Q-15,-32 -20,-35" stroke="#f1f5f9" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M-5,-22 Q8,-35 18,-35" stroke="#f1f5f9" stroke-width="4" fill="none" stroke-linecap="round"/>
      <!-- Head -->
      <circle cx="-5" cy="-38" r="8" fill="#f1f5f9"/>
      <!-- Helmet visor -->
      <path d="M-10,-40 Q-5,-43 0,-40" stroke="#0891b2" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- Control bar -->
      <line x1="-24" y1="-35" x2="22" y2="-35" stroke="#fb923c" stroke-width="3.5" stroke-linecap="round"/>
      <!-- Harness hook hint -->
      <circle cx="0" cy="-8" r="2" fill="#94a3b8" opacity=".5"/>
    </g>

    <!-- Water surface with reflections -->
    <g opacity=".45">
      <path d="M0,388 Q60,378 130,388 T280,388 T420,388 T512,388" stroke="#0e7490" stroke-width="2.5" fill="none"/>
      <path d="M0,412 Q80,402 170,412 T350,412 T512,412" stroke="#0e7490" stroke-width="2" fill="none" opacity=".7"/>
      <path d="M0,435 Q90,425 190,435 T380,435 T512,435" stroke="#0e7490" stroke-width="1.5" fill="none" opacity=".5"/>
      <path d="M0,458 Q100,450 200,458 T400,458 T512,458" stroke="#164e63" stroke-width="1" fill="none" opacity=".35"/>
    </g>

    <!-- Kite reflection in water (subtle) -->
    <g transform="translate(320,420) scale(1,-0.3)" opacity=".08">
      <path d="M-80,-15 Q0,-75 80,-15 Q55,40 0,50 Q-55,40 -80,-15Z" fill="#22d3ee"/>
    </g>

    <!-- Bottom vignette -->
    <rect y="350" width="512" height="162" fill="url(#glow2)" opacity=".5"/>
  </g>

  <!-- Outer rounded rect border (subtle) -->
  <rect width="512" height="512" rx="108" ry="108" fill="none" stroke="#1e293b" stroke-width="2"/>
</svg>
