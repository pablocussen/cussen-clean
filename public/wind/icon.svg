<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0f172a"/>
  <g transform="translate(256,240)">
    <!-- Kite shape -->
    <path d="M0,-120 L60,0 L0,120 L-60,0 Z" fill="#06b6d4" opacity="0.9"/>
    <path d="M0,-120 L60,0 L0,0 Z" fill="#0891b2"/>
    <path d="M0,0 L-60,0 L0,120 Z" fill="#0891b2"/>
    <!-- Lines -->
    <line x1="0" y1="120" x2="-20" y2="200" stroke="#f97316" stroke-width="2"/>
    <line x1="0" y1="120" x2="20" y2="200" stroke="#f97316" stroke-width="2"/>
    <!-- Wind lines -->
    <g stroke="#94a3b8" stroke-width="3" stroke-linecap="round" opacity="0.6">
      <line x1="-140" y1="-60" x2="-80" y2="-60"/>
      <line x1="-150" y1="-20" x2="-70" y2="-20"/>
      <line x1="-130" y1="20" x2="-70" y2="20"/>
    </g>
  </g>
  <!-- Text -->
  <text x="256" y="440" text-anchor="middle" font-family="Inter,sans-serif" font-size="48" font-weight="700" fill="#06b6d4">KITESPOT</text>
</svg>