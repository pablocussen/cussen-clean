[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --cov=claudia_modules
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=14
    --tb=short
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    firebase: Tests that require Firebase
    ai: Tests that require AI API

# Ignore warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
