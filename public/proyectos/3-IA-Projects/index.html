    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth}
        body{background:#000;color:#e0e0e0;font-family:'Rajdhani',sans-serif;overflow-x:hidden;line-height:1.4}
        img{max-width:100%;height:auto;display:block}
        a{text-decoration:none}
        #matrix-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:.15}

        /* Boot Screen */
        #boot-screen{position:fixed;inset:0;z-index:9999;background:#000;display:flex;align-items:center;justify-content:center;transition:opacity .6s}
        #boot-screen.hide{opacity:0;pointer-events:none}
        .boot-text{font-family:'JetBrains Mono',monospace;font-size:14px;color:#00ff41;max-width:500px;padding:20px}
        .boot-line{opacity:0;transform:translateY(5px);transition:all .3s}
        .boot-line.show{opacity:1;transform:translateY(0)}
        .boot-cursor{display:inline-block;width:8px;height:16px;background:#00ff41;animation:blink .6s infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

        /* Nav */
        .nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:12px 30px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.8);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,255,65,.1)}
        .nav-logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:18px;color:#fff;text-decoration:none;letter-spacing:2px}
        .nav-links{display:flex;gap:20px}
        .nav-links a{color:#999;text-decoration:none;font-size:14px;letter-spacing:1px;transition:color .3s}
        .nav-links a:hover{color:#00ff41}

        /* Hero */
        .hero{position:relative;z-index:2;text-align:center;padding:120px 20px 40px}
        .hero h1{font-family:'Orbitron',sans-serif;font-size:clamp(32px,6vw,64px);font-weight:900;color:#fff;letter-spacing:4px;line-height:1.1}
        .hero h1 span{color:#00ff41}
        .hero-sub{font-family:'JetBrains Mono',monospace;font-size:clamp(13px,2vw,16px);color:#00ff41;margin-top:16px;opacity:.8}
        .hero-typing{display:inline}
        .hero-cursor{display:inline-block;width:2px;height:1em;background:#00ff41;margin-left:2px;animation:blink .6s infinite;vertical-align:text-bottom}

        /* Stats */
        .stats-bar{position:relative;z-index:2;display:flex;justify-content:center;gap:clamp(20px,5vw,60px);padding:30px 20px;margin:0 auto;max-width:800px}
        .stat{text-align:center}
        .stat-num{font-family:'Orbitron',sans-serif;font-size:clamp(28px,4vw,42px);font-weight:900;color:#00ff41}
        .stat-label{font-size:12px;color:#666;text-transform:uppercase;letter-spacing:2px;margin-top:4px}

        /* Filter */
        .filter-bar{position:sticky;top:52px;z-index:90;padding:14px 20px;display:flex;justify-content:center;gap:10px;flex-wrap:wrap;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,255,65,.08)}
        .filter-pill{font-family:'JetBrains Mono',monospace;font-size:12px;padding:6px 16px;border-radius:20px;border:1px solid #333;background:transparent;color:#777;cursor:pointer;transition:all .3s;letter-spacing:.5px}
        .filter-pill:hover{border-color:#00ff41;color:#00ff41}
        .filter-pill.active{border-color:#00ff41;color:#000;background:#00ff41;box-shadow:0 0 20px rgba(0,255,65,.3)}

        /* Grid */
        .grid{position:relative;z-index:2;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;padding:30px clamp(20px,4vw,60px) 60px;max-width:1400px;margin:0 auto}

        /* Cards */
        .card{position:relative;background:rgba(0,15,8,.85);border:1px solid rgba(0,255,65,.15);border-radius:12px;padding:0;cursor:pointer;transition:all .4s cubic-bezier(.4,0,.2,1);backdrop-filter:blur(8px);overflow:visible;opacity:0;transform:translateY(30px)}
        .card.visible{opacity:1;transform:translateY(0)}
        .card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:12px 0 0 12px}
        .card[data-cat="geo"]::before{background:#00ff41}
        .card[data-cat="ai"]::before{background:#00ffff}
        .card[data-cat="tools"]::before{background:#fbbf24}
        .card[data-cat="apps"]::before{background:#a78bfa}
        .card:not(.flipped):hover{transform:translateY(-4px) scale(1.01);border-color:rgba(0,255,65,.4);box-shadow:0 8px 40px rgba(0,255,65,.12)}
        .card-front::after{content:'';position:absolute;top:-100%;left:0;width:100%;height:100%;background:linear-gradient(180deg,transparent,rgba(0,255,65,.03),transparent);transition:top .6s;pointer-events:none}
        .card:not(.flipped):hover .card-front::after{top:100%}
        .card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
        .card-cat{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;border-radius:4px;font-weight:500}
        .card[data-cat="geo"] .card-cat{color:#00ff41;background:rgba(0,255,65,.1)}
        .card[data-cat="ai"] .card-cat{color:#00ffff;background:rgba(0,255,255,.1)}
        .card[data-cat="tools"] .card-cat{color:#fbbf24;background:rgba(251,191,36,.1)}
        .card[data-cat="apps"] .card-cat{color:#a78bfa;background:rgba(167,139,250,.1)}
        .card-status{display:flex;align-items:center;gap:6px;font-size:10px;letter-spacing:1px;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
        .status-dot{width:6px;height:6px;border-radius:50%}
        .status-live .status-dot{background:#00ff41;box-shadow:0 0 8px #00ff41;animation:pulse-dot 2s infinite}
        .status-live{color:#00ff41}
        .status-dev .status-dot{background:#fbbf24}
        .status-dev{color:#fbbf24}
        .status-mvp .status-dot{background:#00ffff}
        .status-mvp{color:#00ffff}
        @keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
        .card-title{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;color:#fff;margin-bottom:8px;line-height:1.3}
        .card-desc{font-size:14px;color:#888;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:14px}
        .card-tech{display:flex;flex-wrap:wrap;gap:6px}
        .card-tech span{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(255,255,255,.05);color:#666;border:1px solid rgba(255,255,255,.06)}
        .card-arrow{position:absolute;bottom:20px;right:20px;color:#333;font-size:18px;transition:all .3s}
        .card:hover .card-arrow{color:#00ff41;transform:translateX(4px)}

        /* Card Flip */
        .card{perspective:1200px}
        .card-inner{position:relative;transition:transform 0.7s cubic-bezier(0.25,0.46,0.45,0.94);transform-style:preserve-3d;width:100%}
        .card.flipped .card-inner{transform:rotateY(180deg)}
        .card-front,.card-back{backface-visibility:hidden;-webkit-backface-visibility:hidden}
        .card-front{position:relative;padding:24px;overflow:hidden}
        .card-back{transform:rotateY(180deg);display:none;flex-direction:column;padding:24px;background:rgba(0,15,8,.95);border-radius:12px}
        .card.flipped .card-front{display:none}
        .card.flipped .card-back{display:flex}
        .card.flipped{z-index:50;border-color:rgba(0,255,65,.5);animation:cardFloat 3s ease-in-out infinite,cardAppear .5s ease-out}
        @keyframes cardFloat{0%,100%{transform:translateY(0) scale(1.03)}50%{transform:translateY(-8px) scale(1.05)}}
        @keyframes cardAppear{from{opacity:.7;transform:translateY(10px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1.03)}}
        .card[data-cat="geo"].flipped{border-color:#00ff41;box-shadow:0 0 30px rgba(0,255,65,.25)}
        .card[data-cat="ai"].flipped{border-color:#00ffff;box-shadow:0 0 30px rgba(0,255,255,.25)}
        .card[data-cat="tools"].flipped{border-color:#fbbf24;box-shadow:0 0 30px rgba(251,191,36,.25)}
        .card[data-cat="apps"].flipped{border-color:#a78bfa;box-shadow:0 0 30px rgba(167,139,250,.25)}
        .back-title{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:700;color:#fff;margin-bottom:6px;line-height:1.3;padding-right:30px}
        .back-status{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 10px;border-radius:12px;margin-bottom:16px;letter-spacing:1px}
        .back-desc{font-size:14px;color:#aaa;line-height:1.7;margin-bottom:18px}
        .back-section-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:#555;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
        .back-tech-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
        .back-tech-pills span{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 10px;border-radius:4px;background:rgba(0,255,65,.08);color:#00ff41;border:1px solid rgba(0,255,65,.15);transition:all .3s}
        .back-tech-pills span:hover{background:rgba(0,255,65,.15);transform:translateY(-1px)}
        .back-features{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
        .back-features span{font-size:12px;padding:4px 12px;border-radius:20px;background:rgba(255,255,255,.04);color:#888;border:1px solid rgba(255,255,255,.08)}
        .back-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding-top:8px;border-top:1px solid rgba(255,255,255,.06)}
        .back-btn{display:inline-block;padding:10px 28px;border-radius:24px;font-weight:700;text-decoration:none;text-transform:uppercase;letter-spacing:1px;font-size:12px;transition:all .4s cubic-bezier(.4,0,.2,1);font-family:'Rajdhani',sans-serif;text-align:center}
        .back-btn-primary{background:linear-gradient(135deg,#00ff41,#00cc33);color:#000;box-shadow:0 0 20px rgba(0,255,65,.3)}
        .back-btn-primary:hover{box-shadow:0 0 35px rgba(0,255,65,.5);transform:translateY(-3px) scale(1.02)}
        .back-btn-secondary{background:rgba(255,255,255,.05);color:#aaa;border:1px solid #333}
        .back-btn-secondary:hover{border-color:#00ff41;color:#00ff41;transform:translateY(-2px)}
        .back-close{position:absolute;top:10px;right:14px;font-size:22px;color:#555;cursor:pointer;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;transition:all .3s;line-height:1;z-index:5}
        .back-close:hover{color:#00ff41;border-color:#00ff41;background:rgba(0,255,65,.1);transform:rotate(90deg)}

        /* Footer */
        .site-footer{position:relative;z-index:2;text-align:center;padding:40px 20px;border-top:1px solid rgba(0,255,65,.08);color:#444;font-size:13px}

        /* Lang toggle */
        .lang-toggle{position:fixed;top:14px;right:120px;z-index:101;display:flex;gap:4px;opacity:.4;transition:opacity .3s}
        .lang-toggle:hover{opacity:1}
        .lang-toggle button{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 8px;border:1px solid #444;border-radius:4px;background:transparent;color:#777;cursor:pointer;transition:all .2s}
        .lang-toggle button:hover,.lang-toggle button.active{border-color:#00ff41;color:#00ff41}
        /* ── Mobile ── */
        @media(max-width:768px){
            body{-webkit-tap-highlight-color:transparent}
            .hero{padding:80px 16px 20px}
            .hero h1{letter-spacing:2px}
            .hero-sub{margin-top:10px}
            .stats-bar{padding:16px;gap:16px}
            .stat-label{font-size:10px;letter-spacing:1px}
            .filter-bar{top:46px;padding:10px 16px;gap:8px;justify-content:flex-start;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none}
            .filter-bar::-webkit-scrollbar{display:none}
            .filter-pill{flex-shrink:0;padding:8px 16px;font-size:11px}
            .grid{grid-template-columns:1fr;padding:16px 12px 40px;gap:12px}
            .card{border-radius:10px}
            .card-front{padding:18px 16px}
            .card-title{font-size:15px}
            .card-desc{font-size:13px;line-height:1.4}
            .card-arrow{display:none}
            .card-tech span{font-size:9px;padding:2px 6px}
            .card-back{padding:18px 16px}
            .back-title{font-size:14px}
            .back-desc{font-size:12px;line-height:1.5}
            .back-tech-pills span{font-size:9px;padding:2px 6px}
            .back-btn{width:100%;text-align:center;padding:12px;font-size:12px}
            .back-close{font-size:24px;top:6px;right:10px}
            .nav{padding:10px 16px}
            .nav-logo{font-size:16px;letter-spacing:1px}
            .nav-links{display:none}
            .lang-toggle{top:10px;right:12px;opacity:.7}
            .lang-toggle button{padding:6px 10px;font-size:11px}
            .site-footer{padding:30px 16px;font-size:12px}
        }
        @media(max-width:380px){
            .hero{padding:70px 12px 16px}
            .hero h1{font-size:26px;letter-spacing:1px}
            .hero-sub{font-size:12px}
            .stats-bar{gap:10px}
            .stat-num{font-size:24px}
            .stat-label{font-size:9px;letter-spacing:.5px}
            .filter-bar{padding:8px 12px}
            .grid{padding:12px 10px 30px;gap:10px}
            .card-front{padding:14px 12px}
            .card-cat{font-size:9px}
            .card-title{font-size:14px}
            .back-title{font-size:13px}
            .back-desc{font-size:11px}
        }

        /* Scrollbar */
        ::-webkit-scrollbar{width:6px}
        ::-webkit-scrollbar-track{background:#000}
        ::-webkit-scrollbar-thumb{background:#00ff41;border-radius:3px}
    </style>
</head>

    ];

    const catLabels = { geo: 'GEO', ai: 'IA', tools: 'TOOLS', apps: 'APP' };

    // ── Matrix Rain (lighter on mobile) ──
    const isMobile = window.innerWidth <= 768;
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resizeCanvas();
    const matrixChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*アイウエオカキクケコ';
    const fontSize = isMobile ? 10 : 16;
    const columns = Math.floor(canvas.width / fontSize);
    const matrixSkip = isMobile ? 3 : 1;
    const activeColumns = Math.floor(columns / matrixSkip);
    const drops = Array.from({length: activeColumns}, () => Math.random() * canvas.height / fontSize | 0);
    const matrixInterval = isMobile ? 60 : 40;
    function drawMatrix() {
        ctx.fillStyle = 'rgba(0,0,0,0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00ff41';
        ctx.font = fontSize + 'px monospace';
        for (let i = 0; i < drops.length; i++) {
            ctx.fillText(matrixChars[Math.random() * matrixChars.length | 0], i * matrixSkip * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, matrixInterval);
    window.addEventListener('resize', resizeCanvas);

    // ── Boot Sequence ──
    const bootLines = [
        '> CUSSEN AI SYSTEMS v3.0',
        '> Inicializando módulos...',
        `> Cargando ${projects.length} proyectos...`,
        '> Conexión satelital establecida',
        '> SISTEMA LISTO'
    ];
    const bootEl = document.getElementById('boot-text');
    const bootDelay = isMobile ? 200 : 350;
    const bootEnd = isMobile ? 1200 : 2200;
    bootLines.forEach((line, i) => {
        const div = document.createElement('div');
        div.className = 'boot-line';
        div.innerHTML = line + (i === bootLines.length - 1 ? ' <span class="boot-cursor"></span>' : '');
        bootEl.appendChild(div);
        setTimeout(() => div.classList.add('show'), 150 + i * bootDelay);
    });
    setTimeout(() => document.getElementById('boot-screen').classList.add('hide'), bootEnd);
    setTimeout(() => document.getElementById('boot-screen').style.display = 'none', bootEnd + 600);

    // ── Hero Typing ──
    const typingTexts = ['Teledetección satelital + Machine Learning', 'FinTech, GIS, Apps en producción real', 'Del concepto al deploy. Stack completo.'];
    let txtIdx = 0, charIdx = 0, deleting = false;
    const typingEl = document.getElementById('hero-typing');
    function typeEffect() {
        const current = typingTexts[txtIdx];
        if (!deleting) {
            typingEl.textContent = current.slice(0, ++charIdx);
            if (charIdx === current.length) { setTimeout(() => { deleting = true; typeEffect(); }, 2000); return; }
        } else {
            typingEl.textContent = current.slice(0, --charIdx);
            if (charIdx === 0) { deleting = false; txtIdx = (txtIdx + 1) % typingTexts.length; }
        }
        setTimeout(typeEffect, deleting ? 25 : 45);
    }
    setTimeout(typeEffect, bootEnd + 600);

    // ── Stats Counter ──
    document.querySelectorAll('.stat-num').forEach(el => {
        const target = +el.dataset.count;
        let current = 0;
        const step = Math.max(1, Math.floor(target / 40));
        function count() {
            current = Math.min(current + step, target);
            el.textContent = current;
            if (current < target) requestAnimationFrame(count);
        }
        setTimeout(count, bootEnd + 200);
    });

    // ── Render Cards ──
    const grid = document.getElementById('project-grid');
    function getStatusClass(s) {
        if (s === 'PRODUCCION') return 'status-live';
        if (s === 'MVP COMPLETO') return 'status-mvp';
        return 'status-dev';
    }
    function getStatusLabel(s) {
        if (s === 'PRODUCCION') return 'LIVE';
        if (s === 'MVP COMPLETO') return 'MVP';
        return 'DEV';
    }
    projects.forEach((p, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.cat = p.cat;
        card.dataset.id = p.id;
        card.style.transitionDelay = (i % 6) * 0.08 + 's';
        card.innerHTML = `
            <div class="card-inner">
                <div class="card-front">
                    <div class="card-top">
                        <span class="card-cat">${catLabels[p.cat]}</span>
                        <span class="card-status ${getStatusClass(p.status)}"><span class="status-dot"></span>${getStatusLabel(p.status)}</span>
                    </div>
                    <div class="card-title">${p.title}</div>
                    <div class="card-desc">${p.descShort}</div>
                    <div class="card-tech">${p.tech.slice(0, 4).map(t => `<span>${t}</span>`).join('')}</div>
                    <span class="card-arrow">&rarr;</span>
                </div>
                <div class="card-back"></div>
            </div>
        `;
        card.onclick = (e) => { if (!e.target.closest('a')) flipCard(card, p); };
        grid.appendChild(card);
    });

    // ── Scroll Reveal ──
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
    }, { threshold: 0.1 });
    document.querySelectorAll('.card').forEach(c => observer.observe(c));

    // ── Filter ──
    let activeFilter = 'all';
    document.querySelectorAll('.filter-pill').forEach(btn => {
        btn.addEventListener('click', () => {
            if (currentFlipped) { currentFlipped.classList.remove('flipped'); currentFlipped = null; }
            document.querySelector('.filter-pill.active').classList.remove('active');
            btn.classList.add('active');
            activeFilter = btn.dataset.filter;
            document.querySelectorAll('.card').forEach(card => {
                const match = activeFilter === 'all' || card.dataset.cat === activeFilter;
                card.style.display = match ? '' : 'none';
                if (match && !card.classList.contains('visible')) card.classList.add('visible');
            });
        });
    });

    // ── Card Flip ──
    let currentFlipped = null;
    function flipCard(card, p) {
        if (card.classList.contains('flipped')) {
            card.classList.remove('flipped');
            currentFlipped = null;
            return;
        }
        if (currentFlipped && currentFlipped !== card) {
            currentFlipped.classList.remove('flipped');
        }
        const back = card.querySelector('.card-back');
        const statusColor = p.status === 'PRODUCCION' ? '#00ff41' : p.status === 'MVP COMPLETO' ? '#00ffff' : '#fbbf24';
        const allSame = p.landingUrl && p.appUrl && p.infoUrl && p.landingUrl === p.appUrl && p.appUrl === p.infoUrl;
        let actionsHtml;
        if (allSame) {
            actionsHtml = `<a href="${p.landingUrl}" target="_blank" class="back-btn back-btn-primary">Abrir App &rarr;</a>`;
        } else {
            actionsHtml = '';
            if (p.landingUrl) actionsHtml += `<a href="${p.landingUrl}" target="_blank" class="back-btn back-btn-primary">Landing</a>`;
            if (p.appUrl && p.appUrl !== p.landingUrl) actionsHtml += `<a href="${p.appUrl}" target="_blank" class="back-btn back-btn-secondary">App</a>`;
            if (p.infoUrl && p.infoUrl !== p.landingUrl && p.infoUrl !== p.appUrl) actionsHtml += `<a href="${p.infoUrl}" target="_blank" class="back-btn back-btn-secondary">Info</a>`;
            if (!actionsHtml && p.landingUrl) actionsHtml = `<a href="${p.landingUrl}" target="_blank" class="back-btn back-btn-primary">Abrir App &rarr;</a>`;
        }
        const featuresHtml = p.features && p.features.length ? `
            <div class="back-section-label">FEATURES</div>
            <div class="back-features">${p.features.map(f => `<span>${f}</span>`).join('')}</div>` : '';
        back.innerHTML = `
            <button class="back-close" onclick="event.stopPropagation();this.closest('.card').click()">&times;</button>
            <div class="back-title">${p.title}</div>
            <span class="back-status" style="background:${statusColor}22;color:${statusColor};border:1px solid ${statusColor}44">${p.status}</span>
            <div class="back-desc">${p.descCommercial}</div>
            ${featuresHtml}
            <div class="back-section-label">STACK</div>
            <div class="back-tech-pills">${p.tech.map(t => `<span>${t}</span>`).join('')}</div>
            <div class="back-actions">${actionsHtml}</div>
        `;
        card.classList.add('flipped');
        currentFlipped = card;
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape' && currentFlipped) { currentFlipped.classList.remove('flipped'); currentFlipped = null; } });

    // ── Lang Toggle ──
    function switchLang(lang) {
        if (window.switchLanguage) window.switchLanguage(lang);
        document.getElementById('btn-es').classList.toggle('active', lang === 'es');
        document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    }
    </script>
    <script src="../../assets/i18n.js"></script>
