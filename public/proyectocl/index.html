<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1e3a5f">
<title>ProyectoCL — Gestión de Proyectos</title>
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;ProyectoCL&quot;,&quot;short_name&quot;:&quot;ProyectoCL&quot;,&quot;start_url&quot;:&quot;.&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;#f8fafc&quot;,&quot;theme_color&quot;:&quot;#1e3a5f&quot;}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f8fafc;--card:#ffffff;--card2:#f1f5f9;--border:#e2e8f0;--accent:#2563eb;--text:#0f172a;--muted:#64748b;--green:#16a34a;--yellow:#d97706;--red:#dc2626;--purple:#7c3aed;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:linear-gradient(90deg,#1e3a5f,#2563eb);padding:13px 18px;position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;color:white}
header h1{font-size:1.1rem;font-weight:700;letter-spacing:.5px}
header span{font-size:.75rem;opacity:.8}
nav{background:#fff;border-bottom:2px solid var(--border);display:flex;overflow-x:auto;position:sticky;top:62px;z-index:40;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
.tab-btn{flex:0 0 auto;padding:12px 16px;font-size:.82rem;font-weight:600;border:none;background:none;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;white-space:nowrap;font-family:'Inter',sans-serif}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{display:none;padding:16px}
.tab-content.active{display:block}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;border:none;cursor:pointer;font-size:.85rem;font-weight:600;font-family:'Inter',sans-serif;transition:.15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-sm{padding:5px 10px;font-size:.78rem}
.btn-green{background:var(--green);color:#fff}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.card+.card{margin-top:12px}
input,select,textarea{font-family:'Inter',sans-serif;font-size:16px;border:1px solid var(--border);border-radius:8px;padding:9px 12px;width:100%;background:var(--card);color:var(--text);outline:none;transition:.15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
textarea{resize:vertical;min-height:80px}
label{display:block;font-size:.82rem;font-weight:600;color:var(--muted);margin-bottom:5px}
.form-group{margin-bottom:14px}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border-radius:16px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:24px;position:relative}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-title{font-size:1.05rem;font-weight:700}
.close-btn{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--muted);padding:4px;line-height:1}
/* Kanban */
.kanban-top{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.kanban-board{display:flex;gap:14px;overflow-x:auto;padding-bottom:12px;align-items:flex-start;min-height:400px}
.kanban-board::-webkit-scrollbar{height:6px}
.kanban-board::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.kanban-col{flex:0 0 260px;background:var(--card2);border-radius:12px;padding:12px}
.kanban-col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.kanban-col-title{font-size:.88rem;font-weight:700}
.col-badge{background:var(--border);color:var(--muted);border-radius:20px;padding:2px 9px;font-size:.75rem;font-weight:700}
.task-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;transition:.15s;position:relative}
.task-card:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(37,99,235,.1)}
.task-title{font-size:.88rem;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px}
.task-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.priority-badge{font-size:.72rem;font-weight:700;padding:2px 7px;border-radius:20px}
.p-alta{background:#fee2e2;color:#dc2626}
.p-media{background:#fef9c3;color:#d97706}
.p-baja{background:#dcfce7;color:#16a34a}
.avatar{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#fff;flex-shrink:0}
.due-badge{font-size:.72rem;padding:2px 7px;border-radius:20px;font-weight:600}
.due-overdue{background:#fee2e2;color:#dc2626}
.due-today{background:#fef9c3;color:#d97706}
.due-ok{background:#dcfce7;color:#16a34a}
.tag-chip{background:var(--card2);border:1px solid var(--border);border-radius:20px;font-size:.68rem;padding:2px 7px;color:var(--muted)}
.move-btn{position:absolute;top:8px;right:8px;font-size:.7rem;background:var(--accent);color:#fff;border:none;border-radius:6px;padding:3px 7px;cursor:pointer;opacity:0;transition:.15s}
.task-card:hover .move-btn{opacity:1}
/* Task list */
.list-controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-wrap input{padding-left:34px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1rem}
.filter-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);font-size:.78rem;font-weight:600;cursor:pointer;background:var(--card);color:var(--muted);transition:.15s}
.chip.active{border-color:var(--accent);background:#eff6ff;color:var(--accent)}
.task-row{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:7px;cursor:pointer;transition:.15s}
.task-row:hover{border-color:var(--accent)}
.estado-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.row-title{flex:1;font-size:.88rem;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row-meta{display:flex;align-items:center;gap:8px;flex-shrink:0;font-size:.78rem;color:var(--muted)}
select.sort-select{width:auto;font-size:.82rem;padding:7px 10px}
/* Projects */
.proj-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;cursor:pointer;transition:.15s}
.proj-card:hover{border-color:var(--accent)}
.proj-card.selected{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.proj-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.proj-color{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.proj-name{font-size:1rem;font-weight:700}
.prog-bar{height:7px;background:var(--card2);border-radius:10px;overflow:hidden;margin:8px 0}
.prog-fill{height:100%;background:var(--accent);border-radius:10px;transition:.3s}
.proj-stats{display:flex;gap:14px;font-size:.78rem;color:var(--muted);flex-wrap:wrap}
.proj-members{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.status-badge{font-size:.72rem;padding:2px 9px;border-radius:20px;font-weight:700}
.s-activo{background:#dcfce7;color:#16a34a}
.s-pausado{background:#fef9c3;color:#d97706}
.s-terminado{background:#f1f5f9;color:#64748b}
/* Dashboard */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:20px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.ring-wrap{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.ring-pct{font-size:2rem;font-weight:700;color:var(--accent)}
.upcoming-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.upcoming-item:last-child{border-bottom:none}
/* Reports */
.chart-wrap{position:relative;height:220px;margin:10px 0}
.report-table{width:100%;border-collapse:collapse;font-size:.82rem}
.report-table th{text-align:left;padding:8px 10px;background:var(--card2);font-weight:600;font-size:.78rem;color:var(--muted)}
.report-table td{padding:8px 10px;border-bottom:1px solid var(--border)}
/* Comment */
.comment-item{padding:8px 0;border-bottom:1px solid var(--border)}
.comment-item:last-child{border-bottom:none}
.comment-meta{font-size:.72rem;color:var(--muted);margin-bottom:3px}
.comment-text{font-size:.85rem}
/* FAB */
.fab{position:fixed;bottom:24px;right:20px;z-index:30;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;font-size:1.5rem;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(37,99,235,.4);display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif}
/* Color swatches */
.color-swatches{display:flex;gap:8px;flex-wrap:wrap}
.swatch{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.15s}
.swatch.selected{border-color:var(--text)}
/* Move dropdown */
.move-select{position:absolute;top:30px;right:8px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px;z-index:10;box-shadow:0 4px 16px rgba(0,0,0,.12);min-width:160px}
.move-option{padding:7px 10px;font-size:.82rem;cursor:pointer;border-radius:6px;white-space:nowrap}
.move-option:hover{background:var(--card2)}
/* Alerts */
.alert{padding:10px 14px;border-radius:8px;font-size:.85rem;margin-bottom:10px}
.alert-warn{background:#fef9c3;color:#d97706;border:1px solid #fde68a}
.alert-info{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}
/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* Responsive */
@media(min-width:640px){.tab-btn{padding:12px 20px}}
.section-title{font-size:.95rem;font-weight:700;margin-bottom:12px}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-state .icon{font-size:2.5rem;margin-bottom:10px}
.tags-wrap{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
</style>
</head>
<body>

<header>
  <h1>📋 ProyectoCL</h1>
  <span id="active-project-label">Sin proyecto activo</span>
</header>

<nav id="main-nav">
  <button class="tab-btn active" data-tab="tablero">📋 Tablero</button>
  <button class="tab-btn" data-tab="tareas">✅ Tareas</button>
  <button class="tab-btn" data-tab="proyectos">🎯 Proyectos</button>
  <button class="tab-btn" data-tab="dashboard">📊 Dashboard</button>
  <button class="tab-btn" data-tab="reportes">📈 Reportes</button>
</nav>

<!-- TAB: TABLERO -->
<div id="tab-tablero" class="tab-content active">
  <div class="kanban-top">
    <select id="kanban-project-select" style="max-width:220px;font-size:.85rem;padding:7px 10px"></select>
    <button class="btn btn-primary btn-sm" onclick="openNewTask(null)">+ Tarea</button>
  </div>
  <div class="kanban-board" id="kanban-board"></div>
</div>

<!-- TAB: TAREAS -->
<div id="tab-tareas" class="tab-content">
  <div class="list-controls">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="search" id="task-search" placeholder="Buscar tareas..." oninput="renderTaskList()">
    </div>
    <select id="task-sort" class="sort-select" onchange="renderTaskList()">
      <option value="fecha">Fecha límite</option>
      <option value="prioridad">Prioridad</option>
      <option value="asignado">Asignado</option>
      <option value="estado">Estado</option>
    </select>
  </div>
  <div class="filter-chips" id="task-filters">
    <span class="chip active" data-filter-type="estado" data-value="all" onclick="setFilter('estado','all')">Todos</span>
    <span class="chip" data-filter-type="estado" data-value="por_hacer" onclick="setFilter('estado','por_hacer')">Por Hacer</span>
    <span class="chip" data-filter-type="estado" data-value="en_curso" onclick="setFilter('estado','en_curso')">En Curso</span>
    <span class="chip" data-filter-type="estado" data-value="en_revision" onclick="setFilter('estado','en_revision')">En Revisión</span>
    <span class="chip" data-filter-type="estado" data-value="listo" onclick="setFilter('estado','listo')">Listo</span>
    &nbsp;|&nbsp;
    <span class="chip" data-filter-type="prioridad" data-value="all" onclick="setFilter('prioridad','all')">Todas</span>
    <span class="chip" data-filter-type="prioridad" data-value="alta" onclick="setFilter('prioridad','alta')">🔴 Alta</span>
    <span class="chip" data-filter-type="prioridad" data-value="media" onclick="setFilter('prioridad','media')">🟡 Media</span>
    <span class="chip" data-filter-type="prioridad" data-value="baja" onclick="setFilter('prioridad','baja')">🟢 Baja</span>
  </div>
  <div style="height:10px"></div>
  <div id="task-list-container"></div>
  <button class="fab" onclick="openNewTask(null)" title="Nueva tarea">+</button>
</div>

<!-- TAB: PROYECTOS -->
<div id="tab-proyectos" class="tab-content">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <span class="section-title" style="margin:0">🎯 Mis Proyectos</span>
    <button class="btn btn-primary btn-sm" onclick="openProjectModal()">+ Nuevo proyecto</button>
  </div>
  <div id="project-list-container"></div>
</div>

<!-- TAB: DASHBOARD -->
<div id="tab-dashboard" class="tab-content">
  <div id="dashboard-content"></div>
</div>

<!-- TAB: REPORTES -->
<div id="tab-reportes" class="tab-content">
  <div class="card" style="margin-bottom:12px">
    <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end">
      <div class="form-group" style="margin:0;flex:1;min-width:160px">
        <label>Proyecto</label>
        <select id="report-project-select" onchange="renderReports()"></select>
      </div>
      <div class="form-group" style="margin:0;flex:1;min-width:140px">
        <label>Desde</label>
        <input type="date" id="report-from" onchange="renderReports()">
      </div>
      <div class="form-group" style="margin:0;flex:1;min-width:140px">
        <label>Hasta</label>
        <input type="date" id="report-to" onchange="renderReports()">
      </div>
      <button class="btn btn-secondary btn-sm" onclick="exportReport()">📋 Copiar reporte</button>
      <button class="btn btn-green btn-sm" onclick="shareWhatsApp()">📱 WhatsApp</button>
    </div>
  </div>
  <div id="reports-content"></div>
</div>

<!-- TASK MODAL -->
<div class="modal-overlay" id="task-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="task-modal-title">Nueva Tarea</span>
      <button class="close-btn" onclick="closeTaskModal()">✕</button>
    </div>
    <div class="form-group">
      <label>Título *</label>
      <input type="text" id="t-titulo" placeholder="Nombre de la tarea" required>
    </div>
    <div class="form-group">
      <label>Descripción</label>
      <textarea id="t-desc" placeholder="Detalles de la tarea..."></textarea>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label>Estado</label>
        <select id="t-estado">
          <option value="por_hacer">Por Hacer</option>
          <option value="en_curso">En Curso</option>
          <option value="en_revision">En Revisión</option>
          <option value="listo">Listo</option>
        </select>
      </div>
      <div class="form-group">
        <label>Prioridad</label>
        <select id="t-prioridad">
          <option value="media">🟡 Media</option>
          <option value="alta">🔴 Alta</option>
          <option value="baja">🟢 Baja</option>
        </select>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label>Proyecto</label>
        <select id="t-project"></select>
      </div>
      <div class="form-group">
        <label>Asignado a</label>
        <select id="t-asignado"><option value="">Sin asignar</option></select>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label>Fecha límite</label>
        <input type="date" id="t-fecha">
      </div>
      <div class="form-group">
        <label>Etiquetas (coma)</label>
        <input type="text" id="t-tags" placeholder="diseño, urgente, cliente">
      </div>
    </div>
    <div class="form-group">
      <label>Comentarios</label>
      <div id="t-comments-list" style="margin-bottom:8px;max-height:150px;overflow-y:auto"></div>
      <div style="display:flex;gap:8px">
        <input type="text" id="t-new-comment" placeholder="Agregar comentario..." style="flex:1">
        <button class="btn btn-secondary btn-sm" onclick="addComment()">+ Add</button>
      </div>
    </div>
    <div style="display:flex;gap:10px;justify-content:space-between;margin-top:6px">
      <button class="btn btn-danger btn-sm" id="t-delete-btn" onclick="deleteTask()" style="display:none">Eliminar</button>
      <div style="display:flex;gap:8px;margin-left:auto">
        <button class="btn btn-secondary" onclick="closeTaskModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveTask()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<!-- PROJECT MODAL -->
<div class="modal-overlay" id="proj-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="proj-modal-title">Nuevo Proyecto</span>
      <button class="close-btn" onclick="closeProjModal()">✕</button>
    </div>
    <div class="form-group">
      <label>Nombre *</label>
      <input type="text" id="p-nombre" placeholder="Nombre del proyecto">
    </div>
    <div class="form-group">
      <label>Descripción</label>
      <textarea id="p-desc" style="min-height:60px" placeholder="Descripción breve..."></textarea>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label>Fecha inicio</label>
        <input type="date" id="p-inicio">
      </div>
      <div class="form-group">
        <label>Fecha fin</label>
        <input type="date" id="p-fin">
      </div>
    </div>
    <div class="form-group">
      <label>Color</label>
      <div class="color-swatches" id="color-swatches"></div>
    </div>
    <div class="form-group">
      <label>Categoría</label>
      <div class="filter-chips" id="cat-chips">
        <span class="chip" onclick="selectCat('Construcción')">Construcción</span>
        <span class="chip" onclick="selectCat('TI')">TI</span>
        <span class="chip" onclick="selectCat('Marketing')">Marketing</span>
        <span class="chip" onclick="selectCat('Diseño')">Diseño</span>
        <span class="chip" onclick="selectCat('Consultoría')">Consultoría</span>
        <span class="chip" onclick="selectCat('Eventos')">Eventos</span>
        <span class="chip" onclick="selectCat('Personal')">Personal</span>
        <span class="chip" onclick="selectCat('Otro')">Otro</span>
      </div>
    </div>
    <div class="form-group">
      <label>Estado</label>
      <select id="p-estado">
        <option value="activo">Activo</option>
        <option value="pausado">Pausado</option>
        <option value="terminado">Terminado</option>
      </select>
    </div>
    <div class="form-group">
      <label>Miembros (máx 8)</label>
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <input type="text" id="p-member-input" placeholder="Nombre miembro" style="flex:1">
        <button class="btn btn-secondary btn-sm" onclick="addMember()">+ Add</button>
      </div>
      <div id="p-members-list" class="tags-wrap"></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:space-between;margin-top:6px">
      <button class="btn btn-danger btn-sm" id="p-delete-btn" onclick="deleteProject()" style="display:none">Eliminar</button>
      <div style="display:flex;gap:8px;margin-left:auto">
        <button class="btn btn-secondary" onclick="closeProjModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveProject()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<script>
// ===== STATE =====
let db = { projects: [], tasks: [] };
let settings = { activeProjectId: null };
let currentTaskId = null;
let currentProjId = null;
let projMembers = [];
let selectedColor = '#2563eb';
let selectedCat = 'Personal';
let filterEstado = 'all';
let filterPrioridad = 'all';
let moveDropdownOpen = null;
let barChart = null;
let doughnutChart = null;

const COLORS = ['#2563eb','#7c3aed','#16a34a','#d97706','#dc2626','#0891b2'];
const AVATAR_COLORS = ['#2563eb','#7c3aed','#16a34a','#d97706','#dc2626','#0891b2','#db2777','#0d9488'];

// ===== STORAGE =====
function loadData() {
  try {
    const d = localStorage.getItem('proy_data');
    if (d) db = JSON.parse(d);
  } catch(e) { console.warn('Load error', e); }
  try {
    const s = localStorage.getItem('proy_settings');
    if (s) settings = JSON.parse(s);
  } catch(e) {}
  if (!db.projects) db.projects = [];
  if (!db.tasks) db.tasks = [];
  if (!db.projects.length) seedData();
}

function saveData() {
  try { localStorage.setItem('proy_data', JSON.stringify(db)); } catch(e) {}
  try { localStorage.setItem('proy_settings', JSON.stringify(settings)); } catch(e) {}
}

// ===== SEED DATA =====
function seedData() {
  const pid = uid();
  const today = new Date();
  const fmt = (d) => d.toISOString().split('T')[0];
  const past = (n) => { let d=new Date(); d.setDate(d.getDate()-n); return fmt(d); };
  const future = (n) => { let d=new Date(); d.setDate(d.getDate()+n); return fmt(d); };

  db.projects.push({
    id: pid, nombre: 'Remodelación Oficina', descripcion: 'Proyecto de remodelación completa de oficina central',
    color: '#2563eb', inicio: past(30), fin: future(60), miembros: ['Juan','María','Carlos'],
    estado: 'activo', categoria: 'Construcción'
  });

  const tasks = [
    { titulo:'Revisar planos arquitectónicos', estado:'listo', prioridad:'alta', asignado:'Juan', fechaLimite:past(10), tags:['arquitectura','urgente'] },
    { titulo:'Comprar materiales de construcción', estado:'listo', prioridad:'alta', asignado:'Carlos', fechaLimite:past(5), tags:['compras'] },
    { titulo:'Pintura sala de reuniones', estado:'en_curso', prioridad:'media', asignado:'María', fechaLimite:future(3), tags:['pintura','diseño'] },
    { titulo:'Instalación sistema eléctrico nuevo', estado:'en_curso', prioridad:'alta', asignado:'Juan', fechaLimite:past(2), tags:['eléctrica','urgente'] },
    { titulo:'Colocación pisos flotantes', estado:'en_revision', prioridad:'media', asignado:'Carlos', fechaLimite:future(7), tags:['pisos'] },
    { titulo:'Mobiliario sala de espera', estado:'en_revision', prioridad:'baja', asignado:'María', fechaLimite:past(1), tags:['mobiliario','diseño'] },
    { titulo:'Instalar climatización', estado:'por_hacer', prioridad:'alta', asignado:'Juan', fechaLimite:future(14), tags:['HVAC'] },
    { titulo:'Señalética y rotulación oficinas', estado:'por_hacer', prioridad:'baja', asignado:'María', fechaLimite:future(21), tags:['diseño','señalética'] },
  ];

  tasks.forEach(t => {
    db.tasks.push({
      id: uid(), projectId: pid,
      titulo: t.titulo, descripcion: '', estado: t.estado, prioridad: t.prioridad,
      asignado: t.asignado, fechaLimite: t.fechaLimite, tags: t.tags, comentarios: [],
      createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
    });
  });

  settings.activeProjectId = pid;
  saveData();
}

// ===== UTILS =====
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function avatarColor(name) {
  if (!name) return '#64748b';
  let h = 0;
  for (let i=0;i<name.length;i++) h = name.charCodeAt(i) + ((h<<5)-h);
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}

function initials(name) {
  if (!name) return '?';
  return name.trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
}

function dueBadge(dateStr) {
  if (!dateStr) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr+'T00:00:00');
  const diff = Math.round((d-today)/(1000*60*60*24));
  if (diff < 0) return `<span class="due-badge due-overdue">⚠ ${Math.abs(diff)}d atrás</span>`;
  if (diff === 0) return `<span class="due-badge due-today">Hoy</span>`;
  if (diff <= 3) return `<span class="due-badge due-today">${diff}d</span>`;
  return `<span class="due-badge due-ok">${d.toLocaleDateString('es-CL',{day:'2-digit',month:'short'})}</span>`;
}

function estadoColor(e) {
  return {por_hacer:'#64748b',en_curso:'#2563eb',en_revision:'#d97706',listo:'#16a34a'}[e]||'#64748b';
}

function estadoLabel(e) {
  return {por_hacer:'📥 Por Hacer',en_curso:'🔄 En Curso',en_revision:'👀 En Revisión',listo:'✅ Listo'}[e]||e;
}

function prioridadBadge(p) {
  const m = {alta:`<span class="priority-badge p-alta">🔴 Alta</span>`,media:`<span class="priority-badge p-media">🟡 Media</span>`,baja:`<span class="priority-badge p-baja">🟢 Baja</span>`};
  return m[p]||'';
}

function formatDate(s) {
  if (!s) return '';
  const d = new Date(s+'T00:00:00');
  return d.toLocaleDateString('es-CL',{day:'2-digit',month:'short',year:'numeric'});
}

function isOverdue(dateStr) {
  if (!dateStr) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  return new Date(dateStr+'T00:00:00') < today;
}

function activeProject() {
  return db.projects.find(p=>p.id===settings.activeProjectId)||null;
}

function projectTasks(pid) {
  return db.tasks.filter(t=>t.projectId===pid);
}

function daysLeft(dateStr) {
  if (!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr+'T00:00:00');
  return Math.round((d-today)/(1000*60*60*24));
}

// ===== KANBAN =====
function renderKanban() {
  const sel = document.getElementById('kanban-project-select');
  const prev = sel.value;
  sel.innerHTML = '';
  if (!db.projects.length) { sel.innerHTML='<option>Sin proyectos</option>'; document.getElementById('kanban-board').innerHTML='<div class="empty-state"><div class="icon">🎯</div><p>Crea un proyecto primero</p></div>'; return; }
  db.projects.forEach(p => {
    const o = document.createElement('option');
    o.value = p.id; o.textContent = p.nombre;
    if (p.id === settings.activeProjectId) o.selected = true;
    sel.appendChild(o);
  });
  if (prev && db.projects.find(p=>p.id===prev)) sel.value = prev;
  if (sel.value) settings.activeProjectId = sel.value;
  updateActiveLabel();
  drawKanban(settings.activeProjectId);
}

document.getElementById('kanban-project-select').addEventListener('change', function() {
  settings.activeProjectId = this.value;
  saveData();
  updateActiveLabel();
  drawKanban(this.value);
});

function updateActiveLabel() {
  const p = activeProject();
  document.getElementById('active-project-label').textContent = p ? p.nombre : 'Sin proyecto';
}

function drawKanban(pid) {
  const board = document.getElementById('kanban-board');
  const cols = [
    {key:'por_hacer', label:'📥 Por Hacer'},
    {key:'en_curso', label:'🔄 En Curso'},
    {key:'en_revision', label:'👀 En Revisión'},
    {key:'listo', label:'✅ Listo'}
  ];
  const tasks = projectTasks(pid);
  board.innerHTML = cols.map(col => {
    const colTasks = tasks.filter(t=>t.estado===col.key);
    return `<div class="kanban-col">
      <div class="kanban-col-header">
        <span class="kanban-col-title">${col.label}</span>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="col-badge">${colTasks.length}</span>
          <button class="btn btn-primary btn-sm" style="padding:3px 8px;font-size:.72rem" onclick="openNewTask('${col.key}')">+</button>
        </div>
      </div>
      ${colTasks.map(t => renderTaskCard(t)).join('')}
      ${colTasks.length===0?`<div style="text-align:center;padding:20px;color:var(--muted);font-size:.8rem">Sin tareas</div>`:''}
    </div>`;
  }).join('');
}

function renderTaskCard(t) {
  const proj = db.projects.find(p=>p.id===t.projectId);
  return `<div class="task-card" onclick="openTaskDetail('${t.id}')">
    <button class="move-btn" onclick="event.stopPropagation();toggleMoveMenu('${t.id}')">Mover ▾</button>
    <div id="move-menu-${t.id}" style="display:none;position:absolute;top:30px;right:8px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px;z-index:10;box-shadow:0 4px 16px rgba(0,0,0,.12);min-width:160px">
      ${['por_hacer','en_curso','en_revision','listo'].filter(e=>e!==t.estado).map(e=>`<div class="move-option" onclick="event.stopPropagation();moveTask('${t.id}','${e}')">${estadoLabel(e)}</div>`).join('')}
    </div>
    <div class="task-title">${esc(t.titulo)}</div>
    <div class="task-meta">
      ${prioridadBadge(t.prioridad)}
      ${t.asignado?`<span class="avatar" style="background:${avatarColor(t.asignado)}">${initials(t.asignado)}</span>`:''}
      ${t.fechaLimite?dueBadge(t.fechaLimite):''}
    </div>
    ${t.tags&&t.tags.length?`<div class="tags-wrap" style="margin-top:6px">${t.tags.slice(0,2).map(tg=>`<span class="tag-chip">${esc(tg)}</span>`).join('')}</div>`:''}
  </div>`;
}

function toggleMoveMenu(tid) {
  const m = document.getElementById('move-menu-'+tid);
  if (!m) return;
  const isOpen = m.style.display !== 'none';
  document.querySelectorAll('[id^="move-menu-"]').forEach(el=>el.style.display='none');
  m.style.display = isOpen ? 'none' : 'block';
}

function moveTask(tid, newEstado) {
  const t = db.tasks.find(t=>t.id===tid);
  if (t) { t.estado = newEstado; t.updatedAt = new Date().toISOString(); saveData(); }
  renderKanban();
}

document.addEventListener('click', e => {
  if (!e.target.closest('[id^="move-menu-"]') && !e.target.classList.contains('move-btn')) {
    document.querySelectorAll('[id^="move-menu-"]').forEach(el=>el.style.display='none');
  }
});

// ===== TASK LIST =====
function setFilter(type, val) {
  if (type==='estado') filterEstado = val;
  if (type==='prioridad') filterPrioridad = val;
  document.querySelectorAll(`[data-filter-type="${type}"]`).forEach(c=>{
    c.classList.toggle('active', c.dataset.value===val);
  });
  renderTaskList();
}

function renderTaskList() {
  const search = (document.getElementById('task-search').value||'').toLowerCase();
  const sort = document.getElementById('task-sort').value;
  let tasks = [...db.tasks];
  if (filterEstado!=='all') tasks = tasks.filter(t=>t.estado===filterEstado);
  if (filterPrioridad!=='all') tasks = tasks.filter(t=>t.prioridad===filterPrioridad);
  if (search) tasks = tasks.filter(t=>t.titulo.toLowerCase().includes(search)||(t.asignado||'').toLowerCase().includes(search)||(t.tags||[]).join(' ').toLowerCase().includes(search));
  const priMap = {alta:0,media:1,baja:2};
  const estMap = {por_hacer:0,en_curso:1,en_revision:2,listo:3};
  if (sort==='fecha') tasks.sort((a,b)=>(a.fechaLimite||'9')<(b.fechaLimite||'9')?-1:1);
  if (sort==='prioridad') tasks.sort((a,b)=>(priMap[a.prioridad]||1)-(priMap[b.prioridad]||1));
  if (sort==='asignado') tasks.sort((a,b)=>(a.asignado||'').localeCompare(b.asignado||''));
  if (sort==='estado') tasks.sort((a,b)=>(estMap[a.estado]||0)-(estMap[b.estado]||0));
  const c = document.getElementById('task-list-container');
  if (!tasks.length) { c.innerHTML='<div class="empty-state"><div class="icon">✅</div><p>No hay tareas que mostrar</p></div>'; return; }
  c.innerHTML = tasks.map(t => {
    const proj = db.projects.find(p=>p.id===t.projectId);
    return `<div class="task-row" onclick="openTaskDetail('${t.id}')">
      <span class="estado-dot" style="background:${estadoColor(t.estado)}"></span>
      <span class="row-title">${esc(t.titulo)}</span>
      <div class="row-meta">
        ${t.asignado?`<span class="avatar" style="background:${avatarColor(t.asignado)};width:22px;height:22px;font-size:.65rem">${initials(t.asignado)}</span>`:''}
        ${t.fechaLimite?`<span style="font-size:.75rem;color:${isOverdue(t.fechaLimite)?'var(--red)':'var(--muted)'}">${formatDate(t.fechaLimite)}</span>`:''}
        ${prioridadBadge(t.prioridad)}
        ${proj?`<span class="tag-chip">${esc(proj.nombre)}</span>`:''}
      </div>
    </div>`;
  }).join('');
}

// ===== TASK MODAL =====
function openNewTask(defaultEstado) {
  currentTaskId = null;
  document.getElementById('task-modal-title').textContent = 'Nueva Tarea';
  document.getElementById('t-titulo').value = '';
  document.getElementById('t-desc').value = '';
  document.getElementById('t-estado').value = defaultEstado||'por_hacer';
  document.getElementById('t-prioridad').value = 'media';
  document.getElementById('t-fecha').value = '';
  document.getElementById('t-tags').value = '';
  document.getElementById('t-comments-list').innerHTML = '';
  document.getElementById('t-delete-btn').style.display = 'none';
  populateProjectSelect(settings.activeProjectId);
  populateMemberSelect(settings.activeProjectId, null);
  document.getElementById('task-modal').classList.add('open');
  document.getElementById('t-titulo').focus();
}

function openTaskDetail(tid) {
  const t = db.tasks.find(t=>t.id===tid);
  if (!t) return;
  currentTaskId = tid;
  document.getElementById('task-modal-title').textContent = 'Editar Tarea';
  document.getElementById('t-titulo').value = t.titulo;
  document.getElementById('t-desc').value = t.descripcion||'';
  document.getElementById('t-estado').value = t.estado;
  document.getElementById('t-prioridad').value = t.prioridad;
  document.getElementById('t-fecha').value = t.fechaLimite||'';
  document.getElementById('t-tags').value = (t.tags||[]).join(', ');
  populateProjectSelect(t.projectId);
  populateMemberSelect(t.projectId, t.asignado);
  renderComments(t.comentarios||[]);
  document.getElementById('t-delete-btn').style.display = 'inline-flex';
  document.getElementById('task-modal').classList.add('open');
}

function populateProjectSelect(activeId) {
  const sel = document.getElementById('t-project');
  sel.innerHTML = db.projects.map(p=>`<option value="${p.id}" ${p.id===activeId?'selected':''}>${esc(p.nombre)}</option>`).join('');
  sel.addEventListener('change', function() { populateMemberSelect(this.value, null); });
}

function populateMemberSelect(pid, activeAsignado) {
  const proj = db.projects.find(p=>p.id===pid);
  const sel = document.getElementById('t-asignado');
  const members = proj ? proj.miembros : [];
  sel.innerHTML = '<option value="">Sin asignar</option>' + members.map(m=>`<option value="${m}" ${m===activeAsignado?'selected':''}>${esc(m)}</option>`).join('');
  if (!members.find(m=>m===activeAsignado) && activeAsignado) {
    sel.innerHTML += `<option value="${activeAsignado}" selected>${esc(activeAsignado)}</option>`;
  }
}

function renderComments(comments) {
  const c = document.getElementById('t-comments-list');
  if (!comments.length) { c.innerHTML='<p style="font-size:.78rem;color:var(--muted)">Sin comentarios aún</p>'; return; }
  c.innerHTML = comments.map(cm=>`<div class="comment-item"><div class="comment-meta">${cm.fecha||''} ${cm.autor?'· '+esc(cm.autor):''}</div><div class="comment-text">${esc(cm.texto)}</div></div>`).join('');
  c.scrollTop = c.scrollHeight;
}

function addComment() {
  const inp = document.getElementById('t-new-comment');
  const txt = inp.value.trim();
  if (!txt) return;
  const cm = { id:uid(), texto:txt, fecha:new Date().toLocaleString('es-CL',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}), autor:'' };
  if (currentTaskId) {
    const t = db.tasks.find(t=>t.id===currentTaskId);
    if (t) { t.comentarios = t.comentarios||[]; t.comentarios.push(cm); saveData(); renderComments(t.comentarios); }
  }
  inp.value = '';
}

function saveTask() {
  const titulo = document.getElementById('t-titulo').value.trim();
  if (!titulo) { alert('El título es requerido'); return; }
  const pid = document.getElementById('t-project').value;
  const tags = document.getElementById('t-tags').value.split(',').map(s=>s.trim()).filter(Boolean);
  if (currentTaskId) {
    const t = db.tasks.find(t=>t.id===currentTaskId);
    if (t) {
      t.titulo=titulo; t.descripcion=document.getElementById('t-desc').value;
      t.estado=document.getElementById('t-estado').value;
      t.prioridad=document.getElementById('t-prioridad').value;
      t.projectId=pid;
      t.asignado=document.getElementById('t-asignado').value;
      t.fechaLimite=document.getElementById('t-fecha').value;
      t.tags=tags; t.updatedAt=new Date().toISOString();
    }
  } else {
    db.tasks.push({
      id:uid(), projectId:pid, titulo, descripcion:document.getElementById('t-desc').value,
      estado:document.getElementById('t-estado').value, prioridad:document.getElementById('t-prioridad').value,
      asignado:document.getElementById('t-asignado').value, fechaLimite:document.getElementById('t-fecha').value,
      tags, comentarios:[], createdAt:new Date().toISOString(), updatedAt:new Date().toISOString()
    });
  }
  saveData(); closeTaskModal();
  renderKanban(); renderTaskList();
}

function deleteTask() {
  if (!currentTaskId) return;
  if (!confirm('¿Eliminar esta tarea?')) return;
  db.tasks = db.tasks.filter(t=>t.id!==currentTaskId);
  saveData(); closeTaskModal(); renderKanban(); renderTaskList();
}

function closeTaskModal() {
  document.getElementById('task-modal').classList.remove('open');
  document.getElementById('t-new-comment').value = '';
  currentTaskId = null;
}

// ===== PROJECTS =====
function renderProjectList() {
  const c = document.getElementById('project-list-container');
  if (!db.projects.length) { c.innerHTML='<div class="empty-state"><div class="icon">🎯</div><p>No hay proyectos aún.<br>¡Crea tu primer proyecto!</p></div>'; return; }
  c.innerHTML = db.projects.map(p => {
    const tasks = projectTasks(p.id);
    const done = tasks.filter(t=>t.estado==='listo').length;
    const pct = tasks.length ? Math.round(done/tasks.length*100) : 0;
    const dl = daysLeft(p.fin);
    const smap = {activo:'s-activo',pausado:'s-pausado',terminado:'s-terminado'};
    return `<div class="proj-card ${p.id===settings.activeProjectId?'selected':''}" onclick="selectProject('${p.id}')">
      <div class="proj-header">
        <span class="proj-color" style="background:${p.color}"></span>
        <span class="proj-name">${esc(p.nombre)}</span>
        <span class="status-badge ${smap[p.estado]||'s-activo'}" style="margin-left:auto">${p.estado}</span>
        <button class="btn btn-secondary btn-sm" style="margin-left:8px" onclick="event.stopPropagation();editProject('${p.id}')">✏️</button>
      </div>
      ${p.descripcion?`<p style="font-size:.82rem;color:var(--muted);margin-bottom:8px">${esc(p.descripcion)}</p>`:''}
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${p.color}"></div></div>
      <div class="proj-stats">
        <span>${done}/${tasks.length} tareas completadas (${pct}%)</span>
        ${p.categoria?`<span>📁 ${esc(p.categoria)}</span>`:''}
        ${p.fin?`<span>📅 ${formatDate(p.fin)}${dl!==null?` (${dl>=0?dl+'d restantes':Math.abs(dl)+'d vencido'})`:''}</span>`:''}
      </div>
      <div class="proj-members">
        ${(p.miembros||[]).map(m=>`<span class="avatar" style="background:${avatarColor(m)}">${initials(m)}</span>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function selectProject(pid) {
  settings.activeProjectId = pid;
  saveData();
  updateActiveLabel();
  renderProjectList();
  renderKanban();
  populateAllProjectSelects();
}

function populateAllProjectSelects() {
  ['kanban-project-select','report-project-select'].forEach(id => {
    const sel = document.getElementById(id);
    if (!sel) return;
    const prev = sel.value;
    sel.innerHTML = db.projects.map(p=>`<option value="${p.id}" ${p.id===settings.activeProjectId?'selected':''}>${esc(p.nombre)}</option>`).join('');
    if (prev && db.projects.find(p=>p.id===prev)) sel.value = prev;
  });
}

function renderColorSwatches() {
  const c = document.getElementById('color-swatches');
  c.innerHTML = COLOR_SWATCHES.map(col=>`<div class="swatch ${col===selectedColor?'selected':''}" style="background:${col}" onclick="pickColor('${col}')"></div>`).join('');
}

function pickColor(col) { selectedColor = col; renderColorSwatches(); }

function renderCatChips() {
  document.querySelectorAll('#cat-chips .chip').forEach(ch => {
    ch.classList.toggle('active', ch.textContent===selectedCat);
  });
}

function selectCat(cat) { selectedCat = cat; renderCatChips(); }

function addMember() {
  const inp = document.getElementById('p-member-input');
  const name = inp.value.trim();
  if (!name || projMembers.length>=8) return;
  if (projMembers.includes(name)) { inp.value=''; return; }
  projMembers.push(name);
  inp.value = '';
  renderMembersList();
}

function removeMember(name) {
  projMembers = projMembers.filter(m=>m!==name);
  renderMembersList();
}

function renderMembersList() {
  const c = document.getElementById('p-members-list');
  c.innerHTML = projMembers.map(m=>`<span class="tag-chip" style="display:inline-flex;align-items:center;gap:4px">
    <span class="avatar" style="background:${avatarColor(m)};width:20px;height:20px;font-size:.6rem">${initials(m)}</span>
    ${esc(m)}
    <span onclick="removeMember('${esc(m)}')" style="cursor:pointer;color:var(--red);font-weight:700;margin-left:2px">×</span>
  </span>`).join('');
}

function saveProject() {
  const nombre = document.getElementById('p-nombre').value.trim();
  if (!nombre) { alert('El nombre es requerido'); return; }
  if (currentProjId) {
    const p = db.projects.find(p=>p.id===currentProjId);
    if (p) {
      p.nombre=nombre; p.descripcion=document.getElementById('p-desc').value;
      p.color=selectedColor; p.inicio=document.getElementById('p-inicio').value;
      p.fin=document.getElementById('p-fin').value; p.miembros=[...projMembers];
      p.estado=document.getElementById('p-estado').value; p.categoria=selectedCat;
    }
  } else {
    const np = {
      id:uid(), nombre, descripcion:document.getElementById('p-desc').value,
      color:selectedColor, inicio:document.getElementById('p-inicio').value,
      fin:document.getElementById('p-fin').value, miembros:[...projMembers],
      estado:document.getElementById('p-estado').value, categoria:selectedCat
    };
    db.projects.push(np);
    if (!settings.activeProjectId) settings.activeProjectId = np.id;
  }
  saveData(); closeProjModal(); renderProjectList(); populateAllProjectSelects(); updateActiveLabel();
}

function deleteProject() {
  if (!currentProjId) return;
  if (!confirm('¿Eliminar proyecto y todas sus tareas?')) return;
  db.tasks = db.tasks.filter(t=>t.projectId!==currentProjId);
  db.projects = db.projects.filter(p=>p.id!==currentProjId);
  if (settings.activeProjectId===currentProjId) settings.activeProjectId = db.projects[0]?.id||null;
  saveData(); closeProjModal(); renderProjectList(); renderKanban(); populateAllProjectSelects(); updateActiveLabel();
}

function closeProjModal() { document.getElementById('proj-modal').classList.remove('open'); currentProjId=null; }

// Close modals on overlay click
['task-modal','proj-modal'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
});

// ===== DASHBOARD =====
function renderDashboard() {
  const el = document.getElementById('dashboard-content');
  const today = new Date(); today.setHours(0,0,0,0);
  const in7 = new Date(); in7.setDate(in7.getDate()+7);

  // Project summary cards
  let projCards = db.projects.map(p => {
    const tasks = projectTasks(p.id);
    const done = tasks.filter(t=>t.estado==='listo').length;
    const wip = tasks.filter(t=>t.estado==='en_curso').length;
    const todo = tasks.filter(t=>t.estado==='por_hacer').length;
    const overdue = tasks.filter(t=>t.fechaLimite&&isOverdue(t.fechaLimite)&&t.estado!=='listo').length;
    const pct = tasks.length ? Math.round(done/tasks.length*100) : 0;
    const ring = ringSVG(pct, p.color);
    return `<div class="card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <span style="width:12px;height:12px;border-radius:50%;background:${p.color};flex-shrink:0"></span>
        <span style="font-weight:700">${esc(p.nombre)}</span>
      </div>
      <div class="ring-wrap">
        ${ring}
        <div>
          <div class="ring-pct">${pct}%</div>
          <div style="font-size:.75rem;color:var(--muted)">completado</div>
        </div>
      </div>
      <div class="stat-row"><span style="font-size:.82rem">📋 Total tareas</span><strong>${tasks.length}</strong></div>
      <div class="stat-row"><span style="font-size:.82rem">📥 Por hacer</span><strong>${todo}</strong></div>
      <div class="stat-row"><span style="font-size:.82rem">🔄 En curso</span><strong>${wip}</strong></div>
      <div class="stat-row"><span style="font-size:.82rem">✅ Completadas</span><strong>${done}</strong></div>
      <div class="stat-row"><span style="font-size:.82rem">⚠ Atrasadas</span><strong style="color:${overdue?'var(--red)':'inherit'}">${overdue}</strong></div>
    </div>`;
  }).join('');
  if (!projCards) projCards = '<p style="color:var(--muted);font-size:.85rem">No hay proyectos</p>';

  // Upcoming deadlines
  const upcoming = db.tasks.filter(t => {
    if (!t.fechaLimite||t.estado==='listo') return false;
    const d = new Date(t.fechaLimite+'T00:00:00');
    return d>=today && d<=in7;
  }).sort((a,b)=>a.fechaLimite<b.fechaLimite?-1:1).slice(0,8);

  // Overdue
  const overdueAll = db.tasks.filter(t=>t.fechaLimite&&isOverdue(t.fechaLimite)&&t.estado!=='listo');

  // Workload per member
  const memberMap = {};
  db.tasks.forEach(t => {
    if (!t.asignado) return;
    if (!memberMap[t.asignado]) memberMap[t.asignado]={total:0,done:0};
    memberMap[t.asignado].total++;
    if (t.estado==='listo') memberMap[t.asignado].done++;
  });
  const workloadRows = Object.entries(memberMap).map(([name,s])=>`
    <div class="stat-row">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="avatar" style="background:${avatarColor(name)}">${initials(name)}</span>
        <span style="font-size:.85rem">${esc(name)}</span>
      </div>
      <span style="font-size:.82rem;color:var(--muted)">${s.done}/${s.total} completadas</span>
    </div>`).join('');

  // This week completed vs created
  const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate()-7);
  const weekCreated = db.tasks.filter(t=>new Date(t.createdAt)>=weekAgo).length;
  const weekDone = db.tasks.filter(t=>t.estado==='listo'&&new Date(t.updatedAt)>=weekAgo).length;

  el.innerHTML = `
    ${overdueAll.length?`<div class="alert alert-warn">⚠ <strong>${overdueAll.length} tarea${overdueAll.length>1?'s':''} atrasada${overdueAll.length>1?'s':''}</strong> — requieren atención inmediata</div>`:''}
    <div class="section-title">Resumen por Proyecto</div>
    <div class="dash-grid">${projCards}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px" class="dash-grid">
      <div class="card">
        <div class="section-title">📅 Próximos 7 días</div>
        ${upcoming.length?upcoming.map(t=>{
          const proj=db.projects.find(p=>p.id===t.projectId);
          return `<div class="upcoming-item">
            <span class="estado-dot" style="background:${estadoColor(t.estado)}"></span>
            <div style="flex:1;min-width:0">
              <div style="font-size:.85rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.titulo)}</div>
              <div style="font-size:.75rem;color:var(--muted)">${proj?esc(proj.nombre):''} · ${formatDate(t.fechaLimite)}</div>
            </div>
            ${t.asignado?`<span class="avatar" style="background:${avatarColor(t.asignado)};width:22px;height:22px;font-size:.62rem">${initials(t.asignado)}</span>`:''}
          </div>`;
        }).join(''):'<p style="color:var(--muted);font-size:.82rem;padding:10px 0">Sin vencimientos próximos</p>'}
      </div>
      <div class="card">
        <div class="section-title">👥 Carga de trabajo</div>
        ${workloadRows||'<p style="color:var(--muted);font-size:.82rem">Sin asignaciones</p>'}
        <div style="margin-top:14px;border-top:1px solid var(--border);padding-top:12px">
          <div class="section-title">Esta semana</div>
          <div class="stat-row"><span style="font-size:.82rem">✅ Completadas</span><strong style="color:var(--green)">${weekDone}</strong></div>
          <div class="stat-row"><span style="font-size:.82rem">➕ Creadas</span><strong>${weekCreated}</strong></div>
          ${sparkline(weekDone, weekCreated)}
        </div>
      </div>
    </div>`;
}

function ringSVG(pct, color) {
  const r=28, c=32, circ=2*Math.PI*r;
  const dash = circ*(pct/100);
  return `<svg width="64" height="64" viewBox="0 0 64 64">
    <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="var(--border)" stroke-width="6"/>
    <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${color}" stroke-width="6"
      stroke-dasharray="${dash} ${circ}" stroke-dashoffset="${circ/4}" stroke-linecap="round" transform="rotate(-90 ${c} ${c})"/>
  </svg>`;
}

function sparkline(done, created) {
  const max = Math.max(done, created, 1);
  const h = 40, w = 120;
  const bw = 20;
  const bar = (val, x, col) => {
    const bh = Math.max(3, (val/max)*h);
    return `<rect x="${x}" y="${h-bh}" width="${bw}" height="${bh}" rx="3" fill="${col}"/>
      <text x="${x+bw/2}" y="${h+14}" text-anchor="middle" font-size="10" fill="var(--muted)">${val}</text>`;
  };
  return `<svg width="${w}" height="${h+20}" style="margin-top:8px">
    ${bar(created, 10, 'var(--accent)')}
    ${bar(done, 50, 'var(--green)')}
    <text x="10" y="${h+26}" font-size="9" fill="var(--muted)">Creadas</text>
    <text x="50" y="${h+26}" font-size="9" fill="var(--muted)">Hechas</text>
  </svg>`;
}

// ===== REPORTS =====
function renderReports() {
  populateReportSelect();
  const pid = document.getElementById('report-project-select').value;
  const from = document.getElementById('report-from').value;
  const to = document.getElementById('report-to').value;
  const el = document.getElementById('reports-content');

  let tasks = pid ? db.tasks.filter(t=>t.projectId===pid) : [...db.tasks];
  if (from) tasks = tasks.filter(t=>t.createdAt>=from);
  if (to) tasks = tasks.filter(t=>t.createdAt<=to+'T23:59:59');

  const total = tasks.length;
  const done = tasks.filter(t=>t.estado==='listo').length;
  const inProg = tasks.filter(t=>t.estado==='en_curso').length;
  const todo = tasks.filter(t=>t.estado==='por_hacer').length;
  const rev = tasks.filter(t=>t.estado==='en_revision').length;
  const overdueAll = tasks.filter(t=>t.fechaLimite&&isOverdue(t.fechaLimite)&&t.estado!=='listo').length;
  const cumplimiento = total>0?Math.round(done/total*100):0;

  // Avg days to close
  let totalDays=0, closedCount=0;
  tasks.filter(t=>t.estado==='listo').forEach(t=>{
    const d1=new Date(t.createdAt), d2=new Date(t.updatedAt);
    totalDays+=Math.max(0,Math.round((d2-d1)/(1000*60*60*24)));
    closedCount++;
  });
  const avgDays = closedCount ? (totalDays/closedCount).toFixed(1) : '—';

  // Member performance
  const perfMap = {};
  tasks.forEach(t => {
    if (!t.asignado) return;
    if (!perfMap[t.asignado]) perfMap[t.asignado]={completadas:0,atrasadas:0,days:0,dc:0};
    if (t.estado==='listo') {
      perfMap[t.asignado].completadas++;
      const d1=new Date(t.createdAt), d2=new Date(t.updatedAt);
      perfMap[t.asignado].days+=Math.max(0,Math.round((d2-d1)/(1000*60*60*24)));
      perfMap[t.asignado].dc++;
    }
    if (t.fechaLimite&&isOverdue(t.fechaLimite)&&t.estado!=='listo') perfMap[t.asignado].atrasadas++;
  });
  const perfRows = Object.entries(perfMap).map(([name,s])=>`
    <tr>
      <td><span class="avatar" style="background:${avatarColor(name)};display:inline-flex">${initials(name)}</span> ${esc(name)}</td>
      <td>${s.completadas}</td>
      <td style="color:${s.atrasadas?'var(--red)':'inherit'}">${s.atrasadas}</td>
      <td>${s.dc?((s.days/s.dc).toFixed(1)+'d'):'—'}</td>
    </tr>`).join('');

  el.innerHTML = `
    <div class="dash-grid" style="margin-bottom:12px">
      <div class="card">
        <div class="section-title">Resumen</div>
        <div class="stat-row"><span>📋 Tareas totales</span><strong>${total}</strong></div>
        <div class="stat-row"><span>✅ Completadas</span><strong style="color:var(--green)">${done}</strong></div>
        <div class="stat-row"><span>🔄 En curso</span><strong>${inProg}</strong></div>
        <div class="stat-row"><span>📥 Por hacer</span><strong>${todo}</strong></div>
        <div class="stat-row"><span>⚠ Atrasadas</span><strong style="color:${overdueAll?'var(--red)':'inherit'}">${overdueAll}</strong></div>
        <div class="stat-row"><span>⏱ Prom. días cierre</span><strong>${avgDays}</strong></div>
        <div class="stat-row"><span>🎯 Cumplimiento</span><strong style="color:${cumplimiento>=70?'var(--green)':cumplimiento>=40?'var(--yellow)':'var(--red)'}">${cumplimiento}%</strong></div>
      </div>
      <div class="card">
        <div class="section-title">Distribución por Prioridad</div>
        <div class="chart-wrap"><canvas id="doughnut-chart"></canvas></div>
      </div>
    </div>
    <div class="card" style="margin-bottom:12px">
      <div class="section-title">Tareas por Estado (últimos 30 días)</div>
      <div class="chart-wrap"><canvas id="bar-chart"></canvas></div>
    </div>
    <div class="card" style="margin-bottom:12px">
      <div class="section-title">Rendimiento por Miembro</div>
      ${perfRows?`<table class="report-table"><thead><tr><th>Miembro</th><th>Completadas</th><th>Atrasadas</th><th>Prom. días</th></tr></thead><tbody>${perfRows}</tbody></table>`:'<p style="color:var(--muted);font-size:.82rem">Sin datos</p>'}
    </div>`;

  // Charts
  setTimeout(() => {
    drawDoughnutChart(tasks);
    drawBarChart(tasks);
  }, 50);
}

function populateReportSelect() {
  const sel = document.getElementById('report-project-select');
  if (!sel) return;
  const prev = sel.value;
  sel.innerHTML = '<option value="">Todos los proyectos</option>' + db.projects.map(p=>`<option value="${p.id}" ${p.id===settings.activeProjectId?'selected':''}>${esc(p.nombre)}</option>`).join('');
  if (prev) sel.value = prev;
}

function drawDoughnutChart(tasks) {
  const alta = tasks.filter(t=>t.prioridad==='alta').length;
  const media = tasks.filter(t=>t.prioridad==='media').length;
  const baja = tasks.filter(t=>t.prioridad==='baja').length;
  if (doughnutChart) { try{doughnutChart.destroy();}catch(e){} }
  const ctx = document.getElementById('doughnut-chart');
  if (!ctx) return;
  doughnutChart = new Chart(ctx, {
    type:'doughnut',
    data:{
      labels:['🔴 Alta','🟡 Media','🟢 Baja'],
      datasets:[{data:[alta,media,baja],backgroundColor:['#dc2626','#d97706','#16a34a'],borderWidth:2}]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{family:'Inter',size:12}}}}}
  });
}

function drawBarChart(tasks) {
  const days=[]; const labels=[];
  for (let i=29;i>=0;i--) {
    const d=new Date(); d.setDate(d.getDate()-i); d.setHours(0,0,0,0);
    const next=new Date(d); next.setDate(next.getDate()+1);
    const dayStr=d.toISOString().split('T')[0];
    labels.push(i===0?'Hoy':i===1?'Ayer':d.toLocaleDateString('es-CL',{day:'2-digit',month:'2-digit'}));
    days.push({
      done:tasks.filter(t=>t.estado==='listo'&&t.updatedAt>=dayStr&&t.updatedAt<next.toISOString().split('T')[0]).length,
      created:tasks.filter(t=>t.createdAt>=dayStr&&t.createdAt<next.toISOString().split('T')[0]).length
    });
  }
  if (barChart) { try{barChart.destroy();}catch(e){} }
  const ctx = document.getElementById('bar-chart');
  if (!ctx) return;
  barChart = new Chart(ctx, {
    type:'bar',
    data:{
      labels,
      datasets:[
        {label:'Creadas',data:days.map(d=>d.created),backgroundColor:'rgba(37,99,235,.5)',borderColor:'#2563eb',borderWidth:1},
        {label:'Completadas',data:days.map(d=>d.done),backgroundColor:'rgba(22,163,74,.5)',borderColor:'#16a34a',borderWidth:1}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{font:{family:'Inter',size:11}}}},
      scales:{x:{ticks:{font:{family:'Inter',size:9},maxRotation:45}},y:{ticks:{font:{family:'Inter',size:11},stepSize:1}}}
    }
  });
}

function shareWhatsApp() {
  const pid = document.getElementById('report-project-select').value;
  const proj = pid ? db.projects.find(p=>p.id===pid) : null;
  const tasks = pid ? db.tasks.filter(t=>t.projectId===pid) : [...db.tasks];

  const msg = encodeURIComponent(`📋 *ProyectoCL — Actualización*\n${proj?'*'+proj.nombre+'*\n':''}\n✅ Avance: ${pct}% (${done}/${tasks.length} tareas)\n⚠ Atrasadas: ${tasks.filter(t=>t.fechaLimite&&isOverdue(t.fechaLimite)&&t.estado!=='listo').length}\n🔄 En curso: ${tasks.filter(t=>t.estado==='en_curso').length}\n\n_Generado con ProyectoCL_`);

}

// ===== ESC HELPER =====
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== INIT =====
function init() {
  loadData();
  updateActiveLabel();

  // Set report defaults
  const today = new Date();
  const ago30 = new Date(); ago30.setDate(ago30.getDate()-30);
  document.getElementById('report-from').value = ago30.toISOString().split('T')[0];
  document.getElementById('report-to').value = today.toISOString().split('T')[0];

  renderKanban();
  renderTaskList();
  renderProjectList();
  populateAllProjectSelects();

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.key==='Escape') {
      document.querySelectorAll('.modal-overlay.open').forEach(m=>m.classList.remove('open'));
    }
  });

  // Enter key in member input
  document.getElementById('p-member-input').addEventListener('keydown', e=>{if(e.key==='Enter'){e.preventDefault();addMember();}});
  document.getElementById('t-new-comment').addEventListener('keydown', e=>{if(e.key==='Enter'){e.preventDefault();addComment();}});

  // PWA service worker
  if ('serviceWorker' in navigator) {
    const swCode = `
self.addEventListener('install',e=>self.skipWaiting());
self.addEventListener('activate',e=>e.waitUntil(clients.claim()));
self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>new Response('<h1>ProyectoCL — Sin conexión</h1>',{headers:{'Content-Type':'text/html'}}))));`;
    const blob = new Blob([swCode],{type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  }
}

document.addEventListener('DOMContentLoaded', init);
