<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ahorcado Cyberpunk | Cussen.cl</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    body {
      background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0f0f23 100%);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      font-family: 'Rajdhani', sans-serif;
      color: #e0e0e0;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        radial-gradient(2px 2px at 20px 30px, #00fff2, transparent),
        radial-gradient(2px 2px at 40px 70px, #ff00ff, transparent),
        radial-gradient(1px 1px at 90px 40px, #00fff2, transparent),
        radial-gradient(2px 2px at 130px 80px, #ff00ff, transparent),
        radial-gradient(1px 1px at 160px 120px, #00fff2, transparent);
      background-size: 200px 200px;
      animation: sparkle 4s linear infinite;
      opacity: 0.3;
      pointer-events: none;
      z-index: -1;
    }

    @keyframes sparkle {
      from { transform: translateY(0); }
      to { transform: translateY(-200px); }
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 10px;
      padding-bottom: 20px;
    }

    .game-title {
      text-align: center;
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.8rem, 8vw, 3rem);
      font-weight: 900;
      background: linear-gradient(90deg, #00fff2, #ff00ff, #00fff2);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradient-shift 3s ease infinite;
      margin-bottom: 5px;
      letter-spacing: 2px;
    }

    .game-subtitle {
      text-align: center;
      font-family: 'Orbitron', monospace;
      font-size: clamp(0.6rem, 2.5vw, 0.9rem);
      color: #888;
      letter-spacing: 5px;
      margin-bottom: 15px;
    }

    @keyframes gradient-shift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .music-toggle {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 1001;
      padding: 8px 12px;
      background: rgba(20, 20, 35, 0.9);
      border: 1px solid rgba(255, 0, 255, 0.4);
      border-radius: 20px;
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      color: #ff00ff;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .music-toggle:hover, .music-toggle.active {
      background: rgba(255, 0, 255, 0.2);
      box-shadow: 0 0 15px rgba(255, 0, 255, 0.4);
    }

    .back-btn {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 1001;
      padding: 8px 12px;
      background: rgba(20, 20, 35, 0.9);
      border: 1px solid rgba(0, 255, 242, 0.4);
      border-radius: 20px;
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      color: #00fff2;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .back-btn:hover {
      background: rgba(0, 255, 242, 0.2);
      box-shadow: 0 0 15px rgba(0, 255, 242, 0.4);
    }

    .main-panel {
      background: rgba(20, 20, 35, 0.85);
      border: 1px solid rgba(0, 255, 242, 0.3);
      border-radius: 15px;
      padding: 15px;
      box-shadow: 0 0 30px rgba(0, 255, 242, 0.1), inset 0 0 40px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 12px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
    }

    .stat-item { text-align: center; }

    .stat-value {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.2rem, 5vw, 1.8rem);
      font-weight: 900;
      color: #00fff2;
      text-shadow: 0 0 10px rgba(0, 255, 242, 0.5);
    }

    .stat-label {
      font-size: clamp(0.5rem, 2vw, 0.65rem);
      color: #666;
      letter-spacing: 1px;
    }

    .info-panel {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .info-box {
      background: rgba(255, 0, 255, 0.1);
      border: 1px solid rgba(255, 0, 255, 0.3);
      border-radius: 8px;
      padding: 6px 14px;
      font-family: 'Orbitron', monospace;
      font-size: 0.75rem;
    }

    .info-box .label {
      color: #888;
      font-size: 0.55rem;
      letter-spacing: 1px;
    }

    .info-box .value {
      color: #ff00ff;
      font-weight: 700;
      text-shadow: 0 0 8px rgba(255, 0, 255, 0.5);
    }

    .hangman-container {
      text-align: center;
      margin: 10px 0;
    }

    .hangman-svg {
      width: clamp(120px, 35vw, 180px);
      height: auto;
      filter: drop-shadow(0 0 8px #00fff2);
    }

    .hangman-part {
      stroke: #00fff2;
      stroke-width: 3;
      fill: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .hangman-part.visible {
      opacity: 1;
      animation: flicker 0.3s ease;
    }

    .hangman-base {
      stroke: #444;
      stroke-width: 2;
      fill: none;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .lives-container {
      text-align: center;
      margin: 8px 0;
    }

    .lives-label {
      font-family: 'Orbitron', monospace;
      font-size: 0.6rem;
      color: #888;
      letter-spacing: 2px;
      margin-bottom: 5px;
    }

    .life-heart {
      display: inline-block;
      font-size: clamp(1.2rem, 5vw, 1.6rem);
      margin: 0 3px;
      transition: all 0.3s ease;
      filter: drop-shadow(0 0 8px #ff0066);
    }

    .life-heart.lost {
      filter: grayscale(100%) brightness(0.3);
      transform: scale(0.7);
    }

    .word-display {
      text-align: center;
      margin: 15px 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
    }

    .letter-box {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: clamp(32px, 9vw, 48px);
      height: clamp(40px, 11vw, 58px);
      background: rgba(0, 255, 242, 0.1);
      border: 2px solid #00fff2;
      border-radius: 8px;
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.2rem, 5vw, 1.8rem);
      font-weight: 700;
      color: #00fff2;
      text-shadow: 0 0 15px #00fff2;
      box-shadow: 0 0 12px rgba(0, 255, 242, 0.3);
      transition: all 0.3s ease;
    }

    .letter-box.revealed {
      background: rgba(0, 255, 242, 0.2);
      animation: reveal-letter 0.5s ease;
    }

    @keyframes reveal-letter {
      0% { transform: rotateX(90deg) scale(0.5); opacity: 0; }
      50% { transform: rotateX(-10deg) scale(1.1); }
      100% { transform: rotateX(0) scale(1); opacity: 1; }
    }

    .wrong-letters {
      text-align: center;
      margin: 10px 0;
      min-height: 30px;
    }

    .wrong-letters-label {
      font-family: 'Orbitron', monospace;
      font-size: 0.6rem;
      color: #555;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }

    .wrong-letter {
      display: inline-block;
      padding: 4px 10px;
      margin: 2px;
      background: rgba(255, 50, 50, 0.15);
      border: 1px solid rgba(255, 50, 50, 0.4);
      border-radius: 5px;
      font-family: 'Orbitron', monospace;
      color: #ff5555;
      font-size: 0.85rem;
    }

    .keyboard {
      text-align: center;
      margin-top: 15px;
      padding: 0 5px;
    }

    .keyboard-row {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin: 5px 0;
    }

    .key-btn {
      flex: 0 1 auto;
      min-width: clamp(28px, 8.5vw, 42px);
      height: clamp(38px, 11vw, 50px);
      padding: 0;
      background: linear-gradient(180deg, rgba(40, 40, 60, 0.95) 0%, rgba(20, 20, 35, 0.95) 100%);
      border: 1px solid rgba(0, 255, 242, 0.5);
      border-radius: 6px;
      font-family: 'Orbitron', monospace;
      font-size: clamp(0.85rem, 3.5vw, 1.1rem);
      font-weight: 700;
      color: #00fff2;
      cursor: pointer;
      transition: all 0.15s ease;
      text-shadow: 0 0 8px rgba(0, 255, 242, 0.6);
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
    }

    .key-btn:active:not(.used) {
      transform: scale(0.95);
      background: rgba(0, 255, 242, 0.3);
    }

    @media (hover: hover) {
      .key-btn:hover:not(.used) {
        background: rgba(0, 255, 242, 0.2);
        border-color: #00fff2;
        box-shadow: 0 0 18px rgba(0, 255, 242, 0.5);
        transform: translateY(-2px);
      }
    }

    .key-btn.correct {
      background: linear-gradient(180deg, rgba(0, 255, 100, 0.35) 0%, rgba(0, 150, 50, 0.35) 100%);
      border-color: #00ff66;
      color: #00ff66;
      cursor: default;
      box-shadow: 0 0 12px rgba(0, 255, 100, 0.4);
      animation: key-correct 0.4s ease;
    }

    @keyframes key-correct {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    .key-btn.wrong {
      background: linear-gradient(180deg, rgba(255, 50, 50, 0.25) 0%, rgba(100, 20, 20, 0.25) 100%);
      border-color: #ff4444;
      color: #ff4444;
      cursor: default;
      opacity: 0.5;
      animation: key-wrong 0.4s ease;
    }

    @keyframes key-wrong {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-4px); }
      40%, 80% { transform: translateX(4px); }
    }

    .new-game-btn {
      display: block;
      width: 100%;
      max-width: 250px;
      margin: 20px auto 5px;
      padding: 14px 25px;
      background: linear-gradient(90deg, #ff00ff, #00fff2);
      border: none;
      border-radius: 25px;
      font-family: 'Orbitron', monospace;
      font-size: clamp(0.8rem, 3vw, 0.95rem);
      font-weight: 700;
      color: #0a0a0f;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 25px rgba(255, 0, 255, 0.4);
      touch-action: manipulation;
    }

    .new-game-btn:active { transform: scale(0.98); }

    @media (hover: hover) {
      .new-game-btn:hover {
        transform: scale(1.03);
        box-shadow: 0 0 40px rgba(255, 0, 255, 0.6);
      }
    }

    .result-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      animation: fadeIn 0.3s ease;
      padding: 20px;
    }

    .result-overlay.hidden { display: none; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .result-box {
      background: rgba(20, 20, 35, 0.98);
      border: 2px solid;
      border-radius: 20px;
      padding: 30px 40px;
      text-align: center;
      animation: scaleIn 0.4s ease;
      max-width: 90%;
    }

    .result-box.win {
      border-color: #00ff66;
      box-shadow: 0 0 50px rgba(0, 255, 100, 0.5);
    }

    .result-box.lose {
      border-color: #ff3333;
      box-shadow: 0 0 50px rgba(255, 50, 50, 0.5);
    }

    @keyframes scaleIn {
      from { transform: scale(0.5) rotate(-5deg); opacity: 0; }
      to { transform: scale(1) rotate(0); opacity: 1; }
    }

    .result-icon {
      font-size: clamp(3rem, 15vw, 5rem);
      margin-bottom: 15px;
      animation: bounce 0.6s ease infinite alternate;
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to { transform: translateY(-10px); }
    }

    .result-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.5rem, 7vw, 2.5rem);
      font-weight: 900;
      margin-bottom: 10px;
    }

    .result-box.win .result-title {
      color: #00ff66;
      text-shadow: 0 0 25px rgba(0, 255, 100, 0.6);
    }

    .result-box.lose .result-title {
      color: #ff3333;
      text-shadow: 0 0 25px rgba(255, 50, 50, 0.6);
    }

    .result-word {
      font-family: 'Orbitron', monospace;
      font-size: clamp(0.9rem, 4vw, 1.2rem);
      color: #888;
      margin-bottom: 25px;
    }

    .result-word span {
      color: #fff;
      font-weight: 700;
    }

    @media (max-width: 380px) {
      .container { padding: 8px; }
      .main-panel { padding: 12px; }
      .stats-bar { gap: 12px; padding: 8px; }
      .keyboard-row { gap: 3px; }
      .key-btn { min-width: 26px; height: 36px; font-size: 0.8rem; }
    }

    @media (max-height: 500px) and (orientation: landscape) {
      .hangman-svg { width: 100px; }
      .stats-bar { margin-bottom: 8px; padding: 6px; }
      .word-display { margin: 10px 0; }
    }
  </style>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
  <a href="/" class="back-btn" data-es="← VOLVER" data-en="← BACK">← VOLVER</a>
  <button id="music-btn" class="music-toggle">🔇 MÚSICA</button>

  <div class="container">
    <div class="game-title" data-es="AHORCADO" data-en="HANGMAN">AHORCADO</div>
    <div class="game-subtitle">CYBER EDITION</div>

    <div class="main-panel">
      <div class="stats-bar">
        <div class="stat-item">
          <div class="stat-value" id="wins">0</div>
          <div class="stat-label" data-es="VICTORIAS" data-en="WINS">VICTORIAS</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="streak">0</div>
          <div class="stat-label" data-es="RACHA" data-en="STREAK">RACHA</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="games">0</div>
          <div class="stat-label" data-es="PARTIDAS" data-en="GAMES">PARTIDAS</div>
        </div>
      </div>

      <div class="info-panel">
        <div class="info-box">
          <div class="label" data-es="CATEGORÍA" data-en="CATEGORY">CATEGORÍA</div>
          <div class="value" id="category">-</div>
        </div>
        <div class="info-box">
          <div class="label" data-es="LETRAS" data-en="LETTERS">LETRAS</div>
          <div class="value" id="letter-count">0</div>
        </div>
      </div>

      <div class="hangman-container">
        <svg viewBox="0 0 200 220" class="hangman-svg">
          <line x1="20" y1="210" x2="180" y2="210" class="hangman-base"/>
          <line x1="50" y1="210" x2="50" y2="20" class="hangman-base"/>
          <line x1="50" y1="20" x2="120" y2="20" class="hangman-base"/>
          <line x1="120" y1="20" x2="120" y2="45" class="hangman-base"/>
          <circle cx="120" cy="60" r="18" class="hangman-part" id="head"/>
          <line x1="120" y1="78" x2="120" y2="130" class="hangman-part" id="body"/>
          <line x1="120" y1="90" x2="85" y2="115" class="hangman-part" id="left-arm"/>
          <line x1="120" y1="90" x2="155" y2="115" class="hangman-part" id="right-arm"/>
          <line x1="120" y1="130" x2="90" y2="175" class="hangman-part" id="left-leg"/>
          <line x1="120" y1="130" x2="150" y2="175" class="hangman-part" id="right-leg"/>
          <text x="108" y="65" fill="#ff3333" font-size="16" font-weight="bold" font-family="monospace" id="dead-eyes" style="display:none">X X</text>
        </svg>
      </div>

      <div class="lives-container">
        <div class="lives-label" data-es="VIDAS" data-en="LIVES">VIDAS</div>
        <div id="lives"></div>
      </div>

      <div class="word-display" id="word"></div>

      <div class="wrong-letters">
        <div class="wrong-letters-label" data-es="FALLIDAS" data-en="MISSED">FALLIDAS</div>
        <div id="wrong">—</div>
      </div>

      <div class="keyboard" id="keyboard"></div>

      <button class="new-game-btn" id="new-game" data-es="NUEVO JUEGO" data-en="NEW GAME">NUEVO JUEGO</button>
    </div>
  </div>

  <div class="result-overlay hidden" id="result">
    <div class="result-box" id="result-box">
      <div class="result-icon" id="result-icon"></div>
      <div class="result-title" id="result-title"></div>
      <div class="result-word" data-es="La palabra era: <span id=&quot;result-word&quot;></span>" data-en="The word was: <span id=&quot;result-word&quot;></span>">La palabra era: <span id="result-word"></span></div>
      <button class="new-game-btn" id="play-again" data-es="JUGAR DE NUEVO" data-en="PLAY AGAIN">JUGAR DE NUEVO</button>
    </div>
  </div>

  <script>
    // === AUDIO SYSTEM ===
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    let musicPlaying = false;

    function initAudio() {
      if (!audioCtx) audioCtx = new AudioCtx();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playCorrect() {
      initAudio();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.type = 'sine';
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.4);
    }

    function playWrong() {
      initAudio();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.type = 'sawtooth';
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.3);
    }

    function playVictory() {
      initAudio();
      [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.15);
        gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + i * 0.15 + 0.05);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + i * 0.15 + 0.6);
        osc.type = 'sine';
        osc.start(audioCtx.currentTime + i * 0.15);
        osc.stop(audioCtx.currentTime + i * 0.15 + 0.6);
      });
    }

    function playGameOver() {
      initAudio();
      [392, 349.23, 329.63, 261.63].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.25);
        gain.gain.linearRampToValueAtTime(0.25, audioCtx.currentTime + i * 0.25 + 0.05);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + i * 0.25 + 0.5);
        osc.type = 'triangle';
        osc.start(audioCtx.currentTime + i * 0.25);
        osc.stop(audioCtx.currentTime + i * 0.25 + 0.5);
      });
    }

    function playClick() {
      initAudio();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.setValueAtTime(800, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.05);
      osc.type = 'square';
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.05);
    }

    function startMusic() {
      if (musicPlaying) return;
      initAudio();
      musicPlaying = true;
      playBeat();
    }

    function playBeat() {
      if (!musicPlaying) return;
      const bass = audioCtx.createOscillator();
      const bassGain = audioCtx.createGain();
      bass.connect(bassGain);
      bassGain.connect(audioCtx.destination);
      bass.frequency.setValueAtTime(55, audioCtx.currentTime);
      bassGain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      bassGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
      bass.type = 'sine';
      bass.start(audioCtx.currentTime);
      bass.stop(audioCtx.currentTime + 0.3);

      const notes = [130.81, 164.81, 196, 261.63];
      const synth = audioCtx.createOscillator();
      const synthGain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      synth.connect(filter);
      filter.connect(synthGain);
      synthGain.connect(audioCtx.destination);
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(800, audioCtx.currentTime);
      synth.frequency.setValueAtTime(notes[Math.floor(Math.random() * notes.length)], audioCtx.currentTime);
      synthGain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      synthGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
      synth.type = 'sawtooth';
      synth.start(audioCtx.currentTime);
      synth.stop(audioCtx.currentTime + 0.4);
      setTimeout(playBeat, 500);
    }

    function stopMusic() { musicPlaying = false; }

    function toggleMusic() {
      const btn = document.getElementById('music-btn');
      if (musicPlaying) {
        stopMusic();
        btn.innerHTML = '🔇 MÚSICA';
        btn.classList.remove('active');
      } else {
        startMusic();
        btn.innerHTML = '🎵 MÚSICA';
        btn.classList.add('active');
      }
    }

    // === GAME DATA ===
    const categories = {
      'ANIMALES': ['elefante', 'jirafa', 'cocodrilo', 'mariposa', 'delfin', 'tortuga', 'canguro', 'pinguino', 'leopardo', 'aguila'],
      'PAISES': ['argentina', 'colombia', 'alemania', 'australia', 'japon', 'brasil', 'mexico', 'espana', 'francia', 'italia'],
      'TECNOLOGIA': ['algoritmo', 'software', 'hardware', 'servidor', 'internet', 'frontend', 'backend', 'terminal', 'codigo', 'pixel'],
      'ESPACIO': ['galaxia', 'asteroide', 'saturno', 'neptuno', 'cometa', 'supernova', 'pluton', 'estrella', 'planeta', 'meteorito'],
      'CIENCIA': ['molecula', 'atomo', 'electron', 'neutron', 'quimica', 'biologia', 'fisica', 'genetica', 'celula', 'energia']
    };

    const hangmanParts = ['head', 'body', 'left-arm', 'right-arm', 'left-leg', 'right-leg'];
    const keyboardRows = [
      ['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'],
      ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L'],
      ['Z', 'X', 'C', 'V', 'B', 'N', 'M', 'Ñ']
    ];

    // === GAME STATE ===
    let word = '';
    let category = '';
    let correctLetters = [];
    let wrongLetters = [];
    let errors = 0;
    let maxErrors = 6;
    let gameOver = false;
    let stats = { wins: 0, games: 0, streak: 0 };

    // Load stats from localStorage
    const savedStats = localStorage.getItem('ahorcado-stats');
    if (savedStats) stats = JSON.parse(savedStats);

    // === GAME FUNCTIONS ===
    function newGame() {
      const catNames = Object.keys(categories);
      category = catNames[Math.floor(Math.random() * catNames.length)];
      const words = categories[category];
      word = words[Math.floor(Math.random() * words.length)].toUpperCase();
      correctLetters = [];
      wrongLetters = [];
      errors = 0;
      gameOver = false;

      document.getElementById('result').classList.add('hidden');
      document.getElementById('dead-eyes').style.display = 'none';
      updateDisplay();
      renderKeyboard();
    }

    function updateDisplay() {
      // Stats
      document.getElementById('wins').textContent = stats.wins;
      document.getElementById('streak').textContent = stats.streak;
      document.getElementById('games').textContent = stats.games;

      // Info
      document.getElementById('category').textContent = category;
      document.getElementById('letter-count').textContent = word.length;

      // Hangman
      hangmanParts.forEach((part, i) => {
        document.getElementById(part).classList.toggle('visible', i < errors);
      });

      // Lives
      let livesHtml = '';
      for (let i = 0; i < maxErrors; i++) {
        livesHtml += `<span class="life-heart${i >= maxErrors - errors ? ' lost' : ''}">❤️</span>`;
      }
      document.getElementById('lives').innerHTML = livesHtml;

      // Word
      let wordHtml = '';
      for (const letter of word) {
        const revealed = correctLetters.includes(letter) || gameOver;
        wordHtml += `<div class="letter-box${revealed ? ' revealed' : ''}">${revealed ? letter : ''}</div>`;
      }
      document.getElementById('word').innerHTML = wordHtml;

      // Wrong letters
      document.getElementById('wrong').innerHTML = wrongLetters.length > 0
        ? wrongLetters.map(l => `<span class="wrong-letter">${l}</span>`).join('')
        : '—';
    }

    function renderKeyboard() {
      let html = '';
      keyboardRows.forEach(row => {
        html += '<div class="keyboard-row">';
        row.forEach(letter => {
          let cls = 'key-btn';
          if (correctLetters.includes(letter)) cls += ' correct used';
          else if (wrongLetters.includes(letter)) cls += ' wrong used';
          html += `<button class="${cls}" data-letter="${letter}">${letter}</button>`;
        });
        html += '</div>';
      });
      document.getElementById('keyboard').innerHTML = html;
    }

    function checkLetter(letter) {
      if (gameOver || correctLetters.includes(letter) || wrongLetters.includes(letter)) return;

      playClick();

      if (word.includes(letter)) {
        correctLetters.push(letter);
        playCorrect();

        // Check win
        const uniqueLetters = [...new Set(word.split(''))];
        if (uniqueLetters.every(l => correctLetters.includes(l))) {
          gameOver = true;
          stats.wins++;
          stats.games++;
          stats.streak++;
          saveStats();
          setTimeout(() => {
            playVictory();
            showResult(true);
          }, 300);
        }
      } else {
        wrongLetters.push(letter);
        errors++;
        playWrong();

        // Check lose
        if (errors >= maxErrors) {
          gameOver = true;
          stats.games++;
          stats.streak = 0;
          saveStats();
          document.getElementById('dead-eyes').style.display = 'block';
          setTimeout(() => {
            playGameOver();
            showResult(false);
          }, 300);
        }
      }

      updateDisplay();
      renderKeyboard();
    }

    function showResult(win) {
      const resultBox = document.getElementById('result-box');
      resultBox.className = 'result-box ' + (win ? 'win' : 'lose');
      document.getElementById('result-icon').textContent = win ? '🎉' : '💀';
      document.getElementById('result-title').textContent = win ? '¡VICTORIA!' : 'GAME OVER';
      document.getElementById('result-word').textContent = word;
      document.getElementById('result').classList.remove('hidden');
    }

    function saveStats() {
      localStorage.setItem('ahorcado-stats', JSON.stringify(stats));
    }

    // === EVENT LISTENERS ===
    document.getElementById('keyboard').addEventListener('click', e => {
      if (e.target.classList.contains('key-btn')) {
        checkLetter(e.target.dataset.letter);
      }
    });

    document.getElementById('new-game').addEventListener('click', newGame);
    document.getElementById('play-again').addEventListener('click', newGame);
    document.getElementById('music-btn').addEventListener('click', toggleMusic);

    // Keyboard support
    document.addEventListener('keydown', e => {
      const letter = e.key.toUpperCase();
      if (/^[A-ZÑ]$/.test(letter)) {
        checkLetter(letter);
      }
    });

    // Start game
    newGame();
  </script>
  <script src="../assets/i18n.js"></script>
</body>
</html>
